front:
  text: 吳師道讀四書叢説序讀四書叢説者金華白雲先生許君益之為其徒講説而其徒記之之編也君師仁山金先生履祥仁山師魯亝王先生柏從登北山何先生基之門北山則學於勉亝黃公而得朱子之傳者也四書自二程子表章肇明其旨至朱子章句集注之出折衷羣言集厥大成説者固蔑以加矣門人髙弟不為不多然一再傳之後不泯滅而􅈬微則泮渙而離真其能的然久而不失傳授之正則未有如吾鄉諸先生也蓋自北山取語録精義以為發揮與章句集注相發魯亝為標注點抹提挈開示仁山于大學有疏義指義論孟有考證中庸有標抹又推所得于何王者者與其已意併載之君上承淵源之懿雖見仁山甚晚而契誼最深天資純明而又加以堅苦篤實之功妙理融于言表成説具于胸中問難開陳陳無少疑滯抑揚反覆使人竦聼深思隨其淺深而有得焉故自逺方來從學者至數百人遂為一時之盛今觀叢説之編其于章句集注也奧者白之約者暢之要者提之異者通之畫圖以形其妙析段以顯其義至于訓詁名物之缺考證輔而未備者又詳著焉其或異義微牾則曰自我言之則為忠臣自他人言之則為讒賊金先生有是言也此可以見其志之所存矣嗚呼𣣔通四書之旨者必讀朱子之書𣣔讀朱子之書者必由許君之説兹非適道之津梁示學者之標的歟先是君未沒時州人有得其書而刋之者君聞亟使人止之且恐記録之差也則自取以視因得遂為善本諸生謂豫嘗辱君之知俾序其所以然竊獨惟念昔聞北山首見勉齋臨川將别授以但熟讀四書之訓晚年悉屏諸家所録直以本書深玩蓋不忘付囑之意自是以來諸先生守為家法其推明演繹者將以反朱子之約而已故能傳緒不差閎大光明式克至於今日也又念某識君之𥘉嘗以持敬致知之説質于君君是之復舉朱子見延平時其言好惡同異喜大耻小延平語以吾儒之學理不患其不一所難分不殊耳朱子感其言精察妙契著書數十萬言莫不由此學者于朱子之書當句讀字求必若朱子之用功而後足以得其心此君之拳拳為人言者也然則得君之叢説而讀之者其于君教人讀書之法尤不可以不知也故因併著之君名謙其世系履行與凡他經論著詳具友人張樞子長所為行述茲不復贅云黃溍作墓志曰先生叢説敷繹義理惟務平實嘗曰聖賢之心盡在四書四書之義備于朱子顧其立言辭約義廣讀者或不能悉究其義以一偏之致自異𥘉不知未離其範圍其可以易心求之哉
