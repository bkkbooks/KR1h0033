body:
  text: 右白雲先生文懿許公所箸讀書叢説六篇先生之子元與門人俞實叟等之所校讎其文字無訛斘可誦習東陽張樞考其終始而序次其説曰古者左史記事右史記言春秋者左史之流而書者言與事皆記之也古書篇第至多聖人取其嘉言善行可以垂世立教近於時切於事者定箸為書百篇凡聖賢傳道之微旨帝王經世之大猷盡在是矣遭秦滅學漢興掇拾輔綴於焚棄之餘雖有所佚亡猶幸其不遂堙沒而無傳於世也於是立之學官以教學子孔安國始為書傳辭義簡質至唐孔頴逹撰正義以推演其説其以後書説䆮廣見於箸録者數十百家疲精神瘁枯竹間有所明而其大要卒不能以出夫二家之説焉朱子之為經於書屬之門人蔡氏固嘗質疑問難然非若昜詩之有全書也本朝設科取士並絀衆説而專用古注疏蔡氏猶以朱子故也蔡氏之説或有未備仁山先生文安金公於書表注通鑑前編引書語中既剖析而著明之矣先生受學之久聞義之邃獨患是經之傳出於朱子之門人苟一豪之不盡則學者無所折衷非所以稱國家崇奬訓厲之意乃研精覃思博求其義為之圖説以示學者使人人易知焉於是言行並彰細大畢備書之奧義微旨至此無餘藴矣叢説中所引傳疏諸家之説或采掇其辭而易置其次不必盡如舊也蓋皆有所裁定而畢致其意非徒隨文引援而已雖其説時時少異於蔡氏而異者所以為同也先生嘗誦誦金先生之言曰在我言之則為忠臣在人言之則為讒賊要歸於是而己豈不信哉至正六年門人南臺監御史白野普化怗睦爾與其僚大梁楊公惠移浙東廉訪使謂先生之遺書雖已行於世而學者倦於翻録使得鋟板以傳此誠學者之幸亷訪使既受牒轉移浙東宣慰使請下屬郡取於校官羡財以給資用如監察御史言於先生所著詩名物鈔八篇四書叢説二十篇與讀書叢説皆刋行樞聞古之有道有德者必推己之所明以發人之所未明已得之而後施於人禮樂政教之謂也夫豈自為己哉其或邂逅無位不能見之事業將以正人心覺來世者莫大乎為經自世學不明而士之為經者各􅕽其偏私以求聖人之意求之愈深而失之愈逺言之愈廣而襲之愈晦此世士之為經者之所同病也先生不幸無位退而求之於經不為竒新不求近名率以救往説之偏得聖人之意而會夫大中之歸既沒而其言立其施於人者博矣宜其為士所宗為時所尚考行易名而令聞長世也先生金華人其諱字世系言行本末具今翰林直學士烏傷黃公溍所為墓志序銘兹不述至正七年丁亥歲夏五月壬寅朔序讀大學叢説東陽許謙序章句序作三大節每節又分作兩假自篇首至非後丗所能及為第一節首兩句言大學之用蓋自至之性言得於天之理人人皆同然其至不能齊言得於天之氣人人皆異是以至全之言因氣之昏牽引物欲故失其善一有至復其性言得其氣之至清至淳者為聖人自然能盡其性於是體天道立標凖而教化其民欲人復其已失之性此原三皇二帝立教之始三代之隆以下言設教之法至周大備自及周之衰至壞亂極為第二節周衰至鮮矣言上無聖君而聖人在下移其教於下君師之職始分此天運之失常丗道之大變然教法尤詳聖人有位者其政教止及於當時孔子之道有所卑付筆之於書而傳教於萬隂陽五行相涵之圖隂陽五行合下齊有非是先有隂陽後生五行古人察氣之來往便立陽隂之名又見流行者有微有甚又立五行之名康節推天地自開闢至于復闔十有二萬九千六百年為一元一元之間只是一箇大來往而已一元有十二會則子至巳會六萬四千八百年為氣之來為陽午至亥會六萬四千八百年為氣之往為隂一元十二會一會三十運一運十二丗一丗三十年一年十二月一月三十日一日十二時小而歲月日時大而元會運丗只一般今於一歲之氣上易見冬至之日陽氣生於九泉之下至春則上至地面漸舒布夏而盛秋則收斂冬而伏藏又復起于九泉矣循環無端以歲序則自春始爾一元亦不過如此然則元會運丗歲月日時之間各有隂陽有隂陽則有五行矣木神為仁火神為禮金神為義水神為智土神為信凡言往來開闔只是説氣然必有理為之主氣譬如舟所以乘載理譬如柂所以運舟者也此所謂神即理之妙者也大抵説隂陽五行只是説氣而理自然在其中太玄木為性仁金為性義火為性禮水為性智土為性信五性本於五行者如此細玩其理無不吻合鄭康成乃謂水神為信土神為智者非是天之生人理氣俱到然有此氣故理有所泊是以談者多是先説氣如中庸章句天以隂陽五行化生萬物氣以成形理亦賦焉是也此序却先單説理然後言氣質又著然字反接蓋要見人性本善而全皆可為聖賢却𬒳氣質有偏故受而生者不等是人皆可以學文又不可不學也氣稟不齊大約且分四等曰清濁純駁清者智而濁者愚純粹者賢而駁雜者不肖此以四者不雜兩端極處言之若清多濁少濁多清少純多駁少駁多純少或清而駁或純而濁萬有不齊故人之資質各各不同聰明睿智聖人之資質聰明不專在耳目蓋主於心而言也聽得精審見得明了皆是心上事睿是思通乎微智是知識周遍睿如物格智如知至禮智之智性之名睿智之智質之稱盡其性是知之到行之極兼上知全兩字天命為君師天非能諄諄然命之也天理只在人心天下朝覲訟獄謳歌者不之堯舜之子而之舜禹人心既歸即知天命歸之矣故孟子曰天與之人與之治者法制禁令賞善罰惡凡政事施設皆是教者躬行心得能感化而可推充者也大小學之教固在其中極字本義是屋棟借以為至髙至中之喻今匝角亭子之棟最可見故曰至極之義標凖之名此是聖人處天位為父子則極於慈孝為兄弟則極於友恭至於百度萬行一言一動無非天理之正中立此標凖於上然後臣民莫不仰視爭趨興起而效之矣舜命契曰百姓不親五品不遜汝作司徒命夔曰命汝典樂教胄子周禮大司徒以鄉三物教萬民大司樂掌成均之法以教國子弟曰百姓曰鄉萬民則司徒主鄉學之教曰胄子曰國子弟而成均又國學之名則典樂主國學之教也三代之降是專指夏禹商湯武王周公之盛時是言聖人一代之興必修法度改制作亦因前代之舊而增益之至周公則大備矣王制有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊鄭氏注曰上庠右學大學也在西郊下庠左學小學也在國中王宫之東東序東膠亦大學在國中王宫之東西序虞庠亦小學也在西郊孔氏疏曰養老必於學者教孝悌也國老謂卿大夫致仕者庶老謂士及庶人在官者陳祥道曰四代之學如此而周又有辟雍成均瞽宗之名記曰天子設四學周之制也蓋周之學成均居中成均以成性也又曰均其過不及則曰成均其左東序其右瞽宗此大學也虞庠在國之西郊則小學也記曰天子視學命有司行事祭先師先聖焉卒事遂適東序設三老五更之席又曰食三老五更於太學所以教諸矦之弟祀先賢於西學所以教諸矦之德夫天子視學則成均也命有司行事祭先師先聖即祀先賢於西學也所謂祭於瞽宗者也適東序設三老五更之席即養國老於東膠所謂食三老五更於太學者也然則商之右學在周謂之西學亦謂之瞽宗夏之東序在周謂之東膠亦謂之太學蓋夏學上東而下西商學上右而下左周之所存特其上者而右學東序蓋與成均並建於一丘之上成均頒學政右學祀樂祖東序養老更也陳氏周學圖商之右學周謂之西學亦謂之瞽宗夏之東序周謂之東膠亦謂之太學朱子曰諸儒皆以養國老者為大學養庶老者為小學蓋亦因王制之言而意之耳陳氏説其位置又與鄭氏諸儒之説不同皆無所考闕之可也明堂位曰米廪有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也王制曰天子曰辟雍諸矦曰類宫孟子曰夏曰校殷曰序周曰庠學則三代共之項安丗松滋縣學記曰學制之可見於書者自五帝始其名曰成均説者以成性也有虞氏即學以藏粢而命之曰庠又曰米廪自其孝養之心發之也夏后氏以射造士而命之曰序以檢其行也商人以樂造士而命之曰學又曰瞽宗以成其德也學之音則校校之義則教也至於商先王所以教者備矣周人倄而兼用之內即近郊並建四學虞庠在其北夏序在其東商校在西當代之學居中南面而三學環之命之曰膠又曰辟雍郊言其地璧言其象皆假借字也侯國皆立當代之學而損其制曰泮宫凡鄉皆立虞庠州皆立夏序黨皆立商校於是四代之學逹於天下矣項氏周學圗右天子之學即王宫之學諸儒之言不同王制諸侯天子命之教然後為學小學在公宫南之左大學在郊名曰頖宫長樂陳氏曰諸矦之學小學在內大學在外故王制言小學在公宫南之左大學在郊以其選士由內以升於外然後以逹於京故也天子之學小學居外大學居內故文王丗子言凡語于郊然後於成均取爵於上尊以其選士由外以升於內然後逹於朝也右諸矦之學即國都之學學記曰古之教者家有孰黨有庠術有序國有學注曰術當為遂聲之誤也古者仕焉而已者歸教於閭里朝夕坐於門門側之堂謂之孰疏曰按書傳説云七十致仕而退老歸鄉里大夫為父師士為少師新榖已入餘子皆入學距冬至四十五日始出學上老平明坐於右孰庶老坐於左孰餘子畢出然後皆歸夕亦如之上老父師庶老少師漢書食貨志曰春令民畢出在壄冬則畢入於邑春將出民里胥平旦坐於右孰鄰長坐於左孰畢出然後歸夕亦如之入者必持薪樵輕重相分斑白不提挈陳祥道禮書曰坐上老庶老於此所以教之學也坐里胥鄰長於此所以教之耕也疏又曰六鄉舉黨六遂舉序則餘閭里以上皆有學可知鄭注州長云序州黨之學注鄉飲酒義云庠鄉學也此云黨有庠是鄉之所居黨為鄉學之庠不别立序凡六鄉之內州學以下皆為庠六遂之內縣學以下皆為序又曰黨有庠疑夏殷禮也右鄉學天子之制百里為近郊有六鄉二百里為逺郊有六遂大國三鄉三遂次國二鄉二遂小國一鄉一遂尚書傳曰百里之國二十里之郊七十里國九里之郊五十里國三里之郊按上注疏所言則閭里以上凡鄉州黨族遂縣鄙酇皆有學但閭里之孰為小學餘皆大學也大戴禮曰王子八歲出就外舍學小藝履小節束髮而就大學白虎通亦曰八歲入小學十五入大學尚書大傳曰公卿之太子大夫元士之適子十有三年入小學二十入大學又曰歲事已畢餘子皆入學年十五入小學十八入大學按大戴禮是王子入學歲數書傳前説是公卿大夫元士之子入學歲數遲速不同程子止據大戴禮酌中為定朱子從之灑掃應對進退是其所行故教其節六藝非幼少能盡行故教誦其文灑者播水於地以浥塵掃者運帚於地以拂塵也實水于盤攘𬒮及肘堂上播灑室中握手灑之節也如為長者糞之禮必加帚於箕上以袂拘而退以箕自鄉而扱之如拚席不以鬣執箕膺擖又如凡拚之紀必由奧始俯仰磬折拚母有徹之類是掃之節也扱音吸拚弗運反鬛力輒反帚也擖又作揲舌也並以涉反執箕以舌自嚮也如先生問焉終則對如長者問不辭讓而對非禮也又如長者不及母儳言母勦説母雷同之類應對之節也如見父之執不謂之進不敢進不謂之退不敢退如侍坐於君子請見不請退君子欠伸運笏澤劒首還屨問日蚤莫請退可也之類進退之節也禮謂五禮吉禮祭天神祀地示享人鬼之禮凡十有二凶禮喪荒弔禬恤凡五賔禮朝宗覲遇會同問視凡八軍禮師均田役封凡五嘉禮飲食昏冠賔射饗燕脤膰賀慶凡六樂謂六樂雲門黃帝樂大咸堯樂大磬舜樂大夏禹樂大濩湯樂大武武王樂射謂五射白矢謂矢貫侯過見鏃白參連前放一矢後三矢連續而去剡注羽頭髙鏃低去剡剡然襄尺謂臣與君射立襄君一尺而退井儀謂四矢貫侯如井之容儀剡失冉反襄音讓御謂五御鳴和鵉和在式鵉在衡升車馬動則鵉鳴鵉鳴則和應逐水曲謂隨逐水勢之屈曲而不墜水過君表謂若毛詩傳云褐纒旃以為門間容握驅而入擊則不得入是也舞交衢謂在交道而車旋應舞節逐禽左謂御驅逆之車逆驅禽獸使左當人君以射之書謂六書象形謂日月之類象形體為之會意謂武信之類止戈為武人言為信會合人意也轉注謂考老之類建類一首左右相注處事謂上下之類假借謂令長之類一字兩用諧聲謂形聲一也江河之類皆以水為形工可為聲數謂九數方田以御田疇界域粟布以御交質變易衰分以御貴賤稟稅少廣以御積羃方圎商功以御功程積實均輸以御逺近勞費盈朒以御隱雜互見方程以御錯糅正圎勾股以御髙深廣逺衰𥘉危反稟力錦反羃莫狄反朒女六反天子元子將繼丗有天下衆子將封國為諸侯以至二字包諸矦在其中諸侯元子將繼丗有國衆子將為大夫公卿大夫元士適子皆將繼丗有祿位不問賢愚皆必當學若公卿大夫元士之衆子則與凡民同擇俊秀入大學焉漢有秀才士之美稱也北史萬人之秀曰俊凡俊秀只是人才出衆之名次第言小大入學之年節目言小學之節文大學之八條目心得不是知得是此身體道而行理融神會契合之妙者所以著在躬行之下日用如飲食起居皆是彛倫只是五者之常倫性分是從天理大原頭分來底職分是見處地位君臣父子長幼朋友隨事合當做底陵小山也夷平也陵夷言丘陵斜阤漸漸與地夷平教化漸廢至於無類此誦傳先王之法兼大小學言之傳是傳之當時與下詔後丗對説支者木之末流者水之末餘者食之末裔者衣之末支流餘裔却是止把水與衣二者來比謂支分之流餘末之裔也規模節目以三綱八條對言則三綱為規模八條為節目謂八條即三綱中事也獨以八條言之則平天下為規模上七條為節目平天下是大學之極功然須是有上七條節節做工夫行至于極然後可以天下平俗儒是害於內者異端是害於外者凡非聖人之道而别立異論者皆異端此是總名虛無寂滅又是其中目之大者老氏以無為道而其用專以清靜為宗釋氏以萬物皆空然後見其本性而以寂滅為期聖學止是五常人倫一切都是實事全然相反戾權變詐也謀隂計也術數小道智數也百家各自立意持論人人不同諸子小説是也衆技隂陽卜筮醫藥種樹雜藝是也一切就功名者專以功利惑丗百家衆技又以新竒詭異禍福射利之説誣民所以人皆眩瞀奔趨之不暇是故沈迷汩沒不復知仁義之歸是充塞而不能行也雜出乎其間是俗儒異端之間蓋老釋二教雖背正道然其立言髙逺又無塵俗勢利之趨故𬒳他立得根基牢若可與正道角此外則必須依傍以成説故必出乎二者之間漢藝文志權謀家兵法也數術家天文歷譜五行蓍龜雜占形法也方技家醫藥之類也此序蓋用彼名而所該者或廣如月之晦如目之肓如氣之否如川之塞晦肓言不明否塞言不行反覆是展轉愈深而不可去底意沈如物沒於水而不可浮痼如病著於身而不可愈戰國以來固是治少亂多然五季五十三年間五易代八易姓于時天下分裂為十餘國爭地殺人無日無之至於弒父弒君篡攘傾奪權譎變詐無所不有人倫盡喪天理消亡自古以來未有甚於此時故曰季丗治休美而教詳明表而出之章而顯之指歸趣向趣言其始歸言其終私淑者私善於人孟子不得為孔子之徒而私善於再傳之子思朱子不得為程子之徒而私善於三傳之李氏此私淑字最切經經一章明明德新民止於至善及下逆順兩言八條目共四十三字先王立學教人之法其餘皆孔子發明之言看三在字及古之字可見凡言道有二意天理氣化運行不息者謂之道人由義理而行亦謂之道聖人贊易多言天之道餘經中所言皆是言人所行之道也此大學之道又非二者之謂却是言大學中教人修為之方爾如君子深造之以道之道凡言德亦有二意得天理而存於心者德也行道有得於心亦德也此明明德字就得處言則是上一意及加明之之功而有得於已然後有下一意人之𥘉生稟天地之氣以為形稟天地之理以為性理無有不善則其性亦皆善所謂德也以其虛靈而能具萬物之理而可應萬事故謂之明德氣則有清濁淳駁之不同得清者為智得濁者為愚淳者為賢駁者為不肖此朱子所謂氣稟所拘及其有知又為物欲牽引於外內有私意逐物而起此朱子所謂物欲所蔽也氣稟所拘就有生之𥘉言之物欲所蔽就有知之後言之因此二者所得之明德竟𬒳昏昧學者當慿開發磨瑩之功變化其氣質消去其物欲使此德復明此明明德之意人之生同得此理與我無異既自明其明德又當推以及人使亦如我之用功明其德此新民之意天以善理賦人而人受之存於心者為性故性字從心從生是有此心即有此理也得此性存於心其本則盡具萬物之理其用則可應天下之事故謂之德然性是單説理德是就泊在氣上處説故如此光明洞徹縱橫妙用應物無窮不可雜氣言之然不可離氣言之蓋此理搭在正通氣上方能如此明若搭在物之偏塞氣上如何會具衆理應萬事是故不可離氣言之也但不可道明德是氣耳此要體認三句固是大學之綱領分而推之則上一句為下兩句之總綱領下一句為上兩句之標的明德新民雖兩事對舉而新民亦是明德中事知止謂知至善所在定以理言靜以心言安以身言慮以處事言得謂得其所止定靜安屬知慮得屬行定靜在事至之先安在事至之際慮在處事之時得在應事之後靜如不惑安如不動心朱子以不惑解不動心固若一般今且借此分開體認二節靜是明物理各見有定向後其心自然無紛擾故曰如不惑安是事來之時素有以應之如俗語不手忙腳亂故曰如不動心看孟子論北宮􅉳孟施舍曽子皆是就臨應事上説此安字與朱子所言略有不同然亦不妨通意試審思之物即事也事即物也物有形而事無迹故互舉就明德新民以已對人言故曰物五者是一事之始終故曰事朱子語録曰對言則事是事物是物獨言則兼事在其中如仁者不過乎物所謂物亦只是事古之欲明明德於天下此處上明字又與篇首上明字稍不同此謂推明明明德之道於天下下明德字包章首明明德三字章句使天下之人使字體貼上明字意不曰欲平天下先治其國而曰明明德者是要見新民是明德中事又見新民不過使人各明其德而已凡言必先而后固是謂欲如此必先如此既如此了然後如此然而致知力行並行不悖若曰必格盡天下之物然後謂之知至心知無有不明然後可以誠意則或者終身無可行之日矣聖賢之意蓋以一物之格便是吾之心知於此一理為至及應此事便當誠其意正其心修其身也須一條一節逐旋理會他日揍合將來遂全其知而足應天下之事矣八條目前假自下説上者明明德新民工夫後假自上説下者止至善之功效格物致知以知言誠意以下以行言其本亂而末治者否此本字舉身而言上該誠意正心下對家國天下厚謂家薄謂國與天下家者父子兄弟夫婦所在固所當厚國與天下皆推此以接之故當薄其勢自然如此此非是教人薄於逺正是教人厚於近也君子之學只是要明得分輕重之分既明則家厚而國薄自不容巳章句人之所得乎天原明德之所從來虛靈不昧解明字具衆理應萬事解德字虛靈正説不昧反説作一貫看下惟虛故靈虛是體靈是用惟虛靈故不昧虛靈是體不昧是用惟虛靈不昧故能具衆理虛靈不昧是體具衆理是用惟其具衆理故能應萬事具衆理是體應萬事是用又分看惟虛靈故能具衆理惟不昧故能應萬事人之所得至萬事者也是明德正訓下三轉却是説上明字但為氣稟至有時而昏原其所當明然其本體至未嘗息者證其所可明下言明之之方復其𥘉言明之之效氣稟是內根物欲是外染氣稟濁駁有微甚則物欲所染有淺深明明德是要變化氣質消除物欲氣稟已一定物欲則日增用功者但要隨時隨事止遏物欲使不行開廓氣稟使通暢是皆
