body:
  text: 東陽許謙公冶長第五公冶長章擇壻之意全在可妻也上下面却言長雖曽在縲絏自是為人所誣纍非長實有罪則縲絏不足汙其行聖人非是就縲絏非罪上取只是因而說起解內外之惑集注有又言兩字極分得伶俐疏曰家語南宫縚魯人字子容史記南宫括字子容鄭注檀弓南宫縚南宮閲也然則名縚名括又名閲閲左傳作說字子容氏南宫孟僖子仲孫玃之子懿子何忌之兄也此章兩節要見不是一時說話其意便自分曉集注其必有以取之矣其字指長也取之猶言得之言長取之也謂聖人言其可妻是必長有德而有以得聖人此言矣若云聖人有取乎長則不須用其字子賤章君子哉若人贊子賤有君子之德魯無君子者斯焉取斯贊魯國多賢作兩節看集注有又言兩字分曉集注厚之至言稱人之善既厚矣必本其父兄師友是尤厚也故曰厚之至瑚璉章明堂位夏后氏之四璉殷之六瑚包氏注論語杜氏注左傳皆云夏曰瑚殷曰璉未詳集注貴言宗廟之器重言盛黍稷之器蓋祭祀以粢盛為上也華美言飾以玉不佞章上焉用佞蓋泛言下焉用佞以專言仲弓禦人兩句是言不可佞而說焉用佞一句在上不知其仁是言仲弓而以焉用佞繼之集注重厚簡默四字是就聖人及或人詞氣并南面章內描盡出來或人未識仁體而又以有口才為賢故見其重厚即以為仁而稱之見其簡默以為不佞而少之事三之義也孟武伯章武伯見聖人專教人行仁而不知仁之體假故就門人中舉以為問非泛論人才之謂也觀其再問與歷舉三人問可見不知者非謂三子皆不能行仁也但未至全體之仁耳一事之仁則有之武伯獨舉仁字為問非全體渾然者不足以當故夫子但可總言不知而巳固不可遍指其平日所行某事為仁某事為不仁也就所舉治賦為宰為行人而無失即隨事之仁矣古注於不知也下有仁道至大不可全名一句好集注日月至焉或在或亡注在第一箇不知字下只得指子路而言蓋兼包下二人在內日月至焉指行之出入乎仁而言或在或亡指德之存亡乎心而言聞一知十章一十一二只就每事上說顔子聞事理之始即洞見底藴皆造其極子貢但能就近推去耳一十字只是始終字晝寢章天地之氣晝夜運行不息晝陽夜隂晝舒散夜收斂人法則天地故白晝用事夜則寢卧收斂神氣以為晝之用蓋不收斂則無以發揚晝則勤於事為何况君子尤不可昏惰易曰君子終日乾乾謂當法天道之不息也宰豫晝寢宜乎深責之朽木糞墻比志氣昏惰不是言資質卑下不可雕杇比教無所施申棖章君子之心所存惟禮義故堅強不屈於事物之下如孟子所謂富貴不能淫貧賤不能移威武不能屈欲則為事物所屈是心裏見他好了便貪他此心隨他去是他為主我心為客是心柔了安得為剛理之明自然能勝物者謂之剛私之萌求勝於物者謂之欲剛只是勇於行義申棖想是倔強好勝之人故為欲大意見事合義處勇於必行有一毫不合義處决不為集注志字當為看此章之主有志於理義則不為物所屈無志則心逐物移及勝字掩字伸字屈字最是眼目字當詳玩則剛欲之辨自明我不欲章愚竊以為子貢若曰我不欲人之加諸我也吾亦無加諸人則全是仁矣今猶有欲字辭氣亦自用力但又有無字則為過也恐子貢只是修辭未尽善尓夫子聞其無字便言非尓所及蓋恐其錯擔當了試如此詳味看如何孔文子章聖人垂訓句句是醫病良方讀者不可泛觀須件件將來反身自省方有益若此章只是因孔文子之諡以答子貢之疑耳於已何預况孔圉自是惡人何足稱道若能自反則是學者大戒也天資敏鋭必視學為易而不能細索深求精思篤好至於恥下問節目尤多貴者恃位恥問賤富者恃財恥問貧年髙者恥問幼能者恥問不能多恥問寡凡此皆是切中學者之急病如是則文子自是可師當自省而痛治之又當思文子雖勤學好問而其制行乃近於禽獸蓋務知而不行也故學者則宜知行兼用其力而不可少緩又文子之行極惡而以勤學好問尚得諡為文而免名曰幽厲則知而篤行者所以流芳百丗又可知矣凡此一事作戒數端學者以此意讀書則所謂三人必有我師而皆可以進德矣今逸周書諡法篇是學勤好問為文子産章集注吳氏之言未盡公恐斷當不殺此二人想朱子只是取以為觀聖人論人之言之法尓居蔡章古注蔡國君之守龜出蔡地因以為名長尺有二寸今按因以為名非謂龜必得之蔡也漢食貨志元龜為蔡非四民所得居元龜長尺二寸公龜九寸侯龜七寸子龜五寸公龜以下不知此名所自來疏云山節藻梲天子廟飾考證云禮記管仲山節藻梲君子以為濫以此例之則山節藻梲似指宫廟之僣侈與居蔡各一事此說恐長蓋二者皆是僣而於事無益徒取僣上之罪故同歸於不智令尹子文章子文盡心於本國自是忠只是所以盡心者非當理而無私欲未仁文子一時棄富而出自是清只是未必果見義理必如此而脫然無纍故未仁此是專就所問上論若論全體則二人之身渾在利欲中雖有一善不得為仁也本注及圈外今以是以下至真無私心是就子張所問事上論二人之未仁他書考之以下至亦可見矣是就二人凡事上論其未仁三思章此章當用格物工夫在思之前理既明則所思可善若未明理再思也未合理百思也未合理聖人只就文子上斷其思之過而格物之道自然見於言外左傳文公六年秋季文子將聘於晉使求遭喪之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害杜氏注行父聞晉侯有疾故也所謂文子三思疏聘禮出使唯以幣物而行無别齎遭喪之禮圈外發明再思意思恐人不明理而妄處事必有失故用此意補之唯窮理則能思思則必中既中便果斷行之窮理在未思之前果斷在再思之後圈外季文子事考證詳之乞醯章凡舉一言以蔽一人之行皆是以全體言若直則是平生行事無一件私曲方可稱直之名今微生髙縱饒他事皆直只此事之不直便不可言直了本注就本事上言程子就心術上言范氏又推他事上言所謂一介取豫千駟萬鐘可知是推演說開去不是正言微生高看來高自無此等失范氏是教人謹心術細微處足恭章集注謝氏曰二者之可恥有甚於穿窬蓋為盜者莫夜穿窬猶有畏人之心此二者白晝通衢對面謾人公然無忌憚以君子視之可恥之甚朱子言若微生高之心久之便做此等可恥事來此亦是戒學者於細微事不可不謹人心路要熟若一時小事不謹把做無緊要行來行去到大事亦以為常終為惡人學者工夫皆是如此若凡小善件件致力則行來行去到大事亦以為常終為君子矣顔淵季路章此章聖人顔子氣象以集注觀之尚可體認唯子路之意須要識取南軒先生謂人之不仁病於有巳故雖衣服飲食之間此意未嘗不存蓋仁者心體廓然人我無間程子所謂與物共者也常人之有巳於衣服車馬所常服御者必存心計較彼我則大於此者固可知故子路於日用上除去私狹氣象廓然同人則其他亦無往而不弘廣矣須看程子言豈可以勢利拘亞於浴沂辝氣不可只泥車馬輕裘看子路雍也第六雍也章仲弓言行無所考前篇或人許其仁又稱其不佞此章自言居敬四科以德行稱故集注於前章言仲弓重厚簡默此章言寬供簡重是模寫仲弓之德夫子許其可南面者意蓋如此謂有德足以為民之上也南面但謂可居位長民不必重看古之有德者必有位諸矦皆天子所命而附庸之地不及五十里亦皆以有功德者居之楚尚欲以書社地封孔子則南面之說正不必以僣為嫌夫子謂仲弓有德可以臨民而仲弓謂伯子大略與巳相類故以為問看來伯子是寡言簡直率易之人聖人乃獨於簡許之集注僅可而有所未盡之辭但訓可也之可而可使之可不與蓋可也之下繼以簡字而可使南面四字連文故所指有輕重不同然書凡言可也則是僅可意獨言可字而上下有所指者又不可同一律如可以死可以無死之類當隨文觀居敬以修身言集注自處以敬則中有主而自治嚴中有主是說以敬存心自治嚴是說以敬治身也中無主而自治踈亦兼內外說行簡却是說事朱子謂自處以敬則中有主而自治嚴程子謂居敬則心中無物一言有一言無似相抵捂蓋有以理言無以欲言則二說正相發所行自簡又轉一轉不是經文正意好學章此章集注甚詳而通釋亦甚密當玩不遷怒二過是好學之效人之七情惟怒發之暴而難制故尤為難克顔子於當怒而怒之隨即雪消冰釋無一點留滯意故夫子舉其難者則情之發皆合於中和矣集注克已二字是說此章骨子已固是私要看得私字分明蓋人有此身便與物對人專把皮膚包定這些血氣便是我有我便要用物專一取物以供我所欲所謂巳也但狹小與天地之氣不能相入只是專欲尊己不把人做事故怒遷向他人亦不以為事做事差失亦以為無緊要我若改却屈巳以從物矣若勝去得此私則心量廣大不見我尊於人所以怒不敢輕加人作事亦不敢過失究其極則聖人之無我也但顔子之巳甚輕非如衆人之已然略有私意即與天地不相似惟克得尽故能不遷不二也克巳是修身總目不遷二只是非禮勿動一端中之兩事耳此言克巳後功效如此也鑑照妍媸之喻不說見處正說行處應之者應事也聖人之道不是一串意是言學至聖人底方法下文學之道學之得其道可見天地儲精以氣言五行之秀兼氣與理言其夲也至五常言得五行之理以為性本只是本體真言性靜是未發形既生言得五行之氣以成形外物以下至七情言情之所以生情既熾而益蕩其性鑿言發不中節則喪其真故覺者以下方是工夫緊要只是約字約情合中者正其心也正其心者養其性也作一串說下然又當以致知為先故曰先明諸心知所往下面力行雖是就事上說其實只是約其情學之得其道言聖人教他就四勿用功此正是學底方法下二不却兼效言記誦文辭便是學不得其方法請粟章此章大意說不當與而與不當辭而辭二者雖皆未合中道原思是過於厚者二人皆弟子也師命以事而區區以利祿為急是何心哉原思辭之誠是然聖人行事必合中道故雖辝不許蓋守一職自有必得常俸辝之反為私意故不許之子華使齊若孔子居位時以公事使之則子華為家臣自有常祿若非居位時以私事使之則子華富家為師出行何必求利然此非子華之過乃冉有之過也犂牛章一章之中為義不一聖人稱仲弓之德門人聞之當效其進德也仲弓聞之當愈進修造其極也人欲勿用山川不舍有德必見用於丗也犂牛之子騂角德不繫丗類也父有惡子當修德以掩之也用人者不當論其丗也聖人之言廣大如此諸章亦多在人推看但不可穿鑿爾不違仁章顔子三月不違是乍違於仁日月至焉是乍至於仁二者正相反仁者天地之生意也人得此生意而存於心萬善備具則謂之德能體而全之無少虧缺是能存其本有之德也故總謂之心之德則心即仁是指道心言之也朱子既以此訓仁字又曰心不違仁者無私欲而有其德此兼人心言之也張子曰合性與知覺有心之名所謂無私欲是就知覺上言有其德是全其性尓蓋知覺者應事之本而性則萬事之則也若全無私欲則此心渾是義理動靜皆仁少有私欲之間便違於仁矣夫子不曰回也三月不違仁而言回也其心三月不違仁若獨言不違仁可就應事上論言其心則貫動靜徹內外無非天理也內外且以屋喻顔子心與理融事皆中道時有小私意動隨即克除又只在仁裏如人居屋內為主暫出而歸其餘心與理二勉而行之時乎於一事去得私意盡所行皆合天理之公或一日一至或一月一至少間又自有私意起而非仁矣如人在屋外而為客暫到屋中隨即出去季康子問章從政謂為大夫蓋大政小事在國為政在家為事季氏專魯蓋以國事與家臣謀之以冉有退朝謂有政觀之可見季氏正欲得家臣與謀國事故歷問孔子門人非謂即欲使為大夫也伯牛疾章古人之屋共是三間外為堂而內為室室中為寢處自堂入室左位髙者偏室多如後大寢小寢東酉夾左右孰之類大夫士則惟有東房無西房簞瓢章盈天地之間惟萬物莫非至理之流行生意充塞固與人心無間也君子由道而行則何往非樂三月不違仁或可想見顔子之樂簞瓢陋巷豈足改之邪集注周子令程子尋孔顔樂處意猶在知上朱子則教人學顔子之學行之久而有得則我亦自有顔子之樂矣冉求章為學之道先立志欲求至於聖賢却隨事只管低頭做將去曉一分道理便行一分道理一邊明理一邊力行都不要計較功效須要見得聖人亦是人做我亦可學而至學之所以未至者只是理未明行未力耳長持此心篤志行之自少至老不倦到頭却隨人力量髙下見其成功淺深最不可作界限君子儒章當看考證武城宰章集注飲射讀法周禮大司徒以鄉三物教民而賔興賢能故有鄉飲酒之禮此行於鄉學者也又黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位此行於黨學者也射鄉射也周禮鄉大夫以鄉射之禮五物詢衆庶州長春秋以禮㑹民射于州序讀法周禮州長一歲四讀法正月之吉各屬州民讀法以考其德行道藝而勸之紏其過惡而戒之若歲時祭祀州社則讀法亦如之正歲則讀教法黨正一歲七讀法四時孟月吉日屬民讀邦法以紏戒之春秋祭禜亦如之正歲屬民讀法而書其德行道藝族師一歲十四讀法月吉屬民讀邦法書其孝友睦姻有道者春秋祭酺亦如之閭胥讀法不可數凡春秋之祭祀役政喪紀之類聚衆庶既比則讀法書其敬敏任恤者正大總言二事無苟邪言行不由徑無賤媚言非公事不至室苟賤邪媚皆就章外反說形容上言正大之情可見是子羽之心凡百正大因此二事可見其凡下言無苟賤邪媚亦是二子平日無之之意祝鮀章今之丗三字重看古之丗必尚誠而不尚諛好德而不好色今之丗乃好諛說色所以可嘆也不由户章自室出於堂必由户非户不可出也道者天理之當然人必當由之而不可背亦猶出不由户則無可出之路矣行不由道則悖禮傷義必不可也人何故不從道而行乎深惜其失而勉之以正也道只是人當行底大路如子之當孝父之當慈兄當友弟當恭人皆可曉但不肯行故聖人謂當從户出既知之即由之當從道行既曉了何故不行正為道與人相去夲不逺自不肯行耳故以户為喻最切須就何莫由三字上詳味旨意此聖人哀人之自失而勉之也質勝章史官記事雖據事實而書必須造辭述意其記人之言亦必為美辭文飾之非盡當時之本語也故曰誠或不足人生也直章天以善理生人人得此理以生其理本直凡行事皆當合理若不合理則與天之生意不相關是理巳絶死之道也而又生於丗者幸然免死尓謂具人之形事當順理違天自絶不可生於人丗知之者章知有兩等一等只是知有道如此好一等曽用致知工夫而深知至理之所在上知淺下知深好是知而行之者樂則安行有得於心而樂也集注知有此道也知道字輕看作總說謂知斯道之高美亦可重看作就每事物上知其至理之所在亦可下兩節皆作此兩意推中人章質與學兩言之問知仁章通釋曰夫子既告之以所當為復戒之以所不當為使其志存於此而念絶於彼此語包二者皆全集注知者言事仁者言心事字指務民義重心只是言存心當如此其實先難只是民義此章大約上以知言下以行言也知者樂水章天地萬物巨細髙下無非至理徹頭徹尾通貫周流無纎毫不足處知者知之極其心於物理無少礙滯不留查滓融㑹流通而水之為物流行不滯而其漸漬浹洽大無不遍小無不入與此心相類故樂水而其體動其效則樂仁者之應物各當其極不過物各付物而巳無私焉其理則一定不可移而以存心言則全體自有渾厚安重之意象故樂山而其體靜其效自然夀然所謂夀非必如堯舜禹湯然後謂之夀也蓋受命於天其夀夭固有一定不可易人能知命而保其天之所以與我者全而歸之是夀巳若立於岩墻之下與桎梏而死則是我夭之矣非正命也由是觀之則雖顔子亦夀也博文約禮章博文則能知聖賢之成法識事理之當然約禮則收斂歸之於身而為修行之實若泛泛學文而不約之以禮則於已無相關既能博文又以約禮為自巳之行方可進德約是收束向身意思集注約要也通釋曰博謂泛而取之以極其廣約謂反而束之以極其要此語精切見南子章天者理之所自出言天厭之者是事背於理理與己不相關也子路惡惡不汙聖人無可無不可見惡人而不纍其德唯聖人能然若學者則當以子路為法見惡不可不逺中庸之為德章饒雙峰云此章上句有之為德也四字以中庸之德言也中庸無此四字以中庸之道言也以德言則不必言能而能在其中故此章下句無能字以道言則有能知不能知能行不能行故彼章下句不可無能字此章言民鮮此德是以丗教之衰民不興行而然彼章言民鮮能此道是以氣質之異有過不及而然此章久矣是言近丗如此彼章久矣是言自古如此集注中者無過不及不及是未至於中過是過於中去此是把兩意影出中字只是行事件件合天理到恰好處庸平常也平是平正常是常久之道此是把兩字正說庸字行事平正便可常久才好竒欹側便不可常久總而言之惟中故可庸中而又可庸方是此為德之至非聖人不能中之故曰民鮮觀民鮮久之言則古之有是德者蓋多矣博施章博施謂施惠廣博病博施且如分井受田豈不欲多與它田蓋土地有限人生無窮故一夫之田夏止五十畒殷止七十畒周止百畒欲多不可得又豈不欲都把與百姓而國家之用不可無故一井之中其中為公田又如前代賜民田租非不欲盡賜又有國家之用故止賜一半此等處雖堯舜亦不能如意此病博施之類病濟衆集注言之甚明博廣也猶多也博施是每人與之多濟衆是人人皆博施濟衆大槩以地言天之所覆地之所載含齒戴髮者皆濟之是衆也聖只是行仁至極處盡仁之道聖與仁不是兩等人己欲立逹而立逹人所謂以己及人仁也近取譬所謂推已及人恕也上出於自然下出於勉強學者只是欲學為仁古時未嘗有人言仁之本義分明故孔子門弟子往往問仁子貢亦未知仁之體假故以此為問然所問地步太廣逺此是聖人有位者方可言此而猶恐未足若學者如此為仁則終身不可至故孔子既非之而又教之第一節言為仁功用之極第二節言仁之本體第三節言學者求仁之方法述而第七德不修章講學是此章之要既學又須是去講論然後明義理皆自講學中來講既明了則知德之所以修義之所在而徙有不善者而改之若不先講學則三者皆不知當為之則只作知行看徙義改不善是修德之目志道章志道是專心致志在日用當行之道念念在此為之不厭道字雖指行然所以求知其所當然者意亦在其中志道據德積纍久之然後至依仁地位志據二者常並行依仁則志之久據之固而心德全但長存養而不息耳四句雖前三者是一連後一節與上對然人之為學只是要全一箇仁字上三者應事處工夫至不與物接時便要游藝游藝一是未知者欲求知巳知者欲習熟一是應事之隙欲心不少放二者皆是欲全乎心德爾以此觀之不可全然截斷作兩假看也集注知此而心必之焉為道主於行所以特著知字在上知在行前也若未知者則求知之亦在志字意內他岐不特是異端是正道上行無過不及差誤處謂志之專見之明行之正如行路若認程途分曉到交逵九逹處亦自能循當往之途無錯也日新之功是𥙷意周備以明經旨蓋據德不是守蒨正謂志道而有得即堅守不忘遇再應如前事則以所執者復見之行事則前所據者又有日新之功矣依者不違之謂或問亦言不違仁吾於顔子之事既言之矣是依仁即顔子之不違仁也然則此章工夫全在志道據德上至依仁只是存養尓據既是執守之意是行道有得了只是堅守而勿失則此句就有德而言然則工夫又全在志於道一句上志於道不是道在彼我心却在此專思之欲至之之謂既謂之道正就行上說是謂專心致志於日用常行處行其道故既行之便有可據之德積德既深則常操存此心使天理流行不至妄作此依則比顔子不違稍用力尓三月不違仁順辝也依於仁勸辝也至於游藝即至道據德之方而防其違仁之隙也私欲盡去而心德之全蓋德之積纍自少至多積之既久則百行皆善而德備德既備則是私欲全去故曰工夫至此此句是接仁字說下無終食之違方是說依字存養是正說依字意禮樂體大學者日用行不能盡故兼玩繹其文射御書數既學之即能惟常常玩習之故曰法應務有餘心無所放是游藝兩件得效處應務有餘在志道據德之間心無所放恐依仁之有間也此章道德仁藝指其實工夫全在志據依游先後之序說上四字謂志然後可據據然後可依依後又須遊輕重之倫說下四字前三者重藝為輕本指三者末指藝志據依養其內游飬其外無少間隙涵泳從容皆指游藝意思多忽不自知入聖賢之域亦游藝意多前三者皆用力以全仁游藝則𥙷其隙而有浸漬漸磨之功矣束修章事師就養無方束修其至薄者故著以上字聖人言語自無滲漏類如此集注修脯也周禮膳夫肉修疏加薑桂煆治者謂之修不加薑桂以鹽乾之謂之脯憤悱章既憤悱而啓發之則感之深守之固未能憤悱而教之出於勉強終不濟事雖能憤悱而告之又須舉一隅而能三隅反然後及他事若未能反而又告之則學者倚靠箇請問都不自去推充天下事理無窮如何教得盡自能推充方是為學不是聖人吝於教人聖人凡百只是提箇綱領與人使人自去理㑹用舍章用舍以身言行藏以道言是字正指行藏之道而言人用我則行其所藏之道於外人舍我不用則藏其所行之道於身惟孔顔有此可行可藏之道行藏字不比仕隱字行謂見之行事藏謂卷而懷之看下有是二字則行藏意便自見集注取尹氏行藏安於所遇雖若不甚分曉然語録巳明言夫子與顔淵有可行有可藏之意則以此意看行藏安於所遇一句亦自包含盡嘗謂集注難讀𥘉把淺近意思來看固若無差及後來看得較深㑹注意亦合又久而看得較愈深則意又不出朱子之外蓋不唯聖人之言廣大淵深而朱子體㑹精至不可輕易看過也通釋曰暴固是徒搏馮固是徒涉然二者皆有慢侮侵陵之意富可求章如不可求一句上添一其字下添一何字則語意自明子所愼章古之祭祀必齊未祭之先散齊七日齊於外致齊三日齊於內散齊不御不樂不吊致齊則居於齊室之中不茹葷不飲酒不接事物惟思所祭鬼神禮記所謂思其居處思其笑語思其志意思其所樂思其所嗜者是也齊平生心事而答之而平生大事無大於逃國餓死二事者然則夷齊微諌伐餓死之事則何以必知其逃國之無怨乎安知夫子不并以此事斷之為無怨也故集注不得不入此假而後惟以逃國事論此章之旨飯疏食章此章似專以飯疏飲水言所處地位曲肱而枕是就此地位中平居之容也故程子亦止曰非樂疏食飲水也然聖人之言亦不可間放一句過曲肱而枕亦見得無所事事之意蓋上二句固言貧而此句或指賤而言也此聖人就所居地位言其樂若聖人居富貴則樂亦在富貴居夷狄患難則樂亦莫不在其中即君子無入不自得之意聖人但言不義富貴若富貴以義來則舜受堯之天下不為泰孔顔之樂相類而有不同言不改其樂而著顔子於上是簞瓢陋卷不改顔子之樂也言樂在其中而連食水曲肱之下是孔子之樂在食水曲肱之中也顔子不改其樂是顔子之樂不為外物所改蓋顔子惟知自有其樂不知有憂也聖人樂在其中是無所往而非樂也譬之然火顔子如然燭而紗籠罩之雖有風來不曽動得它光明孔子如然燎炬在空中任風自來隨風都有許多光熖此顔子具體而微顔則守之而孔則化之也程子以不能改其樂釋樂在其中精神全在能字上與不改其樂自不同當味學易章集注消長者隂陽之機吉凶者隂陽之應進退者人事也存亡則進退得失之極也夫陽長隂消吉道也隂長陽消凶道也然陽雖吉失位或凶隂雖凶得位亦吉是消長中各自有吉凶之理君子學易隨各卦之時事位義驗其消長而明其吉凶以為身之進退進退合其宜則存失其宜則亡吉凶消長有定而不可移故曰理進退存亡人行之故曰道使知其不可不學是先說不可以無大過又不可以易而學是覆說上假我數年平誦聖人之言所謂無大過亦兼有於易道無過之義集注引史記於易則彬彬之說固含此意下只明用易而已無過說是為學者修已處切雅言章集注理情性道政事謹節文是言詩書禮之本體如此情乃性之發情發於言而有文成音者為詩故詩所以理情性言作詩之人也情發而為詩故言情在上理其情則是理其性也道言也書所以載二帝三王之大政小事也禮專在謹慎其品節文章節言其大文是節中之文也聖人以此教人使人却用此以理其情性知其政事而謹其節文然後是用處謂人學之亦可以如此葉公問章憤是求知之切樂是行之之效不知老將至自強不息也全體至極純亦不巳言聖人之學全體而又至於極以一事而言未得則憤既得則樂是至於極而樂也以萬事而言憤而樂樂而又憤憤而又樂必至於全體也其憤樂相繼剛健不息是純亦不巳也全體至極自憤樂兩句發純亦不巳自不知老至上生全體與仲弓章全體不息字同天生德章天生德或問謂氣質清明義理昭著二三子章此章聖人告門人不可專俟言以為教凡平日所行者皆教也蓋聖人動靜語默無非天理之自然此是體首實處皆當審觀而反諸身何必專待言語之教乎蓋言與行猶隔一層故聽言不如觀行顔子言仰鑽瞻忽正是就日用上諦觀而學二三子有未逹此故夫子䁱之集注雖不明說二三子待夫子言教之意而言聖人作止語默無非教意自可見集注貼襯文義說自是正意圈外程子又是一意言門人就聖人全體大用上學見其道高逺不可及有如顔子之歎高堅前後者故聖人止就日用動靜小節上指出教之聖人之道猶天言全體俯而就之言小節四教章學文則窮物理知古今以為自修之基故以文為先既學文則當反之於身而修行故行次之修行當以忠信為主忠是發於心孝弟為仁意同無絶無也虛未滿之意無而為有謂本無一長而為有之狀虛而為盈未能充實而為盈之狀此二者謂學之所到事之所能而言約而為泰則論貧富貴賤之事不知而作章丗蓋有不知理而妄作其事者我則無是也我惟於古人之言行多博其聞擇其善者從而行之蓋多聞則非不知擇善而從則非妄作矣此句正反上兩句而言之然又自謙以為於理未能盡知所以下文言曰我於今人之言行多博其見而善惡皆記于此以備參考雖未足為知之明是亦知之次也蓋古人言行事跡善惡巳彰故可擇而從今人言行未可定其善惡故惟記之耳此謙而又謙之言也司敗問章古者婦人皆以其姓在下而以孟仲之次加於上如春秋所書仲子伯姬詩所謂孟姜之類子是宋姓姬是魯姓姜是齊姓伯仲孟長幼之序仲子宋女伯姬魯女孟姜齊女也同姓為婚姻與禽獸無異春秋之時同姓之國雖多婚姻之道皆不通吳之祖太伯文王之伯父也魯之祖周公文王之子也吳魯無婚姻之禮昭公違禮取之却諱取同姓之罪字之曰孟子欲使人把作宋女看欲掩其惡古者有姓有氏帝王則自著姓如伏羲風姓神農姜姓之類人有功德者天子則賜之姓如黃帝之子得姓者十四人又如堯賜太嶽之姓為姜之類是也賜姓之外則為氏氏又名曰族或以祖父之字如春秋公子展之後為展氏子國之後為國氏之類或以祖父之諡如文王之支孫稱文氏魯叔孫宣伯之後為宣氏之類或以祖父之官如司馬司空倉氏庫氏之類後又或以國如周魯齊陳許趙之類是也鄭夾漈推姓氏之由有數十端然今何者為姓何者為氏分曉者固易知亦難盡辨凡出於古帝王之後有姓無氏如上說風姓姜姓之類是也若其餘有氏則又有元姓且如春秋時同姓之國如周魯衛鄭邢茅蔣胙諸氏皆姬姓又如魯之公族大夫以諡以字以官者亦皆姬姓以此類推之須要考究其原方見各人姓氏分䁱秦漢以後姓氏多亂皆不可分别漢有功者多賜姓劉唐有功者多賜姓李都是把别姓氏硬扭作劉李去數丗後不辨真僞又如胸奴以漢外家姓劉亦冒姓劉此等尤難理㑹文吾猶人章文猶文章威儀文辭皆是得是有得於已文固亦君子之事乃發於外者故曰莫吾猶人也若躬行者必心有所得乃可成君子故曰全未有得若聖章集注博施章曰仁以理言通乎上下聖以地言則造其極之名也言仁是天理至善上謂全體之仁下謂隨事之仁也聖則行仁至於極無一事之非仁妙而不測之謂也此章曰聖者大而化之仁則心德之全而人道之備大而化之即聖之地也心德之全人道之備即全體之仁也朱子云為之謂為仁聖之道誨人亦謂以此教人是合說金先生云聖言德仁言及物聖人言為之不厭即作聖之事誨人不倦即及人之仁此是開說如此覺易見奢不孫章不孫者殺身亡國之由固不過為人所鄙而巳故不孫寧固子溫而厲章常人之容溫和則不嚴厲嚴厲則少溫和無威者失之易有威者或大過而至於猛好禮者不能恭能恭者又或出於勉强聖人中和氣象故全備望之儼然即之也溫聽其言也厲察之猶淺言之尚略此章察之深言之備集注人之德性本無不備氣質所賦鮮有不偏此言衆人謂人性本皆全善為氣質不適中而偏故性為所蔽亦偏其見於氣貌之間者必不得剛柔之中全體渾然應德性本備句隂陽合德反氣質有偏句全體渾然雖言德性然謂之渾然則是德性未常少為氣質所蔽隂陽合德則隂陽二者皆亭當和平略無過不及之偏是又見渾然意象矣此是就聖人所禀言氣質故著合德字此德字只就隂陽說非言性也中和之氣是關渾然合德說惟其渾然合德故其氣見於外者自然中正和平經言六陳北溪曰以上三截為陽而下三截為隂似乎有合然又以上三截為隂而下三截為陽亦似有合未知所决抑聖人渾是一元氣之㑹無間可得而指學者強為之形容如且以其說自分三才而言則溫然有和之可挹而不可屈奪則人之道也儼然有威之可畏而不暴於物則天之道也恭順卑下而恬然無所不安則地之道也自陽根隂而言則溫者陽之和厲者隂之嚴威者陽之震不猛者隂之順恭者陽之主安者隂之定自隂根陽而言則溫者隂之柔厲者陽之剛威者隂之慘不猛者陽之舒恭者隂之肅安者陽之健蓋渾然無適而非中正和平之極不可得而偏指者也泰伯第八泰伯章詩言太王實始剪商其意以為周之所以滅商者自此基之尓非必謂太王即有滅商之謀也蓋古公之遷邠人從之如歸市而吳越春秋云古公居三月成城郭一年成邑二年成都而民五倍其𥘉仿佛帝舜氣象則德化及於民其勢有不可遏者但古公遷岐左殷王小乙之末年不久而髙宗立傅說為相中興在位五十九年次祖庚立七祀次祖甲二十八祀文王生皇王大紀祖甲三十一年文王生以文王沒之年者之非是書稱祖甲不義為王舊惟小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年自遷岐至文王生之年巳九十七年古公壽百二十歲後不知的於何年卒計在文王生一二年之後則古公始終正居商令王有道之丗剪啇之志何自而生邪文王生有聖瑞故古公曰我後丗當有興者其在昌乎太伯知欲立季歷以傳昌乃亡史之可見者如此蓋古公但言興者其在昌未見有剪商之意觀知欲立季歷之言則亦未嘗明言立季歷所謂知正於其在昌乎一言知其意尓其讓國也固為至德而季歷之後丗遂有天下天命既欲興周其始也非季歷則國固太伯之國而太伯之後有周矣故曰以天下讓夫子就成事上論其讓也止讓國而非天下故民無得而稱惟太王始不明言立季歷乃太伯因其在昌一言暗知太王之意托採藥而去亦無讓國之迹所以民尤無得而稱所以為德之至也王文憲謂集注朱子因舊傳修入未及改啓手足章此章作兩節看啓手足是一節是以巳然者示門人其平生孝謹之成效也下二節言致謹之方只是戰戰兢兢句上是其平日惓惓於此未嘗少懈如臨履薄言恐懼戒謹之狀也孟敬子問疾章動容貌便當逺去暴慢不粗厲當文雅不放肆當矜莊正顔色便當近於信不可色厲而內荏出言語聲氣便當逺去凡陋與背理者工夫全在逺近二字上集注程子工夫在動正出之先蓋平日敬義工夫純熟至動正出時自然有此效驗則工夫意在道字上朱子以操存二字上承程子之旨以省察二字使用之於動正出之際是工夫在斯字上金先生謂此是成德之事恐非敬子所及以曽子語意工夫只在逺近字上使只就地頭做工夫必欲其逺之近之如此則下學亦有入頭處久而至於程子地位程子暴慢斯逺一句倒說下近信逺鄙倍二句順說當思所以異問不能章能不能以事為言多寡以明理言謂彼之不能固不如我之能而彼有一能乃我之所未能者彼之寡聞固不如我之多聞而彼有少聞適我之未聞者故問之天下事理無窮顔子雖亞聖亦有未盡知未盡能者故每問於人能與多固顔子學問之積問不能問寡謂或有事理顔子所未知所未能人或知之能之則必下問為巳益但就他人一件長處請問不必論此人他事皆不如我此章兩節皆就己接人上說上節主於問下節主於不校集注以唯知義理無窮一句總上節而謝氏亦曰不知有餘在我不足在人有若無實若虛是其見義理之無窮所以問也謝氏又以非幾於無我者不能總兩節則皆是接人意有若無應能問不能一句實若虛應多問寡一句唯知義理無窮智也不見物我有間仁也言顔子體乎仁智託孤章興於詩章集注詩本性情謂詩夲出人性情之自然蓋心之聲為言言之成文而有音韻者謂之詩是性之動為情而見於外者言詩發揚己志出於自然也古之天子巡守采詩以觀民風蓋擇其善者𬒳之弦歌頒之邦國如周之二南則用之鄉人邦國雅則用之邦國朝廷頌則用之宗廟今集注乃言有邪有正金先生謂此据毛氏詩言之也變風變雅邪者多矣但學者既知義理則凡見善即取為法見惡即取為戒固不必較其邪正也此三人行必有師擇善者從不善者改之意如春秋善惡皆書而自可為法戒也抑揚反復正言吟詠抑揚是吟詠之聲反復言吟詠之不巳學者於書固須口誦心惟况詩有音節可以吟哦詠歎則感於其心尤速而切故能有所興起也恭見於貌敬主於心辭者不受於人遜者讓巳所有恭敬律於已辭遜接於人行禮以四者為本節文度數則禮之事也品節是其大綱文章是其小目度者制度數者數目多寡之皆以上四者行之也肌膚本有㑹筋骸夲有束但不知禮則無以固之而懈惰散漫遂至手足無所措耳目無所加能以恭敬而行節文則動容周旋莫非天理之流行矣卓然者自立之貌既守乎禮則事物之來皆有以應之莫不中節不為其搖撼惑奪其心志矣五聲十二律更唱迭和語録曰謂如黃鐘為宫太蔟為啇姑洗為角林鐘為徴南吕為羽還至無射為宫便是黃鐘為商太蔟為角中吕為徴林鐘為羽蓋五聲十二律皆上下相生聲始於宫律始於黃鐘官即黃鐘也其法皆三分去一益一上下相生宫之數八十一三分去一下生徴為五十四徴三分益一上生啇為七十二商三分去一下生羽為四十八羽三分益一上生角為六十四而五聲備矣黃鐘之琯九寸三分去一下生林鐘林鐘三分益一上生太簇太簇下生南吕南吕産姑洗姑洗下生應鐘應鐘上生㽔賔㽔賔下生大吕大吕上生夷則夷則下生夾鐘夾鐘上生無射無射下生中吕而終焉前所謂黃鐘為宫至南吕為羽五節是從宫商角徴羽順數其實乃黃鐘生林鐘太蔟南吕姑洗依前五聲次序生去也第二無射為宫至林鐘為羽亦然所謂更唱是十二律皆可為宫所謂迭和十二律皆可為徴商羽角相繼和去養人性情言養於平日以為應事之本也邪穢者物欲之染查滓者氣質之偏興詩立禮則消物欲而變氣質矣有未能淨盡者又因樂以蕩滌消融之而全入於中和也義精是明善至於極精仁熟是行仁不假勉力和順道德如云不違仁也民可使章民者庶民百姓也或問曰聖人為禮樂刑政皆所以使民由之也其所以然則莫不原於天命之性雖學者有未易得聞况庶民乎好勇章人而不仁疾之巳甚而致亂蓋教君子當知時審勢也不仁者固所當惡大學所謂迸諸四夷不與同中國可謂甚矣理之正也蓋時可為而勢足以制之何憂其生亂乎若非其時而勢不能誅討徒疾惡之則鮮有不致亂者漢之宦者是巳君子非不惡之不得時與勢禍遍及於君子之身而國併以亡唐之末路亦類是也聖人之言其㫖逺哉之才之美章驕吝只就才上見是以其才美而驕吝者其餘亦指才言此章才字重是言有才無德之病故集注於圈外取程子德字𥙷之集注智能技藝智其所知者能其所能為者技藝又是能中小節目用此四字方包括得才字義尽程子開說驕吝朱子合說驕吝氣盈歉不同時遇一事氣盈則驕遇一事氣歉則吝其才於此事有所長則矜衒誇張以氣陵人其才於此事有不足則掩閟靳嗇不欲示短於人此是一等人若吝本根而驕枝葉則所以吝者乃為驕人之地驕是發見在外者吝是沉潛在中者吝是智底意思多驕是能的意思多若有所長推已忠告則人將皆知而能之我無可以驕人矣惟其必以自知則人莫我測常足以陵轢於人矣此又是一等人程子雙重朱子遍重合二說方盡驕吝氣象吝者則不驕驕者則不吝圈外勢常相因及未有驕而不吝吝而不驕者也蓋驕者吝之枝葉吝者驕之本根是驕起於吝篤信好學章言實篤信此道方能好學信之不篤則不能好學方能善道若持守不堅固畏死避害則不能善道能篤信之又須好學若不學則不知義理之極致亦徒信而巳能守死須是善於道若不善於道則有不當死而死當用權而不用執一不合於義亦徒死而巳篤信須是能守死不守死則所信者未篤好學須是善於道不足以善道則所好者未正惟其信之篤則能守之至死不變惟其好學見理明則能處事善於道故朱子曰守死者篤信之效善道者好學之功大意篤信然後能好學守死然後能善道篤信又不可不好學守死又不可不善道篤信須是守死好學須是善道惟篤信而好學故能守死而善道篤信好學就知上說守死善道就行上說荇菜左右芼之窈窕淑女鐘鼓樂之者正其類也關睢之亂蓋只指此四句不必求他說狂不直章狂謂心志髙逺而事為不精詳侗謂無知以理言悾悾謂無能以事言常人之情有狂侗悾悾之病必有直願信之德人志髙逺而不計較小節則為事必質直而不迂曲無知者則不敢妄為故願無能者則不敢輕出語故信若有是病而無是德雖聖人亦不教也學如不及章為學者晝夜勤力不息其心如追一物惟恐不及既用功如此尚恐失之蓋人生有期白日不再既生為人全不見得些小道理便死了只是枉了一丗所以古人為學不分毫放過舜禹章聖人治天下只順天地生物之理以養育萬民民之所欲與之聚所惡勿施惟知參天地贊化育盡其誠而巳不以天子之貴四海之富為事一如與己不相關一般大哉堯章上巍巍乎贊天髙大下巍巍乎贊堯德髙大則是凖則之則謂堯之德與天一般所以廣逺而民不可形容無能名是不可形容也人所見可者惟見其成功之文章尓然此乃粗迹其妙用入神處皆不可見唯聖人知之而亦不可形容故其言止此巍巍乎其有成功也煥乎其有文章上句也字起下句孔子只是言堯之成功可見者唯有禮樂法度耳圈外却是成功與文章對說舜臣五人章此章語脉須子細體認舜有臣五人懸說起一句在上面孔子是就武王曰豫有亂臣十人主意說言古言人才難得果是如此武王興周時人才之多惟有唐虞交㑹之間比於此時為盛尓夏商之代人才皆不能及然周𥘉雖曰人才多十人之中又有一婦人止有九人而巳是才之果難得也唐虞之際人才極多不止五人二典中可見所以可說盛於周𥘉獨言此五人者蓋五人功德尤彰著也周自成王之後人才亦衰禹貢五服甸侯綏要荒王畿千里謂上中方方千里為王者所居即甸服也四面各相去五百里為侯服又五百里為綏服又五百里為要服又五百里為荒服一面二千里與甸服共方方五千里是天下大約道里如此其服地內所封諸侯朝貢皆各有時所謂以服事所居在何服內依服內合當朝貢之數事天子也禹章致孝鬼神是祭宗廟盡其誠致美黻冕是待諸矦盡其禮盡力溝洫是飬民盡其愛子罕第九子罕章利凡利益利便財利皆是君子見義則為不睱計較利已有殺身以成仁者若言利安能及此天之賦與人者謂之命有以理言者仁義禮智之性是也有以氣言者智愚賢不肖冨貴壽夭之數是也理精微難見不可以一言舉知氣者非君子所尚惟當見義而行若委之命則廢人事而為學變化之功亦無用矣孔門問仁皆是問行仁之方而夫子答之皆是進修之目未嘗以仁之全體切切言之也故曰子罕言利與命與仁麻冕章冕冠總名冕之名有五衮鷩毳希玄天子諸矦公卿大夫士朝祭用之就五冕之中共有九等其一則十二旒次九旒下至二旒為八等與十二旒者共九等天子用十二及九七五三共五等自九旒以下各以其命數服之上可兼下下不可僣上其上兼下者於祭祀時各視祀之大小而服冕之髙下天子自衮冕以下上公亦自衮冕以下侯伯鷩冕以下子男毳冕以下只是冕上旒數不同天子自十二旒五等皆十二玉公矦以下只依旒數綴玉如九旒九玉八旒八玉其九七五共三等則君服之命六四三二共五等則天子諸矦之臣隨命數服冕之下有辨辨之下有冠皆首服也冕冠皆以緇布為之麻冕禮也集注作緇布冠亦總名也鷩必滅反毳昌鋭反希陟里反漢食貨志周布帛廣二尺二寸為幅三十升布升八十縷則二尺二寸容二千四百縷一寸計一百九縷程子謂周尺當今尺五寸五分弱所謂今尺者即營造尺也如此則營造尺之一寸為縷幾二百是一寸為今百眼簆其細密難成可見儀禮燕禮君燕臣之禮也公取大夫所媵觶興以酬賔賔降西階下再拜稽首公命小臣辭賔升成拜公答再拜立卒觶賔下拜小臣辭賔升再拜稽首公答再拜賔易觶下拜小臣辭賔升再拜稽首公答再拜注疏凡臣於君雖為賔與君相酬受爵不敢拜於堂上皆拜於堂下若君辭之聞命即升若堂下拜訖君辭之即升復再拜所以然者以堂下再拜而君辭之若未成然故復升堂再拜以成之若堂下未拜之間聞命則升升乃再拜則不言升成拜又覲禮諸侯覲天子之禮也侯氏坐取圭升致命王受之玉侯氏降階東北靣再拜稽首擯者延之升升成拜又王勞之再拜稽首擯者延之升升成拜及賜車服侯氏降兩階間北靣再拜稽首升成拜今禮中言升成拜者非一以此推之則他從可知矣然行禮又各有節然多有臣拜於下不辭升者蓋各有宜也其辭有命臣辭之者有君親辭之者亦各有當此章孔子之言又似臣凡拜皆當拜下而升成拜如覲禮賜車服之儀拜下不言辭而自升成拜程子是推凡處事說子絶四章集注四者相因循環不窮是合來看是分開看合看者易見分看者難明大凡我固亦有不自主聖人成此病者如聖人之心與天地同流無往自不在如無適無莫仕止久速是無固如佛肸弗擾之召欲往而復不往墮三都未能墮成則止緣聖人不久去魯若不去魯必別有所處是無必所謂子絶四只是說聖人私意期必固滯物我四者無一件聖人如何相連而生直至我若說道聖人無私意便無下三件則誠者不須立這四件條目張子之言恐是正意朱子是專為學者說開看合看各有意味然而總只是私意合看固因私意牽引來開看則各是私意所成必亦私意也固亦私意也我亦私意也太宰問章聖德也多能才也太宰以夫子多能為聖子貢則分别德與才以告之夫子之言止接多能之意故曰太宰知我下文言君子不貴多能以曉之語録太宰以多能為聖子貢謂多能為聖人餘事孔子以聖不在多能形容聖人地位則子貢之言為盡鄙夫問章集注始終本末上下精粗分四節看不必就一事求四者始終是前後兩端如夫子言興詩立禮成樂及學而時習章可與共學章之類本末是綱目及內外兩端如吾道一以貫之人而不仁如禮樂何答林放問禮之本之類上下是高下逺近兩端如答子張言忠信行篤敬答子路修己以敬及道千乘之國之類精粗是深淺兩端如答子貢問仁既告以仁之體又告以求仁之方及未若貧而樂富而好禮之類蓋答鄙夫之問亦若是也語上遺下但言高深逺大而不及淺近者語理遺物但言其體而不及於用喟然章門人為臣章魯哀十五年冬子路死於衛十六年夏孔子卒於魯則此疾病非將夢奠時也或問謂必夫子失司寇之後未致其事之前行詐只是不誠意思當輕看子路忠信剛決但知上稍缺此舉是實敬愛其師便決於行不知其失然凡事稍有違理便是不誠此是過不是故意用詐之罪夫子言久矣哉由之行詐是責其平昔任意便行致失理也美玉章沽去聲訓賣若平聲則訓買於此義不相當樂正章朱子詩集傳綱領釋此章引漢禮樂志云王官失業雅頌相錯孔子論而定之故其言如此古之樂章既各有體製亦各有音節孔子之時相錯失倫故為之更定使復其本出事公卿章金先生引語録三說中一說謂此數事外我復何有此說為正蓋此章之言甚近又非七篇默而識之章比若聖人亦謙言恐是太過必有人稱頌聖人道德因言我但能出事公卿入事父兄各盡其禮於喪事不敢不勉力以盡其至不飲酒而為其所困如此而巳此外何有於我蓋於人之所言姑以此數者答之觀兩則字與不敢字可見非未及者川上章舍去聲止息也見楚詞辨證集注未及改先看川字為主著實方見得下文意思此不獨是記夫子所言之地出逝字固指川流者字兼包萬物如斯字指流而不息夫字指與學者之辝謂萬物與道為體者如此流動未嘗止息於川可見然此只說得往者分明未見來者意故又曰不舍晝夜然後義理沛然如字非如似之如不是以川流比道是正言道之流行也如斯正指流而不息此章固是言道體聖人亦不懸空說正是教人體道不可須臾間闕集注三道體字第一就大原頭全體說來所以謂之道體之本然此道體是無形之體是就此章頂上說其次然後言易見者莫如川流此下方就川上說第二此道體也此字即指川流而言云是道之形體也道本無形因物而見其體下遂歷叙五端云皆是與道為形體者此第三箇說尤重大抵三道體上則輕清而所包者大下則漸著實而人可共見人而欲體道則全在謹獨工夫能謹獨又在於自强爾一道體就氣化流行處說是說所以生物者未說到物上二道體是就物上指形而上者而言三道體指物而言本注道體是道為物之體假程子道體是物為道之體質好德章德者人心本得於天惟知好之然後能進修以成己德但人真好之者少而好好色乃人之實心若心實好德如好色然則實好德矣此與大學比喻一般意只是勉人須實好德集注圈外引史記語以證夫子發此言之由但如此說則好德有好有德之人之意不惰章集注心解字𥙷不惰之前顔子聞夫子之言其心即融釋脫落略無疑滯既心解即勉力行之造次顚沛又是力行中節目下言如物得時雨發榮滋長何有於惰言自然不能巳非勉而不能惰此是形容顔子不惰非衆人不惰者比但學者讀此章則當自勉勵勿懈慢可也蓋聖人雖贊顔子之進亦所以厲學者之惰吾見其進章何文定云惜顔子者惜其巳進於所立卓尓之地未見其止者惜其不造於聖人之極也後生可畏章前兩語期之後兩語戒之期之者勉其進也戒之者警其惰也年冨者未來之日尚多也人以百年為期今當少壯則未來之日尚富也法語章集注語之未逹拒之不受是向上靣說未逹是法語巽言皆不能曉不受是雖曉而不從說其或喻焉是能從說者三軍章奪帥如漢王馳入韓信壁即卧內奎其印符以易置諸將公子無忌椎殺晉鄙奪其軍之類匹夫猶言一夫謂小人而有志者正與三軍多寡相對言三軍之氣在外匹夫之志在心人若心志堅定向道不惑孰能移之哉可奪則非志矣衣敝章衣敝緼𫀆而不恥此是舉一端以見子路之心不為貧富動非謂子路之德專見於此也其由也與辭氣可見子曰士志於道而恥惡衣惡食未足與議亦是舉凡而言大抵飾於身者往往以不及人為恥此止言敝衣故知只是舉一隅說如士志於道章有自厭其貧之意此章是貧富相對言外物來鑠於我人則易動其心而乃不恥子路所以為賢也此見子路心正氣全逹命安分樂已之貧而不知人之富略不以此事芥蒂於心唯見道義之安耳可與車馬輕裘與朋友共敝章對看此是不慕人之富彼是不輕人之貧此是不屈於物彼是樂與物共合而觀之可見子路氣象之全二臧字似有不同不忮不求安得不善上臧字就不忮不求中說唯不忮不求何足為善下臧字就不忮不求外說禮記緼為𫀆注緼謂纊及舊絮纊新綿也蓋以舊絮而加新綿為之枲著枲牡麻也以枲捶細以當綿貧者之服著音旨吕切字或作􅾺以綿裝衣也此謂以枲麻裝衣也此緼𫀆之義與禮記不同謂以麻當絮著在袍中也衣之賤衣之貴言其直爾非人之貴賤也進於道謂漸造深逺進字就道中說非自此進於彼之謂歲寒章木至寒而不雕者亦多聖人取松柏者蓋松柏之受命也獨一斬斷更不萌蘖如君子有剛斷者然松柏不雕於冬而換葉於春其枝未嘗見枯槁之態故聖人不言不凋但言後凋聖人言語雖小節自周備無滲漏如此知者不惑章三者字指人此章以三逹德循序而言蓋就一人身上說與知者樂水仁者樂山章開說者意不同共學章學是學問思辨之事知人皆可學而不可不學又知學以為巳然後可與之共學適道者篤行之事也格物之多心知既明善惡是非判然無疑然後可與同由於道之中矣行之日熟執志愈堅擇善則拳拳服膺而不變故可與立道在日用之間適道猶就每事言之立則行之全德之成矣立字如建字謂守聖人所制之法循其規矩凖繩皆有所成立然猶能應事之常爾或事變之來前無定制固當隨時處中如稱之稱物必以錘移前卻後以取其平所謂權也權非大而化之者不能故以是終焉有志之士則可與共學能明義理者則可與適道信道篤守不變者可與立立則守經者也至於義精仁熟則可與權而能處變矣集注知所以求之知格物致知之方也知所往知至善之所在而志於必至之也篤志固執而不變行成而守之固也權是稱錘凡稱物須以權於稱上推移前郤以取平今以權字為義理度而行之至中而止程子謂權即經朱子謂權經有辨勉齊謂有朱子之說則經權之義明有程子之說則經權之義正蓋經是常也權字有變意常者一定之理變者隨時之宜事之常者只依見成禮法一定行將去至有非常之事來須用自以禮義度而行之亦欲合於常道蓋自上古聖人代興制為典禮雖備然亦豈能盡該天下之事變哉因此度彼皆欲合於義而已且如父子相繼而有天下常也至堯舜則皆以子不肖而禪讓其義則在於得人而安天下君令臣共常也桀紂至暴而湯武至仁則起而伐之其義在於去惡而救民伊尹事太甲而放之其義在於全湯託孤之命兄弟友愛常也而周公誅管蔡其義在於正國家嫂叔不通問常也嫂溺則援之以手不通問者避嫌也見他人孺子入井且有惻隱之心見兄之妻將死則避小嫌而不顧所失大矣義理是活潑潑地物不在這一邊便是那一邊若兩下皆是義則稱量其重者為之便是權但權須是用得義理極明了方可行若未明理專認箇權字件件要去權則有背義妄作其罪不可勝言矣經者聖人所制禮法常久當行者君子用之以應常事者也權者聖人之大用前聖所未立法適逢事變而處之既當則其法即可常久所謂權即經也且如五帝以來父子相繼常也堯則因子之不肖而以有聖人在下故易為禪讓此權也至舜之讓禹則用堯之權為經矣天子在位諸侯臣服常也桀有極惡而湯至仁故易為征伐此權也至武之伐紂則用湯之權為經矣至於小事莫不皆然經與權皆聖人所制以君子言之則但可循聖人巳立之經不能用聖人未制之權唐棣章聖人未嘗言易亦未嘗言難但曰未之思蓋不思則難思之則易難易在思不思耳鄉黨第十鄉黨節前注容貌指恂恂詞氣指似不能言總結言指似不能言與便便言貌指恂恂與謹使擯節周禮大行人上公之禮介九人擯五人朝位賔主之間九十步侯伯介七人擯四人賔主之間七十步子男介五人擯三人賔主之間五十步諸侯之卿其禮各下其君二等謂如公之卿則七介侯伯卿五介子男卿三介則擯一半之其大夫又下於卿二等論語疏謂賔若是公來至門外直當闑西去門九十步下車北嚮立九介立在君之北邐迤西北並東嚮而列主公出直闑東南西向立擯在主人之南邐迤東南立並西向末擯與末介相對中間相去三丈六尺列擯介竟主君問賔來之意主人傳言於上擯歷次擯至末擯末擯傳末介歷次介上介至於賔賔答來意則自上介漸歷次末介及末擯至上擯告於主人既畢然後迎賔至門侯伯以下禮皆如此若使者來聘則主君至大門而不出限南面而立上擯出閾外闑東南西嚮亦如上陳列末介末擯相對亦相去三丈六尺陳擯介竟則不傳命上擯進至末擯間南揖賔賔亦進至末介間上擯與賔相去亦三丈六只上擯揖請事入告君乃相與入也凡門外之列擯介皆在主賔之前及入門則擯介皆隨主賔之後疏聘禮私覿禮畢賔出公再拜送賔不顧注云公既拜客趍辟君命上擯送賔出反告賔不顧矣君反路寢集注躩盤辟貌辟音闢謂足盤旋開闢聞君命敬之若無所措其身然命數謂圭璧之度冕服之章建常之斿樊纓之就二車之乘介擯之人禮牢之數朝位之步饗獻之禮皆隨其命多少之數入公門節周禮應門二徹參箇應門者朝門也徹者轍也二轍之內八尺參箇三八二十四門容二丈四尺也諸侯之禮有降殺門或狹於此然聘禮記侯國之禮而疏引二徹參箇為證則門之制或同歟門有二扉門中竪一短木謂之闑又名橛兩旁有長木謂之棖又名楔楔即今所謂門􅦟左右扉各有中左扉之中在闑東棖西右扉之中在闑西棖東此左右以內視外而言也然門以向堂為正謂自外視內也大抵左扉是主出入之道右扉是賔出入之道玉藻曰君入門介拂闑大夫中棖與闑之間士介拂棖賔入不中門公事自闑西私事自闑東此皆言賔客之事也君入門者兩君相見也客君入於右扉棖闑之中其上介卿也次介大夫也末介士也三介鴈行斜列於君之後右前左後而進卿介則在東而拂闑之西大夫介則正當君之後士介則拂西棖賔入不中門者謂他國來聘之使者不敢當客君之位故稍東近闑而入公事自闑西私事自闑東皆使者之事公事聘享也奉君命而行則用賔禮拂闑西而入私事私覿也已之禮非君之命則從主國臣之禮拂闑東而入也大射禮燕禮皆曰卿大夫皆入門右曲禮曰大夫士出入君門由闑右此右謂自外視之也故燕禮注凡入門而右由闑東左則由闑西疏謂由闑東者是臣朝君之法由闑西者是聘賔入門之法此經所謂立不中門者左扉之中也中者君出入之道臣之出入不敢由此必旁闑東則亦不敢當此而立行不履閾一者為行乍高乍低為失容一者為履穢門閾而不淨集注寧立之處諸侯門內有屏大朝㑹卿大夫立門外君立於門內屏外以待之謂之寧攝摳也摳即挈也齊衣下縫古者上衣下裳其實所攝乃裳下縫也階一尺為一級故上堂摳衣必去地尺執圭節天子封諸矦必以圭璧命之辨其等數為國之瑞信凡諸侯朝王執之以合信使使者聘問他國則亦執之以表信享禮享獻也此是聘禮第二次見其君也既聘用圭璧有庭實此圭璧又非前瑞信蓋凡瑞玉則還之享禮則納之而不還者庭實者以物實於庭中也唯國所有周禮小行人曰合六幣圭以馬璋以皮璧以錦琮以錦琥以繡璜以黼此六物者以和諸侯之好故禮器曰大饗其王事與三牲魚臘籩豆之薦束帛加璧龜金丹漆絲纊竹箭其餘無常貨各以其國之所有足以見庭實無一定之物小行人注曰六幣所以享也五等諸侯享天子用璧享后用琮其大各如其瑞謂公圭九寸則璧亦九寸侯伯圭十寸則璧亦七寸皆是庭實以馬若皮二王後享王則用圭璋疏謂大各如其瑞此諸侯享天子之禮其諸侯自相享則各降一等謂二王後則用璧琮二王後上公也而子男則用琥璜侯伯雖用璧琮而諸侯相享之玉又各降一寸謂上公則八寸侯伯則六寸子男則四寸其庭實則隨所用玉及國之所有上公桓圭九寸侯信圭七寸伯躬圭七寸子穀璧五寸男蒲璧五寸圭博三寸厚半寸其首左右剡各寸半璧圎徑五寸中孔一寸厚半寸䀻禮賔覿奉束錦總乘馬紺緅節古注孔氏曰一入曰緅飾者為領䄂緣也紺者齊服盛色以為飾衣似衣齊服緅者三年練以緅飾衣似衣喪服故皆不以飾衣集注取此以為說疏曰紺玄色按考工記三入為纁五入為緅七入為緇注謂染纁者三入而成又再染以黑則為緅緅今禮俗文作爵言如爵頭色也又復再染以黑則成緇矣鄭司農謂尓雅曰一染謂之縓再染謂之窺三染謂之纁凡玄色者在緅緇之間其六入者與孔氏云一入曰緅未知出何書又云緅者三年練以緅飾衣則似讀緅為縓檀弓練練衣黃裏縓緣今按諸書言染色一入曰縓再入曰窺三入曰纁四入曰朱五入曰緅六入曰玄玄即紺七入曰緇經所謂不以紺緅飾者則齊用玄衣巳明緅在朱玄之間則自赤漸變黑者但不知此色本為何用而決非飾練之縓矣窺音頳縓七絹反裘以皮為衣冬服也凡服內有𫀆襗之屬然後加裘又以衣蒙之謂之裼此所謂衣裼衣也裼之色必與裘之色類裼上加襲襲則朝祭之服也緇衣羔裘是諸侯君臣日視朝之服素衣麑裘君王視朔之服黃衣狐裘息民之祭之服然此是衆人之通禮何獨孔子服之今獨稱君子或恐是當時亦有非朝祭而自有此服孔子則亦必以同色之衣裼之言非行禮而必謹禮父否則君子是泛言於禮當如此而非指孔子也襗直格反凡佩有德佩有事佩德佩則有琚瑀珩璜衝牙玉藻曰古之君子必佩玉無故玉不去身君子於玉比德焉天子佩白玉公侯佩山元玉大夫佩水蒼玉世子佩瑜玉士佩瓀玫凡帶必有佩玉唯喪否若事佩如內則所謂左佩紛帨刀礪小觽金燧右佩玦捍管遰大觽木燧是也紛帨拭物之巾刀礪小刀及礪石小觽解小結大觽解大結貌如錐以象骨為之金燧取火於日木燧所以鑽火玦發弦者也捍拾也管筆彄遰刀鞞也玉藻人曰孔子佩象環五寸瓀而兖反玫武巾反觽許規反遰時世反古之弔服有錫衰緦衰疑衰錫者治其布使滑易也十五升去其半無事其縷有事其布曰錫十五升去其半有事其縷無事其布曰緦疑之言擬也擬於吉也吉服十五升疑衰十四升少一升而巳疑衰蓋布縷皆有事也周禮司服王為三公六卿錫衰為諸侯緦衰為大夫士疑衰注疏謂諸侯及卿大夫亦以錫衰為弔服士以緦衰為喪服其弔服則疑衰也又曰凡辨絰服其衰侈𬒮謂弔服皆著辨絰也辨絰者如爵辨而素加環絰也侈大也凡𬒮皆二尺二寸大夫以上侈之蓋半而益一焉則其大三尺三寸也又儀禮喪服記曰朋友麻謂服疑衰而加麻絰也庶人之弔服則素委貌白布深衣聖人之弔服則用錫衰疑衰與詩君子偕老言蒙彼皺絺謂以展衣蒙於皺絺之上展衣者禮服也既服禮服則絺衣之內必有中衣明矣故集注取此以證絺在中衣之外是中衣表絺其義不在蒙字詩疏謂皺絺絺之尤細靡者襞積襞是衣褶積曡也謂之褶成曡即今日所謂也襞必益反褶之涉反賈限反食不厭精節割不正不食集注割肉不方正者不食引陸續母切肉必方為證竊恐方正自出已意經文正字則該之古者燕饗有大臠曰胾又有切肉則切肉者必方可也其餘牲體臂膞骨脅及腸胃肺心割截各言其度所謂不正則不合乎度者兼此二說恐盡正字意古人食肉必用其醬之相宜者合食之周禮王者之醬百有二十甕其品數之多如此如內則魚鱠芥醬麋腥醢醬之類以魚腥為膾則合芥醬以食麋腥謂麋之生肉蓋亦膾之類則合麋醢及醬以食又有所謂濡雞醢醬濡魚卵醬濡鱉醢醬皆實蓼此則烹調之節也濡者烹之以汁和也凡言醢醬皆是醢及醬二物卵醬則用魚子作醬也若此三者自是亨飪條不備則是失飪而亦不食之矣濡音而卵音昆亨音烹古注齊禁葷物薑辛而不臭故不去此說頗長忽突出薑一條而曰不撤則是尋常有薑矣古注雖自此上皆作齊戒意說固未穩然此句安知不是齊一類錯簡在此飲食或勸酬故有言但未答述寢則無可言者鄉人飲酒節周禮方相氏掌蒙熊皮黃金四目玄衣朱裳執戈揚盾帥百隸而時難以索室毆疫注曰郤凶惡也禮記月令季春命國難九門磔攘以畢春氣注謂此難隂氣也隂寒至此不止害將及人蓋此月內日行歷大梁昴宿有大陵積尸其氣佚則厲鬼隨而出此難唯天子諸侯得為之又仲秋天子乃難以逹秋氣注謂此難陽氣也陽暑至此不衰害亦將及人蓋此建酉之月而日至壽星之次又與大梁合故亦動大陵積尸此難惟天子得為之又季冬命有司大難旁桀注謂難隂氣也此月內日行歷虛危有墳墓四司之氣厲鬼將隨強冷出害人謂之大則下及民庶皆得難也廄焚節廄養馬之間也凡牧馬之數四馬為乘三乘為皂三皂為繫六繫為廄一廄二百一十六馬廄即間也牧馬之人謂之圉而馬有良駑良馬則匹一人駑馬則麗一人良馬則乘有圉師皂有趣馬繫有馭夫廄有僕夫駑馬則六麗一師六師一趣馬六趣馬一馭夫天子十二間馬六種五良一駑駑三良馬之數諸矦六間三良三駑駑則一當其一此章為邦國之廄良馬三間六百四十八馬掌牧者三百八十八人掌牧者八百八十五人駑馬三間亦六百四十八馬總一千二百七十三人故廄焚夫子問人而不問馬然周禮之制云尓未知果如何如大夫四間一良三駑則八百六十四馬掌牧者六百八十三人且大國之卿四大夫祿其田不過三千二百畒上農夫可食二百八十八人而巳祭祀服御賔客皆出於此固不能全以養人今牧者乃有六百八十三人而又欲畜八百六十四馬則何以給之陳文子有馬十乘巳謂其富而大夫當有馬如此多何邪皆不可曉觀此則國中亦未必有許多馬雜記曰廄焚孔子拜鄉人為火來者然則乃孔子之私廄故於退朝而後問君賜食節集注引周禮四句王日一舉殺牲盛饌日舉鼎十二備大牢此舉謂朝食也膳夫授祭者膳夫掌王之食飲膳羞禮飲食必先以少許置之地以祭始造飲食之人王食則膳夫以當祭之物授之於王而王親祭之品嘗食者凡王之饋食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十甕王將食膳夫每品嘗之然所嘗只嘗火熟者謂之烹之於鼎者也所以嘗者恐失生熟之節也注中引此四句以證先飯之意非正解此章蓋此天子之禮而孔子則侍諸侯之食也凡祭座中尊者祭之餘則否賔主敵體則主祭賔之長者一人祭今侍食於君不敢當客禮故君祭則先飯寢不尸節古者車皆立乘馬驟車馳難於立故於車上立髙五尺五寸橫一木謂之較伏之而立或遇有所敬則當躬身故髙三尺又橫一木在較下謂之軾有敬則俯身慿之惟尸與婦人坐乘讀論語叢說卷中
