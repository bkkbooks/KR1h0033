front:
  text: 讀孟子叢説卷下東陽許謙
  hash: sha256:6abb9994f4c53980626447afc6dde6c69e3a3e8414f268da86032128b0d746ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0033_SBCK_008-1a}
body:
  text: 滕文公上問為國章文公問為國孟子告以教養其民有養然後可教故先言分田制祿而後及學校也自民事不可緩至雖周亦助也養之事設為庠序至小民親於下教之事下至新子之國總言之答文公者止此下答畢戰却只是言分田蓋畢戰惟掌井田之事也許行章許行言仁政是孟子所言井地之法陳相言聖人之政是許行言神農之法蓋文公始聞孟子之言既使畢戰為之矣然後許行來及許行來文公不斥絶之而與之處故陳相謂巳行其法而其言如此聖人治民不過教養兩事堯治天下遇災變先命舜禹平水土次命后稷教稼穡然後使契為司徒次敘必如此江漢以下三語謂夫子之道德光輝如江漢濯之潔秋陽暴之乾皓二潔白人不可加尚巳又一説欲以有若擬孔子則雖江漢以濯秋陽以暴而孔子之皓皓者終不可尚已以為孟子贊美曽子則曰曽子不可之辭識明義精有如江漢之濯秋陽之暴若是皓皓乎而不可尚已許行謂不論屨材精粗但大小同者同賈是實説孟子謂大屨與小屨若同賈則賣者必不肯為大者是比説將大小比精粗兩屨字意不同此章孟子曰以下三大節自許子必種粟而後食乎至不用於耕耳闢其假託神農之言吾聞用夏變夷至不善變矣責其倍師從許子之道以下陳相之遁辭故又闢其市賈不二之説夷之章語録命之矣之字是事子名滕文公下周霄問章注籍字音義見考證前篇藉者借也下諸矦上公衮冕侯伯鷩冕子男毳冕上可兼下紘以組為之屈之而屬兩端於武所以固冠於首也副者王后之首服猶王之冕禕者王后之衣猶王之衮衣二者皆王后之服而此言諸矦之夫人者禮記注謂記者容二王之後與禕音暉禮注三盆手者三淹也凡繅每淹大總而手振之以出諸也淹於驗反又於斂反白黑曰黼青黑曰黻青赤曰文赤白曰章用此以為祭服謂染絲成此色而繡裳或畫於衣者亦如此彭更章彭更以孟子傳食諸矦為泰孟子答之以舜受堯之天下且不以為泰而子以我傳食為泰乎彭更謂非以傳食為泰但無事而食則不可尓蓋謂有職業而食則可也後孟子之意則謂雖無職業而君子為仁義有功於國者多何嫌於無事好辨章集注氣化盛衰人事得失反覆相尋竊謂氣化盛人事得則天下治氣化衰人事失則天下亂是固然矣然孟子此章答好辨之問而孟子之辨專為闢楊墨而發則易亂為治全賴人事以輔天道之不足反氣化之衰而至於盛也觀堯禹之治水則以人事而回氣化武王周公誅紂伐奄孔子作春秋則以人事而救衰失所以孟子亦於衰失之時闢楊墨以回氣化正人事也此正聖賢作用參天地贊化育之功讀此章當如此會集注之意陳仲子章匡章以仲子為廉孟子謂齊之巨擘者許之也雖然以下貶之也伯夷盜跖之築樹反問也此非君子之心謂仲子之廉當如是尓匡章對以織屨辟纑易之此則合君子之道然既以功易食為無害而以母兄之室與食為不義何哉縱母兄之得此物為不義而我受之母兄則為義矣况既是齊之丗家則兄之得祿未為不義也仲子既於母兄之物所從來椎一層上看而於所易者不能椎一層上看是不能充其廉之類矣凡此皆是反説而愛親敬兄及君臣之義皆在其中使之就其所明充其所暗則仲子之罪大匡章之惑解矣此章經注諸廉字當辨廉有分辨不苟取也此廉之正義豈不誠廉士哉此廉字陳仲子不中禮之廉也仲子惡能廉及注仲子未得為廉豈有無人倫而可以為廉哉此三廉字是廉之正然後可得為廉耳未能如蚓之廉滿其志而得為廉耳此三廉字是仲子之廉也離婁上離婁章兩言規矩六律前比説用法後正言立法前謂至聰明者亦須法度以比不一句必須仁政後則謂聖人立法雖盡智慮亦須法度雖主於不忍人之政一句然上兩語亦聖人所立之法也不仁可與言章孺子之歌主於人孟子之言主於水聖人之言雖非孺子之本意然主人而言者意反淺主水而言者意反深所謂聲入心通無非至理道在邇章仁義根於人心人所同有行之則甚近而易其要在乎親親長長但人人各自親親長長則仁義流行天下其有不平者乎教子章夫子教我以正夫子未出於正也非謂為子者必有是言也孟子所以責為父者身之必出於正也事孰為大章事親守身雖對説而守身又為事親之本下文曽子只是事親之凖則意謂事親固當如此然有曽子之守身則可尓離婁下子産章子産非不知為政者徒杠輿梁偶有闕耳孟子此言責備賢者蓋恐學者因敬子産而以其所為皆是故明斥其非以曉人也中養不中章中以德言才以能言有德以其能成物也有能以其能成事也今以子弟之無德無能而棄之是物之近者事之急者皆不能成尚可謂之有德有能乎彼此相較相去豈逺哉涵育寬以容之之意薰陶善以道之之意深造章此章主於行而知在其中故集注謂道則其進為之方也進為字有力當看蓋學者欲其循序漸進優遊涵泳力行積久自然融會於心所謂自得也理既融於心則所處者自然安固而不搖既居之安則所以資藉之者愈深逺而無窮資之既深則日用之間無所往而非道矣工夫只在深造以道四字上至於自得則自然有以下效驗以知行二者各體認之可見孟子之意主於行者為尤重也程子則專主於知故在圈外博學章博學詳説以知言約則會其極而於行上見以善服人章以善飬人謂有善於身而教化撫字使民同歸於善也亟稱水章不舍見諭語川上章異禽獸章此以舜為標凖而使人企慕以力行也舜亦異於禽獸幾希者尓以其能存故為舜則衆人能存之豈不亦可以至於此乎春秋章以三國之史同言而曰一也蓋謂魯之春秋其所紀載非周之典禮善惡不明不過記五霸之事與晉楚之史同尓至於孔子之春秋則假其事以明義而非盡舊史之文故曰其義則某竊取之矣如此看方見得中間一節不間可以取章可以無三字為重不可將可以可以無作兩下看𥘉見其可而詳察為不可故行之惟從其不可者尓或問謂孟子舉傷廉以例二者蓋傷廉是順辭易看傷惠傷勇是反辭難看故也須先體認惠勇之本義然後見過之者為傷集注略見而自許是全釋可以意深察而自疑深察半語是釋可以無意自疑字乃是指上去疑其可以者如此看方見得可以可以無不是兩下説下文過猶不及只是結傷惠傷勇兩語逄蒙章此章專為交友發羿不能取友而殺身孺子能擇交而免禍言性章性是人物所得以生之理本自難明求其發見之故則亦不難明也然故則以利順者為本故之發於逆者則又非性之本矣求已之故則惻隱之發見性之仁羞惡之發見性之義求人之故則父慈子孝君仁臣忠求物之故則鳶飛魚躍山峙淵流皆是也是皆所謂利也如下文天與星辰之故亦只是利而已能知此性而利以行之則為智之大禹之行水不是比喻言禹順水之性為智之大以例人循性皆當以利也智者應物若行其所無事則智亦如禹之大矣智亦之亦是亦大禹也下文又以髙逺者證故之易見却不是功用章內三智者不同上者字是問辭下兩者字是用智之人萬章上萬章問章恝古黠反音與戞同集注苦八反誤娶妻章懟父母言人之常情也為廢大倫則雖子亦不免有讐怨父母之心舜固非懟父母者然告則必廢大倫故不告也此聖人善處變事消弭於未然此等處正好觀聖人書四嶽舉舜曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦則堯妻舜時頑嚚傲德巳化而改萬章傳聞蓋亦野人之語孟子不辨惟欲發聖人處變之心魚入水有悠然而逝之道弟有思兄欎陶之道故子産與舜皆信之舜之愛弟自天性况象又以愛兄之道來感之乎堯以天下與舜章凡祭有祈有報風雨以時年榖順成氣不苛疹民無夭札則是神享其祭而其應如此百里奚章後語六反四智二賢皆反覆明奚之事然各有序第一總言去虞入秦之智第二第三詳言去虞之智第四詳言入秦之智第五以事實言其賢為下節張本第六專以上文之賢證自鬻之言之妄前後皆是倣像言之為第五節為要然不智則不能明去就之幾不賢則不足見其智之正故反覆言之讀之但見其文之妙而不知其意之精密如此萬章下目不視惡色章去父母國之道也此句亦孟子言孔子只有遲遲吾行一句此章聖字言夷惠伊尹處是以地言與大而化之之聖不同只是清任和到極處故謂之聖孔子則是大而化之之聖其行之時中則清任和時而出之亦無不到極處集大成一節以樂比孔子知之至行之極條理即八音以金而聲之所以始其衆樂以玉而振之所以終其衆樂聲振始終皆是動用字惟其知之至故能始萬事惟其行之極故能終萬事是為聖智兩全次一節以射比四聖人能挽強弓射逺地此力也能中其的乃巧也必先知的之所在又知中之之法然後因力之所至而中之謂知之明然後行之從容中道三子力量雖到而知有未至故不及孔子萬章兩篇皆論聖賢之行大率皆以孔子折衷之上篇前五章言舜六章言大禹固無間矣七章則言伊尹故八章以夫子之出處繼其後九章論百里奚次篇之首又言三聖人而以孔子集大成斷之三章問友而上及堯舜四章言交際又繼以孔子五章為貧而仕又言孔子下二章論君餽與見諸矦而又及孔子蓋孟子所願學者孔子故論古聖人則以孔子繼之論賢者必以孔子折衷之前篇言一治一亂及舜禹湯文武周公處與末篇之末皆然論語中庸之體大率亦如此所以示君子心學孔子而後可告子上性猶杞柳章人受天之理以生夲具仁義禮智之性人之有惡是失其本性之善非其真也告子不知乃謂人性本不善因矯揉以為仁義猶矯揉𣏌柳以為杯棬孟子謂人之於仁義乃其本有而所當行者豈矯揉而成若告子謂矯揉而成乃是戕賊人之常性而為之尓揉𣏌柳為杯棬是戕賊之也非可以喻仁義也若此言之行人不知者將真以為戕賊人為仁義誰肯從之是仁義之禍也性猶湍水章告子謂性本無善惡但可以為善可以為惡在所引者如何尓故以水無分東西為喻孟子亦就其水以喻之謂性之必善譬猶水之必下告子所謂決之者人為之也非其自然之性也若人欲拂水之性甚至可使逆行况東西乎人之為善順其本性也水之就下順其本性也生之謂性章告子以活動知覺為性孟子意謂以此為性則人與物同而何足謂之人哉故先以白之説兩轉審告子之意待其應定了然後以犬牛人之性同異而問之告子知其説之非其言方塞所以言犬又言牛者謂非獨人物之性異就物之中其性又各不同所以深曉告子以人之性善也食色性也章告子言仁是好愛只説得人心不知孟子所言仁義是道心告子以好食愛色皆發於心故曰仁內其言巳定故孟子反問之告子只答義外之説孟子就其白字長字明其白不可譬長而長人長馬不可同則所謂義內者可不言而喻告子猶不悟重以內外為言不知愛之所施有宜即義在其中而長之之心豈發於外是則理之不明故也孟子因其以好食色者為性於是借耆炙以為喻謂美味雖在炙而耆之者乃自內出對上長楚人之長説物則指炙而言謂豈獨於人為然物亦有如此者以耆之之心比長之之心則可見義之在內無疑矣富歲子弟章先以歲之豐凶致人之善暴以明人性本善有以陷溺則為惡蓋欲得食以飬其生者人之常情故冨歲得順其心則為善凶年不足以養其生而逆其心則為惡次以牟麥為喻謂人之性本同當皆極於善所以不善者飬之異以勉人當盡養之之道也其下又以形之所好必同以明心之所好無不同而聖人之所為即衆人之所本同而當然者衆人當法於聖人以全其善則當力好如口之恱味可也同然之然集注訓可與耆聽美對而皆以同字冠之非語助也即是字之意謂理義乃人之所同以為是者牛山章浩然章論養氣而以心為主此章論飬心而以氣為驗曰志者氣之帥故謂以心為主曰平旦好惡與人相近故謂以氣為驗集義固為飬氣之方所以知夫義而集之者乃心也飬心固戒其梏亡驗其所息而可致力者則氣也彼欲飬而無暴以充吾仁義之氣此欲因氣之息以飬吾仁義之心兩章之持志操心之意未嘗不同而氣則有在身在天之異然未始不相為用也魚我所欲章弗受呼蹴之食出於倉卒之時受萬鐘在於間暇之際倉卒之時私意未動義之所發者直間暇之際有計較之心則私不可遏矣倉卒而義明如乍見孺子入井惻隱即生意正同間暇而有宫室等三者之纍則如內交要譽惡其聲矣夫行道乞人皆能行之則義乃人之本有明甚君子其可不知之而由之乎孟子之戒深切著明矣三鄉為身北山先生作一讀言鄉為辱身失義之故尚不受呼蹴之食以救身之死今乃為身外之物施惠於人而受失義之祿乎可謂無良心矣此章專以生對義説第一節是主意第二三五又以欲惡分説生字意因第一節暗與義對説蓋欲生即是惡死出此必入彼二節言欲生惡死固人之常情而欲惡有甚之者乃義不義尓此是本然所有義理之良心也三節反言失其良心而不能取義者四節兩是字金先生作兩讀蓋正指義而言五節上三句當急讀作一串此是繳第二節兩句説賢者能保此好義之良心上五節言生死大分下三節言辭受小節然下三節亦是蒙前第一節生義言之天爵章天爵人所皆有人爵各有命分有德則足以長民故人修其天爵則人爵自然至不可求也若有心求人爵便巳務外而失其本心之爵矣欲貴章丗人但知公卿大夫之爵為貴而不知在我之身皆有貴者乃天所賦之善所謂天爵也天爵人所同有故思則得之人爵各有命分雖求之無益天爵亦是天命此則義理之命人爵乃氣數之命孟子前章尚有修天爵而人爵自至之説此章則於人爵下兩不願字是不將這個為念告子下禮食孰重章敬兄禮也雖無食而將死必不可奪兄之食而違敬兄之禮婚娶禮也雖至於絶嗣必不可摟人處子而違婚娶之禮任人蓋異端之徒棄蔑禮法而譏侮之者故孟子止就其所言食色二者使之自權其重輕而自思之蓋不屑之教誨也曹交章第三節為字重獨不勝為患為字輕湯文亦在人為之如有力無力皆人所自為雖舉百鈞之重亦是自去發奮為烏獲之徒此言用力為之皆可至况禮義人皆有之夲無虧欠不須如舉重之用力豈以力不勝為患但能為之即至不至者乃不為尓所以後節教他學堯則為堯學桀則為桀是皆為之而已盡心上盡心章朱子釋明德則曰人之所得乎天而虛靈不昧以具衆理而應萬事者也釋心則曰人之神明所以具衆理而應萬事者也二者無大異豈心即明德之謂乎蓋德者得也所得乎天是釋德字本義而指其得之之原虛靈不昧以狀明之體具衆理應萬事指所得之實然而虛靈不昧則心也具衆理則性也應萬事則情也是合心性情三者言之而以得乎天冠于其上其釋明德為切至於言心而曰神明是指人身之神妙靈明充之可以參天地贊化育之本而言其所統則性情也故亦曰具衆理應萬事此釋心字亦切况德者謂得之於心不以心而言則德何所倚乎然彼言以順辭也此言所以有主宰之意此又微有輕重之不同萬物章廣土衆民章此章緊要在君子所性仁義禮智根於心一句上常人固皆有四者為氣稟昏迷故物欲蔽隔四者不能根於心惟君子則得於天者全而不曽失常與心相著故其發施有下文如此效驗窮逹不能加損而憂樂也分定是分得天之全體分子正指四者伯夷辟紂章此章主意在文王之政有國者所當法不主言二老之去就登東山章第一節兩言登山謂所處地位髙則視下愈小觀海難為水謂所見大則小者不足觀遊聖門難為言謂既聽聖人之言則餘人之言皆不足聽此句與觀海相連一般説第二節言聖人之道有本故用不窮第三節言學者當學聖人然當以漸而進不可躐等也觀海觀水流水雖三節皆言水自是三樣意思比喻揚子取為我章權稱錘也物輕重不齊權與物相凖方得其平君子應事當隨事取中而應之譬之稱銖兩斤鈞石物之輕重各有當其平處今以銖兩為輕鈞石為重例以斤稱之其可乎是子莫之執中也柳下惠章柳下惠不羞汙君不卑小官袒禓祼裎焉能凂我和也至於不怨不憫三黜而不改其道介也人惟知其和而不知其介故孟子表而出之所謂三公當時必有命惠為此任者不可知矣堯舜性之章性之者謂得於天者氣質清明義理純粹而終身行之不思而得不勉而中不假修治者也身之者謂氣稟微有不同而自修其身體道而行自思勉以至於不思不勉者也至於五霸則假尊天子安同盟為名而實欲自行其威富其國久於此道亦不自知其實非仁義豫不狎于不順章不狎不順有二義伊尹謂我見桀不順今又習見太甲不順乃就桀與太甲二人言之此一義也或言伊尹見太甲行事日日不合於理我不欲習慣見此不順理之事乃就太甲一人言之又一義也王文憲謂伊尹放太甲善用權者也孟子明其事而言曰有伊尹之志則可無伊尹之志則篡善語權者也倘使孟子居於彼時則必行伊尹之事業士何事章尚志者髙尚其心之所之士無位未得行其道故且只髙尚其志向非仁非義一節謂有此志而待他日得位而行之者也兩惡在却是目今居者由者則雖未得大人之位而大人之事巳預全備矣當如此作兩節看仲子不義章金先生曰仲子不義當句乃先斷其為不義之人下則曰若有與之齊國必不肯受人皆信其廉殊不知此乃舍簞食豆羹之小義尓何足道哉彼有辟兄離母之大不義豈可以其小義許其大不義而名之曰賢哉食而勿愛章恭敬者之恭敬以發於心者言恭敬而無實之恭敬以幣帛言君子之於物章􅋢之而弗仁之愛愛惜之義不輕用物不暴殄天物之意仁民之仁乃愛之本義親又重於仁程子嘗言以己及物仁也推己及物恕也而此却言仁推己及人似有不同蓋此章四仁字皆言仁之用不言仁之體程子所謂推已及人正訓此章之仁字推字亦要輕看以己所有推出行去尓盡心下盡信書章書中二典三謨之類皆聖哲之言一定而不可易者若其餘載事之辭或有過稱者孟子此言非謂書中之言皆不可盡信但謂其辭時或有害於義者尓讀書之人不可以辭害義可也集注杵舂杵也或作鹵楯也作鹵者是然亦非楯若以為舂杵與楯苟非血深一二尺豈能漂之雖非武王殺之而商人自相殺然亦不至如是之多也蓋鹵乃鹽鹵之鹵謂地發蒸濕言血漬於地如鹵濕然此金先生之意我善為陳章孟子之時皆尚攻戰能者為賢臣而孟子乃以為大罪蓋國君苟能行仁政以愛其民使之飽暖安佚則下民親戴其上矣其他國之民受虐於君者心必歸於此人既樂歸於我我以親上之民而征虐民之君則其民豈肯與我為敵故引湯武之事以證之梓匠輪輿章此言師之教者不過舉其大綱尓至於理之精微事之曲折與夫不可容言之妙而當默識者皆學者所當勉力推明潛心究察非師可以口傳也民為貴章集注八蠟不通禮曰天子大蠟八歲十二月合聚萬物而索饗之其神則先嗇一若神農者司嗇二后稷也農三田畯也田畯是古之官司督促田事有功於民者郵表畷田郵若郵亭表田畔畷井田之畔相連畷於此田畔造郵舍而田畯在其中督約百姓也貓虎五助田除蟲鼠之害者坊六坊畜水之隄水庸七水庸通水之道此皆有益於嗇事者昆蟲八螟螽之屬此則為害者也故皆迎其神而祭之畷知劣反又知衛反貉嵇章此章言文王孔子雖有聖人之德亦不免為衆口所謗訕而其所以處之者如此然人雖謗之終不能損其令名孟子意謂稽雖為衆口所訕但當自修其德而已山徑之蹊間章山間之小徑悠然有人行而不斷即成大路少頃無人行則茅長而遂塞之學同之道才有間斷私欲便生而塞天禮之路矣口之於味章性也之性氣質之性也有性焉之性天地之性也有命焉之命本以氣言而亦有禮在中為之品節限制命也之命本以理言而所稟之氣有清濁厚薄之不同上五者人性皆欲之而有命分不同不可必得然亦有禮在中品節其命分下五者本皆天禮而却有命分一定不得其至君子則但循天禮而行以求至其極故不為命分所拘堯舜性之章性者謂所得於天者不假修為終始如一聖之至者也反之謂得於天者不能無少失缺修而至之亦聖人也第二節言性之第三節言反之説大人章為君子者固當貴貴然於言語之際有畏之之心則言語不能盡况大人所為之事皆不合法度而君子之所不為何必畏之哉由堯舜至於湯章尓如是也指見知聞知者而言此章大意謂古五百年必有聖人興在當時必有見而知之者在後丗必有聞而知之者今去孔子之丗僅百年而顔曽輩巳亡巳無有如是見而知之者恐此後遂無有如是聞而知之者蓋孟子惜前聖憂後丗之心真切感人而孟子自任道統之意亦不容謙謙矣然而無有乎尓非謂在孔子時無見而知之者正謂孟子時去聖人之丗雖未逺而當時見知者今亡矣須將此一節作一串之下乃見意孟子叢説卷下此元刻殘本東陽許謙讀四書叢説中大學一卷中庸上下二卷孟子上下二卷也余于宋元經學不甚喜購然遇舊刻亦間收焉惟此則甚樂之為其中庸多一下卷故也國朝四庫書目止收四卷故嘉定錢竹汀撰輔元史藝文志卷亦如此今兹夏余為竹汀先生刋輔志一書竹汀因余于元代蓻文頗多搜羅屬為參校適書友擕此書至知多一卷強索重直余許以緍錢二千易之而未果告諸竹汀汀己采入志中改作五卷矣越月有三書賈持書易錢而去爰記此緣起以徴信于後余檢篆竹堂書目載四書叢説四册而卷數不詳又璜川吳氏書目收藏較近則云七卷然係抄白未之敢信余惟就所見之五卷為信可爾倘異日齋書目之二十卷盡出不更快乎庚申九月小晦日挑燈記蕘圃黃丕烈
