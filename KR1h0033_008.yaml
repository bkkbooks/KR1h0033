  text: 讀孟子叢說卷下東陽許謙
  hash: sha256:d39a920631b47596d2bf5d7b5112db4d02c134bf15a423c88e34aee10632a915
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0033_SBCK_008-1a}
body:
  text: 滕文公上問爲國章文公問爲國孟子告以敎養其民有養然後可敎故先言分田制禄而後及斈校也自民事不可緩至雖周亦助也養之事設爲庠序至小民親於下敎之事下至新子之國緫言之答文公者止此下答畢戦却只是言分田盖畢戦惟掌井田之事也許行章許行言仁政是孟子所言井地之法陳相言聖人之政是許行言神農之法盖文公始聞孟子之言旣使畢戰爲之矣然後許行來及許行來文公不斥絶之而與之處故陳相謂巳行其法而其言如此聖人治民不過教養兩事尭治天下遇灾変先命舜禹平水土次命后稷敎稼穡然後使契爲司徒次叙必如此江漢以下三語謂夫子之道德光輝如江漢濯之㓗秋陽暴之乾皜二㓗白人不可加尚巳又一說欲以有若擬孔子則雖江漢以濯秋陽以暴而孔子之皜皜者終不可尚已以爲孟子賛美曽子則曰曽子不可之辭識明義精有如江漢之濯秋陽之暴若是皜皜乎而不可尚已許行謂不論屦材精麄但大小同者同賈是實說孟子謂大屦與小屦若同賈則賣者必不肯爲大者是比說將大小比精粗两屦字意不同此章孟子曰以下三大節自許子必種粟而後食乎至不用於耕耳闢其假託神農之言吾聞用夏變夷至不善變矣責其倍師從許子之道以下陳相之遁辭故又闢其市賈不貳之說夷之章語録命之矣之字是事子名滕文公下周霄問章注籍字音義見攷證前篇藉者借也下諸矦上公衮冕侯伯鷩冕子男毳冕上可兼下紘以組爲之屈之而属两端於武所以固冠於首也副者王后之首服猶王之冕禕者王后之衣猶王之衮衣二者皆王后之服而此言諸矦之夫人者礼記注謂記者容二王之後與禕音暉礼註三盆手者三淹也凡繅毎淹大緫而手振之以出諸也淹於驗反又於歛反白黒曰黼青黒曰黻青赤曰文赤白曰章用此以爲祭服謂染絲成此色而綉裳或畫於衣者亦如此彭更章彭更以孟子傳食諸矦爲㤗孟子答之以舜受尭之天下且不以爲泰而子以我傳食爲泰乎彭更謂非以傳食爲泰但無事而食則不可尓盖謂有職業而食則可也後孟子之意則謂雖無職業而君子爲仁義有功於國者多何嫌於無事好辯章集註氣化盛衰人事得失反覆相尋竊謂氣化盛人事得則天下治氣化衰人事失則天下亂是固然矣然孟子此章答好辯之問而孟子之辯專爲闢楊墨而發則易亂爲治全頼人事以𥙷天道之不足反氣化之衰而至於盛也觀堯禹之治水則以人事而囬氣化武王周公誅紂伐奄孔子作春秋則以人事而捄衰失所以孟子亦於衰失之時闢楊墨以回氣化正人事也此正聖賢作用參天地賛化育之功讀此章當如此㑹集註之意陳仲子章匡章以仲子爲廉孟子謂齊之巨擘者許之也雖然以下貶之也伯夷盗跖之築樹反問也此非君子之心謂仲子之廉當如是尓匡章對以織屦辟纑易之此則合君子之道然旣以功易食爲無害而以母兄之室與食爲不義何哉縱母兄之得此物爲不義而我受之母兄則爲義矣况旣是齊之丗家則兄之得禄未爲不義也仲子旣於母兄之物所從來椎一層上看而於所易者不能椎一層上看是不能充其廉之類矣凡此皆是反說而愛親敬兄及君臣之義皆在其中使之就其所明充其所暗則仲子之罪大匡章之惑解矣此章經注諸廉字當辨廉有分辨不苟取也此廉之正義豈不誠廉士哉此廉字陳仲子不中礼之廉也仲子惡能廉及注仲子未得爲廉豈有無人倫而可以爲廉哉此三廉字是廉之正然後可得爲廉耳未能如蚓之廉满其志而得爲廉耳此三廉字是仲子之廉也離婁上離婁章兩言規矩六律前比說用法後正言立法前謂至聦明者亦須法度以比不一句必須仁政後則謂聖人立法雖盡智慮亦須法度雖主於不忍人之政一句然上兩語亦聖人所立之法也不仁可與言章孺子之歌主於人孟子之言主於水聖人之言雖非孺子之本意然主人而言者意反淺主水而言者意反深所謂聲入心通無非至理道在迩章仁義根於人心人所同有行之則甚近而易其要在乎親親長長但人人各自親親長長則仁義流行天下其有不平者乎教子章夫子敎我以正夫子未出於正也非謂爲子者必有是言也孟子所以責爲父者身之必出於正也事孰爲大章事親守身雖對說而守身又爲事親之本下文曽子只是事親之凖則意謂事親固當如此然有曽子之守身則可尓離婁下子産章子産非不知爲政者徒杠輿梁偶有闕耳孟子此言責備賢者盖恐斈者因敬子産而以其所爲皆是故明斥其非以曉人也中養不中章中以德言才以能言有德以其能成物也有能以其能成事也今以子弟之無德無能而棄之是物之近者事之急者皆不能成尚可謂之有德有能乎彼此相較相去豈逺哉涵育寛以容之之意薰陶善以道之之意深造章此章主於行而知在其中故集註謂道則其進爲之方也進爲字有力當看盖斈者欲其循序漸進優游涵泳力行積乆自然融㑹於心所謂自得也理旣融於心則所處者自然安固而不搖旣居之安則所以資藉之者愈深逺而無窮資之旣深則日用之間無所往而非道矣工夫只在深造以道四字上至於自得則自然有以下效驗以知行二者各体認之可見孟子之意主於行者爲尤重也程子則專主於知故在圈外博學章博斈詳說以知言約則㑹其極而於行上見以善服人章以善飬人謂有善於身而教化撫字使民同歸於善也亟稱水章不舎見諭語川上章異禽獸章此以舜爲標凖而使人企慕以力行也舜亦異於禽獸幾希者尓以其能存故爲舜則衆人能存之豈不亦可以至於此乎春秋章以三國之史同言而曰一也盖謂魯之春秋其所紀載非周之典礼善惡不明不過記五霸之事與晋楚之史同尓至於孔子之春秋則假其事以明義而非盡舊史之文故曰其義則某竊取之矣如此看方見得中間一節不閑可以取章可以無三字爲重不可將可以可以無作兩下看𥘉見其可而詳察爲不可故行之惟從其不可者尓或問謂孟子㪯傷廉以例二者盖傷廉是順辭易看傷惠傷勇是反辭難看故也須先体認惠勇之本義然後見過之者爲傷集註略見而自許是全釋可以意深察而自疑深察半語是釋可以無意自疑字乃是指上去疑其可以者如此看方見得可以可以無不是兩下說下文過猶不及只是結傷惠傷勇兩語逄蒙章此章專爲交友發羿不能取友而殺身孺子能擇交而免禍言性章性是人物所得以生之理本自難明求其發見之故則亦不難明也然故則以利順者爲本故之發於逆者則又非性之本矣求已之故則惻隱之發見性之仁羞惡之發見性之義求人之故則父慈子孝君仁臣忠求物之故則鳶飛魚躍山峙渊流皆是也是皆所謂利也如下文天與星辰之故亦只是利而已能知此性而利以行之則爲智之大禹之行水不是比喻言禹順水之性爲智之大以例人循性皆當以利也智者應物若行其所無事則智亦如禹之大矣智亦之亦是亦大禹也下文又以髙逺者證故之易見却不是功用章内三智者不同上者字是問辭下两者字是用智之人萬章上萬章問章恝古黠反音與戞同集註苦八反誤娶妻章懟父母言人之常情也爲廢大倫則雖子亦不免有讐怨父母之心舜固非懟父母者然告則必廢大倫故不告也此聖人善處變事消弭於未然此等處正好觀聖人書四岳㪯舜曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦則尭妻舜時頑嚚傲德巳化而改萬章傳聞盖亦野人之語孟子不辨惟欲發聖人處変之心魚入水有悠然而逝之道弟有思兄欎陶之道故子産與舜皆信之舜之愛弟自天性况象又以愛兄之道來感之乎堯以天下與舜章凡祭有祈有報風雨以時年榖順成氣不苛疹民無夭札則是神享其祭而其應如此百里奚章後語六反四智二賢皆反覆明奚之事然各有序第一緫言去虞入秦之智第二第三詳言去虞之智第四詳言入秦之智第五以事實言其賢爲下節張本第六專以上文之賢證自鬻之言之妄前後皆是彷像言之爲第五節爲要然不智則不能明去就之幾不賢則不足見其智之正故反覆言之讀之但見其文之妙而不知其意之精宻如此萬章下目不視惡色章去父母國之道也此句亦孟子言孔子只有遲遲吾行一句此章聖字言夷惠伊尹處是以地言與大而化之之聖不同只是清任和到極處故謂之聖孔子則是大而化之之聖其行之時中則清任和時而出之亦無不到極處集大成一節以樂比孔子知之至行之極條理即八音以金而聲之所以始其衆樂以玉而振之所以終其衆樂聲振始終皆是動用字惟其知之至故能始萬事惟其行之極故能終萬事是爲聖智兩全次一節以射比四聖人能挽彊弓射逺地此力也能中其的乃巧也必先知的之所在又知中之之法然後因力之所至而中之謂知之明然後行之從容中道三子力量雖到而知有未至故不及孔子萬章兩篇皆論聖賢之行大率皆以孔子折衷之上篇前五章言舜六章言大禹固無間矣七章則言伊尹故八章以夫子之出處継其後九章論百里奚次篇之首又言三聖人而以孔子集大成断之三章問友而上及尭舜四章言交際又継以孔子五章爲貧而仕又言孔子下二章論君餽與見諸矦而又及孔子盖孟子所願斈者孔子故論古聖人則以孔子継之論賢者必以孔子折衷之前篇言一治一乱及舜禹湯文武周公處與末篇之末皆然論語中庸之体大率亦如此所以示君子心斈孔子而後可告子上性猶杞柳章人受天之理以生夲具仁義礼智之性人之有惡是失其本性之善非其眞也告子不知乃謂人性本不善因矯揉以爲仁義猶矯揉𣏌柳以爲桮棬孟子謂人之於仁義乃其本有而所當行者豈矯揉而成若告子謂矯揉而成乃是戕賊人之常性而爲之尓揉𣏌柳爲桮棬是戕賊之也非可以喻仁義也若此言之行人不知者將眞以爲戕賊人爲仁義誰肯從之是仁義之禍也性猶湍水章告子謂性本無善惡但可以爲善可以爲惡在所引者如何尓故以水無分東西爲喻孟子亦就其水以喻之謂性之必善譬猶水之必下告子所謂决之者人爲之也非其自然之性也若人欲拂水之性甚至可使逆行况東西乎人之爲善順其本性也水之就下順其本性也生之謂性章告子以活動知斍爲性孟子意謂以此爲性則人與物同而何足謂之人哉故先以白之說兩轉審告子之意待其應定了然後以犬牛人之性同異而問之告子知其說之非其言方塞所以言犬又言牛者謂非獨人物之性異就物之中其性又各不同所以深曉告子以人之性善也食色性也章告子言仁是好愛只說得人心不知孟子所言仁義是道心告子以好食愛色皆發於心故曰仁内其言巳定故孟子反問之告子只荅義外之說孟子就其白字長字明其白不可譬長而長人長馬不可同則所謂義内者可不言而喻告子猶不悟重以内外爲言不知愛之所施有宜即義在其中而長之之心豈發於外是則理之不明故也孟子因其以好食色者爲性於是借耆炙以爲喻謂美味雖在炙而耆之者乃自内出對上長楚人之長說物則指炙而言謂豈獨於人爲然物亦有如此者以耆之之心比長之之心則可見義之在内無疑矣富歳子弟章先以歳之豊凶致人之善暴以明人性本善有以䧟溺則爲惡盖欲得食以飬其生者人之常情故冨歳得順其心則爲善凶年不足以養其生而逆其心則爲惡次以麰麥爲喻謂人之性本同當皆極於善所以不善者飬之異以勉人當盡養之之道也其下又以形之所好必同以明心之所好無不同而聖人之所爲即衆人之所本同而當然者衆人當法於聖人以全其善則當力好如口之恱味可也同然之然集註訓可與耆聽美對而皆以同字冠之非語助也即是字之意謂理義乃人之所同以爲是者牛山章浩然章論養氣而以心爲主此章論飬心而以氣爲驗曰志者氣之帥故謂以心爲主曰平旦好惡與人相近故謂以氣爲驗集義固爲飬氣之方所以知夫義而集之者乃心也飬心固戒其梏亡驗其所息而可致力者則氣也彼欲飬而無暴以充吾仁義之氣此欲因氣之息以飬吾仁義之心兩章之持志操心之意未甞不同而氣則有在身在天之異然未始不相爲用也魚我所欲章弗受嘑蹴之食出於倉卒之時受萬鐘在於間暇之際倉卒之時私意未動義之所發者直間暇之際有計較之心則私不可遏矣倉卒而義明如乍見孺子入井惻隱即生意正同間暇而有宫室等三者之累則如内交要譽惡其聲矣夫行道乞人皆能行之則義乃人之本有明甚君子其可不知之而由之乎孟子之戒深切著明矣三郷爲身北山先生作一讀言郷爲辱身失義之故尚不受嘑蹴之食以救身之死今乃爲身外之物施惠於人而受失義之禄乎可謂無良心矣此章專以生對義說第一節是主意第二三五又以欲惡分說生字意因第一節暗與義對說盖欲生即是惡死出此必入彼二節言欲生惡死固人之常情而欲惡有甚之者乃義不義尓此是本然所有義理之良心也三節反言失其良心而不能取義者四節兩是字金先生作兩讀盖正指義而言五節上三句當急讀作一串此是繳第二節兩句說賢者能保此好義之良心上五節言生死大分下三節言辭受小節然下三節亦是蒙前第一節生義言之天爵章天爵人所皆有人爵各有命分有德則足以長民故人脩其天爵則人爵自然至不可求也若有心求人爵便巳務外而失其本心之爵矣欲貴章丗人但知公卿大夫之爵爲貴而不知在我之身皆有貴者乃天所賦之善所謂天爵也天爵人所同有故思則得之人爵各有命分雖求之無益天爵亦是天命此則義理之命人爵乃氣数之命孟子前章尚有脩天爵而人爵自至之說此章則於人爵下兩不願字是不將這个爲念告子下禮食孰重章敬兄礼也雖無食而將死必不可奪兄之食而違敬兄之礼婚娶礼也雖至於絶嗣必不可搂人處子而違婚娶之礼任人盖異端之徒棄蔑礼法而譏侮之者故孟子止就其所言食色二者使之自權其重輕而自思之盖不屑之敎誨也曹交章第三節爲字重獨不勝爲患爲字輕湯文亦在人爲之如有力無力皆人所自爲雖㪯百鈞之重亦是自去發奮爲烏獲之徒此言用力爲之皆可至况礼義人皆有之夲無虧欠不須如㪯重之用力豈以力不勝爲患但能爲之即至不至者乃不爲尓所以後節教他斈堯則爲尭斈桀則爲桀是皆爲之而已盡心上盡心章朱子釋明德則曰人之所得乎天而虚靈不昧以具衆理而應萬事者也釋心則曰人之神明所以具衆理而應萬事者也二者無大異豈心即明德之謂乎盖德者得也所得乎天是釋德字本義而指其得之之原虚靈不昧以狀明之体具衆理應萬事指所得之實然而虚靈不昧則心也具衆理則性也應萬事則情也是合心性情三者言之而以得乎天冠于其上其釋明德爲切至於言心而曰神明是指人身之神妙靈明充之可以參天地賛化育之本而言其所統則性情也故亦曰具衆理應萬事此釋心字亦切况德者謂得之於心不以心而言則德何所倚乎然彼言以順辤也此言所以有主宰之意此又微有輕重之不同萬物章廣土衆民章此章緊要在君子所性仁義礼智根於心一句上常人固皆有四者爲氣禀昏迷故物欲蔽隔四者不能根於心惟君子則得於天者全而不曽失常與心相著故其發施有下文如此效驗窮逹不能加損而憂樂也分定是分得天之全体分子正指四者伯夷辟紂章此章主意在文王之政有國者所當法不主言二老之去就登東山章第一節兩言登山謂所處地位髙則視下愈小觀海難爲水謂所見大則小者不足觀游聖門難爲言謂旣聽聖人之言則餘人之言皆不足聽此句與觀海相連一般說第二節言聖人之道有本故用不窮第三節言斈者當斈聖人然當以漸而進不可躐等也觀海觀水流水雖三節皆言水自是三樣意思比喻揚子取爲我章權称錘也物䡖重不齊權與物相凖方得其平君子應事當隨事取中而應之譬之秤銖两斤鈞石物之輕重各有當其平處今以銖两爲輕鈞石爲重例以斤称之其可乎是子莫之執中也柳下惠章柳下惠不羞汙君不卑小官袒禓祼䄇焉能凂我和也至於不怨不憫三黜而不改其道介也人惟知其和而不知其介故孟子表而出之所謂三公當時必有命惠爲此任者不可知矣堯舜性之章性之者謂得於天者氣質清明義理純粹而終身行之不思而得不勉而中不假脩治者也身之者謂氣禀微有不同而自脩其身体道而行自思勉以至於不思不勉者也至於五霸則假尊天子安同盟爲名而實欲自行其威富其國乆於此道亦不自知其實非仁義予不狎于不順章不狎不順有二義伊尹謂我見桀不順今又習見太甲不順乃就桀與太甲二人言之此一義也或言伊尹見太甲行事日日不合於理我不欲習慣見此不順理之事乃就太甲一人言之又一義也王文憲謂伊尹放太甲善用權者也孟子明其事而言曰有伊尹之志則可無伊尹之志則篡善語權者也倘使孟子居於彼時則必行伊尹之事業士何事章尚志者髙尚其心之所之士無位未得行其道故且只髙尚其志向非仁非義一節謂有此志而待他日得位而行之者也兩惡在却是目今居者由者則雖未得大人之位而大人之事巳預全備矣當如此作两節看仲子不義章金先生曰仲子不義當句乃先断其爲不義之人下則曰若有與之齊國必不肯受人皆信其廉殊不知此乃舎簞食豆羹之小義尓何足道哉彼有辟兄離母之大不義豈可以其小義許其大不義而名之曰賢哉食而勿愛章恭敬者之恭敬以發於心者言恭敬而無實之恭敬以幣帛言君子之於物章􅋢之而弗仁之愛愛惜之義不輕用物不暴殄天物之意仁民之仁乃愛之本義親又重於仁程子嘗言以己及物仁也推己及物恕也而此却言仁推己及人似有不同盖此章四仁字皆言仁之用不言仁之体程子所謂推已及人正訓此章之仁字推字亦要輕看以己所有推出行去尓盡心下盡信書章書中二典三謨之類皆聖哲之言一定而不可易者若其餘載事之辭或有過称者孟子此言非謂書中之言皆不可盡信但謂其辭時或有害於義者尓讀書之人不可以辭害義可也集註杵舂杵也或作鹵楯也作鹵者是然亦非楯若以爲舂杵與楯苟非血深一二尺豈能漂之雖非武王殺之而商人自相殺然亦不至如是之多也盖鹵乃塩鹵之鹵謂地發蒸濕言血漬於地如鹵濕然此金先生之意我善爲陳章孟子之時皆尚攻戦能者爲賢臣而孟子乃以爲大罪盖國君苟能行仁政以愛其民使之飽暖安佚則下民親戴其上矣其他國之民受虐於君者心必歸於此人旣樂歸於我我以親上之民而征虐民之君則其民豈肯與我爲敵故引湯武之事以證之梓匠輪輿章此言師之敎者不過㪯其大綱尓至於理之精微事之曲折與夫不可容言之妙而當黙識者皆斈者所當勉力推明潜心究察非師可以口傳也民爲貴章集注八蜡不通礼曰天子大蜡八歳十二月合聚萬物而索饗之其神則先嗇一若神農者司嗇二后稷也農三田畯也田畯是古之官司督促田事有功於民者郵表畷田郵若郵亭表田畔畷井田之畔相連畷於此田畔造郵舎而田畯在其中督約百姓也猫虎五助田除蟲䑕之害者坊六坊畜水之隄水庸七水庸通水之道此皆有益於嗇事者昆蟲八螟螽之属此則爲害者也故皆迎其神而祭之畷知劣反又知衛反貉嵇章此章言文王孔子雖有聖人之德亦不免爲衆口所謗訕而其所以處之者如此然人雖謗之終不能損其令名孟子意謂稽雖爲衆口所訕但當自脩其徳而已山徑之蹊間章山間之小徑悠然有人行而不断即成大路少頃無人行則茅長而遂塞之斈同之道才有間断私欲便生而塞天礼之路矣口之於味章性也之性氣質之性也有性焉之性天地之性也有命焉之命本以氣言而亦有礼在中爲之品節限制命也之命本以理言而所禀之氣有清濁厚薄之不同上五者人性皆欲之而有命分不同不可必得然亦有礼在中品節其命分下五者本皆天礼而却有命分一定不得其至君子則但循天礼而行以求至其極故不爲命分所拘尭舜性之章性者謂所得於天者不假脩爲終始如一聖之至者也反之謂得於天者不能無少失缺脩而至之亦聖人也第二節言性之第三節言反之說大人章爲君子者固當貴貴然於言語之際有畏之之心則言語不能盡况大人所爲之事皆不合法度而君子之所不爲何必畏之哉由尭舜至於湯章尓如是也指見知聞知者而言此章大意謂古五百年必有聖人興在當時必有見而知之者在後丗必有聞而知之者今去孔子之丗僅百年而顔曽軰巳亡巳無有如是見而知之者恐此後遂無有如是聞而知之者盖孟子惜前聖憂後丗之心眞切感人而孟子自任道統之意亦不容謙謙矣然而無有乎尓非謂在孔子時無見而知之者正謂孟子時去聖人之丗雖未逺而當時見知者今亡矣須將此一節作一串之下乃見意孟子叢說卷下此元刻殘本東陽許謙讀四書叢說中大學一卷中庸上下二卷孟子上下二卷也余扵宋元經學不甚喜購然遇舊刻亦間收焉惟此則甚樂之爲其中庸多一下卷故也國朝四庫書目止収四卷故嘉定錢竹汀撰𥙷元史藝文志卷亦如此今兹夏余爲竹汀先生刋𥙷志一書竹汀因余扵元代蓻文頗多蒐羅属爲參校適書友擕此書至知多一卷強索重直余許以緍錢二千易之而未果吿諸竹汀汀己采入志中改作五卷矣越月有三書賈持書易錢而去爰記此縁𧺫以徴信于後余檢篆竹堂書目載四書叢說四冊而卷数不詳又璜川吴氏書目收藏較近則云七卷然係抄白未之敢信余惟就所見之五卷為信可尔倘異日齋書目之二十卷盡出不更快乎庚申九月小晦日挑燈記蕘圃黄丕烈
