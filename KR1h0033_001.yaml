  text: 傳首章
  hash: sha256:9e1241ae9847ab489e4268e4dd65b7f266faac6cc447cc1b724a56fa95a077be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0033_SBCK_001-1a}
body:
  text: 康誥者周武王封弟康叔於衛而告之之書克明德言文王之能明其德也曽子引之解明德克字有力明字即上明字德字包明德字太甲湯孫之名湯崩太甲立不明伊尹作書以吿之史官題曰太甲顧諟天之明命言湯之德也亦引之釋明明德顧諟上明字明命即明德就天付予處說謂之明命就人得之而言謂之明德顧諟動静皆顧一息之頃一事之毫末放過便不是顧天之明命雖是就付與我處言然此明命即是萬物之理在裏面故於應事處才有照管不到便暗損了此明命帝典即堯典克明俊德史官賛堯之德亦引釋明明德俊德即明德第一節平說明明德第二節是明之之功斈者全當法此而用功第三節言明其德以至於大此明明德之極功皆自明也雖結上文自字有力明德須是自去明之方可傳二章古人沐浴用盤盛水以杓取水澆身以杅承之苟訓誠猶今文言果能眞能此一節自新即明明德之意日日新是接續意又日新是無間断不巳意第二節文公以新民爲自新之民盖民心皆有此善才善心發見便是自新之機因其欲新而鼓舞之作字是前新字意新民工夫只是推充感化兩事明明德於上則感而自新又因其自新之機推其有餘而引導勸誘之則民德日新矣第三節周雖舊邦文王明明德而及於民政教日新𥘉受天命日新一節言自新接上明明德作新民是新民工夫其命維新言新民功效第四節無所不是指言明明德新民两事用其極言兩事皆止於至善下接至善傳此章釋新民而章内五新字皆非新民之新盤銘以自新言康誥以民之自新言詩以天命之新言然新民之意却只於中可見傳三章王者所居地方千里謂之王畿王者所自治王畿居天下之中四方之人環視内向皆欲歸止於其地猶事中各有至善之理人當止之也緝熈與敬止是文王作聖功用緝熈是接續光明謂明德常明無時止息而又敬而行之則事事得其當而止於至善也緝熈体上言敬止用上言爲人君以下是曽子之意言文王止於至善者如此君臣父子交是事仁敬孝慈信是五者之則即至善也此五者人倫之大故曽子提出言之天下事無大小皆有至善所以貴於窮理而力行五止是曽子就文王之德之實而言使斈者效之亦無不敬而止於至善也如文王之視民如傷發政施仁必先矜寡孤獨無凍餒之老罪人不拏之類止於仁也崇侯譛文王欲叛紂怒囚之羑里文王歎曰父有不慈子不可以不孝君有不明臣不可以不忠豈有君而可叛乎及旣釋之乃率殷之叛國以事紂所謂三分天下有其二以服事殷止於敬也禮記言文王爲丗子事王季之節及言文王之祭事死如事生思死者如不欲生忌日必哀稱諱如見親如欲色然止於孝也君子慈其子莫大於教之使成聖賢之德文王之子武王周公爲聖人康叔封聃季載爲賢者畢公召公亦以爲文王子則止於慈可見矣文王治岐耕者九一仕者丗禄平虞芮之田而歸者四十餘國又如文王伐崇三旬不降退脩教而復伐之因壘而降又如汝墳詩言魴魚赬尾王室如燬雖則如燬父母孔邇則止於信可見矣淇澳之詩美衛武公之德也此節工夫全在切磋琢磨四字上章句謂治之有緒而益致其精治之有緒謂先切琢而後可磋磨循序而進功夫不亂益致其精謂旣切琢而又須磋磨求其極至工夫不輟切磋曽子以喻斈是就知上說止至善講習討論窮究事物之理自淺以至深自表以至裏直究至其極處琢磨曽子是就行上說止至善謂脩行者省察克治至於私欲净盡天理流行直行至是處瑟兮以下皆以效言瑟兮僴兮曽子謂恂慄是德存於中者完赫兮喧兮曽子謂威儀是德見於外者著賢親樂利金先生曰賢其賢者髙山仰止景行行止崇其德也親其親者敬其所尊爱其所親象其賢也樂其樂者風清俗美上安下順樂其遺化也利其利者分井受􅒡安居樂業沐其餘澤也邦畿一節言物各有當止之地只平說止字綿蛮一節言知止穆穆一節言止於至善淇澳一節言明明德止至善於戯一節言新民止至善章句丘隅岑蔚之處是山岑鋭蓊蔚之地岑銳則網羅弓矢不可到蓊蔚則鷹隼不可及可謂知其地之善而止之朱子注文王之詩曰緝續熈明亦不巳之意言穆穆然文王之德不巳其敬如此注載見俾緝熈于純嘏曰使我得継而明之以至於純嘏也注敬之斈有緝熈于光明曰續而明之以至于光明而注此則曰緝継續也熈光明也或問曰連續光明自無不敬而所止者莫非善也以三詩之注例之則此熈字非指光明之實乃緝之熈之是継續之光明之也其重在敬字謂緝熈其敬而自然止至善也二詩言緝熈純嘏緝熈光明而此詩則緝熈其敬也精是明白之至理指五事而言微是五事中纎悉之事及毎事之間曲折隱微處推類盡其餘推君臣父子國人之類而知其餘有夫婦兄弟之倫推仁敬之類知其餘有夫義婦順兄友弟恭之則又推凡天下之萬物衆事亦莫不有至善之所在嚴密是嚴厲縝密武毅是剛武彊毅曽子以恂慄釋瑟僴而朱子謂恂慄者嚴敬存乎中金先生謂所守者嚴密所養者剛毅嚴密是不麤踈武毅是不頽惰以此展轉体認則瑟僴之義可見宣著盛大是四字兩意緫解赫喧二字講習討論是一串說省察克治是兩節意旣講之又重習之復討論之言之轉宻省是内自警省察是宻察精詳此求已有未善也克者勝去治者平之此去其不善以從善也饒雙峯曰咏嘆言其詞淫泆言其義淫泆者意味溢乎言詞之外也傳四章聽訟是新民之末節治國平天下豈專在聽訟乎况齊家一條聽訟更用不著古人言語不急迫雖是解經亦偶取聖人兩句來德旣明則人自不敢欺人旣不可欺其上則不敢爲惡不敢飾非而民德亦新自然無訟可聽如虞芮爭田不敢履文王之庭是文王之德大畏民志自然無訟傳五章此謂知本饒雙峯云知本只是物格二字之誤知字仿佛與物字相類本字從木亦是格字偏傍此說亦有意思若如此則兩句緫是格物致知章結句爾不必作衍文大斈在礼記中其次第錯亂不斉程子曽正之而未盡朱子重正之分爲經傳其餘傳與經相合皆有條理惟格物致知無傳而大斈工夫始於格物若無傳則格物無用功之方朱子取程子之意爲格物致知傳致知在格物是推極我之心知在窮究事物之理只是一意但在我在物不同耳所以只作一傳不分爲二言欲致吾之知在即物而窮其理是先解致知即是格物一事見在字意明人心之靈莫不有知天下之物莫不有理是推知與理之原惟於理有未窮故其知有不盡是言氣禀拘物欲蔽者不可不致格大斈始教是言大斈教人以格物致知爲始謂是大斈用功起頭即凡天下之物莫不因其已知之理而益窮之以求至乎其極此正是格物用功處但只把致格兩事統說在裏惟極我之心知在窮究事物之理格物之理所以推致我之心知用力之乆一旦豁然貫通是言格物夲是逐一件窮究格來格去忽然貫通如知事人之理便知事鬼之理知生之道便知死之道又如曽子聞一貫之說便說出忠恕來盖事雖萬殊理只是一曉理之在此事如此便可曉理之在彼事亦如此到此須有融㑹貫通脫然無碍如冰消雪釋怡然渙然處格物工夫至此方極物之表裏精粗無不到是言格物於一事之中須推明得到底透徹全無疑碍方是然後又去格一物不可於一事之中做半節工夫了便且住譬如看文字且於一章中窮究其訓詁辭語㫖意隱微處無不洞暁了然後看第二章此是一物中表裏精粗無不到事事如此詳細是衆物表裏精粗無不到天下事物至多固不可件件窮格但格得物多後不㨂見甚麽物來只把這道理格將去自然貫通文公曽把破竹譬喻大意謂𥘉破時逐節破数節之後一直破開去更無凝滯此喻最切吾心之全体大用無不明全体即前具衆理大用即前應萬事程先生教人格物有三事或讀書講明義理或論古今人物而别其是非或應接事物而處其當否文公取在格物致知或問中然三事又當以讀書爲先表裏精粗事事皆有且如子之事親其道當孝此是表如孝經一書之中有許多節目又諸書言孝節目不一此是裏粗是節目中之所當然謂其間事爲禮節也精是節目中之所以然謂事爲禮節中之至理也此章須兼看或問傳六章誠意只是着實爲善着實去惡自欺是誠意之反母自欺是誠意工夫二如是誠意之實自慊是自欺之反而誠意之效慎獨是誠意地頭欺慊皆言自是意之誠不誠皆自爲之自欺者適害已不自慊者徒爲人曽子以母字禁之使人凛然知所戒又以二如字表之使人知所趨惡惡臭好好色人人皆實有此心非僞也二如字曉斈者當實爲善去惡若惡惡臭好好色之爲也此二句作兩層看前慎獨以心言後慎獨兼所處言潤身体胖已含脩身意此章第一節誠意正義二節誠意之反三節惡誠中形外四節善誠中形外誠意是致知以後事故章句曰知爲善以去惡而心之所發有未實也苟且是去惡不决徇外是爲善非爲已也章句於經云意者心之所發發如言𥘉動處又於愼獨云審其幾幾亦是𥘉動處此固言心纔動便要實然心以体統言意即是心發而應事處𥘉動固要誠應事至於終亦要誠若只是𥘉發人未知時要誠及至事形之後却不必誠可乎愼獨而謂之審其幾者是一動便須誠其實直至事之終首尾皆誠不然則發已形見了此時於工夫却何所屬又不可入正心之目也下文言小人間居爲不善無所不至則是著於事爲明矣而亦曰愼獨又十目手所視指及潤身体胖皆歸之誠意則意字相関前後始終可謂分暁銷沮閉藏銷沮出於無心閉藏却是用意大凡爲惡亦是有此氣充此惡念行出此小人平時可謂張王爲是他已曉得惡不可爲故見君子之專爲善者一時慚愧前張王之氣銷沮自不可留於是暫爲善以閉藏不善厭鄭氏讀爲黶注閉藏貌朱子加銷沮字是閉藏之原若不銷沮則不肯閉藏也陸氏有烏斬烏簟两音說文歐减反釋曰中黒也正是暗晦意思今宜讀從烏斬用力之始言致知用力之終言誠意序不可亂謂致知然後誠意功不可闕謂致知又不可不誠意傳七章有字當重讀忿懥恐懼好樂憂患四者是人不可免者但不可有之於心若一事有之於心則應他事皆不合理即是心不得其正集義心不可有一物外面酬酢萬変都只是隨分限應去都不關自家心事纔繫於物心便爲其所動所以繫於物者有三或是事未來而自家先有這箇期待底心或事已應過去了又却長留在胸中不能忘或正應事時意有偏重這都是爲物繫縛愚按朱子說此三箇有所可謂推明詳盡子莫執中事未來之有所也莊周縁督應事際之有所也顔子不遷怒事過後不有所也事未來不可有意事已往不可留心忿􅓰四者情也中庸言喜怒哀樂禮運言喜怒哀懼愛惡欲皆是情之名聖賢隨事提出告人所以不同前言心不正是心雖在所應事上而情之用不當或以怒應當喜者或以樂應當哀者後言心不在是心不在所應事上謂身心全不相關所以前節便要察後節便當敬雙峯謂心不正以義理言心不在以知覺言大率忿恐好憂四字稍輕下四字尤重此章兩節前節說正心後節說脩身四者心之用固人所不能無傳是有所二字爲重事來感此心隨其輕重大小以理應之而適於中事旣往則此心便消釋如此則不是有所事來動此心𬒳他著得重則應之亦重如忿至於懥恐至於懼好至於樂憂至於患此是有所或固滯於心而以忿􅓰應當喜者以好樂應當憂者亦是有所蓋四者便是喜怒哀樂但喜怒哀樂是平說此稍不同忿􅓰怒也但忿是怒之暴􅓰而怒而有恚結意好樂則喜與樂也但好樂字有力而近於欲恐懼憂患皆哀之類也但恐而至懼憂而至患皆有過當意金先生謂此四者重累其辭即是情之勝而滯之深也朱子用欲動情勝字蓋欲動是事來之𥘉情勝是應事之際若此事巳往情猶留滯移以應他事而不當亦情勝也盖意誠以下言誠意然後能正心然或以下言旣誠意又須正心傳八章親爱賤惡畏敬哀矜敖惰夲十事以其意思相似作五句親爱畏敬哀矜是好上事敖惰賤惡是惡上事此十事亦日用常行必不可去者但不可偏一偏則非好惡之正金先生曰敖惰只是常情之所忽如卑㓜婢妾之類若一向偏於忽之則亦有不知其善之弊又曰前四事是心上失故在正心章此五事在事上失故在脩身章誠意章正言工夫又反復言其弊正心脩身兩章皆是反說其病緊要工夫只在誠意意旣誠則所行都是善一邊事但恐遇事時又有未盡善又要逐節関防傳九章孝弟慈三字是自脩身上說來以求齊家之原人自能盡孝弟慈之道推之治國便是事君事長使衆之道保赤子是父母愛子之心如保者是言君養民亦當如父母之保赤子赤子不能言父母保之雖不中不逺况民之能言而意易曉者所欲與之聚所惡勿施雖不中民之心亦不逺矣前言孝弟慈而此獨就慈上言者盖治國是上之撫下故專就爱民處言仁譲必一家方能一國化貪戾只一人便能一國亂至於僨事又只在人之一言以此見爲善難爲惡易不可忽如此其所令反其所好而民不從一句只就桀紂上說桀紂雖惡其出令亦未甞不善只是民不從而從其好藏乎身不恕是存乎身者無可推之道孝弟慈而爲事君事長使衆之道是善底不出家而成教於國仁讓貪戾而國皆從是善惡兩端不出家而成教於國堯舜帥天下以仁而民從繼一家仁讓一國仁譲而言桀紂帥天下以暴而民從継一人貪戾一國作亂而言宜其家人詩中本言女子能冝家曽子引此以明斈者德化行於閨門之内而使女子能冝家進一進說苐三引詩而言父子兄弟足法亦是我之威儀全無差忒誠心德化感格上下而父子兄弟之慈孝友恭皆可爲天下法然後民法之也三引詩自内以至外婦人女子最難於化而夫婦之間常人之情最易失於動不以正化能行於閨門則德盛矣故引詩言夫婦爲首而兄弟次之緫一家言者又次之治國平天下一曰感化二曰推充己有德人感而化於善者上也推此道而充廣者次之然人不能盡化而所觀感者亦未必盡天下之事故須有禮樂政教使人有可效之法是以大斈中皆具此二意此章章首至成教於國是化三所以是推保赤子是就慈所以使衆一條上說是推仁譲一節是化帥天下一節是化有諸己無諸己是推三引詩是化傳十章此章分作四節看自章首至失衆則失國爲一節自是故君子先慎乎德至不善則失之爲一節自楚書至驕泰以失之爲一節自生財有大道至萹終爲一節四節中又分爲小叚看第一節專反覆言絜矩分五叚第一叚老老長長恤孤是直從齊家上說來即前章孝弟慈也老老長長恤孤是上之人能盡此則足以感於下興孝弟不倍是下民觀其上而化之好善惡惡人心所同故上之人盡孝弟慈而民便興起可見人同有此明德而易化矣則上之人凡所好惡民無不同者然天下之大兆民之衆須有規矩制度使各守其分以遂其孝弟不倍之心而不拂其好惡之情然後可不然則上下無節不能均平齊一也是以以己之心度人之心品量位置以爲之限則天下無不平矣故有絜矩之道上三句是化絜矩是推九章言孝弟慈十章亦言孝弟慈九章是推充是正說孝弟慈者脩身也所以齊其家推而治國者也十章是感化是發凡說上之人孝弟慈下之人便能如此則是凡上之人所欲得者下之人皆所同欲旣爲人上則境内匹夫匹婦不獲自盡則無以成治平之功然而地大民衆必有規撫法制然後可以周徧而公平故須度義以處之故曰是以君子有絜矩之道平天下之道在絜矩絜矩之原在識其端而推己耳所推者只是好惡兩面在上者己之好惡無不得則使人人各得其好惡至於大小髙下厚薄則随人所當得之分矩以器言即木匠之曲尺也以義言則方也緫言則用曲尺以度方絜矩只是度義兩字第二叚專釋絜矩之義上下四方均齊方正自守所當得之分不侵越出外上之人如此則下民化之亦循其矩而不敢侵其外也且如君十卿禄爲君者但於十分之外多有所取若不損百官便是損於民我所得旣多它所得必少此即是不能絜矩凡事皆是如此第三叚言上之人能如爱子之道爱其民則下民爱其上如爱父母然爱民之道不過順其好惡之心而已大約言之民所好者飽暖安樂所惡者飢寒勞苦使民常得其所好而不以所惡之事加之則爱民之道也此叚言能絜矩之效第四叚節南山詩家父所作其首章曰節彼南山維石岩岩赫赫師尹民具尓瞻憂心如惔不敢戯談國旣卒斬何用不監赫赫顕盛也師太師三公惔燔也談言也卒盡也斬絶也監視也上兩句興兼比体下六句賦体言截然髙大之南山維見其石之岩岩然此赫赫然尹氏居太師之位乃下民之所瞻望者今乃暴虐無道下民憂之其心如火焚惔憂之極而不安處也甚而至於不敢相戯言語可謂極矣如此則國家旣已終至斬絕汝何不監視之乎此家父知下民困於尹氏之虐而爲此詩也大斈只引上四句則下四句意亦在其中凡引詩書皆是断章取義此處却當兼下文看尤見分曉言爲人上者赫然如此則當謹絜矩之道不可稍有所偏偏則爲天下僇此叚言不能絜矩之害第五叚引文王詩言殷家未失衆之時則能配上帝旣失衆之後則不能配上帝矣當監視之而知天之大命不易得也命不易即䘮師而不配帝也下得衆言未䘮師失衆言䘮師也此叚結上文兩叚得衆得國結能絜矩之效失衆失國結不能絜矩之害第二節言爲人上者明德爲本而財用爲末財固是國家所必用而不可無者但當脩德爲本絜矩而取於民有制中分五叚第一叚君子先慎乎德至此有用言德明而人服有土而有財第二叚德者本也至施奪言當脩德而絜矩取民財有制第三叚財聚財散兩句財聚民散言不能絜矩取於民無制之害財散民聚言能絜矩取於民有制之利散財不是要上之人把財與人只是取其當得者而不過盖土地所生年年只有許多數目上取之多則在下少第四叚言悖貨悖四句又以言之出入比貨出入不能絜矩取於民無制之害第五叚引書以結之與前文王詩相應第三節言用人盖治天下之要專在於用善人故也中分七叚第一叚引楚書楚王孫圉聘於晋趙簡子問曰楚之白珩猶在乎對曰然簡子曰其爲寳也幾何曰未甞爲寳楚之所寳者曰觀射父能作訓辭以行事於諸矦使無以寡君爲口實又有左史倚相能道訓典以叙百物以朝夕獻善敗于寡君使寡君無忘先王之業又能上下說于鬼神順道其欲惡使神無有怨痛于楚國曽子取其意而言金玉不當寳惟當寳善人第二叚語見檀弓盖重耳出亡在外而有父䘮秦穆公使人弔之意欲使之爭國而舅犯之言如此大斈引之其意若曰豈惟不寳金玉至於國家之利亦非所寳而惟寳人也此兩叚承上内德外財之意而起下用善人之說第三叚引秦誓專言爲政者好惡之公私此叚又當分作兩截看尚亦有利哉以上是一截以下是一截毎節當假作三人休休中心樂易之意有一个臣其心誠一樂易而能容物者此以在上爲政者言有技以才言彦聖以德言上面断断休休之人見下有才有德者則能舉用而容之便可興國家而利及子孫衆民此一截言能絜矩而以公心好人下截人之有技上自然含断断休休之反之意謂有一个臣其心僞雜傾躁而不能容物者見有才者妬之有德者阻之使不得進旣不能容引善人則惡人進以敗其國家而不能保子孫衆民此一截言不能絜矩而以私心惡人第四叚言能絜矩而惡惡得其正所謂放流則放流上文媢疾蔽賢之人朝廷之上惡人旣去則善人方得通下又以仁人緫結之言能絜矩者也第五叚言絜矩而薦賢當速退不肖當逺第六叚言不能絜矩而好惡之反第七叚以得失結之忠信善人也驕泰惡人也忠信則能絜矩者也驕泰則不能絜矩者也此節雖主用人言然爲君者自忠信則能用忠信之人其原又在上章句謂三言得失而語益加切盖第一得失以人言之第二得失以事言之第三得失就心上言至上之人心不善則事皆不善而失之故曰語益切一能絜矩不能絜矩之得失二尚德尚財之得失三用善人用惡人之得失大率絜矩則得之絜矩則失第四節言生財之道前節但言内德而外財此節直言生財之方而生財當用君子不可用小人緫上兩節之意中分五叚第一叚正言生財之方吕氏解極明白切當而朱子謂務本節用尤爲精宻生衆爲疾務本也食寡用舒節用也第二叚言仁者外末不仁者内末即前節内德外財之意第三叚言内本外末之效絜矩章本多是推意此叚却是化第四叚言上之人當絜矩不可侵下之利雖養雞豚之小利尚不可與民争而况爲君者專事聚歛以虐民乎以利爲利快目前之意而爲禍深以義爲利不過儉目前之用而福自逺伐冰之家章句謂卿大夫以上䘮祭用冰者也周礼天官凌人祭祀共冰鑑大䘮共夷盤冰共音恭鑑胡監反甕大口者春夏祭時用鑑盛冰而致祭物於其中以禦温熱之氣防其味之変也夷尸也夷盤廣八尺長一丈二尺深三尺實冰其中而以尸床置其上所以寒人死之尸也此叚言君子能絜矩而生財之利第五叚又言有天下者當用善人若用惡人至於天灾見於上人害生於下國勢將崩此時雖有聖賢欲來扶持亦不可爲再三戒用人之詳也天灾如日食星変水旱蝗疫皆是人害如民心怨叛㓂賊姦宄兵戈変亂皆是此叚言小人不能絜矩而生財之害此章大意治天下在乎絜矩而絜矩於用人取財處爲要然得失之幾全在忠信驕泰上發於心者忠接於物者信則事皆務實好善惡惡皆得其正而能盡絜矩之道存於心者矜驕行之以侈肆必不能絜矩則逺正人而讒謟聚歛之人進矣故忠信驕㤗治亂之原也讀大學叢說
