  text: 傳首章
  hash: sha256:9e1241ae9847ab489e4268e4dd65b7f266faac6cc447cc1b724a56fa95a077be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0033_SBCK_001-1a}
body:
  text: 康誥者周武王封弟康叔於衛而告之之書克明德言文王之能明其德也曽子引之解明德克字有力明字即上明字德字包明德字太甲湯孫之名湯崩太甲立不明伊尹作書以告之史官題曰太甲顧諟天之明命言湯之德也亦引之釋明明德顧諟上明字明命即明德就天付豫處説謂之明命就人得之而言謂之明德顧諟動靜皆顧一息之頃一事之毫末放過便不是顧天之明命雖是就付與我處言然此明命即是萬物之理在裏面故於應事處才有照管不到便暗損了此明命帝典即堯典克明俊德史官贊堯之德亦引釋明明德俊德即明德第一節平説明明德第二節是明之之功學者全當法此而用功第三節言明其德以至於大此明明德之極功皆自明也雖結上文自字有力明德須是自去明之方可傳二章古人沐浴用盤盛水以杓取水澆身以杅承之苟訓誠猶今文言果能真能此一節自新即明明德之意日日新是接續意又日新是無間斷不巳意第二節文公以新民為自新之民蓋民心皆有此善才善心發見便是自新之機因其欲新而鼓舞之作字是前新字意新民工夫只是推充感化兩事明明德於上則感而自新又因其自新之機推其有餘而引導勸誘之則民德日新矣第三節周雖舊邦文王明明德而及於民政教日新𥘉受天命日新一節言自新接上明明德作新民是新民工夫其命維新言新民功效第四節無所不是指言明明德新民兩事用其極言兩事皆止於至善下接至善傳此章釋新民而章內五新字皆非新民之新盤銘以自新言康誥以民之自新言詩以天命之新言然新民之意却只於中可見傳三章王者所居地方千里謂之王畿王者所自治王畿居天下之中四方之人環視內向皆欲歸止於其地猶事中各有至善之理人當止之也緝熙與敬止是文王作聖功用緝熙是接續光明謂明德常明無時止息而又敬而行之則事事得其當而止於至善也緝熙體上言敬止用上言為人君以下是曽子之意言文王止於至善者如此君臣父子交是事仁敬孝慈信是五者之則即至善也此五者人倫之大故曽子提出言之天下事無大小皆有至善所以貴於窮理而力行五止是曽子就文王之德之實而言使學者效之亦無不敬而止於至善也如文王之視民如傷發政施仁必先矜寡孤獨無凍餒之老罪人不拏之類止於仁也崇侯譛文王欲叛紂怒囚之羑里文王歎曰父有不慈子不可以不孝君有不明臣不可以不忠豈有君而可叛乎及既釋之乃率殷之叛國以事紂所謂三分天下有其二以服事殷止於敬也禮記言文王為丗子事王季之節及言文王之祭事死如事生思死者如不欲生忌日必哀稱諱如見親如欲色然止於孝也君子慈其子莫大於教之使成聖賢之德文王之子武王周公為聖人康叔封聃季載為賢者畢公召公亦以為文王子則止於慈可見矣文王治岐耕者九一仕者丗祿平虞芮之田而歸者四十餘國又如文王伐崇三旬不降退修教而復伐之因壘而降又如汝墳詩言魴魚赬尾王室如燬雖則如燬父母孔邇則止於信可見矣淇澳之詩美衛武公之德也此節工夫全在切磋琢磨四字上章句謂治之有緒而益致其精治之有緒謂先切琢而後可磋磨循序而進功夫不亂益致其精謂既切琢而又須磋磨求其極至工夫不輟切磋曽子以喻學是就知上説止至善講習討論窮究事物之理自淺以至深自表以至裏直究至其極處琢磨曽子是就行上説止至善謂修行者省察克治至於私欲淨盡天理流行直行至是處瑟兮以下皆以效言瑟兮僴兮曽子謂恂栗是德存於中者完赫兮喧兮曽子謂威儀是德見於外者著賢親樂利金先生曰賢其賢者髙山仰止景行行止崇其德也親其親者敬其所尊愛其所親象其賢也樂其樂者風清俗美上安下順樂其遺化也利其利者分井受􅒡安居樂業沐其餘澤也邦畿一節言物各有當止之地只平説止字綿蠻一節言知止穆穆一節言止於至善淇澳一節言明明德止至善於戲一節言新民止至善章句丘隅岑蔚之處是山岑鋭蓊蔚之地岑鋭則網羅弓矢不可到蓊蔚則鷹隼不可及可謂知其地之善而止之朱子注文王之詩曰緝續熙明亦不巳之意言穆穆然文王之德不巳其敬如此注載見俾緝熙于純嘏曰使我得繼而明之以至於純嘏也注敬之學有緝熙于光明曰續而明之以至于光明而注此則曰緝繼續也熙光明也或問曰連續光明自無不敬而所止者莫非善也以三詩之注例之則此熙字非指光明之實乃緝之熙之是繼續之光明之也其重在敬字謂緝熙其敬而自然止至善也二詩言緝熙純嘏緝熙光明而此詩則緝熙其敬也精是明白之至理指五事而言微是五事中纎悉之事及每事之間曲折隱微處推類盡其餘推君臣父子國人之類而知其餘有夫婦兄弟之倫推仁敬之類知其餘有夫義婦順兄友弟恭之則又推凡天下之萬物衆事亦莫不有至善之所在嚴密是嚴厲縝密武毅是剛武強毅曽子以恂栗釋瑟僴而朱子謂恂栗者嚴敬存乎中金先生謂所守者嚴密所養者剛毅嚴密是不粗踈武毅是不頽惰以此展轉體認則瑟僴之義可見宣著盛大是四字兩意總解赫喧二字講習討論是一串説省察克治是兩節意既講之又重習之復討論之言之轉密省是內自警省察是密察精詳此求已有未善也克者勝去治者平之此去其不善以從善也饒雙峯曰咏嘆言其詞淫泆言其義淫泆者意味溢乎言詞之外也傳四章聽訟是新民之末節治國平天下豈專在聽訟乎况齊家一條聽訟更用不著古人言語不急迫雖是解經亦偶取聖人兩句來德既明則人自不敢欺人既不可欺其上則不敢為惡不敢飾非而民德亦新自然無訟可聽如虞芮爭田不敢履文王之庭是文王之德大畏民志自然無訟傳五章此謂知本饒雙峯云知本只是物格二字之誤知字仿佛與物字相類本字從木亦是格字偏傍此説亦有意思若如此則兩句總是格物致知章結句爾不必作衍文大學在禮記中其次第錯亂不齊程子曽正之而未盡朱子重正之分為經傳其餘傳與經相合皆有條理惟格物致知無傳而大學工夫始於格物若無傳則格物無用功之方朱子取程子之意為格物致知傳致知在格物是推極我之心知在窮究事物之理只是一意但在我在物不同耳所以只作一傳不分為二言欲致吾之知在即物而窮其理是先解致知即是格物一事見在字意明人心之靈莫不有知天下之物莫不有理是推知與理之原惟於理有未窮故其知有不盡是言氣稟拘物欲蔽者不可不致格大學始教是言大學教人以格物致知為始謂是大學用功起頭即凡天下之物莫不因其已知之理而益窮之以求至乎其極此正是格物用功處但只把致格兩事統説在裏惟極我之心知在窮究事物之理格物之理所以推致我之心知用力之久一旦豁然貫通是言格物夲是逐一件窮究格來格去忽然貫通如知事人之理便知事鬼之理知生之道便知死之道又如曽子聞一貫之説便説出忠恕來蓋事雖萬殊理只是一曉理之在此事如此便可曉理之在彼事亦如此到此須有融會貫通脫然無礙如冰消雪釋怡然渙然處格物工夫至此方極物之表裏精粗無不到是言格物於一事之中須推明得到底透徹全無疑礙方是然後又去格一物不可於一事之中做半節工夫了便且住譬如看文字且於一章中窮究其訓詁辭語旨意隱微處無不洞曉了然後看第二章此是一物中表裏精粗無不到事事如此詳細是衆物表裏精粗無不到天下事物至多固不可件件窮格但格得物多後不㨂見甚麼物來只把這道理格將去自然貫通文公曽把破竹譬喻大意謂𥘉破時逐節破數節之後一直破開去更無凝滯此喻最切吾心之全體大用無不明全體即前具衆理大用即前應萬事程先生教人格物有三事或讀書講明義理或論古今人物而别其是非或應接事物而處其當否文公取在格物致知或問中然三事又當以讀書為先表裏精粗事事皆有且如子之事親其道當孝此是表如孝經一書之中有許多節目又諸書言孝節目不一此是裏粗是節目中之所當然謂其間事為禮節也精是節目中之所以然謂事為禮節中之至理也此章須兼看或問傳六章誠意只是著實為善著實去惡自欺是誠意之反母自欺是誠意工夫二如是誠意之實自慊是自欺之反而誠意之效慎獨是誠意地頭欺慊皆言自是意之誠不誠皆自為之自欺者適害已不自慊者徒為人曽子以母字禁之使人凛然知所戒又以二如字表之使人知所趨惡惡臭好好色人人皆實有此心非偽也二如字曉學者當實為善去惡若惡惡臭好好色之為也此二句作兩層看前慎獨以心言後慎獨兼所處言潤身體胖已含修身意此章第一節誠意正義二節誠意之反三節惡誠中形外四節善誠中形外誠意是致知以後事故章句曰知為善以去惡而心之所發有未實也苟且是去惡不決徇外是為善非為已也章句於經云意者心之所發發如言𥘉動處又於愼獨云審其幾幾亦是𥘉動處此固言心才動便要實然心以體統言意即是心發而應事處𥘉動固要誠應事至於終亦要誠若只是𥘉發人未知時要誠及至事形之後却不必誠可乎愼獨而謂之審其幾者是一動便須誠其實直至事之終首尾皆誠不然則發已形見了此時於工夫却何所屬又不可入正心之目也下文言小人間居為不善無所不至則是著於事為明矣而亦曰愼獨又十目手所視指及潤身體胖皆歸之誠意則意字相關前後始終可謂分曉銷沮閉藏銷沮出於無心閉藏却是用意大凡為惡亦是有此氣充此惡念行出此小人平時可謂張王為是他已曉得惡不可為故見君子之專為善者一時慚愧前張王之氣銷沮自不可留於是暫為善以閉藏不善厭鄭氏讀為黶注閉藏貌朱子加銷沮字是閉藏之原若不銷沮則不肯閉藏也陸氏有烏斬烏簟兩音説文歐減反釋曰中黑也正是暗晦意思今宜讀從烏斬用力之始言致知用力之終言誠意序不可亂謂致知然後誠意功不可闕謂致知又不可不誠意傳七章有字當重讀忿懥恐懼好樂憂患四者是人不可免者但不可有之於心若一事有之於心則應他事皆不合理即是心不得其正集義心不可有一物外面酬酢萬變都只是隨分限應去都不關自家心事才繫於物心便為其所動所以繫於物者有三或是事未來而自家先有這箇期待底心或事已應過去了又却長留在胸中不能忘或正應事時意有偏重這都是為物繫縛愚按朱子説此三箇有所可謂推明詳盡子莫執中事未來之有所也莊周緣督應事際之有所也顔子不遷怒事過後不有所也事未來不可有意事已往不可留心忿􅓰四者情也中庸言喜怒哀樂禮運言喜怒哀懼愛惡欲皆是情之名聖賢隨事提出告人所以不同前言心不正是心雖在所應事上而情之用不當或以怒應當喜者或以樂應當哀者後言心不在是心不在所應事上謂身心全不相關所以前節便要察後節便當敬雙峯謂心不正以義理言心不在以知覺言大率忿恐好憂四字稍輕下四字尤重此章兩節前節説正心後節説修身四者心之用固人所不能無傳是有所二字為重事來感此心隨其輕重大小以理應之而適於中事既往則此心便消釋如此則不是有所事來動此心𬒳他著得重則應之亦重如忿至於懥恐至於懼好至於樂憂至於患此是有所或固滯於心而以忿􅓰應當喜者以好樂應當憂者亦是有所蓋四者便是喜怒哀樂但喜怒哀樂是平説此稍不同忿􅓰怒也但忿是怒之暴􅓰而怒而有恚結意好樂則喜與樂也但好樂字有力而近於欲恐懼憂患皆哀之類也但恐而至懼憂而至患皆有過當意金先生謂此四者重纍其辭即是情之勝而滯之深也朱子用欲動情勝字蓋欲動是事來之𥘉情勝是應事之際若此事巳往情猶留滯移以應他事而不當亦情勝也蓋意誠以下言誠意然後能正心然或以下言既誠意又須正心傳八章親愛賤惡畏敬哀矜敖惰夲十事以其意思相似作五句親愛畏敬哀矜是好上事敖惰賤惡是惡上事此十事亦日用常行必不可去者但不可偏一偏則非好惡之正金先生曰敖惰只是常情之所忽如卑幼婢妾之類若一向偏於忽之則亦有不知其善之弊又曰前四事是心上失故在正心章此五事在事上失故在修身章誠意章正言工夫又反復言其弊正心修身兩章皆是反説其病緊要工夫只在誠意意既誠則所行都是善一邊事但恐遇事時又有未盡善又要逐節關防傳九章孝弟慈三字是自修身上説來以求齊家之原人自能盡孝弟慈之道推之治國便是事君事長使衆之道保赤子是父母愛子之心如保者是言君養民亦當如父母之保赤子赤子不能言父母保之雖不中不逺况民之能言而意易曉者所欲與之聚所惡勿施雖不中民之心亦不逺矣前言孝弟慈而此獨就慈上言者蓋治國是上之撫下故專就愛民處言仁讓必一家方能一國化貪戾只一人便能一國亂至於僨事又只在人之一言以此見為善難為惡易不可忽如此其所令反其所好而民不從一句只就桀紂上説桀紂雖惡其出令亦未嘗不善只是民不從而從其好藏乎身不恕是存乎身者無可推之道孝弟慈而為事君事長使衆之道是善底不出家而成教於國仁讓貪戾而國皆從是善惡兩端不出家而成教於國堯舜帥天下以仁而民從繼一家仁讓一國仁讓而言桀紂帥天下以暴而民從繼一人貪戾一國作亂而言宜其家人詩中本言女子能冝家曽子引此以明學者德化行於閨門之內而使女子能冝家進一進説苐三引詩而言父子兄弟足法亦是我之威儀全無差忒誠心德化感格上下而父子兄弟之慈孝友恭皆可為天下法然後民法之也三引詩自內以至外婦人女子最難於化而夫婦之間常人之情最易失於動不以正化能行於閨門則德盛矣故引詩言夫婦為首而兄弟次之總一家言者又次之治國平天下一曰感化二曰推充己有德人感而化於善者上也推此道而充廣者次之然人不能盡化而所觀感者亦未必盡天下之事故須有禮樂政教使人有可效之法是以大學中皆具此二意此章章首至成教於國是化三所以是推保赤子是就慈所以使衆一條上説是推仁讓一節是化帥天下一節是化有諸己無諸己是推三引詩是化傳十章此章分作四節看自章首至失衆則失國為一節自是故君子先慎乎德至不善則失之為一節自楚書至驕泰以失之為一節自生財有大道至萹終為一節四節中又分為小假看第一節專反覆言潔矩分五假第一假老老長長恤孤是直從齊家上説來即前章孝弟慈也老老長長恤孤是上之人能盡此則足以感於下興孝弟不倍是下民觀其上而化之好善惡惡人心所同故上之人盡孝弟慈而民便興起可見人同有此明德而易化矣則上之人凡所好惡民無不同者然天下之大兆民之衆須有規矩制度使各守其分以遂其孝弟不倍之心而不拂其好惡之情然後可不然則上下無節不能均平齊一也是以以己之心度人之心品量位置以為之限則天下無不平矣故有潔矩之道上三句是化潔矩是推九章言孝弟慈十章亦言孝弟慈九章是推充是正説孝弟慈者修身也所以齊其家推而治國者也十章是感化是發凡説上之人孝弟慈下之人便能如此則是凡上之人所欲得者下之人皆所同欲既為人上則境內匹夫匹婦不獲自盡則無以成治平之功然而地大民衆必有規撫法制然後可以周遍而公平故須度義以處之故曰是以君子有潔矩之道平天下之道在潔矩潔矩之原在識其端而推己耳所推者只是好惡兩面在上者己之好惡無不得則使人人各得其好惡至於大小髙下厚薄則隨人所當得之分矩以器言即木匠之曲尺也以義言則方也總言則用曲尺以度方潔矩只是度義兩字第二假專釋潔矩之義上下四方均齊方正自守所當得之分不侵越出外上之人如此則下民化之亦循其矩而不敢侵其外也且如君十卿祿為君者但於十分之外多有所取若不損百官便是損於民我所得既多它所得必少此即是不能潔矩凡事皆是如此第三假言上之人能如愛子之道愛其民則下民愛其上如愛父母然愛民之道不過順其好惡之心而已大約言之民所好者飽暖安樂所惡者飢寒勞苦使民常得其所好而不以所惡之事加之則愛民之道也此假言能潔矩之效第四假節南山詩家父所作其首章曰節彼南山維石岩岩赫赫師尹民具尓瞻憂心如惔不敢戲談國既卒斬何用不監赫赫顯盛也師太師三公惔燔也談言也卒盡也斬絶也監視也上兩句興兼比體下六句賦體言截然髙大之南山維見其石之岩岩然此赫赫然尹氏居太師之位乃下民之所瞻望者今乃暴虐無道下民憂之其心如火焚惔憂之極而不安處也甚而至於不敢相戲言語可謂極矣如此則國家既已終至斬絶汝何不監視之乎此家父知下民困於尹氏之虐而為此詩也大學只引上四句則下四句意亦在其中凡引詩書皆是斷章取義此處却當兼下文看尤見分曉言為人上者赫然如此則當謹潔矩之道不可稍有所偏偏則為天下僇此假言不能潔矩之害第五假引文王詩言殷家未失衆之時則能配上帝既失衆之後則不能配上帝矣當監視之而知天之大命不易得也命不易即喪師而不配帝也下得衆言未喪師失衆言喪師也此假結上文兩假得衆得國結能潔矩之效失衆失國結不能潔矩之害第二節言為人上者明德為本而財用為末財固是國家所必用而不可無者但當修德為本潔矩而取於民有制中分五假第一假君子先慎乎德至此有用言德明而人服有土而有財第二假德者本也至施奪言當修德而潔矩取民財有制第三假財聚財散兩句財聚民散言不能潔矩取於民無制之害財散民聚言能潔矩取於民有制之利散財不是要上之人把財與人只是取其當得者而不過蓋土地所生年年只有許多數目上取之多則在下少第四假言悖貨悖四句又以言之出入比貨出入不能潔矩取於民無制之害第五假引書以結之與前文王詩相應第三節言用人蓋治天下之要專在於用善人故也中分七假第一假引楚書楚王孫圉聘於晉趙簡子問曰楚之白珩猶在乎對曰然簡子曰其為寶也幾何曰未嘗為寶楚之所寶者曰觀射父能作訓辭以行事於諸矦使無以寡君為口實又有左史倚相能道訓典以敘百物以朝夕獻善敗于寡君使寡君無忘先王之業又能上下説于鬼神順道其欲惡使神無有怨痛于楚國曽子取其意而言金玉不當寶惟當寶善人第二假語見檀弓蓋重耳出亡在外而有父喪秦穆公使人弔之意欲使之爭國而舅犯之言如此大學引之其意若曰豈惟不寶金玉至於國家之利亦非所寶而惟寶人也此兩假承上內德外財之意而起下用善人之説第三假引秦誓專言為政者好惡之公私此假又當分作兩截看尚亦有利哉以上是一截以下是一截每節當假作三人休休中心樂易之意有一個臣其心誠一樂易而能容物者此以在上為政者言有技以才言彥聖以德言上面斷斷休休之人見下有才有德者則能舉用而容之便可興國家而利及子孫衆民此一截言能潔矩而以公心好人下截人之有技上自然含斷斷休休之反之意謂有一個臣其心偽雜傾躁而不能容物者見有才者妬之有德者阻之使不得進既不能容引善人則惡人進以敗其國家而不能保子孫衆民此一截言不能潔矩而以私心惡人第四假言能潔矩而惡惡得其正所謂放流則放流上文媢疾蔽賢之人朝廷之上惡人既去則善人方得通下又以仁人總結之言能潔矩者也第五假言潔矩而薦賢當速退不肖當逺第六假言不能潔矩而好惡之反第七假以得失結之忠信善人也驕泰惡人也忠信則能潔矩者也驕泰則不能潔矩者也此節雖主用人言然為君者自忠信則能用忠信之人其原又在上章句謂三言得失而語益加切蓋第一得失以人言之第二得失以事言之第三得失就心上言至上之人心不善則事皆不善而失之故曰語益切一能潔矩不能潔矩之得失二尚德尚財之得失三用善人用惡人之得失大率潔矩則得之潔矩則失第四節言生財之道前節但言內德而外財此節直言生財之方而生財當用君子不可用小人總上兩節之意中分五假第一假正言生財之方吕氏解極明白切當而朱子謂務本節用尤為精密生衆為疾務本也食寡用舒節用也第二假言仁者外末不仁者內末即前節內德外財之意第三假言內本外末之效潔矩章本多是推意此假却是化第四假言上之人當潔矩不可侵下之利雖養雞豚之小利尚不可與民爭而况為君者專事聚斂以虐民乎以利為利快目前之意而為禍深以義為利不過儉目前之用而福自逺伐冰之家章句謂卿大夫以上喪祭用冰者也周禮天官凌人祭祀共冰鑑大喪共夷盤冰共音恭鑑胡監反甕大口者春夏祭時用鑑盛冰而致祭物於其中以禦溫熱之氣防其味之變也夷尸也夷盤廣八尺長一丈二尺深三尺實冰其中而以尸床置其上所以寒人死之尸也此假言君子能潔矩而生財之利第五假又言有天下者當用善人若用惡人至於天災見於上人害生於下國勢將崩此時雖有聖賢欲來扶持亦不可為再三戒用人之詳也天災如日食星變水旱蝗疫皆是人害如民心怨叛寇賊姦宄兵戈變亂皆是此假言小人不能潔矩而生財之害此章大意治天下在乎潔矩而潔矩於用人取財處為要然得失之幾全在忠信驕泰上發於心者忠接於物者信則事皆務實好善惡惡皆得其正而能盡潔矩之道存於心者矜驕行之以侈肆必不能潔矩則逺正人而讒諂聚斂之人進矣故忠信驕泰治亂之原也讀大學叢説
