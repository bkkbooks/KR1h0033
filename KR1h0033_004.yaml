body:
  text: 朋來之樂有二意善固人所同有我旣得之而朋友相從亦皆知之能之道合志同人我無間自是可樂又我之樂雖自以爲得而尚未知邪正淺深今朋友之來自近及逺如是之衆則是我之斈果同於人心而可信眞有以合乎君子之道乃可樂上是及人之樂下是爲已之樂愠只是悶猶言不樂如南風詩中愠字只是熱之悶人集注先覺之所爲此先覺字當專以古之聖賢言之盖聖賢制行立言無非天理之至凡威儀之節六藝之文經之所載者皆足爲萬丗之準的學者當於此求知其理學行其事故有成而無弊然皆日用之常未有出於人倫之外者至於今之先覺不過資之使指引以求聖賢之心耳盖其學未到此地位不可便把做準的也當把先覺之所爲五字作一串看乃得其意斈須隨事隨理求其知求其能逐一習令明習令熟必明一理又求知一理熟一事又求能一事故集注於本文外有其進自不能巳一句然亦只在孔子語意内程子兩條只是言習前一條知上習後一條能上習謝氏主時習說就能裏提出二事作標凖餘事皆當求其至而習之坐如尸坐時習立如齊立時習此是就人所爲上提此二事以爲例謂一日之間當坐之時則習之必如尸坐如尸則身正而安頭容必直手容必恭不妄動移或當立之時則習之必如齊齊謂祭祀對越時也立如齊則整齊嚴肅敬主於中而㳟見乎外以二者推之則凡動容周旋事親敬長接人應物各隨其則而習之是無事無時而不習也又進歩言之坐如尸則於坐之始終時時習之如尸立如齊則於立之始終時時習之如齊是一事上無時而不習却推就凡所爲上皆如此習兼此二義看方備程子曰說在心樂主發散在外恱之字從心故曰在心此字爲說盖古字通用樂本借音樂之樂喜在外象樂聲在外故曰主發散在外順易逆難學旣有得於己便推此善及人於理爲順信從者衆則樂於事爲易旣有學人當知今却不知於理爲逆旣不知我則當愠今却要不愠於事爲難故惟成德者能之只接不知不愠一句本經三節以文勢言之學習與朋來不愠是一截說樂君子是一截然君子是成德之名德之成非獨不愠之所能致若但不愠即是成德則孤陋寡聞而人無可知異端邪說而人不是我乃悍然不顧囂囂自得其罪不亦大乎故文公曰故惟成德者能之下又曰德之所以成云云而程子亦曰非樂不足以語君子言須有上兩節工夫方可成德孝弟章上節以質言下節以斈言有子之意專主於爲仁而先引丗人自有資質淳厚而心和順能行孝悌者然不止於孝弟亦無犯上作亂之事能孝弟便能順其心至於此次泛言兩句承上生下言凡物皆如木之有本末本盛則末榮末非末節細務之謂是與本對言者若木但有本而無末則不成木君子之斈當用力於根本則道可進如培植其根則幹枝梢葉漸長而成木自孝弟推而仁民愛物方全得仁君子所斈爲仁而巳如上文所爲孝弟乃是爲仁之本不是如上好資可爲仁正是勸斈者當先行孝悌以爲質而漸求仁之全体親親而仁民愛物皆自此始非但如不作亂而巳此章君子只如言斈者兩字論語中所言君子不同有以成德言者如首章及君子不器君子周而不比之類有以位言者如君子篤於親君子之德風之類有以斈者言者如此章及君子不重則不威君子食無求飽之類可以類推又有指孔子言者如君子有三変是也小人亦有不同有以位言者有以行言者皆與君子相對說仁者專言之則包四者謂之心之德偏言則與礼義智爲對謂之愛之理此章自孝弟而言仁所以解愛之理在上仁字之訓須兼㸔或問通釋方盡其義切在子細體認巧言章此章大意似聖人觀人然未常不警省學者觀其辭甚嚴盖警省學者之意爲多集注以專言之仁當之若緫而言致飾恱人全是私意故天理冺分而言巧言是無信令色非莊是無礼不能守正而求恱於人是不知義外飾欲欺人而終爲識者所知是不知一舉而心德皆亡知巧言令色之非仁只就此句飜轉㸔則知直言正色之爲仁然此只就言色上論盖仁是心之德延平先生所謂當理而無私心者也凡欲動於中則心私矣其接於事不當於理者皆非仁也夫致飾於外不當理也務以說人皆私心也推此類而言之則非禮之視聽言動心私違理處皆非仁本注人欲肆而本心之德亡雖就言色上言而所包者甚廣又恐學者止於言色上致察故著程子之說於圈外使人隨事致察而立心以公也三省章忠信是處心應事之主而曽子惟於爲人謀交朋友上省似於忠信之用處未備而人之行大於此者甚多盖曽子篤厚於他事無有不善獨此三者或有未至而亦人情之所忽者故自道其所未慊者日以省之固非謂斈者只有此三者當省也斈未至於曽子則已之未及者皆當日省集注三者之序又以忠信爲傳習之本非謂爲人謀交朋友爲傳習之本謂心之誠實爲傳習之本也此語是接上自治誠切而推出去說此忠信字是大綱說心誠實處盖有誠實之心則可傳習無此則非爲巳之斈矣然此是夲注故只就章内說讀者又當推出凡事皆以忠信爲本也千乘章千乗之國其地可出兵車千乗古註有兩說馬氏曰六尺爲歩歩百爲畒畒百爲夫夫三爲屋屋三爲井井十爲通通十爲成成出車一乗然則千乗之賦其地千成居地方三百一十六里有畸惟公矦之封乃能容之周礼井田之法方里而井井九百畒百畒爲夫九夫爲井中爲公田一井止有八家四井爲邑則方二里四邑爲丘則方四里四丘爲甸甸即乗字則方八里旁加一里則方十里爲成甸中六十四井出田賦旁加三十六井治溝洫不使出賦六十四井除公田外止有五百一十二家共出車一乗毎乗則有兩車一曰兵車又名馳車馬四匹甲士三人在車上一執御一執弓矢一執戈矛歩卒七十二人在車前與左右共七十五人一曰大車又名革車牛十二頭炊家子十人同守衣装五人廐飬五人樵汲五人共二十五人兵車以戦大車以載輜重兩車緫百人謂之一乗也車千乗則當有地千成所謂方三百十六里有畸者先直排三十成作一行便是直三百里横闊十里却以如此之行横排三十行便是方三百里共計九百成尚有一百成却分爲萬井於每行上添十六里則東南兩面共添六百箇十六井共計九千六百井要取方又於東南上有闕却又用將方十六井去𥙷教方該二百五十六井十六今十六計二百五十六以一萬井除去九千八百五十六井外尚餘一百四十四井難以分爲方故曰有畸若分開計一千二百九十六夫亦分不去所謂惟公矦之封能容之者按周礼大司徒建邦國諸公之地方五百里諸矦之地方四百里故有是言包氏曰古者井田方里爲井十井爲乗百里之國適千乗也此是不除公田又只九十家出車一乗包氏據王制與孟子公矦皆方百里故如此說三代之礼不能詳考所以集注只混全說諸侯之國其地可出兵車千乗盖夫子當時亦是大槩言之耳若馬氏謂公矦之封能容者凡公方五百里其食者半則爲十二萬五千井北上数爲多侯方四百里其食者參之一則爲五萬三千三百三十三井有竒比上数爲少皆未能盡合包氏以九十家賦一乗其賦爲重又無公田亦不計國都邑治民居殊未可曉盖古之建國雖曰計方然山林川澤都邑塗巷必三分去一然後爲田之数如馬氏謂地方三百十六里者言亦未俻也然又有一說王畿百里之内爲六郷一郷一萬二千五百家出軍則家一人每乗戦士七十五人合六郷僅得千乗所謂天子六軍也二百里之遂亦然若是則孔子之言亦可該天子之國但不能盡舉畿内尓今此章未須究竟度数底藴且只就用處看集注五者反覆相因下因乎上謂如此然後能如此上因乎下謂如此又不可不如此弟子孝弟章此章非言斈者之大全只說爲人弟子事餘力是不與上事接空隙之時大意欲盡弟子之所當爲才有餘睱便當讀書兩事皆不可廢謹信守身之事上下四者接人之事以孝弟爲行之大故言於先其實以謹信二事貫于四者之間盖謹信則孝弟愛衆親仁皆得其道巳不謹信則四者皆無實至於斈文亦謹信者能之君子不重章此章是斈者最先用工處心主忠信貌存重厚内外相應方可爲斈不忠信則心虚妄不重厚則貌輕躁虚妄輕躁如何斈得道人資質稍聦俊者最要戒輕輕則百事皆不成道在天地間只是實理至重至大如何𬒳輕躁人檐當得去貌重厚是用功于外心忠信是用功于内乃内外相養工夫雖然欲貌重厚亦忠信者能之虚妄者不能也故忠信上用主字謂應一事始終以忠信爲主緫脩身而言亦始終以忠信爲主是出言制行待人接物皆主於誠實而每事又首尾主於誠實也聖人言忠信處不一如言忠信是主於言忠信所以進德是主於行此章是緫言行而言之孟子操則存舎則亡出入無時莫知其郷者人心也盖操而存即是入舎而亡即是出此章忠信即是操心之道故只引兩句游氏斈以成之之說有古註斈則不蔽固之意與集註稍有不同文公以論一章大㫖條暢明白故取在圏外愼終追逺章常人之情於親之終悲痛之情切而戒愼之心或不及親逺而祭恭敬之心勝而思慕之情或踈君子存心則加於此送終旣盡擗踊哭泣之情又愼䘮死之礼如礼記殯而附於身者必誠必信葬而附於棺者必誠必信勿之有悔之類祭逺者旣盡孝敬之意又致追慕之情如礼記所謂祭死者如不欲生霜露旣降有悽愴之心雨露旣濡有怵惕之心之類如此則過於常人其德爲厚上之人旣如此下民化之其德亦歸于厚慎終存哀中之敬追逺動敬中之哀子禽章集註謂子禽子貢皆孔子弟子或曰亢子貢弟子未知孰是愚按子禽見於論語者三其問於伯魚如朋友私相請益者疑其爲孔子弟子其謂子貢過恭於仲尼若惟自尊其師者而称子貢爲子称夫子爲仲尼他無此例以此推之出於子貢之門審矣聖人所經過人即化有所存主便神妙此等處未易窺測而觀聖人者只就德容上看文公此句有不滿子貢之意盖此亦是子貢早年之言至後篇荅子禽之言方形容聖人端的又足以見子貢之斈日進而子禽終於卑下眞斈者之勸戒過化存神正是得聞邦政之原𥙷說聖人如此故人自與之言政也未易窺測不獨是說子貢之言未足盡聖人之德亦兼見子禽所造者淺未能深知聖人故子貢止就他可及處說五者尓不願乎外却是求字得字意言之凢圈内本注皆是体貼經文說無一字閑慢無來歴讀者須仔細把注字一一体貼經文㸔休要作剰字放過此是讀朱子書之法此五者只是礼恭而徳盛乃礼恭之本父在章此章主於觀人但上兩句觀志行之大分三年無改又是觀行中之一節禮之用章金先生曰程子礼樂之說所該爲大樂記天髙地下萬物散殊而礼制行矣流而不息合同而化而樂興焉此章所謂礼盖髙下散殊之分也其所謂和即合同交通之意也先王制礼其尊卑貴賤上下之体截然甚嚴然其用則常有合同交通之意行其間如宗廟之礼至嚴也而旅酬逮下献享之礼多儀也而燕示慈惠卑尊上下至辨也而粲然有文之中毎有歡然相愛之意此皆礼之用有和而小大事皆由之又如飲食合歡也而籩豆有数延祭有儀臣侍君宴不過三爵夫婦和好也而内外有辨衣服異藏湢浴異處此類非一或但知和合之意而畧上下名分尊卑降殺男女内外之節此所以流而生禍而亦不可行也集注但見行礼不拘迫之意似不見交際和洽之意但說君子行礼之意不推先王制礼之意然於其首取程子之說未有嚴泰和節之說則該之矣愚按此章有子是說用礼前節是正意後節是防敝礼之体雖嚴非和不足以行或一於和而失嚴敬之本則流而不可行一也此未是言礼之全体只是言用礼就逐事上看以下節礼字則知上節礼字不要重看程子借樂記二語提掇起說此章全体范氏因程子之言而言就礼中自有樂然敬是礼之本体故曰礼之所以立和是用礼處故曰樂之所由生立字生字有輕重細玩可見朱子又進一進說礼之全体中自有敬與和所以又不曽說樂字必合金先生合同交通之意看合同交通雖是就制礼處言然所行即所制之礼也信近章約言必合於事之宜防其過也致恭必中於礼之節無過不及也因不失親擇交之道也上兩節欲明礼下一節要知人則皆無失上兩節言行是脩己之事因親是知人之事三者皆明理者能之三事各開㸔非相因之辭集注謹之於始慮其所終始者信也㳟也因也終者復言也逺恥辱也可宗主也慮者欲近義礼而得其親也謹者必近義礼而得其親也無求飽安章敏於事是敏速於行事無懈惰之氣無優游之心見義即爲如恐不及又不但主於行事而巳至於斈文明理之事亦欲敏速所謂爲斈務時敏是也就有道而正謂心有憤悱而辭之未脩行之未果因問辨而逹之者固正也高山景行聽其言觀其行黙識而興起得以逹其辭善其事者亦正也有道而正本注只說正其是非盖上靣言君子則是有志於爲學而非常人矣故其所敏慎者皆是向善上事但未知必當於理否爾此夫子之正意也圈外乃取尹氏之說恐流於異端則是併欲正其斈之邪正矣此是兼後丗爲斈者言之以防弊夫子時未有此等學問也若果欲戒此則聖人之言必别貧富章此章貧富二者相對㸔盖貧者見富者則卑屈富者見貧者則矜肆卑屈是容氣言辭卑下屈伏矜肆是容氣言辭矜誇放肆卑與肆反屈與矜反此二者曲盡貧富之態盖不期而然也往年目擊一事眞有類此郷間有親兄弟異居者兄貧而弟富弟每以錢財周其兄實無閲墻之事但一日二人相遇於途兄揖其弟甚㳟而弟揖其兄甚倨竟若易置兄弟然稠人之中彼此皆安之而無媿色以禮律之則弟當坐不弟之誅而其兄亦有不能安分之罪固無足道者弟足以見常人貧富之態所必至兄弟尚然况他人乎非君子不能自守也貧富固當對㸔人情必如此但此態爲之旣熟則貧者無所不用謟富者無所不用驕亦不擇貧富而施矣引詩固是子貢因孔子言而知學問之道無窮不可少得而遽止在荅樂好礼之後然關上節說則無謟驕切琢之事也樂好礼磋磨之事也但不可謂專言此爾始可與言詩始字不可輕故過謂如此觸類而長方才可以讀詩非謂足以盡詩之用亦是引而不發集註無謟無驕知自守者能之樂則心廣躰胖好礼則安處善樂循理斈者須体認何以能自守又何以進於心廣体胖安處善樂循理之地必有所見然後可盖非窮理者不能然二者雖淺深不同皆知命者能之知氣数之命者則能無謟無驕知天厓之命者然後能樂與好礼知天理之命非深造者不能知也細体認兩節意可見無謟驕只就貧富裏做工夫貧者常守定不要去謟人富者亦常守定不敢去驕人是把貧富做要緊事而著力持守不肯放慢至於樂則知命樂天安於道義外來者不足以改其樂豈知所謂貧禮非富足者不能行旣富則足遂其好礼之心唯恐行之不逮何暇顧其富是謂超貧富之外者樂與好礼皆是心上言故上靣說心廣下靣說樂循理心旣廣大寛平則體自然舒泰此由内以逹外行事安於處善盖其心樂於循理也此由外以原内也樂一字全是心故先言内禮有節文於事上見其好之則在心也故先言外然體旣安舒烏得有卑屈心旣樂循理烏得有矜肆却暗關上兩句見得未若兩字意往者所巳言指樂與好礼來者所未言指切磋琢磨言義理無窮圈外註淺深以斈力言髙下以見識言然不切以下是說凡學問之道如此而處貧富亦在其中看此章者知處貧富之道是一事知義理無窮是一事讀書須能推充而用之不可止泥文求意是一事人不己知章此兩句平說只是不必欲人知我我却要知人但兩知字不同上知只欲知己之善下知却欲知人之善惡專就斈者言則上句不患人不已知便自可包後章患其不能之意在其中便當明理脩身自加精進使有可知之實則雖不求人知而人必知之矣下句則凡尊師取友與人交際往來須知其善惡而趨避之然後無損而有益然此專以斈者言聖人則未甞指定也若推而言之上下皆可通上句論其極則雖居高位其處已應事唯循天理上不欺其君下不病其民内無愧於心何必欲人盡知吾心也否則有違道干譽之失矣下句論其極則仕而擇可宗之人有位而舉賢才爲用爲宰輔而進退百官非知人之明其可乎否則賢愚渾淆分朋傾軋而亂亡至矣集注是非以事爲言邪正以心術言爲政第二爲政章此章爲政只如言爲治不必把政字重㸔著箇法制禁令來都說不行不然則此政字先見朱子何不於此立訓而於後章見之此旣云正人之不正只如言治人之未治者治人者不以德則不足感人若一出於德則心說誠服興起向化自然歸仰不逾矣北辰非徒喻爲君意多在德上爲政以德則能如北辰居其所不動而衆星自共向如黄帝堯舜垂衣裳而天下治如舜恭巳正南面如篤恭而天下平皆此意集註三無爲字皆就居其所上發政即法制禁令自不可無但有德者有政即是德政紀綱旣具以德居之則民觀感而化無違於政者固不必用智作爲也若無德而任智尚才則有爲而民不化矣極是四方合湊至中恰好處天之体雖大至中恰好處即是北辰天全体皆運行惟此處爲之樞紐其位不動北極雖有一星而此星亦動北辰却在極星運圍之中星属陽辰属隂辰是無星處凡天無星處皆謂之辰此辰是居北之辰南極卑而隱於地故不言詩三百章公強合爲一所謂有関雎麟趾之意然後可以行周官法度本末之謂也集注淺深言進德厚薄言應事志于學章此六節皆是知行兼進不可分作兩節說所以朱子於志于斈下便釋曰斈即大斈之道又曰念念在此而爲之不厭正兼知行言之竊謂立是能處常不惑是能應変知命是極其本原統㑹耳順則化矣集注程子前條謂聖人進德未必果有如此等級但立言勉人使及時修德第二條謂聖人所以言有等級之詳使斈者當循序漸進不可徒慕髙虚此爲後斈者甚切胡氏第二條兩說前說即程子後條意後說即程子前條意以其言尤直捷故文公取之文公之言是𥙷程子意方見聖人至誠氣象之全盖聖人之言無非實理豈有心實自聖而鑿空撰出許多節次以欺斈者金先生謂聖人固自有聖人之資然聖人自有聖人之斈又自有聖人之進但非常情所可窺測尓此言極得聖人之意然十年一進所謂因其近似以自名者懿子問孝章魯桓公四子長莊公次慶父次公子牙次公子友礼適長稱伯庻長稱孟莊公旣爲君而大夫不敢宗諸侯故以庻長爲孟而諸弟宗之慶父爲孟孫氏牙爲叔孫氏友爲季孫氏慶父視莊公則巳爲仲也故又曰仲孫氏夫子曰生事葬祭皆以禮集注亦曰人之事親始終一於禮而不苟此是就禮之中正處說過於此不可不及於此亦不可夫子雖戒孟孫之僣然當時於所當爲者豈皆盡善則不及之意亦在其中故又曰語意渾然又若不專爲三家發者謂推廣之無不包也三家僣禮因魯僣天子故三家僣諸侯有併及天子之禮僣之者如三家視桓楹䘮而設撥葬禮之僣也八佾舞於庭歌雍以徹俎祭禮之僣也其他如朝服之以縞自季康子始又如䑓門而旅樹反坫繡黼丹朱中衣大夫之僣禮則三家凡居處服御舞非僣也處巳如此則處其親者可以類推葬禮諸侯用桓楹謂於椁之前後立二碑如大柱穿其中而爲鹿盧以繂貫其中以下棺雙植謂之桓盖碑立如雙柱然諸侯用四繂貫二碑大夫則二繂二碑而柱形小視桓楹是用四繂貫大楹也繂音律撥者引丧車之紼也禮諸侯輴而設撥輴殯車也三家亦以撥引輴僣諸侯也輴勑龍反八佾雍徹皆僣天子禮朝服以縞亦僣宋王者之後旅道也屏謂之樹繡讀爲綃繒也繡黼丹朱以爲中衣領縁皆諸侯禮縁越絹反其餘當時大夫多不得禮之中如曰管仲􅍢簋朱紘山節藻梲君子以爲濫晏平仲祀其先人豚肩不揜豆君子以爲隘濫者僣於己奉親可知隘者祭不及於禮他亦或可見矣武伯問孝章以集註前說言之則爲人子者須當謹疾愼起居節飲食皆謹疾之事而朱子又以一凡字該守身之大法以後說言之則疾病或爲六氣所冠自外而來非人所可謹事爲乃自我作人所當制兩說皆是從唯字上起義但前正說唯字後反說唯字前說則爲凡斈者切後說則於武伯身上切盖武伯非善人故也子游問孝章非謂以犬馬比親夫子以貴賤之絶相逺者言之以曉人然至於兩字所包多謂自父母以下兄弟妻子奴婢以至犬馬尓金先生謂有養之養作上聲讀意自明子夏問孝章聖人各因四子材之髙下與其所失而告之程子之言盡矣然斈者緫是四人之失者反之於身事親必盡礼母過於節而䧟親於惡母不及於節而不能恱親之心脩其身而不至於不義謹其身而不至於有疾以貽親憂飬而能敬服勞奉飬而能愛進進於是豈非孝之全者勿徒究四子之失也如愚章如愚承教時也其私臨事時也師友難疑荅問之際須是見識開明事理通逹直下承當是之謂發顔子旣無疑於夫子之言心領神㑹却不曽見於言但實踐於行故聖人着箇亦字謂雖不言而其行亦足以發吾意也要看得言字重便見意言與私對愚與發對置亦字在中間此亦字不是閑慢語助辭視其所以章第一句分君子小人下兩句尺觀君子大凡爲君子難爲小人易人只是善惡二端此章是就人所習上說所習者旣不善便是小人更無可議論只是爲善却有淺深不同須是自源頭用意便善而又能安然不勉強方是君子若未盡後兩節事爲難君子其心只小人温故章古注温㝷也㝷繹故者又知新者左傳曰盟可㝷也亦可寒也注云㝷温也鄭注中庸温故曰温讀如燖温之温則㝷是温㝷舊熟食也温字但當正訓㝷字今集注曰㝷繹也是兼取古注下句說時習舊聞而毎有新得故非一也必時時温之或温此或温彼也温則必有所得温此有得温彼亦有得一温有得又温亦有得時兼衆故毎兼累温時毎二字注中活眼故學矣不温則將失之而非我有能温則守之固而在我矣雖温而不知新則徒誦数其說而無融㑹貫通之妙亦將一索而尽毎有新得則義理源源而來應人無窮矣記問之學是誦讀記憶及問於師友而得之者不知温故則無所玩索故無得於心而所知有不在我者矣不能知新則無所充擴而所知有限應亦有窮矣不器章體無不具謂明盡事物之理以全吾心之所具用無不周則事物之來皆有以應之而無纎毫之差失用之周如爲趙魏老滕薛大夫無不可大之則乗田委吏以至立道綏動所存皆神體之具也用之不周如黄霸長於治民爲相則功名損於治郡時龐綂長於治中别駕而不能爲令體不具也先行其言章聖人以言行對舉教人多矣大率皆欲敏行慎言也此章因子貢問何謂君子是合言之言君子之人其所言皆是平日所行者欲成君子則須是務於行旣行得徹然後言之是言即所行事也學思章斈以事言思以理言凡一事必有一理有此理必有此事但習其事而不思其理則昏罔而無得但思其理而不習其事至於臨事其心又必危疑不安欲斈者知行兼進異端章集注佛氏之言尤近理者謂其言欲窮極髙明蕩滌查滓不見可欲而自無累㪯丗之物不足以凂之說心說性直欲超六合之外故髙明者毎樂簡便而喜超越多趍之者至於大而天地萬物内而身心皆作虚妄而理則謂之障故雖實得其所謂道者其於應事顚倒錯乱而無分别兼無父無君之禍矣誨由章章内六知字稍有不同上下兩知字揔言心之知中間四知字指一事之知而言知者知事理也第一知字是緫指子路心知無所不知者也次四知字是知與不知之實末知字是指巳知之者與第一字雖相類而該不尽上知字意集注不能尽知是說不知者不害其爲知是說知之者又有可知之理雖是𥙷意却是從不知上來須要㸔上面子路好勇盖有強其所不知以爲知一句爲主則下靣知字自有著落通釋意與集注不同把是知也一句通結知之不知兩句謂纔分别得知與不知分明這便是知所以引是非之心智之端也若是則是知之知在知之不知之外矣聖人意若果如此其辭必異不把六箇知字衮說子路言子之迂何必讀書然後爲學無臣而爲有臣皆是以不知爲知者夫子告之事君曰勿欺亦是戒此故集注著強所不知一句在上方說得子路切而章意皆明干禄章子張斈求禄之道於孔子孔子荅之曰於古今之言多有所聞有疑而未信者闕之不言其餘不疑者又當謹愼而言之如此則言必當理人少有尤怨於古今之事多有所見有殆而未安者闕之不行其餘不殆者又當謹愼而行之如此則行皆當理少有悔心能謹言行至於寡尤悔是將成君子之德者上之人必㪯而用之豈舎之乎故曰禄在其中子張之言病在干字夫子但教其謹言行殆危也危字與疑字意思相近只是於事危疑處决未破若行必未穩所以闕之不敢行集註罪自外至謂言輕則招灾禍也經中言在其中謂如此必如此順辭也圈外注言在其中謂如此却不如此反辭也二者字雖同而意不相類盖謹言行者必得禄故曰禄在其中耕本欲得飽而值水旱之灾則飢矣故曰餒在其中若謹言行而命不偶則亦老死而已須應接如此亦有不得禄一句看此與後篇夫子所言正文句意不同此是借來反用民服章居敬窮理爲舉直錯枉之本窮理則燭枉直明居敬則舉錯當居敬又窮理之本也使民章上莊孝而民敬忠是感化慈與舉善教不能而民忠勸是感應康子問何以使民敬忠勸夫子告之以三者意謂民固不可使之如此然在上如此則民自有此應聖人則字專對他使字說是止就敬忠勸三者說張宣公謂在上者但爲所當爲則下民自應此舉凡例說在上所當爲不止三者而巳其說稍寛故置在圈外不然則其說首尾皆備何不收在本注耶可見集注精擇如此人無信章輗軏是車與牛馬接處信是己與人接處此喻至切損益章四可知字不同二與三指巳往而言謂損益者可知一與四指未來而言四則又緫言因革者可知聖人之意是就禮中有損益不可將損益與禮字對㸔故集注謂禮之大體因之而不能變其所損益小過不及之間中間兩可知字雖曰損益者可知乃是就禮中損益其小節尓故中二可知亦包禮字意在其中胡氏言損益制度文爲亦是上靣天叙天秩之制度文爲尔集註五常謂仁義礼智信大地流行一氣而巳其來則生物爲息爲陽其去則物壞爲消爲隂故曰隂陽二氣錯綜分而爲五曰水火木金土謂之五行五行雖分爲五隂陽又各在五行之中然五行以氣言氣之中莫不有理人禀五行之全氣而生故皆得其理之全所謂木神爲仁金神爲義火神爲礼水神爲智土神爲信以五行之形言水時發生金剛断制火有文彩水善流動土重不迁俱各有意此是五常之原此五者亘宇宙窮古今不可変而又只是日用常行之理故曰常文質謂夏尚忠殷尚質周尚文忠實也夏代凡事忠實無文華質雖亦是實然質與文相對言質則已有許多朴素在此但未十分加文飾是忠與質不同之意周又於上加以文華三代之礼只是一節文似一節十二辰横布地之四維天運於外晝夜不息一伏時一周北極天之樞紐居其所不動圜北極之外爲紫微垣垣之側有北斗六星在垣内杓在垣外所以運隂陽定辰次行四時者也每𥘉昏時杓所指之方則謂之建所以建之方即定爲月之辰然晝夜之建有三用昏建者杓夜半建者衡旦建者魁自有天地至於窮盡謂之一元其間以㑹運丗歳月日時紀数少言之則爲歳月日辰大言之則爲元㑹運丗皆以十二三十起數一㑹一萬八百年大約子㑹生天丑㑹生地寅㑹生物戍㑹閉物而消地亥㑹消地而消天至子則又生天以歳比之春月在寅爲生物之時秋月在戍爲閉物之時以元與歳相類故有天下者以斗杓所建之月取以爲歳首建寅爲首取生物也丑爲歳首取生地也子爲歳首取生天也尭舜禹皆用人統尭舜皆禅譲故舜禹不改正殷周以征伐得天下所以改正朔易服色以新視聽殷以人依地而生遂用地正周又以地倚天而成則天爲原故用天正所謂統者以律而言盖黄鐘應子大吕應丑大蔟應寅律管黄鐘九寸三分損一下生林鐘六寸又三分盖一上生大蔟八寸以其得全寸無分毫厘忽之数所以統餘律者也故謂之統而林鐘之位在未故以對衝之大吕爲統東萊先生曰三正迭用尚矣盖自上古以來更用之也然春爲歳首生物之𥘉民事之始冬不可以先春故孔子曰行夏之時言萬丗不可易之道䟽家謂尭用丑正舜用子正愚恐不然以理度之禅譲如父子相継奚必改易以事實言之古者雖改正而不改月人君即位必在正朝大甲即位及復位皆書十有二月而舜居尭丗廵狩四岳用二五八十一月皆合方與時可見皆不改月數然則凡言正月者寅月也舜受終文祖則曰正月上日格于文祖則曰月正元日此一事関係唐虞三代而其文如此可見非以建子丑爲正明矣臯陶謨言天叙有典天秩有禮天叙者天理自然之倫叙其興即五者人倫之常也天秩者天理自然之品節其礼即五禮也八佾第三八佾章季氏以大夫而僣用天子之礼樂於廟庭此事尚可敢忍爲之何事不可敢忍爲之此忍字就季氏上說季氏以大夫而僣用天子之礼樂於廟庭其罪不可勝誅此事若可容忍而不誅則何事不可容忍此忍字就孔子上說如此說則說得两可字意出古注季氏謂桓子盖與孔子同時祭綂曰大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯注管象吹管而舞武象之樂朱干玉戚武象之舞所執也大夏禹樂文舞也執籥所謂左手執籥右手秉翟之舞也左傳隱公五年考仲子之宫將萬焉問羽數於衆仲對曰天子用八諸侯用六大夫四士二杜預注天子六十四人諸侯三十六人大夫十六人士四人䟽引服䖍云用六爲四十八人用四爲三十二人用二爲十六人集注取此䟽又謂舞勢冝方行列旣减即毎行人數亦宜减或問取此三家章奔走無辟公之相祝號非天子之稱故曰奚取此章聖人有惡之之意焉有憫之之意焉至於譏之之意則併及魯也魯桓公取齊女生子曰同又生友謚成曰成季又曰季友又有庶子二人長曰慶父謚共故曰共仲次曰牙謚僖故曰僖叔又曰叔牙二人同母桓公卒子同立是爲莊公莊公亦取齊女是爲哀姜哀姜無嫡子其娣叔姜生子開莊公妾成風生子申又嬖黨氏之女孟任生子般愛而欲立之公疾問於叔牙叔牙欲立慶父公又問季友友對曰以死奉般季友殺叔牙而爲之置後立叔孫氏莊公三十二年八月卒成季立子般十月慶父弑子般而立開是爲閔公成季出奔閔公立召季友歸二年哀姜與慶父謀欲殺公立慶父故慶父又弑閔公成季奉公子申出奔魯人欲誅慶父慶父出奔成季奉申歸立是爲僖公遂召慶父而殺之亦爲之置後立仲孫氏古者次子称仲庶長称孟而慶父之長則莊公也其子孫不敢上与君叙故以慶父本庶子之做去如何㑹感動得游氏正說收爲夲注程子是就凡事上說禮樂夲意是不仁則不仁則不能用禮樂程子是不仁則事事無礼樂不仁是主於心言李氏是主人言故程李說在圈外然程子謂失正理却接得上人心亡之說緊無序不和亦是禮樂之本故在李氏前林放章本字昔日作本始說㸔來不若作本原說言本原則始意在其中本字旣可與文字對而末流之弊亦可對言之與集注礼之全體亦無礙易節文習熟也䘮礼言易是於送死之礼如飯含歛殯之節擗踊之數皆習熟而無差如此固是好然但一心只是要行礼節於哀戚未必盡情盖但知有繁文而不知其本䘮親者人子與親一旦永訣自是哀痛入骨髄皇皇如醉如夣只理㑹得哭泣哀慕雖知有許多礼節亦未暇盡行故古者䘮必有相凡礼儀皆相者掌之若丧親者只如他事行礼一般行一畨過於骨肉之恩似不相関䘮礼節文自属纊沐浴飯含殮殯葬祭之節擗踊之数衰麻冠厞之等飲食居處之常凡爲䘮事從𥘉終以至祥禫皆是厞父沸反集注哀痛見於貌者慘怛發於心者禮貴得中而下四句爲此章之主夫子以儉戚荅其夲而礼之中乃在奢儉易戚之間須㸔與其寕三字是聖人正意范氏祭䘮兩節檀弓全文子路聞夫子之言也抑揚之意正與此章相類故取以爲說彼言䘮礼在上此順經文而祭則礼之首也故易置先後揚氏取禮運汙尊抔飲之言說得儉字出汙尊謂鑿地汙下以爲尊抔飲謂以手掬而飲也夷狄章有君亡君主於位而言有之無之也故集注曰不如諸夏僣乱無上下之分此全責於臣是夫子正意尹氏之言是責其君推說也泰山章周禮大宗伯國有大故則旅上帝及四望鄭注故謂凶烖旅陳也陳其祭事以祈焉礼不如祀之備此說旅字亦恐未爲的當禹貢兩言旅皆祭山也豈亦故耶大夫行諸侯之禮固是僭但當時巳四分魯國季氏取二孟叔各一魯君無民亦無賦雖欲祭不可得季氏旣專魯則凡魯當行典禮皆自爲之旅泰山若代魯行士耳亦不自知其僣冄有誠不能救也欲正之則必使季氏復其大夫之舊魯之政一歸於公然後可此豈冄有之力可能故以實告孔子孔子亦不再責冄有而自嘆也倘冄有必欲不染季氏之惡則如閔子辭其仕可也集注不輕絶人句絶盡已之心一句是言聖人君子無爭章射有三大射賔射燕射天子諸矦卿大夫皆有之士則無大射而有賔射燕射也大射爲祭祀射王將有郊廟之士以射擇諸矦羣臣與邦國所貢之士諸矦則擇其臣大夫擇邑宰家臣凡射中者得與於祭不中者不得與於祭與祭多者則有慶慶以地不與祭多者則有譲削其地故君子必習於射也射必有耦天子六畿内諸矦四畿外諸矦六大夫三凡耦各服其所宜服袒决遂而立堂下阼階之東南隅西面射時隅同出次西面揖旋轉當阼階北面揖行至階下北面揖然後升堂南面當序而立於物以射樂作射者容体欲比於礼其節欲比於樂各發四矢以較勝負一揖而復位俟衆耦升射皆如上儀畢司射命設豐于西楹之西勝者之子弟洗觯酌酒奠于豐上勝者乃揖不勝者升堂勝者袒決遂執張弓不勝者襲說决拾卻左手右加弛弓於其上如前三揖至階媵者先升堂少右不勝者至豐北面坐取觯立飲卒觯坐奠於豐興揖不勝者先降凡飲酒賔主勸酬必拜以送爵今不勝者自飲而無送爵勸飲之意以是爲罰說音脫巧笑音十子夏只是疑素以爲絢兮一句作以素爲絢意故問按字書采成文曰絢㑹五采以畫曰繪本意是說用素以爲絢謂先有素却絢之故夫子答之以繪畫之事在素功之後詩意上二句賦體下一句比體謂女人有倩盼好質然後加服飾之盛方成其美素比倩盼之質絢比加服飾之意只在第三句内不是集注添此一層說禮噐曰甘受和云云苟無忠信之人則禮不虗道楊氏引其文略改作苟無其質禮不虗行行即道也𣏌宋章樂記曰武王克殷及商下車而封夏后氏之後於𣏌投殷之後於宋皇王大紀曰封夏后氏之後東婁公於𣏌封紂子武庚於殷此事實也與尚書史記合樂記之言記者之失也武王崩成王㓜周公居冡宰攝政武庚乃與三叔比流言以撼周公周公居東監邊兵及天動威彰周公德成王悟迎周公以歸於是武庚三叔叛周公乃奉成王誅武庚然後封微子於宋以奉殷祀宋爲故亳商之舊都也封微子乃在克商十年之後此其實也禘自章王者立始祖之廟百丗不迁宗廟之最尊者也然諸矦亦有始礼廟而君子報本之意無窮故王者又推始礼之所自出之帝以祀之盖帝者又得姓受命之始也然丗數既逺不可以立廟則祭於始祖之廟而以始祖配之凡廟各有主皆居室中東面之位而獨尊禘則於始祖廟中特設所自出之主於東面而始祖之主退居南向而配之也礼家言五年一祫盖以三年一祫比例爲說春秋纂例謂其年數或毎年或數年未可知也武王崩成王㓜三監與殷叛周公以叔父之親冡宰之任誅之而天下定制礼作樂以教化百丗周公薨成王思其勲勞命魯公祀周公以天子之礼樂說見明堂位故魯推周公所自出之帝而祭文王於太廟以周公配之通鑑外紀謂魯惠公使宰譲請郊廟之礼於天子王使史角往魯公止之路史謂惠公之止之是周不與之矣不與而魯用郊自用之也然則魯之郊廟皆後丗之僣而附㑹爲明堂位之說欤不然孔子何以曰魯之郊禘非礼也周公其衰矣灌用秬黍醸酒以欝金草十葉爲貫百二十貫爲築以煑之臼以椈杵以梧以檮之而和酒中其香暢逹故謂之鬱鬯用圭瓉盛之於始祭之時灌之於地使香氣逹九泉以求其神然後迎牲䰟魄者人身之靈也孔子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也鄭氏注氣謂嘘吸出入者也耳目之聦明祭而鬼享則誠爲不虚始祖之所自出而欲感格之故非仁孝誠敬不足以與如知禘之意而誠意仁心足以格此神則以此而應天下之事何有故曰知其說者如示諸掌仁誠是体孝敬是用合此二者然後可禘仁誠所該者廣孝敬獨主禘言自仁誠中發出孝敬一節旣足以感禘祭之祖則仁誠之發以應他事何所不當仁孝誠敬四字極精深孝敬主於禘仁誠關之於天下禘者孝敬自仁誠之本發出則禘固全四者治天下而以心之至誠而盡夫仁則何士不極其當乎有此四字方見禘與天下是一貫夫子所謂知此而盡天下者正在此仔細體認祭如在章祭如在當爲在存之在有士死如士生之意媚奥章自堂從户八室户内東南隅爲窔東北爲宧西北爲屋漏西南爲奥八户目之所視先見宧次轉屋漏以及西南隅爲最深之地故曰奥㝔音杳集注五祀春户夏竈季夏中霤秋門冬行月令春祀户夏祀竈季夏祀中霤秋祀門冬祀行注春陽氣出祀之於户内陽也夏陽氣盛熱於外祀於竈從熱類也中霤猶中室也土主中央而神在室古者複穴故名室爲霤秋隂氣出祀之於門外隂也冬隂盛寒於水祀於行從辟除之類也注又引逸禮中霤禮曰凡祭五祀於廟用特牲有主有尸皆先設席于奥祀户之禮設主于户内之西乃制脾及腎爲俎奠于主北又設盛于俎西祭黍稷祭肉祭醴皆三慨祭徹之更陳鼎俎設饌于筵前迎尸畧如祭宗廟之儀竈在廟門外之東祀竈之禮先席於門之奥設主于竈陘乃制肺及心肝爲俎奠于主西設盛于俎南祭黍肉醴餘如祀户之禮祀中霤之禮設主于牖下乃制心及肺肝爲俎祭肉他皆如户禮祀門之禮設主于門左樞乃制肝及肺心爲俎奠于主南設盛于俎東他如竈礼行在廟門外之西爲軷壤厚二寸廣五尺輪四尺設主于軷上乃制䁂及脾爲俎奠于主南設盛于俎東祭肉他如門礼以上皆中霤礼文䟽曰祭户祭中霤在廟室之中先設席於廟堂之奥若祀竈門行皆在廟門外先設席於廟門之奥特牲者特牛也諸侯或亦當然大夫或特羊也旣三祭移主於𥘉設奥之筵上乃出户迎尸入即筵而坐也門之奥謂廟門外西室之奥也竈陘竈邊承噐之物以土爲之鼎當陳於廟門室之前稍東西向以俎就鼎載肉入設於筵前盛則設于俎南中霤之主設于廟室牗内之下按五祀之主户主中霤主北向門主行主南向竈主西向䟽又曰月令五祀盖殷礼也周天子則七祀加司命與厲此見祭法篇諸侯五祀曰司命中霤國門國行公厲大夫三祀曰族厲曰門曰行適士二祀曰門行庻士庻人立一祀或戸或竈周禮宫正注祭七祀於宫中則又與上廟祭之說不同射不主皮章凡射必有的其緫名曰矦天子中之能服諸矦諸矦大夫士中之得爲諸矦故曰矦天子三矦虎矦熊矦豹矦諸矦二矦熊矦豹矦大夫麋矦士豻矦凡射有三大射賔射燕射凡矦皆以布爲之其形必方毎三分之以爲飾大射之矦其外一分以其名之皮飾之虎矦用虎皮熊矦用熊皮其中三分之一又用其皮綴於中爲射之的故曰棲皮爲鵠賔射之矦外亦用皮飾其中三分之一則用彩色畫謂之正天子五正内朱次白蒼黄玄諸矦三正朱白蒼大夫士二正朱緑燕射之矦外亦用皮飾其中三分之一天子則白質而畫其獸頭諸矦丹質而畫其獸頭謂先就布上上顔色了却畫其獸大夫士則止就布上畫之故曰畫布爲正今集註中凡言畫布爲正是以賔射燕射之矦言棲皮爲鵠是以大射之矦言也然古礼中又自有主皮之射庶人爲之於冬田獵分禽時用之與此章註内意不同又有貫革之射軍旅用之樂記武王散軍而郊社左射貍首右射騶虞而貫革之射息也禆冕搢笏而虎賁之士說劒也散軍謂起而伐紂者皆散而歸民郊射謂爲射宫於郊左東斈也右西斈也貍首騶虞以歌爲節此言行礼射而息武射所以虎賁之士皆說劒而服禆冕搢笏也說音脫告朔章古者以竹簡爲書盖十二月作十二簡故毎月至朔日告廟請本月之簡而行之朝廷及國中簡上想只是書朔之日辰及節氣朔之爲言蘇也謂月之魄巳滿明皆盡至晦日而死矣月之一日明乃復生是死而復蘇也兩其字指告朔而言謂尓愛其告朔之羊以爲無實而妄費我則愛其告朔之礼恐因此名而後可復其實玉藻天子玄冕聽朔於南門之外諸侯皮弁聽朔於大廟鄭氏注南門謂國門也天子明堂在國之陽毎月就其時之堂而聽朔焉凡聽朔必以特牲告其帝及神配以文王武王諸侯皮弁下天子也周礼大史頒告朔于邦國䟽謂朔者以十二月暦及政令若月令之書諸侯受之縣之於中門帀日歛之藏於祖廟月月用羊告而受行之春秋文公六年公羊傳注諸侯受十二月朔政於天子藏于大祖廟毎月朔朝廟使大夫南面奉天子命君北面而受之左傳䟽特羊告廟謂之告朔人君即以此日視此朔之政謂之視朔視朔者聽治此月之政亦謂之聽朔杜預釋例曰聖人因月朔朝廟迁坐正位乃㑹群吏而聽大政考其所行非徒議將然也乃所以考巳然也此章是魯事故集注止言諸侯之禮關雎章關雎詩是文王宫中人知后妃之德欲求以爲王配旣得之而作此詩求之未得則有寤寐反側之思求之旣得則有琴瑟鐘鼓之樂哀樂皆是宫中人不是就文王身上說所以不淫不傷樂主第三章言哀主第二章言關雎第三章是追言文王娶大姒巳有成說但未至宫中之時思之也寤寐而思皆主大姒非泛然思得内主也問社章周禮禮記之文及諸儒之說大抵社所以祭五土之示而以勾龍配勾龍者古諸侯共工氏之子也有平水土之功王爲群姓立社曰大社王自爲立社曰王社諸侯爲百姓立社曰國社自爲立社曰侯社士大夫以下成群立社曰置社王之大社則土五色而冐以黃諸侯之國社則受其方色之土於天子而苴以茅其位則中門之右其壝則北面其飾則不屋其表則樹其土之所宜木遂以名其社其壇方五丈諸侯之唐以來其主則石爲之其祭天子用大牢諸侯用少牢其日用甲管仲章三歸臺名三歸筭法也言作臺度其基廣袤若干尺髙若干尺而其頂廣袤若干尺取上下之数中折之則其半廣袤若干尺以爲作臺之数攝官者大夫采地少禄八不多故家臣一人兼管数事若不兼攝而一人管一事則官多俸禄亦多大夫所得公家之禄不足供之此二事皆言仲之奢以荅或人之儉天子諸矦大夫士之庭皆有物以蔽内外天子諸矦謂之屏以木爲之大夫以薕士以帷天子設於門外諸矦大夫士皆設於門内庭中管仲位爲大夫當用簾亦用諸矦之屏列國之君有相朝之礼有㑹盟之礼凡有好㑹主國之君先設坫於堂两楹間延賔升堂以爵酌酒獻酢畢覆爵于坫上管仲大夫本無此礼今亦設之金先生謂當時齊霸而管仲當國諸矦來朝齊者必私覿於管仲家故設此以延之此二事皆言管仲之僣以荅或人之知礼當時之人但見管仲匡天下之功髙仰慕他不暇忽聞夫子言他器小不知所謂乃疑爲儉及夫子言仲奢又疑爲知礼夫子雖不明言器小只就奢僣兩端便見得器小處奢僣不能盡器小之意乃器小中之一事能盡大斈之道自然器大夫子屡称管仲之仁及民受其賜是以事業言此章以斈言集註器小言其不知聖賢大斈之道故局量𥚹淺規模卑狹不能正身脩德致主於王道大斈之道八事先以脩身爲本而後及家國天下盖見礼旣明行事自然件件中節不敢踰礼犯分今管仲如此只是格物致知工夫未到見理不明故爲所不當爲踰礼犯分凡事都要向上不知反成小器所謂致主於王道不是要管仲輔齊桓公爲王只是要教他行王者之道人之大倫有五行之各欲當於理先王之道不過如此人倫之中君臣爲大桓公雖曰尊周亦多是自強其國諸國貢賦多入於齊未爲盡臣節如周三分天下有其二以服事殷正是王道湯未伐桀武王未伐紂以前皆是王道非謂湯武伐桀紂取天下爲王了方才是王道伐桀紂自是不得巳爲之所遇時不同耳䟽郷飲酒是郷大夫之禮尊於房户間燕禮是燕己之臣子尊於東楹之西若兩君相敵則尊於兩楹之間故坫在兩楹間也主君獻賔賔筵前受爵飲畢反虚爵於坫上西階上拜主人阼階上答拜賔於坫取爵洗爵酌以酢主人主人受爵飲畢反虚爵坫上主人阼階上拜賔答拜語樂章孔子自衛反魯正樂時告大師之言大要樂聲翕合須要純和不可背戾八音之中金聲最髙竹革之聲次之匏音次之絲音又次之石音最低作樂八音皆和聲聲俱見不可使聲髙掩聲下者故曰皦如旣各自要分曉又恐聲音不相合意思不相聮属故又曰繹如本注止具訓詁不言旨意謝氏之說章意皆具而置圈外朱子必有意也今玩經文盖始從成爲作樂三節翕及純皦及繹乃三節中之節奏樂之作八音並起其聲急促翕然以合此樂之始也及入調旣深則於令悠緩却要八音和合如出於一所謂八音克諧雖是合一却又要每器之聲各各明皦俱見不可高掩下濁亂清所謂無相奪倫此樂之中也及曲將畢則收拾歸宿有紬繹相續不絶之意此樂之終也大抵翕之後継之以純皦又継之以繹從則非翕繹則不從此盖經之本旨而朱子之意也謝氏五音六律爲主以翕純皦繹皆指此言而見於一時樂之始終皆然盖又一義則於始從成三字稍緩者在圈外其爲是歟八音金鐘也石磬也絲琴瑟也竹笛管簫箎之類匏蒲也笙竽也笙竽之下用匏上却用竹土塤也革鼓也木柷敔也儀封人章魯定公十四年孔子行攝相事與聞國政而齊人歸女樂孔子乃去魯適衛過儀其此時歟論語中當時隱君子見孔子者七人儀封人晨門長沮桀溺荷蓧丈人荷蕢楚狂椄輿獨儀封人見得聖人意趣其餘惟知以隱爲髙與孔子意不相合韶武章古者帝王得天下必作樂祭天地鬼神以告成功韶紹也舜受尭禅故作樂見継紹之意其樂詞與樂聲舞態必皆有紹意武王伐紂得天下故作樂亦見征伐之意韶樂今不能知樂記言武樂有發揚蹈厲之容夾振駟伐之事是於樂中見用武戦闘之意舜武皆聖人不是征伐便不及尭舜然禅譲氣象自是好征伐氣象自是不及故曰武未盡善發揚蹈厲是武態奮發揚起歩蹈而有猛奮之容夾振駟伐駟即四字夾振謂夾舞者振鐸以爲節武舞凡六奏毎四伐一擊一刺爲一伐居上不寛章居人上當寛行礼當敬臨䘮當哀能寛敬哀了却於寛敬哀中觀其得失不是寛敬哀之外觀其他事里仁第四約樂章聖賢言不仁字不同如曰君子而不仁者有矣夫是未能尽全体之仁者此不仁字至輕曰不使不仁者加乎其身是未尽善之事不使及身此不仁字亦輕如曰不仁哉梁惠王不仁者可與言哉皆是言失其心徳者此不仁字至重此章所謂不仁者雖是言不能全心德之人然聖人吾意亦是言曾知斈而未深造者故乍處約樂亦能自守但不能乆長處之耳此不仁字雖未如前兩不仁字而比後兩不仁則有間矣集注約窮困也窮是不達困是貧窘聖人約樂是互舉盖乆約者必憂富貴然後樂集注乆約必濫乆樂必淫二字皆以水喻濫是泛濫如水散漫收殺不得底意淫是水過蒲而流出之意盖不仁者久約則憂患而謟䛕卑屈之態生苟且邪僻之行作乆富貴則佚樂而驕矜縱誕之氣長踰節陵分之事興約者日流於卑下樂者日過於僣躐是濫與淫意象上蔡一二之說形容安仁利仁精深在乎體認好惡章此章緊要是兩能字其次要㸔兩人字盖人之善惡有大小幽顯誠僞不同須是察得他真然後好惡之而其好惡則輕重進退纎毫不差故曰能好惡人如大斈中言可見大綱集注無私心當於理是合内外言之必盡二者然後謂之能凡仁者必智非智不能行仁故纔說仁人便是有知者知人善惡者智也好惡之者仁也富貴章古者封建井田之法行貴然後富非有才德勲勞者不得位若才德稱其位雖如舜禹舉一即爲百揆司空亦處之不疑後丗富貴自是兩途如國家設科取士而巳可應科且或仕者品格已及而遷除合宜及貨財義所當得者皆是以道而得富貴不以道得富貴若誦屈巧圖貪冐掊歛君子自無此或問謂一時不期得之如孔子主我衛卿可得行一不義殺一不辜而得天下之類是也貧賤以道得之如不能立身不守法度博奕好飲酒闘狼奢縱之類是得貧賤之道君子自無此士不以其道得之謂水火盗賊及無辜為人所累之類我旣不爲得貧賤之道而得之是命分所遭君子則安命不妄求去此若求去貧賤却是不以道得富貴逆天違命何足爲君子仁者天下之正理君子惟遵正理而行則不以道得之富貴貧賤自然不處不去此上是取舍大分下面終食造次顛沛三節一節宻似一節只是隨事隨時存養工夫此章雖富貴貧賤對說其實總言安貧賤耳不處富貴是擇義不去貧賤是安命進則由義退則樂天其行仁之君子章内兩去字皆當作去聲讀謂違去仁即下文違仁也俗作上声讀者非上聲讀者是除去之義仁是心德如何除得了集注審富貴要見義明安貧賤要守命固圏外要㸔然後則其四字盖君子先要取舎分明若取舎不明决則此身所處全在非義之中雖有存養工夫何益如屠者禮佛倡家講禮耳故曰然後若平日存養纎悉必當理至遇當取處自然明决故曰則其前密字亦緊要謂身之所居旣正則存養者始皆無滲漏也我未見章四等人前好仁惡不仁皆是行仁成德故同称未見次是一日用力行仁者未見三是昏弱欲用力而力不足者亦未見好仁者惡不仁者皆是行仁之人但其資質氣象自有不同尓好仁者如顔子惡不仁者如孟子明言惡不仁者其爲仁矣則是日以行仁爲事但於行事常常照顧不使一毫不仁之士見之於身其與好仁而務於行者亦何以異但好仁者斍自在尓故孔子總曰未見而朱子亦曰皆成德之事也不可將惡不仁者輕看又要看其爲仁矣字重庶見得惡不仁者與好仁者相去不較遠其爲仁矣此矣字不是句絶辭是引下文之辭故朱子作者字說如經史每以也字起下句一般此章三未見字不同前未見及章末未之見皆言無此人中未見謂無是事此節未見其人之意却在有能乎三字上觀過章此章雖爲觀人然主於敎人行仁也上言過各有黨是善惡對言下却專舉仁說意或可見集注以失過二字釋經過字失是錯誤過是太過具此兩字方盡經中過字之義吳祐言掾以親故受汙辱之名所謂觀過斯知仁者本文如此受汙辱之名是指持衣自首請罪之時過言私賦民錢言市衣進父盖嗇夫賦民錢時未知得汙辱之名也及父責之而促伏罪祐旣聞之始有汙辱之名尓祐見其以實首罪又能具說父言故從而赦之汙辱之名則不可泯矣然終是爲父之故故曰觀過知仁二句所指不同讀者亦當詳之汙辱本傳作汙穢聞道章聞道非謂耳聽得直是此心與道契合盖於天下事物之理逐一窮究積累之多至於天理流行融㑹十通處如曽子聞一貫而唯顔子聞克已復礼之說而請事斯語之時方是聞道道是事物當然之理旣得聞之則凡應事皆合乎礼甚而至於死亦無不可聖人言死可㪯其極重者言之而應士皆在其中非專爲死也故集註以生順二字𥙷明其意程子二條言死恐有兩意上條正命而死下條死之之死本注生順死安四字混融兼包二意恥惡衣章前章苟志於仁則無惡此章志於道而有惡衣惡食之恥可見前章是苟字緊要道即仁也士若苟志於道必不爲外物所動矣此見聖人言語一字之嚴而學者不可以不誠也無適章集注專主是適字正訓謝氏適可也是對莫不可說心無所住佛氏之斈正欲如此與無適莫全不同他無所住只是要不著物㪯天下萬物皆是累故必此心常是湛然無纎毫點染無適莫者有義爲之主無可無不可者義在可則可義在不可則不可爾心無住者應事則可亦可不可亦可也何獨應変不同於聖人其應常亦未甞有同也盖聖人用物釋氏忘身冰炭自不可相入無可無不可之間謂可之間與不可之間㸔義在何處非二者之間是義也懷德章德者人得於天之善理即大斈所謂明德君子常切思懷念念不忘欲至於至善之地小人不知有此徇其欲心惟思自逸不能迁善以成德君子常念刑法之可畏而自守其身不至於犯之小人但思惠利之所在不能擇義惟務苟得雖有刑法在前亦不顧集注此章之間字與上章之間不同却是公與私二者之間幾徴分别行向公則懷德懷刑向私便懷土懷惠斈者正要就此之間上用功使心路不可流向私邊去禮譲章此章與人而不仁如礼何語意相類上兩礼字揔天理節文人事儀則言下礼字獨言節文制度言人能用敬譲之實心行礼以治國何難之有不用敬譲之實心行礼以治國雖有制度節文尚奈不得他何如何治得國一貫章孔子言吾道曾子言夫子之道讀者要見夫子是以身教而在門者皆就聖人之身而斈非是論說義理而巳一貫譬如以索貫錢雖千萬錢之多只一索可以盡貫天下事物雖無窮却只是一箇道理貫串在裏面理之原出於天在天地雖渾然至大而事事物物各自不同其理亦流行寓其中毎事物中理雖不同然只是天理一箇大原頭分析來所以謂之一理貫萬事但礼雖同須是就一事一物上看得透行得徹及萬事萬物上皆如此然後可見緫㑹處聖人固是生知如曽子亦是先逐事物上窮究力行義理純熟積累得多夫子只把一言融㑹他零碎底成一片叚若於事物上不曽見得道理便說一貫只是虚談窮事物之理旣多不知一貫之義却又窒塞一理貫萬事固是說事物雖衆只是一箇道理此言吾道一以貫之是就聖人應事處說須要体認得聖人之心全是理行出處全是道如此方是吾道之以貫之若只說萬理一原却只是論造化云小與此章意不相似曽子平日於夫子所爲隨事精察力行但見一事是一理猶覺費力故夫子言我所行之道是一礼以貫萬事是使曽子逹此礼而見之行事以身先者告之也曽子旣聞夫子之言一時融繹通徹洞見天地萬物原委渾然之大而纎悉粲然條葉之繁而本根有在自是行事之間便可入此境尚何疑之有旣以一唯當之隨即融化忠恕以告門人夫子謂之一貫而曽子謂之忠恕只是此一語便見得真契此㫖矣是亦以身所先得者教門人見之行事也大率此章不可專作知㸔正是說行處意多忠恕二字上承夫子下接門人曽子平日用功於忠怒今旣造一貫之礼矣則門人勉夫忠恕豈不足以踐此地乎而已矣三字要㸔得有力要見得學者以忠怒体一貫真可以見其實行忠恕造一貫真可以逹其境集注推已二字是恕之正訓忠恕本是斈者之事曽子爲門人未能逹一貫之㫖故借平日講明忠恕二字以釋一貫之義大凡恕與仁只分生熟生者是恕熟者是仁恕須推已以巳推度它人仁只安行一貫是聖人事仁道也若以恕行之推得熟亦至於安行故忠恕解一貫最切近上言至誠無息是以天地之至誠無息喻夫子之一礼渾然萬物各得其所是以天地之生萬物各得其所喻夫子之泛應曲當下言至誠無息者道之体是言夫子之心至誠無息乃道之体萬物各得其所是言夫子之應萬事各得其所爲道之用各有所指當細玩忠恕一貫以下天道人道大夲逹道皆是借用非中庸本義中庸謂誠者天道不勉而中不思而得從容中道聖人也誠之者人道擇善而固執賢者之事也此借以形容曽子所言忠恕皆就聖人上說盖忠以心之体統言即上文至誠無息之意故曰天道恕以及物處言然合事物上盡其義即前泛應曲當之意故曰人道如中庸天道則自然及物人道則隨事精察而力行聖人之恕雖不待擇不待執終是就毎事上文之勉齋謂聖人之忠是天之天聖人之恕是天之人意可見矣若中庸之大本謂喜怒哀樂未發之中此忠是心之全体眞實非獨未發者也然乃恕之本故亦可以大夲言大抵因曽子借忠恕形容一貫恐學者疑之所以多是借說以明義理固可借用非獨忠恕而巳如下文言天道亦有忠恕之意同圈外第一條作四節看以已及物仁也是一節言聖人之事推巳至不逺是也是一節爲恕之正義忠恕一以貫之至大本逹道也是一節發明聖人之忠恕此與違道以下是一節繳上三節此字指忠恕一貫以下言違道不逺繳第二節動以天又繳事君數章事君交友之道所當爲者固非一端此章以君友同言又同一數字所以專主諌爭說讀論語叢說卷上
