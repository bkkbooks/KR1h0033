body:
  text: 東陽許謙先進第十一孝哉章此章夲稱閔子騫之孝首以孝哉字冠之下句即指上孝字而言蓋父母昆弟主於愛言其孝或有私意至於衆人皆言之而無間則信能盡孝矣集注添友字恐於本意為多顔淵死章顔淵死四章以次第言之當是天喪豫第一哭之慟第二請車第三厚葬第四蓋門人雜記夫子之言故不計前後也鬼神章集注死生人鬼一二二一一主理言二主氣言而已固不顧其國事子路食孔悝之食故為孔悝死尓其死固義也其過却在不當仕衛蓋太子居戚前後十四年矣子路缺知之明今既仕于其家遇難而死自是正道夫子之早料之正以子路勇於有為而缺見理精尓長府章疏金玉曰貨布帛曰財由之瑟章人心善惡邪正皆於樂聲可見善聽聲者聞樂即知人心如荷蕢聞夫子磬聲而知聖人有心於天下鍾子期聽伯牙鼓琴而知志在髙山流水蔡雍聞鄰人鼓琴知有殺心之類子路剛勇其瑟聲亦有剛強氣象故孔子言奚為我之門謂與己不同也以人而不仁如樂何章參看見意思師與商章集注言二子處指學而言子張才髙意廣是缺收斂子夏篤信謹守是缺充擴好為苟難規模狹隘是其效也賢智之過勝愚不肖之不及循上道以中庸為至說下因中庸本文而及之專說過猶不及一句非指二子而言也此章集注以道以中庸為至一句為主方說得上靣過不及意明不然則是子張之才德過子夏而子夏不及子張矣故過中失中歸於中屢提起中字說柴也愚章金先生謂曽子在孔門年最少而與三子並言此曽子𥘉登門時也揚氏謂四者性之偏語之使自勵此聖人之本意蓋唯曽子聞聖言即就魯上用功誠篤淬厲期於必得故後終有聞一貫之唯則魯鈍化為明睿矣彼三子未能力變其質或者為終身之偏歟集注知不足而厚有餘以意釋愚字引家語以證之耳非柴平生之行止此也家語記五事皆是厚有餘其足不履影不徑不竇二事之間則有知不足之意吳氏謂通下章為一章然前四人以質言後二人以學言也庶乎對億中屢空對貨殖顔子惟庶乎所以樂天至於屢空而不顧子貢唯不受命故但能億事而已不踐迹章人雖有好資質志於學方可入聖人之室然其質既善雖不循前人軌轍自然不為惡但未至聖人之地此是就兩頭說中間影出善人形狀孟子曰可欲之謂善有諸己之謂信張子之言本此言有諸己則善之著者意脉自亦不蹈於惡生來不蹈惡自善字上生來聞斯行諸章夫子非教冉有不必禀父兄之命禀命自是常禮正恐冉有遇義當行者不能勇為尓蓋行事須是有决斷志在必行然後禀命而即行若見義前卻自無主見不勇為則非父兄使之也禀命之意即在聞斯行諸之中集注約之於義理之中中字重讀畏匡章國語欒共子曰民生於三事之如一父生之師教之君食之生之族也唯其所在則致死焉檀弓亦曰事親服勤至死致喪三年事君服勤至死方喪三年事師服勤至死心喪三年亦事之如一之意古人皆是如此但師有不同服勤至死亦謂授道以成其德者孔子之於顔子豈與他師弟子可同日語不唯顔子以此自處而孔子亦以此信之孔子正恐顔子不知夫子安否而誤死故有吾以女為死矣之言蓋夫子周流天下從車必多觀孟子後車數十乘可見前後必不能相續連行匡人之圍顔子必相失在後不在圍中故夫子解後恐顔子不知而猶致死故也使子羔章前章集注謂子羔知不足而厚有餘此章又言質美而未學蓋質美則厚有餘未學則知不足其意一耳侍坐章夫子之於弟子於其平日言行問答之間固知其學力之所至然其將有所待而欲為之志則不能知也問之者欲知其自知之如何使之知有未至而自厲蓋此章非獨觀人亦所以教也千乘之國以地實出車數而言當方三百十六里有竒况有山林川澤城郭道塗又當三分加一若以封建常法言可謂大國矣而子路謂攝乎大國之間則此猶小國也蓋自黃帝時天下萬國後漸漸吞併至湯時三千餘國至武王時㑹孟津尚八百諸侯而武王又封建親戚功臣為國多矣東遷之後併吞猶甚小者漸大當時齊秦晋楚其地或至千里故千乘之國誠小國也千乘之國地大事殷固自難治而攝乎大國則此弱彼強為其所檢制而事有不在於己者為尤難也興師旅則傷人殺人妨農費財飢饉則窮困流離轉死溝壑二者乃將危之勢難而又難者也子路僅為政三年便有好勇知方之效可見大材巳豈管仲之比哉有勇知方是衣食足教化行蓋務農積榖使民有以仰事俯育然後教之以軍旅教之以道藝有勇則可以禦侮安人知方則能親上死長三年之間其效之速而大如此二子才學固不及子路然見夫子哂子路故其言愈下冉有猶欲治國公西華止言為相耳尤不敢以重事自任端衣名古者布幅二尺有二寸此衣身長二尺二寸𬒮亦二尺二寸而屬幅謂䄂接一幅也整齊端正故謂之端玄則其色也志者有所期而可必至之意固非己行之事也聖人之問正欲知四子之自期者三子之對正與聖人之意相當亦各自言其所必可至者尓曽點乃無所志於事未然而不可必得者但於只今便得為者言之於春時而服已成之春服童冠之人或七或五無拘於長幼多寡之數沂水雩壇地近即可至景勝可以遊浴者莫春事也風者遊息之意也至於詠而歸則以其胸中所藴發於歌聲以優游涵泳其自得之意則其安分樂天與物為春人我無間氣象藹然可見三子所言雖其所能之實事只是事為之末尓與曽點髙下自不同故曽點所對雖非聖人所問本意而聖人自深許之也雩祭名春秋傳曰龍見而雩龍者東方七宿其形如龍謂建巳之月龍星見時天子雩五精帝配以五人帝諸侯則雩祀百辟卿士有益於民者以祈榖實五精帝謂靈威仰赤熛必逍反怒含樞紐白招拒汁音叶光紀五人帝謂大皥炎帝黃帝少皥顓頊百辟卿士古勾龍后稷之類又周禮司巫若國大旱則帥巫而舞雩集注時見曰㑹衆眺曰同周禮殷見曰同殷即衆也改殷為衆避諱也但周禮有殷眺曰視又一禮也此則易見為眺不知如何然眺亦見義諸侯四時見天子之名曰朝宗覲遇時見則無常期諸侯有不順者王將征之則於朝覲之時别為壇於國外合諸侯而命事焉此時見曰㑹之禮也如王十二歲不巡狩則六服盡朝禮畢王亦為壇合諸侯以命政此殷見曰同之禮也浴盥濯也後漢書三月上巳祓除官民潔於東流水上除去宿垢疢蓋於水上祭而盥手略湔濯其衣以寓潔清之意自古風俗如此非祼而浴也三子之言是盡其才用曽點之言涵容則廣蓋點止就目前日用行事上說便有如此氣象若居别地位則便有别事為所至處皆是天理故點該得三子之言而三子不能及點之趣集注自有以見夫以下至隱然自見於言外雖是就其巳言者形容而其未言者固可想見其氣象也曽點見趣甚髙而行不掩夲注朱子以見字冠之程子謂曽點便是堯舜氣象亦以其物各得所意上描盡然但謂之氣象而不可謂之事業子路若逹為國以禮便是堯舜氣象蓋禮是天理自然之節文逹禮則見物物有則而應物處莫不循其道而行之不可措一毫私意於其間則氣象非堯舜乎圈外第一條是揚三子第二條當作三節看一節言曽點三子者之撰以上揚之特行以下是抑之二節言子路等所見者小是抑三子三節子路以下又是揚子路第三條第四條皆是揚曽點顔淵第十二顔淵章非聖人性之者則皆有物欲之蔽但有淺深之不同尓故學者必須消磨物欲然後可以復其性蓋天地生物理為之主人之一身心為之主人心本全具天理者也天下事物萬變不能皆善心為事物所感則欲生私勝夭理漸昏理與欲二者在人心常相消長理明一分則人欲消一分欲長一分則天理消一分學者但要究明天理屏去私欲若欲盡理明應事接物件件適中即是全體之仁克己是非禮處勿視聽言動復禮是合禮處則視聽言動非勿兩字賢愚之樞機然須先下格物工夫知何者為禮何者為非禮方可到此地步顔子平日格物工夫巳至故聞夫子之言便一力承當克己復禮是開說四勿是合說日克已復禮天下歸仁言一日之間接事應物能盡克去己私皆復還天理則天下之人聞者見者皆許之為仁蓋應事合乎天理之公則同有是心者誰得而間之極言其效之速而甚大尓非謂一日為仁天下之勢便盡歸之此章全以禮字代仁字蓋仁以理言恐難捉摸躰認故以天理節文之禮為言仁即天理之公禮即天理之節文本非二物也身之接於物者事事合乎節文而無一毫私僞即是人欲净盡天理流行即為全體之仁視聽自外入言動自內出但視不是見得聽不是聞得聲色雖自外來而視之聽之却在我所以制於外則養其中四者皆同四針序制於外養其中蓋仁主於存心應事兼動靜而言四勿是就動處用功主於一事中則謂心之全體於動處事事是當則是養於中者熟及其成功則私欲净盡天理流行於視聽言動之間自然皆禮而不待勿矣四勿仍是學者事故顔子就此用功而至於三月不違養之熟則化矣四針序四者身之用也由中而應外制外以養中謂視聽言動四者是身之接物處皆是心為之主心之動而外應之當外動處制之以禮乃所以養其心而全乎仁也蓋仁是心之德故主於心而言意專在制外上由中一語特明其當制外尓如此看夲自無病金先生乃曰由中應外聖人之事制外養中學聖人之事此是兼非禮勿三字看蓋程子本引四全句說來則四者身之用也一語亦總繳四全句如此讀下則由中應外一語為說聖人事又自是一般理趣即如云由仁義行儘自好由是觀之讀書者不可不具眼視針每兩句內外自對說首四句雖兩節內外却是一串說下重在操之有要一語蔽交兩句言其所以當制制之兩句正是工夫後兩句是效驗四針平觀之若視切而聽緩細玩其文意則聽重而視輕蓋視針止言其中遷聽針乃曰遂亡視言心聽言性心以知覺言性以理言知覺有遷猶可挽回天理若亡則不足以為人矣蓋目之所及者有限耳之所接者無窮聽雖主於聲而凡係乎言皆屬聽讀書為學得之於簡冊傳聞者皆聽類也若於事物之來應之或差猶可改也至於學問之差為心術之害遂至於亡其性則不可救藥矣聽言之邪正其可畏也如此視聽言各指一事動則舉一身而言故動針兼心說謂內而心之動外而身之動皆出於正表裏如一則天理流行若但強制於外而動於中者或未盡善則病根不除未為得也此即愼獨工夫仲弓章上兩句敬以持已中兩句恕以及物下兩句敬恕之效驗孟子謂強恕而行求仁莫近焉行恕熟即是仁行仁須自恕起集注謹獨二字是此章之骨子蓋有謹獨工夫然後能如見賔承祭能敬然後能恕則敬是恕之本下一條即此意而言之詳司馬牛問仁章首篇三章問仁而所答不同三人之才有髙下故也顔子見理已明故告以全體其言直捷簡要冉子未及顔子故教之行恕若熟亦便是仁司馬牛多言故只就他病處說言認是行仁之一端緊要在為之難上言為行表人若易其言則所行必不能盡理然只是教顔子非禮勿言一節司馬牛問君子章不憂仁也不懼勇也仁者樂天故不憂勇者果決故不懼必其平日言行忠信所以內省不疚而自然無憂懼司馬牛憂章司馬牛桓魋之弟桓氏蓋宋桓公之後别為向氏丗為宋司馬故為司馬氏桓魋兄弟五人左師向巢次魋次子頎子車及牛不知牛與子頎等兄弟之次𥘉宋景公嬖向魋後魋之寵害於公公將討之魋先謀公請享公以日中為期家備盡往私家甲兵之偹尽往享所公知之命皇野召左師巢與之誓而共伐之遂攻桓氏子頎告魋欲入攻公子車止令勿入魋遂入曹以叛曹人叛魋魋奔衛巢奔魯司馬牛致其邑與圭而適齊後魋再奔齊牛又致其邑適吳吳人惡之而反卒於魯郭門之外阮氏牛無兄弟之言蓋魋未叛之前逆料兄弟之必叛也內敬外恭固是善德敬又須是無間斷敬者主一無適之謂才間斷便不是主一恭須是近禮恭而不近禮則勞而徒招辱能盡二者則天下之人皆愛敬之皆字太泛故先儒以為病子貢問政章夫子所答民信本言其效所以集注以然後教化行五字襯在中間子貢析而為三正欲知信與食兵何者為重蓋兵食有國者必不可無而民不信又不可以立國三者相權孰重孰輕故以為問夫子亦隨其問而答之而信者人心所得天理之固有非如兵食自外來故至死不可去夫子𥘉答民信固以效言制田里薄賦斂使以時則食足比什伍飭車甲時簡教則兵足只此二者之間信已在其中况食之飽居之安然後教化可行而事得施信於民則民無不信於上矣民之信本於上之先信也故集注以然後教化行五字𥙷於上曰不離叛則又信後之效也子貢以二本一效列而為三非強析之也固在聖人語意中夫子最後之答則又推信字之本而極言之謂此實理人之固有失之則不若無生此亦兼上下言之前民信之信則後信字之一義也棘子成章此章質文正是說辭氣威儀之間然又自有兩層意發於辭氣威儀有尚質尚文之不同此一意也如語録使一箇君子與屠販之人相對坐並不以文見畢竟兩人好惡自别大率固不可無文亦當以質為夲如此則又是以德為夲而發為辭氣威儀之文華者為文此又一意也子貢之言亦夫子彬彬之意而集注謂其有失者蓋二章雖皆以文質對舉而夫子有野字史字所以集注上言鄙略下言誠不足鄙略但少修飾尓誠不足則亦虛浮之弊語中自有輕重子貢則兩言無輕重之分而又力反子成之說故有失看來子貢雖言文質相等又只是主文意思多虎豹之鞟猶犬羊之鞟以為無文故無辨雖曰無文故無辨然虎豹之鞟豈果與犬羊之鞟無辨哉盍徹章年饑用不足金先生謂兩下問者是也蓋哀公固以用不足將加賦為問然年饑則不可加賦用不足又不可不加賦將何以處之乎故曰如之何如之何者使於二者處之當也有若對曰盍徹則極本窮源之論也蓋當時三家擅國而魯君無民雖賦什二而不入於公室私家富而公室貧徹法果行則民之田賦既有定制等而上之士大夫卿君各有定分而公室所入者多矣制既定則量入為出一舉先生之制行之安有用不足之理救民之困濟國之貧無過於此哀公不悟其意反以賦少為言故再對專告之不可加賦而已周代賦田之法一夫百畒鄉遂用貢法十夫同溝而無公田都鄙用助法方里而井井九百畒其中為公田八家皆私百畒於公田百畒內各賦與八家二畒半使之為廬播種時居之公田共分二十畒與八家所存止八十畒八家共治公私田八百八十畒鄉遂同溝之人都鄙同井之人皆通力合作計畒勻收凡耕種耘刈皆共治之欲其用力均也收成之時溝中將千畒所得之榖井中將八百八十畒所得之榖皆於十分中取一分納於公家餘九分則溝井之人各均分之徹通也謂通計溝井之所收而分之也此所謂周家什一之法魯自宣公以來既收什一又於私田之中收其什一是謂什二崇德章鈞是人也以我愛惡之故甚至欲其生死生死有命豈能欲之是固惑矣鈞是人也有欲其生者有欲其死者何胸中紛紛如是而有何損益於彼哉豈不惑之甚者齊景公章陳完者陳厲公之子也陳宣公殺其大子禦寇禦寇與完相愛完奔齊齊桓公使為工正完生稚稚生湣湣生須無是為陳文子文子生無宇是為桓子皆事齊莊公無字生乞是為僖子乞事景公行施於民景公卒而立幼子荼田乞為亂荼出奔魯乞立景公庶子陽生是為悼公而使人殺荼陳乞專政卒子恆代立是為成子其後悼公遇弒立其子壬為簡公陳恆復為亂弒簡公而立平公恆之後三丗至太公和篡齊國釐即僖字居之無倦章居之行之此說似虛若不見所指而上句尤虛蓋子張問為大夫而為政之事為政則隨其所居之位有當為之職身任其事則當常存諸心詳思密慮周遍謹審無一事之忽無一時之怠然後職舉而政行此居字當重看則章意自明成人章集注誘掖奬勸誘謂引之於前掖謂扶之於側奬者譽之也勸者勉之也問逹章語録逹是行無窒礙事君則得乎君事親則得乎親之類又曰逹是退一步做卑遜篤實不求人知一旦工夫至到却自然㑹逹聞是近前一步做惟恐人不知故矜張夸大一時若可喜其實無足取質直自是忠實貞信向前行去若不合宜則又不可故須用好義方能進德好字當重看取仁反質直行違反好義居之不疑反察言觀色慮以下人集注逹者德孚於人而行無不得之謂逹是行無不得德孚於人推其本而言之忠信二字貼質直二字忠質也信直也逹者德孚於人而行無不得是就接人上說所以於人之言則當察之而審其信我之言否於人之色則當觀之而審其信我之行否是用人之言行以自觀我之言行非有卑諂之意亦非有以詭道遇人之意從遊章攻人之惡心只散在外况所攻非一人則此心煩擾馳逐無時得巳於己無益而有損且終流於薄攻其惡則收斂務內搜擲隱微而不善不能根著留滯此心日以開明而終歸於厚辨惑聖人只就樊遲切身之病告之以發凡耳人之惑不一學者各自辨察己之惑者而務去之上兩節皆教之以崇之修之之方下一節止語其所惑而不言辨之之說蓋以其所病者語之知此為惑則推此以自察其餘即辨之之方也集注粗鄙近利粗就忿忘身上言鄙就攻人惡上言近利就得上說問仁知章虞廷聖賢之臣固多而獨言舉臯陶者蓋大禹終受帝禪此下惟臯之德最優舜命禹總師而禹之所讓惟臯及帝贊之則曰臣庶罔或干豫正民協于中時乃功又曰四方風動惟乃之休於此正見得不仁者逺意思盡心以告之固美矣又必所告者盡善可也雖誠心以告而所言未逹於理則反有害於仁乃欲朋友之從是賊夫人而已文㑹友章為仁而不取友以為輔則有孤陋寡聞之固㑹友而不以文則有羣居終日言不及義之失子路第十三子路章集注分行與事是開說下句則總兩事俱要無倦語録曰橫渠云必身為之倡且不愛其勞而又益之以不倦此說好此是合三句作一串說下各有意味季氏宰章先有司赦小過舉賢才集注意作三節說或問有一家只就有司上說大意謂既先有司則有小過當赦有賢才當舉通釋推此意謂赦小過故常人可以自勉舉賢才故非常之人可以自見此說尤委曲詳盡誦詩章交與國令下民莫難於辭令有命出於國中則可集衆長較是非修飾而成如鄭國為命草創潤色之類至於出使則一人一時應對而國家之榮辱係焉故曰專對必學詩而能之也魯衛之政章魯國周禮所在而素尚禮義者也衛詩淫亂之風豈魯之比今而魯國之政乃與衛同此夫子所以歎也苟有用我章朞月而可謂興衰撥亂綱紀粗立三年有成謂治定功成治道大偹一言興邦章金先生從通釋是字絶句而幾訓近攘羊章理勝為直父子相證則背天理絶人倫得為直乎子貢問士章第一節兩事似不能盡為士之道然行己有恥一句自可以包君子之凡集注志有所不為其包亦廣宗族鄉黨稱孝弟是有恥中兩事尓故曰本立而材不足者謂夲之立則未能盡行己之全也狂狷章集注狂者志極髙而行不掩狷者知未及而守有餘志極髙守有餘皆過也行不掩知未及皆不及也因各人之才激厲其不及而裁抑其大過則合於中道憲問第十四問耻章邦有道居位而無道可行尸位素餐為可恥邦無道貪祿苟位不能明哲保身亦可恥克伐章克伐怨欲皆是仁之病能知其病而禁其不行固亦難矣仁之體則未見也原思所言病在行字上不行則病根尚在於心未除久則病根未免發見故孔子但許其難而不許其仁仁則心全天理而無私四者皆私也懷居章君子見義則遷懷其所居之安則不能遷義南宫括章夏禹崩子啓立啓崩子太康立夏都河北安邑太康十九歲渡河而畋至十旬弗反有窮后羿距太康于河南而自王夏故都河北之地窮國名后君也羿窮國之君也羿在堯時善射其子孫亦善射皆名羿稱帝夷羿夷羿之姓氏也太康不得歸河北居於河南太康二十九歲崩弟仲康立十三歲崩子相立八年羿恃其射不修民事其臣寒浞使逄蒙射殺羿寒國名浞其國君之名浞因羿室而生澆及殪澆即奡因羿之故地而為政后相二十八歲浞使澆弒王王即后相遂滅夏相之后妃名緍逃歸有仍仍后父母之國也明年生子少康少康四十歲舊臣共立之而滅寒浞及澆殪浞仕角反澆五弔反豷音翳君子不仁章君子固志於仁然仁以全體言存於心無一毫之私應於事無不當於理方得其全君子之心有一毫不在則非全體之仁所謂不仁者指一事而言也愛之章愛之能勿勞大意上之親下忠焉能勿誨大意下之親上如愛子弟則使之供灑掃應對之聀以勞之方可謂之愛如忠於君有過則諌方可謂之忠若篤愛而不勞反害之也盡忠而不諌反陷之也公叔文子章不言笑取當時過稱文子也然謂之不猶是一偏之行公明賈對以時然後言笑取却是時中之行但所言太過不得其真孔子與人為善不明言其非但曰其然豈其然而疑之防求章魯襄公二十三年季武子無嫡子庶子公鉏居長而武子愛幼子紇欲立為後訪於臧孫紇此紇即臧武仲武仲為之立紇為後是為季悼子孟氏惡武仲而季氏愛之孟莊子有長子名秩幼子名羯其御豐點好羯及孟莊子有疾豐點謂公鉏曰苟立羯請讎臧氏以公鉏因臧氏而不得立故豐點許之報讎而成其事孟孫卒公鉏立羯為孟孫後孟氏因閉門告於季孫曰臧氏將為亂臧孫聞之孟氏將葬借人除道臧孫使人助之而使甲士從已而觀孟孫又告季孫季孫怒攻臧氏武仲出奔邾既而歸防使來告於魯曰紇非能為害也知不足也苟守先祀敢不辟邑乃立其兄臧為為臧氏後武仲遂奔齊此事按左氏或代以它語寫直意武仲既出奔當去魯國今尚留防邑請立後而辟邑若朝廷不為立後則必據邑以叛是要君也晋文公章晋獻公太子名申生庶子名重耳夷吾獻公嬖􅌐姬􅌐姬之子名奚齊其娣生卓子􅌐姬譛申生重耳夷吾申生自殺重耳夷吾出奔獻公薨大夫荀息立奚齊大夫里克殺之荀息立卓子里克又殺之及荀息秦人納夷吾是為惠公後惠公卒秦人納重耳是為文公文公之為公子而出奔也過衛曹二國皆不禮焉過宋齊楚三國皆厚禮之當時宋曹衛皆附楚及文公立宋背楚親晋楚伐齊圍宋齊宋求救於晋晋伐曹衛欲以解宋圍衛侯出晋執曹伯分曹衛之田卑宋人楚將子玉使宛春告晋師曰請復衛侯而封曹臣亦釋宋之圍晋侯拘宛春以怒楚私許復曹衛之田曹衛告絶於楚子玉怒與晋戰楚師敗績如不正救齊宋而伐曹衛私許曹衛田而執宛春以怒楚此等處皆文公之譎博議言之甚詳齊桓公伐楚責之曰尓貢包茅不入寡人是徴眧王南征而不復寡人是問其辭意皆正桓文平日行事不止此就各事皆可推此章夫子就桓文以校其正譎桓公行事亦有未全正處但正處多而比文公不同爾桓公殺公子紏章桓公子紏皆襄公之子時襄公無道鮑叔牙奉小白奔莒及無知弒襄公管仲召忽奉子紏奔魯至雍廪殺無知小白自莒先入是為桓公魯亦以兵納子紏是時小白巳立遂與戰魯兵大敗桓公使魯人殺子紏召忽死之管仲請囚鮑叔牙與管仲為友遂脫其囚薦於桓公而為相子路疑召忽管仲皆子紏臣召忽死而管仲不死恐是未能全心德之人故有是問然管仲之為人雖未得為仁其相桓公恩澤及人乃有仁人之功故夫子重言如其仁以深美之管仲非仁章子路之問重在不死子貢之問重在相桓公蓋桓公為兄而出於齊難未作之先子紏為弟而出於無知弒君之後無知弒君子紏在內當討賊報讎而畏死出奔已為齊之罪人及雍廪巳殺無知桓公已正君位子紏方入以爭國則子紏猶齊之賊也管仲雖子紏舊臣今輔之爭國亦為兆義齊君赦管仲而用之亦無不可而管仲不當以桓公為讎故夫子但稱其功而美之或以匹夫匹婦之為諒指召忽者非也此言管仲自信其才足以有為而其事可以不死故全其生以圗後功既而果有霸功之效則是其相桓也不害其仁矣豈如小人之無才而守小信死不得其所哉子貢之問元不及召忽而匹婦又豈可指召忽而言則聖人之意可見矣衛靈公無道章仲叔圉即孔文子祝鮀佞而免於丗王孫賈專衛權即問奧竈者三人本非賢者而其才各有所長靈公用之各當其才所以不喪國夫子平日語此三人皆所不許而此意之言乃若此可見聖人不以其所短棄其所長至公之心也用人當以此為法但欲當其才耳子路問章朱子曰唐人諌敬宗遊􅌐山謂若行必有大禍􅌐山固是不可行以為有大禍則近於欺其實雖不失為愛君其言則欺矣南軒曰若忠信有所不足如內交要譽惡其聲之類一毫之萌皆為欺也饒雙峯曰自家好色却諌君勿好色自家好貨却諌君勿好貨皆是欺君朱子之意謂諌君不能敷暢詳明而欲君必行己說則言失之大過是為欺君南軒之意謂有所為而諌是為欺君此皆就當諌之際用功雙峯之說則工夫在平日至諌君而見學者於三說皆當存心蘧伯玉章集沽行年六十而六十化即知四十九年之非之意謂年自五十九至六十更一年則德又進而化於理心既能化於理則自然覺五十九年之非但化之為言則又與上五十而知去年之非者愈進矣思不出位章范氏物各止其所之說所包甚廣下文君臣上下大小特舉其大者爾究其極當如通釋當食則思食當寢則思寢此亦位也之說方備君子道者三章通釋有是三者則非本心之正而易失其守故君子以無之為貴其意蓋曰仁智勇三逹德固君子之道而聖人常自以為無能焉而不有其德故子貢曰夫子自道之故如此他人則唯是聖人之智仁勇而不知聖人之操心若此也如此恐於夫子自道也一句意順不患不己知章集注此章凡四見學而不患人之不已知患不知人也欲其自反而知人之賢否里仁不患莫已知求為可知也欲其自反而求可知之實此章曰不患人之不己知患其不能也衛靈公君子病無能焉不病人之不已知也此兩章意同語異皆欲反而自修之意聖人屢言之丁寧學者不可務外驥章集注德調良也調謂習熟而易敦良謂順服而不蹄齧報怨章怨有大小如君父之讎怨也兄弟交遊之讎亦怨也有以不善及於我身者怨也意氣之加言語之失亦怨也於讎之當報不當報則據理以直待之或問言之詳矣若小怨非有殺身之讎或與其人相遇而共事則隨今之事怨之不可提起前日之怨而置輕重於其間集注愛憎取舍四字包括大小皆盡且如我當進退人才之任而所怨者在下位則當視其功罪而升黜之至如當議論人才評品德藝雖不係重䡖一言之發亦以其實言之凡愛憎取舍不以怨故著一毫私意於其間所謂直報之也聖人言報而以德怨對舉者蓋君子之心正欲不存私意私意不存然後應事各當若應事有髙下則或公或私是兩心矣前日報怨此心也今日報德亦此心也以德報怨心固厚矣而報德乃與報怨同是反薄也得於彼則失於此得於此則失於彼心而有二得為君子乎故夫子不許表記子曰以德報德則民有所勸又曰以德報怨則寬身之仁也注仁當作民謂是寬愛已身欲苟息禍患之人也莫我知章莫我知也夫意之之詞也知我者其天乎雖意之而實决辝也當於不怨天不尤人下學上逹三語見承上莫知接下知我之意須將不怨不尤在莫知之前非謂人既不知而不怨不尤不怨不尤與下學皆莫知之由而上逹則天知之實此意當細㑹擊磬章集注以衣涉水曰厲衣裏衣也攝衣涉水曰揭攝提起也古人不祼體涉水若水淺但提起衣而過若水深不可提既不可脫衣則和裏衣而過可厲則厲可揭則揭各隨事宜意謂天下可以行道則行不可行道則隱今天下既無道孔子不隱而猶周流天下為不識時宜夫子謂荷蕢可謂果决於忘丗哉又言人若但欲决然去丗亦無難矣諒隂章集注諒隂天子居喪之名禮又作梁暗凡居父母之喪次在中門外東墻之下大夫士居倚廬謂以兩木一頭著地一頭斜倚在墻上外𬒳以茅茨寢苫抌塊常處此中諸侯亦為倚廬而如以圍幛天子既立拄前有梁形稍如屋楣故曰梁暗暗讀如䳺修已以敬章敬字是徹上徹下工夫學而至於聖人始終皆在此君子惟以敬自修已而已至於臨事亦發於敬安百姓之事雖大皆以敬行之若無敬則中無所主事皆不成堯舜聖德巍巍亦心敬而已堯舜猶病諸者謂堯舜雖聖德而天下之廣豈能使無一物不得其所意謂堯舜聖之極矣而尚或未能全敬之用况學者而可不務於敬乎子路言如斯而已有不足之意故夫子極言敬之大者修已以敬一句敬字重下修己兩句敬字亦在其中聖人言修已以安百姓而程子乃言上下一於恭敬蓋治道非一人所能獨成必君臣上下皆能恭敬然後有天地位以下之應然下人能敬亦在乎上之人有以感之漸漬而成恭敬以至於天下平程子此假是推極而言以見敬之功用無窮夷俟章原壤之母死夫子助之沐㨃原壤登木而歌夫子為弗聞也者而過之從者曰子未可以巳乎夫子曰親者母失其為親也故者母失其為故也或問謂夫子何舍其重而責其輕蓋數其母死而歌則壤當絶叩其箕踞之脛則壤猶為故人耳盛德中禮見乎周旋此亦可見衛靈公第十五一貫章集注第四篇以行言此以知言四篇言吾道字道是行意故曰以行言此章就多學而識之上說來故曰以知言曽子篤實力行子貢明敏博學故夫子與之言不同如此然學者須知得然後行得無為而治章聖之盛德而在民上下民感而化之天下自然平治不必有作為夫子獨稱舜者蓋舜即天子位承堯治平之後如平水土誅四凶之類皆在堯朝故舜即位之後無所事為但恭己正南面而巳所以比他聖人尤不見有為然恭巳之容惟聖人為能盡爾子張問行章子張問何以得行於外夫子惟教之修其在己者則自然可行言行君子之樞機謹此二者修身之事備矣聖賢千言萬語皆是二者節目子張恐有時或違夫子之言故以所教之言書於大帶以體參前倚衡之意子張請問者三學干祿問逹問行皆務外之意夫子皆教之以自修以此觀之學者但有一毫求人知之心便全不是了學亦必不能成若但一向以為善為已分內事只管低頭去做學自能進德自能成人自㑹知道自能行古人之帶有二革帶以皮為之用以懸佩在裳上衣內衣上加以大帶用繒為之圍於腰結於前其兩頭垂在下者曰紳即今深衣之帶是也集注鞭辟辟音闢開也鞭開如前驅攔約人向外自兩傍視之則為近裏此蓋當時洛中方言史魚章雜記曰內亂不與焉外患弗辟也釋者謂同僚將為亂已力不能討不與而已則孫林父寧殖謀放弒伯玉行從近關出其合於禮乎子貢問為仁章集注賢以事言是大夫有才德而見於行事者仁以德言是士蹈道積德而自修者為邦章顔淵才大故夫子教之治天下之事以虞夏商周四代禮樂以授之治天下亦非此四句而已提其大綱則他事皆可推度隨時合宜夏正之說大意見子張問十丗章所謂建者蓋地之四方亦以十二辰分之寅卯辰居東已午未居南申酉戌居西亥子丑居北專以北斗之兩為驗每於黃昏星𥘉出時看北斗柄指在何方上便是此月建即指之意也指子為子月是十一月指丑為丑月是十二月指寅為寅月是正月周冕之說其冕旒之數見於前麻冕章其章服之數則自黃帝制衣服而天子衮冕之服十二章日一月二星辰三山四龍五華蟲六畫於上衣宗彛一藻二火三粉米四黼五黻六繡於下裳至周時升日月星辰於旗上天子之衮冕則十二旒十二玉服則惟九章龍一山二華蟲三火四宗彛五畫於衣藻一粉米二黼三黻四繡於裳鷩冕則九旒旒亦十二玉服七章以華蟲為首而繪四於衣繡三於裳毳冕七旒旒亦十二玉服五章以宗彛為首而繪三於衣繡二於裳希冕希九反五旒旒十二玉服三章以粉米為首繪一於衣繡二於裳玄冕三旒旒亦十二玉服一章惟繡黻於裳尓凡衣皆玄裳皆纁玄黑色纁淡黃色其諸侯之五冕大略在麻冕章龍畫為二龍一青一白白升上青降下衮即龍也山畫二山形華蟲雉也亦名鷩為雉形火畫火光之形宗彛祭宗廟之彛器凡宗廟之彛六其一畫虎其一畫蜼今於衣上畫虎彛蜼彛各一虎蜼皆毛物毳即毛也藻為水藻形粉米如粟米堆積之狀粉白色也黼白與黑色也以白與黑二色同成斧形黻青與黑二色為兩已相背亞其義則龍取其變化又升降隂陽交泰之象山取其鎮重華蟲取其文章火取其明宗彛取其孝宗彛所以畫虎蜼者虎取其義蜼之形如猴兩鼻孔向上尾長而兩岐天雨時恐兩入鼻中則以尾兩岐塞鼻孔取其知今畫彛於衣只是取其事宗廟之孝藻取其潔米取其養人斧取其剛斷黻取其向善背惡名衮冕為起於龍也鷩冕始於雉也毳冕始於毳物之虎蜼也希冕希刺也刺音七惟一畫兩繡繡多故曰希玄冕為止有一章與玄同也鄭衛二國之樂皆淫邪亡國之音也而夫子獨言放鄭聲者絶其尤甚者也文公詩傳言衛詩三十有九而淫奔之詩才四之一鄭詩二十有一而淫奔之詩七之五則鄭之淫有甚於衛故夫子獨絶之集注周人飾路以金玉周禮五路一曰玉路二曰金路注以金玉飾諸末謂凡車上之材於末頭皆以金玉飾之逺慮章人無逺慮以地言之人若無千里之思慮則憂在几案前以時言之人若無百年之思慮則憂即在頃刻間義以為質章遇事先裁度合理决定行了行時却把節文行去又欲以遜順之道行出成之必在誠實盡此四者方成君子先以理處度合義了方可行故曰義以為質然要知義須先窮理此章只截定自行上說知又在此先巧言亂德章集注小不忍如婦人之仁匹夫之勇皆是婦人之仁不能忍愛匹夫之勇不能忍暴言君子行事當為即為不可優游不斷然又須沈潜縝密不可輕於果决不能審此二者則敗大事終日不食章思以理言學以事言不於事上學以求合於理而懸空思索必無益於已所謂思而不學則殆者也謀道不謀食章君子所謀者唯欲明道耳不謀食也况貧冨貴賤莫不由命謀食未必得食也故曰耕也餒在其中學本所以謀道而深造乎道者自有得祿之理存其間故曰學也祿在其中是以君子憂道不憂貧也知及之章知及之是知此理仁守是心存此理能行之而不為私欲所蔽莊涖動禮是接物處上兩句明明德之事下兩句新民之事知以知言仁以行言雖得之必失之兩句却就知上說謂雖知此理而行處不能守之則併其所得者亦失之矣所重在於知仁能知而能行之莊涖動禮皆守之事季氏第十六顓臾章注四分魯國禮大國三軍上公之國也次國二軍侯伯之國也魯實侯國本止二軍襄公十一年季武子宿為政作三軍與叔孫穆子豹孟獻子蔑三分公室季氏盡征之叔孫氏臣其子弟孟氏取子弟之半昭公五年季武子舍中軍四分公室季氏擇二二子各一皆盡征之而貢于公祿之去公室章集注魯自文公薨公子遂殺子赤立宣公而君失其政歷成襄昭定凡五公自季武子始專國政歷悼平威子凡四丗而為家臣陽虎所執蓋至孔子時不但公室衰大夫之家亦衰而陪臣彊矣祿去公室五丗圗魯隱公春秋之時諸侯尚知有王桓公諸侯漸不知有王莊公齊桓公始霸禮樂征伐自諸矦出矣閔公齊桓公霸僖公齊桓公後有宋襄公欲霸不成晋文公霸文公晋襄公繼霸宣公魯文公卒公子遂殺子惡及視立宣公祿始却公室成公晋楚爭霸襄公季武子始專魯政晋悼公復霸屈强楚諸矦之大夫漸主盟㑹三家分晋昭公禮樂征伐自大夫出齊有陳氏晋有六卿魯有三家定公晋楚皆衰中國無霸大夫之家臣執國命哀公政逮大夫四丗圗季友季文子行父季友孫季武子宿三分公室三家各有其一既而四分公室季氏擇二季悼子紇季平子意如魯昭公伐之不克出奔死於外平子專魯季桓子斯為陽虎所囚三戒章醫書以血為隂而行乎脉之中為榮謂榮養乎身也氣為陽而行乎脉之外為衛謂衛輔乎血也二者周流上下於一身無有暫息然心則主乎血而志為氣之帥故知養其心則能制血氣而不至於亂聖人三者之戒亦惟操其心而已九思章語録視不為惡色所蔽為明聽不為姦人所欺為聰饒雙峯云上三者是就自身說下三者是事上說視聽是一對色貌是一對言事是一對下三者疑思問屬知餘二者屬行陽貨第十七性相近章有天地之性有氣質之性天地之性天以此理賦於人者氣質之性人禀天地之氣以成人則有淳有駁有清有濁禀得清純者而生為聖賢禀得濁駁者而生為愚不肖若言天地之性即是理理皆是善而無惡此章兼氣質而言人之𥘉生之時性不甚相逺至於所習不同而後逺尓若得清者必好學必至於聖賢得濁者好學不已亦可至於聖賢濁者又不好學則為小人即下所謂下愚是也清者若不好學亦為小人之歸武城章在上人好禮樂則知愛人之道故能愛人在下人好禮樂則心和順知下事上之道故易使子游之絃歌意在於此夫子言割雞焉用牛刀喜之故以此言反以為戲歌詩而以樂和之則為歌徒歌曰謡絃歌以琴瑟和歌也先王之教禮樂雖各有其時而二者未嘗偏廢武城絃歌之聲聞於外則其學禮可知矣故集注添入禮字說公山弗擾章孔子必不助畔人弗擾是畔人來召孔子弗優之意欲遷善亦未可知或能化之為善亦有可往之理聖人道大德弘雖入亂邦必不為惡人所染見南子陽貨欲往弗擾佛肸之召此皆是待惡人處亂丗之道子路不能曉故曉之然當弗優之召時必有可以轉旋之機故夫子欲往而欲興周道於東方子張問仁章恭者不侮於人故人亦不侮之寬廣則能容衆故衆亦向之信實則不為人所疑故人皆倚仗之敏速則不滯而疏通故行事有功有恩惠及之於民而民感之故可以使人聖人亦不過此五者但所至有大小淺深之不同耳故若能盡此五者則為仁佛肸召章聖人處丗無可無不可無不可同謀之人亦無不可遷善之人故欲往子路但能有可有不可未能如聖人無可無不可故有此言孔子以堅白匏瓜曉之磨不磷方可謂之堅涅不緇方可謂之白若不能如此豈足為聖人周南召南章周自后稷始封數十丗至文王辟國寖廣使周公為政於國中召公宣布於諸矦於是南方之國從化至成王立周公相之制作禮樂乃采文王之丗風化所及民俗之詩𬒳之管絃其得之國中者雜以南國之詩謂之周南其餘得之南國者直謂之召南詩序謂南言化自北而南也周國在豐為雍州之地於地為西北而德化流及於梁荆等州皆在雍之南故曰自北而南二南之詩皆修身齊家之事故為詩之首篇而學者必當學之也色厲內荏章厲是僞也荏是真也內欺諸心外欺諸人非穿窬而何道聽章本注聞善言不為已有是自棄其德王文憲謂此德得於天者謂聞善不以去我之惡而但塗說於人則是迷其本有之德不知自修乃自棄其德爾圈外王氏引大畜象辝而曰塗說則棄之矣王文憲謂此德得於人者謂聞善則當積以成我之德今但入耳出口則不注於心矣是隨得隨失乃棄之也民有三疾章狂矜愚氣質之偏而為疾也肆廉直疾之未大害於義者也蕩忿戾詐則為惡矣宰我問喪章孝子之於親其情無有窮巳聖人恐以死傷生故立三年之中制使賢者俯而就之則不肖者亦當企而及宰我亦非故欲薄其親直是自以心度之謂期年其哀巳盡故欲短喪此問與井有人章同皆是實有所疑而問古人居喪𥘉死水漿不入口三日杖而後能起三日而殯然後食粥不食菜果居倚廬寢苫枕塊不脫絰帶朝夕哭泣無時三月而葬疏食水飲不食菜果方卒無時之哭而朝夕哭期而小祥始食菜果再期而大祥中月而禫禫祭後方飲醴酒食乾肉復寢醴酒薄酒也乾肉滋味薄者也復寢入室中卧惟其禮如此其至故宰我疑以為如此一年哀戚已盡非謂如今日丗俗居喪今丗居喪與平常無異未滿三年也不見哀戚若服喪十年亦於事無相妨君子尚勇章此章君子子路問及孔子答以上義皆以德言下與小人對者乃以位言義理之勇君子之勇血氣之勇小人之勇子路平日好勇恐勇全是不好故有此問年四十見惡章學者須是於少年氣血充精神全之時勇於為學乃能有成至於四十當立功業古人四十曰強而仕孔子四十而不或孟子四十不動心此時正當從政治人之時若身不修如何治得人於四十德不成無可取者而又且見惡於人則不復成人矣人才年髙則神氣漸昏記性亦退精力不及故不能成德若壯年學有所得了則雖老亦當溫習舊聞而求新得不可恃此說年髙便不可學或壯年皆未及學於四十餘乃發憤好學亦不妨亦能有所見所謂朝聞道夕死可矣聖人此言只是教人及早學耳微子第十八微子章殷紂無道有敗亡之徴微子帝乙之元子知殷必至於滅亡恐遂絶其宗祀且始者箕子有勸帝乙立微子之事必為紂所疑紂惡之極必殺微子故箕子曰我舊云刻子於是遜于荒野意謂既不致其君有殺兄之惡若不幸而殷亡身在或可承其祭祀比干為少師以謂君有過臣當盡死以諌於是極諌紂怒之剖其心箕子為父師其諌固與比干同而紂偶未殺而囚之見比千諌而死欲極諌之恐復𬒳殺而稔君之惡於是佯狂而為奴微子欲免君殺兄之惡為愛其君以存宗祀為愛其親仁也比干殺身以盡其職為愛其君亦仁也箕子恐陷君於多殺諌臣之罪亦仁也三人用心處事雖不同皆是欲全乎心之德盡乎愛之理長沮章而誰以之以猶與也丘不與之與作用字意以亦用也是與以二字可通互說滔滔者天下皆是也而誰以易之譏孔子且而與至士哉譏子路荷蓧章人之大倫有五而君臣主於義今不仕則為無君臣義荷蓧使二子以禮見子路則是既知長幼之節不可廢也君臣之義何可廢之此兩句最下也字之字相應蓋人倫君臣為大長幼在下既知其次豈可棄其大者今欲自潔其身而亂君臣之大倫君子之所以仕者正欲行君臣之義尓當今天下道不可行我巳知之然不肯終隱者恐絶君臣大倫之義也二義字一般重道總五常而言義其一也道指天下衆人言義言自已也今日道不能使天下由之我固知之我之所欲行者在我之義尓我不仕則失我之義矣此章舊點似細章旨若䀲今但以長幼之節不可廢也作一讀君臣之義如之何其廢之作一句欲潔其身而亂大倫作一句便覺意明集注性命之情孟子所謂四端出於性命之正者也決裂此情則所用者皆發於人欲之私情也逸民章伯夷之父欲立叔齊即堅讓而逃其志在於尊父命果得遂其心是伯夷不降其志處叔齊守嫡庶之常法其志在欲明尊卑之分果逃而不立是叔齊不降其志處以武王伐紂為非諌之不從遂不食周粟而死是夷齊不辱其身處此六人之德伯夷叔齊為最虞仲夷逸次之柳下惠少連又次之前言七人後止六人不見言朱張者或是朱張之德無可稱或是失簡皆不可曉大師摯章亞次也飯食之也古者天子一日四飯魯用天子禮樂其君必一日亦四飯所謂亞三四飯乃於此飯時主作樂侑食之官也不言𥘉飯者或主𥘉飯之官不他適也子張第十九士見危章此為士之大節然論士之全體如孔子言行己有恥之類不止於此而子張言可已矣似乎大快故集注云一有不至則餘無足觀又言庶乎其可皆有未足意問交章子夏之言太峻似不能容物然下學者可以為法子張之言太寬謂於人何所不容必成德方可德未成而不擇友恐有友不如己者之失德已成而不容人則有沮向善之心但拒字大峻何所不容大寬學者之始終皆所當戒博學章博學篤志切問近思自是四事然博學而又須篤志於道志不篤則博學為泛濫問巳切又須就近而思不就近而思則所問者不能以三隅反又一意博學又須切問篤志又須近思百工居肆章此章有兩意百工居肆方能成其事君子學方能致其道又百工居肆須是成其事君子學須是致其道大德小德章大小精粗無一不合於理方可謂之君子小德出入可也是子夏不求備於人然一向以小德為輕事則不矜細行終纍大德矣故吳氏云有弊子夏門人章古人教人只就事上教不但似今日懸空說就事上教故著實而德易成若懸空說得千言萬語至臨事時竟做不去小學灑掃應對事也大學正心修身之類亦事也大小事皆有至理存焉只隨事窮理然事有大小學問有深淺教者須循序漸進不可躐等子游謂子夏門人之小子但教之下學之事而不教大學之事子夏氣質篤實其教人亦皆務實故其言曰君子教人之道以何者為先而傳之何者為後而不傳事之大小亦如草木以類而分别其大小瞭然在目前學之淺者但可教他行下學事學之深者則可教以向上事若學而未有見識驟把大學事教它曉不得行不得乃是誣罔他而已君子教人之道豈可誣罔若曰小大事徹頭徹尾無不曲盡惟聖人能之理於天下之事無所不在故學者皆當循序而學之不可貪慕髙逺而忽淺近如於近者淺者不先務則雖有得於髙逺而有虛空斷絶之處於理之全體有虧矣故君子必循序而不可躐等也讀此章者頗易失㫖但見言游過矣四字便謂子游之言全非蓋子游但言門人雖知灑掃之末不即舉大學之本以教之子夏則言教之當有序子游未嘗譏子夏教灑掃之非而子夏亦未嘗言不教以大學也集注以威儀容節與正心誠意對言則末專就事說本主就心說蓋大學行之之目有八而誠意正心為本誠意正心固非小子所可進此即是先就事上令知其所當然而為之未能使之知其所以然也此古人之學所以實而先後次序自不可踰集注如此襯貼說可謂極精而二子之意皆粲然可見前假本注分經文本末字謂本大學之事末小學之事本注第二假兩本末字及圈外愚按下四本末字皆是以大學小學言但程子第四條兩本末却是以理為本事為末是其然末也所以然本也讀者試思之始終本末一以貫之始終是釋始卒本末是關前本末字謂聖人應事本末兼該前後如一非學者可到也程子後四條大率明事理二字灑掃應對是事形而上者是理慎獨則將應事之際存此理也精義入神只是明理之極此固是聖賢之能然灑掃應對之中其理之極處則亦至精之義也故曰雖灑掃應對只看所以然如何自灑掃應對上便可到聖人事言從此事做將上去直可到聖人事此條全以事言正是本文本末兩字灑掃應對末也聖人事本也非謂末至在此也十六字作一貫讀陽膚章帝王長民之道不過養之教之治之而已養之如分井受田使之帛食肉者有制教之如古者大學小學教人之道及鄉黨州閭讀法之類治之則有禁令刑罰且上之人以德導之以禮齊之則民皆知趍善避惡尊君親上之道而其父子夫婦長幼朋友之間亦皆有親比協和之意故曰民聚上之人反此則民散矣周德既衰皆失前三者之道民陷於罪而不知此皆上人之過無養則飢寒迫身不教則不知禮義不知禮義之人而有飢寒之迫則無所不為矣故君子為政惟當哀矜不可以聽訟為能而自喜子禽章集注大可為化不可為此是說聖人不可及處非謂夫子自大至於化也所以下面著故曰字堯曰第二十堯曰章堯伊祁氏帝摯之弟年十五封為唐侯年十六踐天子之位居位七十載欲遜位于有德於是四嶽舉舜命之為百揆此時洪水九年舜即舉禹平水土堯七十三載巳八十九歲薦舜于天使攝天子之事而命之曰允執其中一百載堯乃殂落堯在位共一百年夀一百十六歲舜姓姚氏虞國名瞽瞍之子年三十歲四嶽薦之於堯為百揆三十三歲攝天子事年六十而堯崩服三年之喪至六十三即天子位命禹為百揆三十二歲舜年巳九十四歲薦禹于天攝天子事命之曰人心惟危道心惟微惟精惟一允執厥中人心者耳目口鼻四肢之於聲色臭味安逸是也為流於欲故危道心者惻隱羞惡辭讓是非之端是也為欲所昏故微精則欲察其人心道心之異一則惟守道心而不移此乃允執其中之法也故曰舜亦以命禹舜在天子位四十八載而崩與居攝共七十八年一百十歲禹姓姒氏崇國君鯀之子舜舉之於堯平水土為司空三十二年而為百揆又三十二年而攝天子之事又十七年而舜崩服三年之喪而即天子位在位八年前後八十九年興滅國謂國巳滅而再立其國繼絶丗謂國維存而君亡為之立君五美章因民之所利如鑿井而飲耕田而食不違耕種之時使之衣食足恩惠自然及之不至廢其財擇可勞而勞如四時搜狩捕逐盜賊皆是因民之事以道使之何怨之有凡人欲必至於貪財貪利若欲行仁便可以得仁非是貪無衆寡小大不敢慢但循理而行出於自然則是泰而非驕正衣冠尊瞻視不色莊人自然畏之但不可使人不可近如此不至於猛上人能教之不至於犯法則可不教之而至於犯法却刑之則是殃民凡斂賦稅起役之類當先出號令限定幾時期民自然去辦集號令不豫及期却便逼迫則害其民三者皆是急迫之惡出納吝是悠緩之惡上三惡重下一惡輕不知命章有天理之命有氣數之命天理之命人得之以為性者也氣數之命人得之以為生死夀夭貧富貴賤者也此章命字蓋兼二者而言知氣數之命則利不必趨害不必避知天理之命則利不可趨害不可避讀論語叢說卷下
