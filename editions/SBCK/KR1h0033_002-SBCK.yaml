  text: 讀中庸叢􅀃上
  hash: sha256:dfe34bf6c27ab61e18f12ebd40ed5fbb3c96c920bf90c871071a5a2c056a3aa1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0033_SBCK_002-1a}
body:
  text: 東陽許謙序中庸專言道故起首便言道學道統道學主於學兼上下言之道統主於行獨以有位者言之至孔子之生他無聖人在位則道統自在孔子凡言統者學亦在其中學字固可包統字上古聖神継天立極而道統之傳有自來矣此是言堯舜以前夫子翼易始於伏羲今之言聖人者必自伏羲始然自開闢生物以來即有首出庶物之聖人與天同道而立乎其位者但前聖所未道故不知其名此但言上古聖神盖混言之又不如大學章句序專以伏羲爲始也聖人大率有兩等有自然之聖生知安行所謂性者也有學而成之聖積而至於大而化之所謂反之者也此不言聖人而言聖神是指性之自然神明不測之聖也此言上古創始有位道與天合之聖人言動皆可爲天下法則者爲道統之始下此皆是接傳其統者継立二字不要重看天道流行無物不在衆人所不能知惟神聖自然與天合而言動皆可爲萬丗標凖非是有意継續天道特爲人而立法也論語尭曰咨爾舜至天禄永終王文憲以爲舜典脫簡當在舜讓于德弗嗣之下此正傳心之要也理與氣合而生人心爲一身之主宰又理氣之㑹而能知覺者也人心發於氣如耳目口鼻四肢之欲是也然此亦是人身之所必有但有發之正不正尓非全不善故但云危謂易流入於不善而没其善也道心發於理如惻􅀮羞惡辭遜是非之端是也亦存乎氣之中爲人心之危者晦之故微而難見心只是一於心上加人字道字看便見不同􅀂只順讀人心道心字却似有二心矣謂之道則是天理之公謂之人則是我身之私雖我身之私亦非全是不善因身之所欲者發而正即合乎道而爲道心之用矣如郷黨所言飲食衣服之􅀋皆人心之發在聖人則全是道心君子於毎事皆合乎理義則亦無非道心也大抵人心可善可惡道心全善而無惡朱子書傳曰心者人之知􅁴主於中而應於外者也指其發於形氣者而言則謂之人心指其發於義理者而言則謂之道心人心易私而難公故危道心難明而易昧故微惟能精以察之而不雜形氣之私一以守之而純乎義理之正道心常爲之主而人心聽命焉則危者安微者著動靜云爲自無過不及之差而信能執其中矣大㫖皆同而傳注與作文之体自不同故此語尤簡㓗易看人心是所欲爲之事道心是發應事之理人心聽命於道心只是事皆順理危者旣安則便是道微只是隱微之意故難見今添妙字是貼襯微字􅀃不必重看精則察夫二者之間是察人心道心之間要察到疑似纎毫之際此言心是指動處當時告大禹故言如此􅀂學者則用格物致知之功辨别衆理明至善審然後可精其動處也私字就形氣上來善旣見此形氣而成人則此人爲一人之私故必欲得於外以濟乎已所以易流於欲下當與公字對却用正字者謂性命之正則是得之於天者固與天地人物同言正則公意自在其中而正字於已切継往聖開來學此學字應前道斈字前道學是緫包上古以來相傳者此斈字是夫子教後人者言継往聖是明夫子敎人亦是述上古聖聖相傳者耳則子思所憂者豈專指夫子之敎哉更迭交互推演紬繹切言深要詳言周備憂深爲道之不明也故言之深而要慮逺恐乆而復失也故􅀃之周而備天命即道也能率性即道心也擇善者察之精也固執者守之一也時中即中也惟君子爲能執之也綱維言道体之大緼奥言節目之詳及精宻隱微之理明言綱維盡言緼奥孟子推明此書謂見之行事及著七篇上言異端下言老佛是異端至多揚朱墨翟許行之徒以及諸子百家各立門户議論不合聖道者皆是爲其弥近理所以大亂眞盖其􅀃宏逺幽微陳􅀃道德指明心性或有􅀋乎吾道之言故爲所亂非如百家之淺近易見也然而道德非聖賢所言之道德心性非聖賢所指之心性固亦不難辨也儻無中庸之書則吾道反晦而不明學者莫知所從又焉得辨之乎裳之要衣之領皆是緫㑹處章句輯畧或問三書旣備然後中庸之書如支體之分骨節之解而脉絡却相貫穿通透中庸一書分爲四大章如第一章十二章二十一章皆言其畧而餘章継其後者皆詳言之三十三章又一章之詳者詳畧謂此巨謂綱維細謂緼奥諸􅀃同異以下專言或問中庸中庸大學二書與論孟二書不同論孟或聖賢自立言教人或隨問而答或記聖賢出處動静日用皆是一條一件各見意趣庸學皆成片文字首尾備具故讀者尤難然二書規模又有不同大斈是言斈中庸是言道大斈綱目相維經傳明整猶可㝷求中庸賛道之極有就天言者有就聖人言者有就斈者言者廣大精微開闔変化髙下兼包巨細畢舉故尤不易窮究中庸德行之至極夫子甞言之故子思取以名篇觧題偏則不在中而在一邊􅀝則斜迤而不正過是越過於中不及是未至於中不偏不􅀝是竪􅀃中字指未發之体而言無過不及是横􅀃中字指已發之用而言此皆是反􅀃以四旁影出中字平如地之平而無杌􅥳危處常者一定之理無詭異又常乆而不可變易惟其平正便可長乆竒異險怪便不可長乆平横􅀃常竪􅀃此是正解庸字緫而言之惟中故可庸中而又須可庸乃中庸之道程子謂不偏之謂中固兼㪯動静朱子不偏不􅀝則專指未發者譬如置物不偏者在四方之正中不略近東西南北之一邊不􅀝者非傾􅀝於一邊而不正以心體而言不偏者渾然中正而無頗不􅀝者不著於喜怒哀樂之一事雖皆指未發而言然自有兩意不偏指其体之本然不􅀝指其用之未發常字該前後自前而言則常定而無異自後而言則常乆而不易不偏不易兩句是中庸之訓話正道定理两句是釋中庸之義始言一理者首率是也約而言之首三句是也又約而言之天命之謂性一句是也末合爲一理者末章是也約而言之不顯惟德以下是也究其極言之上天之載無聲無臭二語是也首章首三句言性道教之名義緫人物言之而主於人率性之謂道一句該上句而貫下句故篇中皆是􅀃道而性教在其中盖氣化流行不息者天之道也是理也人得天道之流行者爲性當順此而行者人之道也所謂率性也亦是理也然率性惟聖人爲能之聖人之治已則盡已之性接人用物則盡人物之性以衆人當率之而不能以失其生之本故以己之安行者品節之以爲教使各知治已接人用物之道處之旣各得其宜則人與物莫不各得遂其性矣如此則雖開􅀃名義而朱甞不貫穿爲一也自道也者至篇終皆是明人當行之道而教其進之之方也首三句是緫􅀃人物第三句脩道固是人上意思多然聖人脩處亦和物都脩了物雖不可敎是敎人處物之道如春田不圍澤不殺胎不殀夭草木黃落斧斤入山林魚不滿尺不粥之􅀋皆是順物之性而成就之不逆生意之意如馬絡頭牛穿鼻亦是也殀於表反夭烏老反性即理也在天地事物間爲理天賦於人物爲命人物得之以生爲性只是一物所爲地頭不同故其名不同理存於心故不可須􅁷離不可者有賛其不能離之之意有戒其勿離之之意不睹不聞己之不睹不聞也獨者人之不睹不聞也道不可須􅁷離可離非道與莫見乎隱莫顯乎微對􅀃此言其定体如此戒愼恐懼與愼獨對􅀃此言脩之之方前一節是操存即致中之事後一節是省察即致和之事戒懼不睹不聞謂但於不接物不當思慮時常敬以存其心究其極則至於無所睹聞之際亦當戒懼工夫至此而極宻非謂止於不睹不聞時用功㝷常只恁悠悠過故章句謂常存敬畏雖不見聞亦不敢忽玩常字雖字亦字可見盖戒懼愼獨兩事包括定心之動静故凡非有所主之思慮及接物時皆在戒懼界限裏如此看然後與不可須􅁷離一句意脉相接續經中於不睹上用戒愼字不聞上用恐懼字雖是分􅀃其實合􅀃蓋不睹不聞只是無聲色無可見聞處非有兩端故章句緫用敬畏字以敬字體戒愼畏字体恐懼下又緫言雖不見聞亦不敢忽只是兼舉互見今且先當分戒懼與愼獨兩項界限蓋愼獨是就裏面􅀃出戒懼是就外面􅀃入但起念頭處便是愼獨境界無所思而有所睹聞自外來者皆属戒懼境界獨是心欲應事見聞是事來動心界限亦甚分曉不睹不聞是就極處􅀃章句用常存字雖字亦字皆是􅀘貼起此意蓋心意不動之時自有睹聞至於無所睹聞皆當敬畏然至於不睹不聞之地則敬畏之工夫尤難但用意則属已發矣愚甞妄爲之􅀃曰當此之時此心當無物而有主然又要看得眞㑹得活􅀂著箇物字主字而欲無之有之則又大不可矣以此體之而實存之乆當自見言愈多則愈爲病矣或問戒愼恐懼工夫如此與不思善惡及致虚静篤之􅀃何以異曰冰炭不相入也彼學專務於靜吾道動静不違彼以静定爲功惟恐物來動心故一切截断然後有斍聖人之斈事來即應事去則静應事時旣無不敬至無所睹聞時亦敬以存之自然虚静惟虚静故愈靈明而發以應事無不當雖無睹聞􅀂有當思固思之無害但所思者正爾非以静爲功而置心如牆壁也諸書不曽言戒懼工夫惟中庸言之蓋子思自性上􅀃來斈者欲体道以全性􅀂無此工夫則心未發時可在道之外邪天者理之所出心者理之所存心知即理動理動即天知故有萌於心則著見明顯莫大乎此豈必待人知之乎中庸愼獨兼大學兩愼獨意大學愼獨是誠意地頭故先專主於心而後乃兼於身中庸前旣言戒懼工夫故愼獨兼外􅀃章句謂隱是暗處又曰幽暗之中此兼内外言之細事非是小事是事之未著者二者皆是人所未見聞者亦只是母自欺之意致中和是戒懼愼獨推行積累至乎極處則有天地位萬物育之效驗致中是逼向裏極底致和是推向外盡頭位育以有位者言之固易曉􅀂以無位者言之則一身一家皆各有天地萬物以一身言􅀂心正氣順則自然睟靣盎背動容周旋中理是位育也以一家言以孝感而父母安以慈化而子孫順以弟友接而兄弟和以敬處而夫婦正以寛御而奴僕盡其職及一家之事莫不當理皆育位也但不如有位者所感大而全尔此章首言性道敎之義次又言性情之則而兩節工夫止是戒懼愼獨兩端致則極乎此二者也致中是戒懼而守其未發之大本所以養天命之性致和是愼獨而精其中節之逹道所以全率性之道前後只是性道兩句工夫而敎在其中其用功處只有戒愼恐懼愼致六字而已此書以中庸名篇而第一章乃無中庸字未發之中非中庸之謂也盖率性之謂道一句即中庸也此句緫言人物是􅀃自然能如此者在人則惟聖人能之是中庸也􅀂衆人則敎之使率其性期至於中庸也章句天以隂陽五行化生萬物氣以成形而理亦賦焉盖人物之生雖皆出於天理而氣有通塞之不同則隨所遇有生人物之異氣通者爲人而得人之理氣塞者爲物亦得物之理雖曰有理然後有氣然生物之時其氣至而後理有所寓氣是載理之具也故章句先言氣以成形後言理亦賦焉天生人物是氣也而理即在其中理主乎氣氣載乎理二者未甞可離故本文天命之性雖專言理而章句必須兼氣􅀃􅀂不言氣以成形一句則理著在何處安有所謂人物蓋言氣則有善有惡言理則全善無惡故子思專舉理以曉人謂此理具於心者謂之性即道心也率者循此而巳脩者品節此而已學者學此而已自可欲之善進而至於大而化之全此而已章句云天以隂陽五行化生萬物是緫􅀃却分言氣以成形理亦賦焉兩句下猶命令也一句獨接理亦賦焉􅀃於是人物之生以下却是專􅀃理以釋性字盖􅀂不兼氣來􅀃則敎字􅀃不去旣全是理則人無不善又何須敎動静開闢往來屈伸只是兩端而已故古之聖人定隂陽之名然消者不能遽長暑必不能遽寒皆有其漸故又定五行之名五行之名旣立則見得造化或相生以循環或相制以成物錯綜氣禀或異應上氣以成形􅀃此其所以聖人立敎也人物所當行者固人物各率性之道然唯聖人能盡已之性而盡人物之性故可品節之以己之所能者使人能之以物之所當然者使人用之人之所以爲人一句代天命之謂性一句盖言性則人物之所共者此叚言人只就人性上􅀃中庸是敎人全性之書故也人全其性亦只是盡爲人之道而已天地萬物本吾一体章句前面皆言理言性到此乃言体字盖理性無形恐難体認此則就實處言之包下心氣二字父母之於子同体而分形天地乃吾之大父母而吾之身本大父母之遺体惟其一体也故吾心可感天地之心吾氣可感天地之氣而其效驗如此但致和主於行事中節而言不但在我身之氣順萬物便能育也與上心正即能感天心之意頗不盡同此言當細体認盖萬物育不專在黙然感應須要所以處物之道施於政事者得其宜則是事雖在外乃我在内之氣得以逹之須著如此轉一轉看兩箇一体字意不同二章語録君子而時中與易傳中重於正正者未必中之意同如君子而時中則是中無不正􅀂君子有時而不中即正未必中此􅀃極好比並体認小人反中庸小人而無忌憚平時旣有小人之心而臨事爲惡又無所忌憚縱意而行反字是用力字謂他故意反中庸之道行之盖此小人非但是愚者而已章句曰隨時以處中又曰中隨時而在此隨時字含兩意謂君子毎應事之時各隨其事以處乎中是一日之間事事皆處乎中也又同此一事今日應之如此爲中他日應之乃如彼爲中是一事各於時宜不同者處乎中也章句二又字是眼目章句上旣言隨時處中矣下却言戒謹恐懼而無時不中時中當是愼獨事而言如此似有可疑今詳朱子意盖以本文但言君子中庸未見有專指用處意且安有無体之用故復如前解題而全舉曰不偏不􅀝無過不及而平常之理是則所謂君子中庸者体用兼全動静一貫者也故下文先言以其有君子之德而又能隨時處中以德字貼襯在君子字上其下却云戒謹恐懼而無時不中戒懼是言平日存中之体應上德字而無時不中則發處皆中庸矣君子而時中時字當用力看便見意中庸一篇凡七章有中庸字餘六章皆與此不同故於此章全解次章則曰過則失中不及則未至是從用上􅀃以三章爲例則後章從可知八章又曰行之無過不及二十七章曰不使過不及可見與此君子中庸一語不可同論三章論語言中庸之爲德也其至矣乎民鮮久矣此章上無德字下有能字此能字即所謂德也但論語言中庸之德此言中庸之道四章道不行不明非是人不行之不明之是言道自不行於天下不明於天下謂大道窒而晦也知賢者之過當作兩層意看大率道者極乎中而已兩道字便是中所謂過者過乎中也禀氣清而淳者則爲聖人知之至行之及自合乎中禀偏於清者則爲知知者唯務於知旣不以行爲事則所知愈至髙逺而過中矣禀偏於淳者則爲賢賢者唯篤於行旣不求知其至則所行必至激切而過中矣此止就正理上看􅀂知者如老釋之空寂賢者如沮溺之逺道又如下索􅀮行怪之􅀋是又非正道而過於中者須作兩意看方盡得知賢過中之義愚不肖之不及却只是一般道不行者知之過與不及道不明者行之過與不及是固然矣然下乃結之曰人莫不飲食也鮮能知味也是又緫於知盖二者皆欠眞知尓􅀂眞知理義之極至則賢者固無過智者亦必篤於行不徒知之而已矣不足知不足行正言知賢者之心盖是他心唯通這一路更不管那一路五章前章主於知此章主於行盖知然後能行旣知之又須能行故此二章發明次第如此金先生曰第二章以來小人反中庸民鮮中庸之乆賢智過中庸愚不肖不及中庸緫嘆曰道其不行矣夫故自六章以後開示擇道中庸之方在智仁勇三逹德六章好問是有疑而問於下如臣如民下至蒭蕘無不詢之察迩言是於所問而對者及下人之言凡逹於上者雖淺近必詳察其理古者民俗歌謡必採之以􅀚民風亦察迩言之􅀋舜固聦明􅐶智而不自用故好問察迩擇善而用其中此所以愈成知之大聖德固是如此然或有見聞所不及必須問而知者民事幽隱因蒭蕘之言而聞者則亦揚善用中故必兼此兩意看執兩端而用中謂衆人所言於此一事雖同於善然却有處之厚薄不同却將已之􅁠度在心者度而取其中或在厚或在薄必合於此事之宜者行之章句廣大謂􅀮惡而不宣光明謂揚善而不匿言惡者掩覆涵容足見其量之廣大言善者播告發揚足見其心之光明􅁠度精切舜本然之智也又好問察迩欲周天下之細故也此其所以爲智之大也歟七章其義在於不能期月守中庸以起下章之能守意不在􅅈擭䧟穽以不知意承上章之知以不能守中庸起下意之能守八章擇字兼知行惟知之明乃能擇旣擇即見之行事所以下面只􅀃守不再􅀃行擇是當應事之時守是事過之後常守在復遇此事又如此應皆合中庸服膺是守也弗失又覆􅀃守之固也舜知是全体之知顔仁是毎事之仁凡已擇乎中庸者固仁矣而應天下之事猶擇之未全也毎得一善則服膺弗失守之者固日新其德則漸可全也三月之違可見此意人之於道不過知行兩事耳知者智也行者仁也四章旣言道之不行不明然所謂愚不肖者固易見不足論惟智者知之過而不務行賢者行之過而不求知所以至於中庸者鮮賢者之過如柳下惠之和伯夷之清未及孔子之時智者之過如曽晳之言髙而行不掩者近之矣故六章言舜之智而謂􅀮惡揚善執兩端而用中是行之意重此舜不專於知而道所以行矣八章言顔子之仁而曰擇乎中庸是知之意重此顔子不專於行而道所以明矣九章七章能擇中庸而不能守是知其理而行未至此章能爲三者而不能中庸是能行所難而知未至者故此二章處於知仁之後而下接言勇之前盖謂知仁皆當勇也七八九章皆言中庸而意不同上兩擇乎中庸毎事上言中庸不可能全体上言義精是知之極仁熟是行之􅁉是就應此事之前說無一毫之私是就應此事時􅀃件件如此則全乎中庸矣十章子思引夫子告子路當強之目以合舜知顔淵仁爲三逹德之事非子路之所已能者子路好勇是子路生質本剛事皆勇爲至此盖亦未知勇之所當務者故以爲問南方之強雖君子之強然亦未是中庸不及於強者北方是過於強者君子則爲後四者之強上君子字輕下君子字重君子之道中而止南方之強不及中北方之強過於中固皆未至然上言君子居之則比強者居之者爲勝之矣不及者勉強至中頗易過者矯揉至中尤難兩君子字雖不同然言君子四強哉終是接著君子􅀃南陽方北隂方陽舒散而隂收歛舒散便和柔收歛便剛勁此盖大約言風氣之偏則風俗隨異其實南人豈盡柔弱亦有剛勁者北人豈盡剛勁亦有柔弱者然寛柔以敎不報無道是言柔之甚而善者祍金革死而不厭是言剛之甚而過者章内兩而強不同前是汝之所當強者後而字是承上句虚字兩君子亦不同君子居之輕如善人長者之􅀋故君子重是全德之人四強矯上兩節言守身應事之常下兩節言出處至極之変下兩節雖尤難然上兩節常貫在其中國有道必出而仕人於未逹其所守者正而堅旣逹之後接物廣應変多或有易其守者國無道固不可出能守之至死略不易其志如夷斉餓死而無怨者方是強之至君子或出或處必當合於中庸者如此四強哉矯雖是言勇而合中庸之体叚而不流不􅀝不変正是立則防弊以敎斈者處有道無道只言國之治亂有道乃可仕之時無道無可出之理君子之出也固當合乎中庸然此却只言出以後事盖君子平日自脩須有能守之節上之人亦爲其有所守故用之及旣仕則必堅守平昔所守者可也今乃不能守其前志不爲富貴所淫則爲事物所汩尓爲所汩者知未盡爲所淫者仁未至皆是不能勇以全夫知仁者也故以不変塞爲強􅀂國無道不変平生所守是窮而在下當不可仕之時雖困悴窮蹙不能全其生亦必死而安於天耳推而言之雖已仕者適逢國变而無道則必屹立不移以身殉國􅀂此豈非至強者歟章句含容形容寛之量巽順体倣柔之容皆不可以爲正訓資質旣寛柔其心必愛人所以能誨人之不及􅀂無道之來直受之不思報之者亦以能含容巽順故也上两字以質言下兩字以接物言祍金革死而不厭却只是一意言以含忍之力勝人爲強善斡旋􅀃中庸之道知固在前然行之及方是曰非有以自勝人欲之私仍舊是􅀃仁重十一章索隱是求人之所不必知行怪是行人之所不必行索隱知者之過行怪賢者之過此不能擇乎中庸者聖人不爲也或有雖不索􅀮行怪而能擇中庸然行之止於半塗而不力以求至是不能守者聖人自不能止必行至於終也是以君子常不違乎中庸則不爲􅀮怪可知由仁義行雖終身不見知於丗亦未甞有所悔艾不半塗而廢也豈非聖人之事乎孔子前旣有兩吾字以身任之故下文謙不肯當但曰唯聖者能之其實依乎中庸即夫子之弗爲者遯丗不見知而不悔即夫子弗能巳者雖欲避聖人之名自有不可得者上兩節各有吾字第二節乃言聖者能之雖聖人不肯自居然曰兩君子之道無異前後夫婦前後天地字皆不同夫婦知能只是衣食起居日用之常皆道之費造端夫婦是言夫婦暗室幽微之處亦道之費天地有憾是言天地之偏反形容道之全察乎天地是指天地之大正發明道之廣盖此章以君子之道費而􅀮一語發端夫婦聖人於人上見道之費鳶飛魚躍於物上見道之費下又再提起道字而言造端是就夫婦知能處舉其至􅀮微者明道之至近又言天地是就鳶之上魚之下推極以明道之至逺此章不言工夫只是言費造端只如爲始兩字不可作工夫看聖人不能知行非就一事上􅀃是就萬事上􅀃如孔子不如農圃及百工技藝瑣細之事聖人豈盡知盡能􅀂君子之所當務者則聖人必知得徹行得極大小二字接道而言天地之大人猶有憾者爲功不能全也君子之語大小而莫能載破者爲道無不在也天地對大小猶有憾對莫能載破金先生曰物有限量則可載道無限量故莫能載物有罅􅂩則可破道無罅􅂩故莫能破鳶飛魚躍大槩言上天下地道無不在偶借詩兩語以明之其義不專在於鳶魚也􅀚此則囿于兩間者飛潜動植何所往而非道之著且蒼然在上塊焉在下者又庸非道之著乎則人於日用之間雖欲離道有不可得者其可造次顚沛之頃不用功於此哉此章專明道充滿天地萬物之間使學者体認欲其灼然如見皆不言功夫然旣知自吾身之小以極天地之大萬物之微無非是道則道不可離當体之而不可少有間断明矣中庸三大章前章言中庸此章言費􅀮後章言誠中庸者道之用於萬物無所不在其体固􅀮是亦費而􅀮也但中庸是就人事上言道之用費􅀮是就天地人物上言道之用盖先言中和見道之統攝於人心次言中庸見道之著見於事物此言費􅀮見道之充塞天地後言誠則見聖人與天地爲一中和以戒懼愼獨爲存養省察之功中庸則以知仁勇爲入德之門費􅀮則於諸章雜言其大者小者欲人隨處致察以全中庸之用皆所以求至於誠也章句近自逺而四字中間包盡事物之無窮此是解及其至三字是就始終兩端􅀃体之微指理性言舉全体指道之全体言二体字不同家語􅀚周篇孔子謂南宫敬叔曰吾聞老聃博古知今通礼樂之原明道德之歸則吾師也今將往矣敬叔與俱至周問礼於老聃斈樂於萇弘歴郊社之所考明堂之則察廟朝之度於是喟然曰吾乃今知周公之聖與周之所以王也史記孔子丗家亦載其事老聃爲周柱下史明習典礼故往問之春秋左氏傳昭十七年郯子來朝昭子問曰少皡氏鳥名官何故也郯子曰我髙祖少皡摯之立也鳯鳥適至故紀於鳥爲鳥師而鳥名鳯鳥氏歴正也玄鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徙也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五雉爲五工正九扈爲九農正仲尼聞之見於郯子而斈之旣而告人曰吾聞之天子失官斈在四夷猶信聖人不能孔子不得位堯舜病博施是兩様意思孔子不得位是在天而非己所能堯舜病􅀶施是其􅀔而非力所能二者皆是舉大綱􅀃其實細事末節不出道之用自有聖人不必能者憾只是不足意覆載生成分言天地各有所主固不可全寒暑災祥合言天地氣数之變有不能已者化育流行上下昭著此雖言鳶魚而非獨言鳶魚也正謂道於天地萬物無不在尓活撥撥地此是程子形容子思用鳶魚兩語使人知化育流行如此活潑潑地斈者須眞見得天地萬物皆如此流動充滿活潑潑地略無滯礙之意方可十三章人之爲道而逺人此爲字重猶言行道不可以爲道此爲字輕猶言謂之道睨邪視視所執之柯也視正視視所伐之柯也詩言伐柯者取則不逺子思謂柯有彼此之異尚猶是逺道在人身而不可離又非柯之比故敎者只消就衆人自身所有之道而治之尓行道者不假外求治人者無可外加第三節言行道之方惟在忠恕自此行之則可至中庸之道故曰違道不逺施諸己而不願亦勿施於人推己之恕也然非忠爲本則亦無可推者矣盖忠以心之全体言恕就毎事上言所接之事萬有不同皆自此心而推然應一事時盡己之心推之則心之全体却又只在此故恕非忠無以本忠非恕不能行二者相須缺一不可所以經以施諸己兩句緫言忠恕而章句亦曰施諸己而不願亦勿施於人忠恕之事也施諸己不愿亦勿施於人上就事不善一邊􅀃反而言之己之所願者則必使人亦得之亦當如此推事父事君事兄上三以自訓用字意甚重非語助也盖求責於人者乃道之當然而巳行之乃未至此故欲用以事父君兄先施之際以責人者責之於己使必合乎道之當然則事父也孝事君也忠事兄也弟施之朋友也信我之所行亦􅀂責之於人者矣此節專言自脩以下句爲重亦恕之道也人倫有五夫婦之倫不可自反故不舉下文著庸德庸言兩向関定謂盡人倫不過在庸德庸言之間行與謹字對德毎不足故當勉於行言毎有餘故當謹而不敢盡庸德庸言謂如上四事所以責己欲盡其道者亦不過常道尓但行之難故毎不足則當勉而至言之易故毎有餘不可恣其出􅀂是則言行相顧豈非篤實之君子乎此雖接上四未能而言推而廣之於凡天下之事皆當如是也第一節言脩己第二節言治人第三節脩己治人之方第四節即是恕盖恕是推己上不願勿施是從裏面推出下以事未能却就外面反推入然推而知其未能則於及人必欲其能是又就裏面推出也章句衆人望人此衆人只是天下人所同行所可至公共的道理又以等級言則與聖人相對􅀃正是体貼改而止之意左傳哀公二十七年晋荀瑶帥師伐鄭次于桐丘鄭請救于齊齊師救鄭及留舒違榖七里榖人不知章下謂丘未能一者聖人所不能此只就此章内摘出􅀃費字非是孔子眞不能於此與十二章聖人有所不能意自不同讀者不可一律看下任有大小又當隨所宜而行􅀂有不中其節者皆非也居貧賤亦有所當行之道安分樂天不厭不懾常守不変􅀂有不甘爲之意皆非也凡人非富貴則貧賤此是人之大分至於夷狄患難又是上兩等人或有遇之之時亦各於其中行所當行此所以君子無所往而不自得自得是從容無急迫滯礙而自快足之意此􅀃素位而行也次兩句不陵不援再言不願乎外陵下援上皆願外也吕氏游氏之􅀃已明又如晏平仲一狐裘三十年祀先人豚肩不揜豆難爲下也管敬仲鏤簋朱紘山節藻梲難爲上也亦陵下援上之意皆非中庸也正己不求於人結上二句無怨亦􅀃己無怨旣是正己不求於人則凡事惟恐不自盡亦奚暇見人之不足於我而怨之哉故己有所藴固有當得於外者天不􅂌而無不平於天人不從而不歸罪於人所以君子居易以俟命此句又是戒君子當如此小人行險以徼幸反此一句􅀃以射爲比又引夫子之言證正己不求人之意正鵠見論語射不主皮章十五章此章專言行道必自近始未有目前日用細微處不合道而於逺大之事能合道者也君子之道其理􅀔必當如此故於費隱之後十三章先言脩己治人必恕以行之而謹其庸德庸言次十四章則言正己不求於外此章則言自近及逺是言凡行道皆當如是也引詩本是比喻􅀃然於道中言治家則次序又如此夫婦人倫之首故先言夫婦之道常人處夫婦之間多褻狎不則又太嚴厲二者皆不可也是以古人貴相敬如賔者處夫婦之道和而正則善矣爲琴瑟之聲和而正故以爲比此章首言夫婦兄弟次之家人又次之自内以及外即大斈三引詩之意人能處其家使正而和如此則其能孝而父母之心安樂可知矣章句人能和妻子宜兄弟則父母安樂之和妻子結詩上二句宜兄弟結中二句便言父母順則詩下二句皆言效驗也十六章十五章自費􅀮章造端夫婦語意來此章察乎天地意也齊明二字只就心上􅀃盛服乃􅀃身齊是用功屏其思慮之不齊者而一於所􅀕之􅀑神明是旣齊而心之体明㓗不雜可交於􅀑神也凡􅀕有三曰天神地示人􅀑緫言之亦通謂之􅀑神大率天之神皆陽􅀋也其中亦有陽中之隂如月如五星之金水如雨師之􅀋然終是麗乎天者地之示皆隂􅀋也亦有隂中之陽山林與川澤對則山林陽也原與隰對則原陽也然終是麗乎地者惟􅀕人􅀑則求魂於天求魄於地是合隂陽而􅀕之􅀑雖是隂其中却是合隂陽來格如在上如在左右不是或在上或在左右是言在上又在左右擗塞滿都是􅀑神此是於􅀕祀時見体物不可遺處所以章句言乃其体物不可遺之驗這是就􅀕祀人所易知之􅀑神上指出使人知大􅀑神之德如此神之格思不可度思矧可射思謂神之來格也旣不可測度是有􅀕則􅀑神必臨之矣其可厭怠而不敬乎微者隱不可見聞也顯者理之昭著也此是誠之不可揜覆者也第二節言􅀑神之大者三節主􅀕祀而言􅀑神之小者四節與三節同五節又緫賛􅀑神之德誠即􅀑神之德也􅀑神者隂陽之靈靈字易見靈字便包含著􅀕祀之􅀑神二氣是開􅀃前節是陽後節是隂如春夏是陽秋冬是隂如有二物相磨盪一進一退一氣是合􅀃共是一箇氣來則全來便是陽去則全去便是隂􅀑神於二者之間皆可見都只是這氣在人体認故曰實一物而已視弗見聽弗聞性也体物不可遺情也使人承􅀕祀者功效也前以天地造化二氣一氣言􅀑神是言􅀑神之全是大底􅀑神後所謂承􅀕祀者如天神地示人􅀑及諸小祀亦皆􅀑神却是從全体中指出􅀕祀者是小底􅀑神使人因此識其大者物之終始莫非隂陽合散之所爲隂與陽合爲物之始隂與陽散爲物之終上言氣至而伸爲陽爲神氣反而歸爲隂爲􅀑是就兩頭說此又言隂陽二氣合而生離而死是就中間混同處􅀃隂陽􅀑神無往不在只要人看得活隂陽合散又是隂與陽之氣二者相合生物爲物之始及其乆也此物中之陽氣上􅂛隂氣下降其物即死爲物之終是就一物上􅀃隂陽体物者爲物之体也幹事者爲事之質幹也此倒用之則体字幹字俱是用字礼記􅀕統曰齊之爲言齊也齊不齊以致齊也君子將齊也防其邪物訖其嗜欲耳不聽樂心不苟慮必依於道手足不苟動必依於礼君子之齊也專致其精明之德精明之至然後可以交於神明也此齊明之􅀃也􅀕義宰我曰吾聞􅀑神之名不知其所謂子曰氣也者神之盛也魄也者􅀑之盛也合􅀑與神敎之至也衆生必死死必歸土此之謂􅀑骨肉斃于下隂爲野土隂與䕃同其氣發揚于上爲昭明焄蒿悽愴此百物之精也神之著也注焄謂香臭蒿謂氣烝出貌朱予謂昭明是人死時自有一般光景焄蒿是其氣升騰悽愴是使人慘慄感傷之意因􅀃脩養人死時氣衝突知得焄蒿之意親切謂氣襲人知得悽愴之意分明此百物之精爽也何文定曰此是隂陽乍離之際有此聲氣此是􅀕義所言正意􅀂中庸章句所引乃是借來形容􅀕祀來格洋洋如在之氣象此是感召復伸之氣與􅀕義所指自不同讀者詳之十七章自舜其大孝至子孫保之一節言舜之事實自故大德至必得其壽一節泛言理之必然自故天之生物至覆之一節言善惡之應所必至後引詩又證有德之應如此故以大德者必受命結之舜其大孝也與一句是綱德爲聖人下五句皆孝之目父母全而生之子全而歸之是孝也以身言之也德爲聖人盡己性而盡人物之性是全其心豈非孝之大者爲天子父尊之至矣以天下養養之至矣宗廟饗子孫保雖就舜言之然欲子孫之安富尊榮歴丗之乆皆父母之願人之情也今皆得之則此五者豈非皆孝之大者爲人子者以有德光顯祖父爲榮舜之德則至於聖人爲天子則􅀕祀奉養之礼極其尊有四海則􅀕祀奉養之具極其備宗廟饗之却是就舜身上􅀃昔者舜傳禹禹旣即位祀舜爲宗而又封商均於虞舜封子均於商盖禹改封於虞後有虞思是也虞亦立廟祀舜及其祖父至周武王又封舜後胡公滿於陳則是子孫保之也舜之德至上使祖父如此榮盛綿逺是所謂大孝大德者必得位禄名壽乃理之常然獨孔子有德而不得位禄與壽惟得聖人之名耳此乃氣數之変金先生曰此所謂聖人所不能也然爲教無窮而萬丗享之子孫保之此又大德必得之驗也㘽培傾覆如春至草木有發生之意故天以雨露滋長之秋冬草木有黄落之意天乃以霜雪彫零之此以物言也以人言之有此德者天必以上四者與之無其德者天必棄絶之如大舜以匹夫而有天下桀紂以天子而䘮其身此栽培傾覆之意栽培傾覆言天之於物其理如此實以喻人栽傾屬人培覆屬天栽傾是其材培覆乃篤也如此章大舜之德是栽也得四者是培之也桀紂傾也䘮亡覆之也下引詩皆是因栽而培之章句氣至兩句只是培覆之訓詁不是􅀃盡此節之意可嘉可樂之君子其令善之德顯顯昭著宜於人民故受天之禄而爲天下之主旣受天禄矣而天又保之祐之復申重之其所以反覆眷顧之者如此又重明上文大德必得四者之一節也所引詩是節節􅀃上受禄于天保佑命之自天申之是三節意只是箇感應十八章十八章十九章皆以周事継大舜而言二十章又以孔子継周皆是聖人所行所言見道之費而無不合於中庸者無憂專就國家上􅀃如文王羑里之囚􅀂可憂矣雖聖人無入不自得然亦是一身事父作子述却是言國家事周家上丗節節有憂患自夏君棄稷不務不窋即失其官守逃之西戎至公劉方復遷􅃎大王又爲狄人所侵遷岐雖肇基王迹而身遭憂患矣王季雖勤王家辟國漸廣亦但守舊國而已文王三分天下有其二而猶守諸矦之舊至武王方受命爲王故惟文王用得無憂二字蓋文王上承已大之國已不勞力不逢変故以歸之子適當商家天命未絶之時已得從容其間至承天命著戎衣奄有四海乃是武王事文王都不費力賛武王之言與賛舜意同但此言身不失天下之􅂋名彼言德爲聖人微有輕重亦論韶武之意然此顯名亦聖德也末猶後也終也盖周自大王王季文王累丗積德累功國土已大最後至武王始受天命爲天下君周公乃承之而追王先王如此說末字則與上下文都相貫穿訓末爲老恐未安葢武王之齡古書不一追王三王武王旣滅啇在啇郊已行之礼記大傳曰牧之野武王之大事也旣事而退柴於上帝祈於社設奠於牧室牧野之室遂率天下諸矦執豆籩駿奔走追王大王亶父王季歴文王昌不以卑臨尊也又書武成金縢康誥酒誥諸篇皆可見所謂周公成文武之德只是又推大王王季之意而以天子之礼祀先公也斯礼也以下又是因此以定上下之通礼章句實始翦商見論語泰伯至德章先公組紺以上通鑑前編曰堯封棄於邰丗后稷以服事虞夏及夏之衰不窋失其官自竄戎翟之間不窋生鞠鞠生公劉始迁於􅃎路史謂稷生斄蠒斄蠒生叔均自后稷至公劉十餘丗而漢劉敬傳亦謂后稷十餘丗至公劉按丗本自公劉歴慶節皇僕差弗僞榆公非辟方髙圉侯牟亞圉雲都大公組紺組紺号太公史記作公叔祖􅀋諸盩十有二丗而生古公亶父自稷至亶父葢二十餘丗矣史記以不窋爲后稷子而又缺辟方矦牟雲都諸盩四丗遂謂后稷至文王爲十五丗且稷契同時受封契至湯四百餘年而十四丗稷至文王千餘年而十五丗其亦誤矣今按章句謂組紺爲大王之父据䟽文而言也輯畧曰期之䘮有二正統之期爲祖父母者也有旁親之期爲丗父母叔父母衆子昆弟昆弟之子是也正統之期雖天子諸矦莫敢降旁親之期天子諸矦絶大夫降十九章前章言文武周公此章又言武王周公盖武王有天下然後周公可以制礼二者皆継志述事之大者然章内皆是言礼盖主於周公而言謂制爲宗廟􅀕器􅀕服薦献之礼而於宗廟之中又制昭穆序爵序事酬燕之礼又推爲郊社之礼然􅀕祀一事中推至於極則郊天禘祖乃其至大者非聖人大孝孰能􅀂此此皆費之大此章雖連言武王周公其實主周公而言周公合先王累丗典礼定爲周制中間損益合乎時中又可垂之萬丗其制大備矣此獨指􅀕祀一礼而言􅀕中又只主於宗廟推及郊社尓此皆㪯一端言之於宗廟中自有許多曲折可見道之費推至於吉礼之全其費可知又推至五礼備其費又可知也舜之孝行於一家故只謂之大孝周制礼逹乎天下故曰逹孝饒双峯意亦如此脩廟只是拚埽整飾常使嚴潔之意譬如今人居室整漏拂塵洒埽之􅀋古注脩埽糞也宗廟之礼所以序昭穆含兩義昭穆本是祫祭時太廟設主而有此名宗廟之位由此而立祖宗旣以此爲序則子孫丗丗皆一昭一穆縁上丗次序而定此言序昭穆謂廟中行礼以及燕毛皆用昭穆爲序則此序字主於人而言之意爲多昭穆又不止廟中㝷常尊卑亦皆以此爲序也宗廟之礼一節五事礼意至爲周宻序昭穆旣明同姓之尊卑序爵是合同姓異姓之貴賤盖皆指助􅀕陪位者而言至於序賢則分别群臣之賢否廟中奔走執事必擇德行之優威儀之美趨事之純熟者爲之賢者旣有事則不賢者亦自能勸雖然旣以有事爲榮則事不及之者豈不有耻則又有序爵以安其心執事者旣榮無事有爵而在列者及賤而役於廟中者皆得與旅酬至此賢不賢皆恩礼之所逮然此合同姓異姓而通言至􅀕礼已畢尸旣出異姓之臣皆退獨燕同姓是親親之礼又厚於踈逺者見制礼之意文理宻察恩意周備仁至義盡而文章粲然天子諸矦之􅀕礼已亡雖間有散見於礼中者今不可知其詳矣所存有特牲饋食礼諸候之士之􅀕礼也少牢饋食礼諸矦大夫之􅀕礼也大抵􅀕必立尸必擇賔賔一人衆賔無數衆賔者賔之黨也其位在堂下西階之西􅀕則子姪兄弟皆㑹小宗􅀕則兄弟皆來大宗􅀕則一族皆至兄弟者主人之黨也其位在堂下阼階之東有司羣執事皆北面而立迎尸旣入主人􅀄献主婦亞献賔三献及尸主兄弟各相献酢畢然後行旅酬兄主人酌酒奉尸賔者謂之献尸賔酌以荅主人者謂之酢主人酌酒先自飲再酌以献賔者謂之酬先自飲謂引導之飲也旅衆也主人㪯觯酌酒自西階酬賔主先自飲再酌以進賔受之奠而未飲兄弟弟子㪯觯于長兄弟於阼階弟子者兄弟之後生者也長兄弟者兄弟之最尊者也弟子導飲而長兄弟亦奠而未飲賔取所奠觯於阼階酬長兄弟長兄弟西階前酬賔衆賔及衆兄弟交錯以徧以及執事者無不徧卒飲者實爵于篚此旅酬之大畧也又賔弟子及兄弟弟子各㪯觯於其長亦先自飲如旅酬所謂下爲上也賔取觯酬兄弟之黨長兄弟取觯酬賔之黨亦交錯以徧無次弟之數謂之無筭爵所以逮賤者如此天子􅀕礼亡不可考楚茨之詩曰神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遟諸父兄弟備言燕私箋云祭祀畢歸賔客之俎同姓則留與之燕所以尊賔客親骨肉也䟽尸已出而諸宰及君婦徹去俎豆歸賔客之俎其諸父兄弟留之使皆備具我當與之燕而盡其私恩也天子諸侯大夫皆立始祖廟大夫亦有始封者如三桓之家即慶父叔牙季友爲始祖廟亦百丗不迁士則無始祖廟只是􅀕祖祢而已盖位卑者流澤不能逺而士又無采邑故也章句適士天子之上士即元士也受三命采地五十里視子男二廟􅀕祖祢官師凡有司之長盖中士下士也雖立一廟事祢却於祢廟并􅀕祖顧命序所陳之寳有赤刀大訓弘璧琬琰大玉夷玉天球河圗胤之舞衣大具鼖鼓兊之戈和之弓垂之竹矢章句曰之属則盡包上所陳者在其中􅀛山先生亦曰宗器於􅀕陳之示能守也於顧命陳之示能傳也書注䟽赤刀寳刀赤刀削其刀必有赤處削音􅀏刀之小者大訓三皇五帝之書訓誥亦在焉文武之訓亦曰大訓弘壁大璧琬琰琬圭琰圭也夷常也或以爲東夷之美玉天球雍州所貢之玉磬也河圗伏羲時龍馬􅀒圗出於河胤古國名無衣無者之衣大貝如車渠車渠車罔也謂貝之大如車之罔鼖鼓長八尺兊和古之巧人垂舜時共工舞衣鼖鼓戈弓竹矢皆制作精巧中法度故歴代傳寳之天官庖人凡用禽獸春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鱻羽膳膏羶注䟽用禽獸謂煎和之以献王行與用同膳謂煎和也腒音渠乾雉鱐音搜乾魚鱻與生同魚也羽鴈也膏脂也香牛脂臊犬脂腥雞脂羶羊脂羔豚物生而肥犢麛物成而充腒鱐暵熱而乾魚鴈水涸而性定此八物者得四時之氣尤盛爲人物之弗勝是以用休廢之脂膏煎和之牛属司徒土也雞属宗伯木也犬属司冦金也羊属司馬火也今按四時食物不同而煎和之脂亦異於是見聖人制礼豈惟宏綱大用法天体道至於一食之際莫不盡其曲折其文理宻察如此四時之宜食脂膏之宜用必自有深意注䟽之言未必得之薦其時食章句引周礼一語而以之􅀋两字該之雖是包下三語然如詩獻羔􅀕韭冬薦魚春獻鮪月令孟夏以􅇾甞麥仲夏以雛甞􅁰羞以含桃孟秋登榖甞新仲秋以犬甞麻季秋以大甞稲皆先薦寢廟此􅀋皆是也子姓者子之所生猶言子孫也在外公侯伯子男在内公卿大夫士皆爵也言公矦則諸矦之駿奔走者也卿大夫則朝臣之執事者也宗謂大宗伯小宗伯掌祀事内宗也薦加豆籩外宗之佐王后皆是也内宗王同姓女之有爵者外宗王姑姊妹女之有爵者祝大祝小祝有司則如宫正執燭天府沃盥陳寳器司几筵設筵几司尊彛詔酌辨用鬯人供鬯􅊊人掌祼内宰賛祼獻司徒奉牛牲羞肆司馬羞牲魚授􅀕内饔割亨司樂以其属作樂膳夫徹俎司士賜爵之􅀋凡執事于廟中者皆是肆託歴反亨普庚反􅀕畢而燕今不知其儀亦於楚茨之詩見其大意云皇尸載起神保聿歸然後言諸父兄弟俻言燕私下章曰樂具入奏􅀃者謂􅀕時在廟燕當在寢故􅀕時之樂皆入奏於寢也所謂燕礼其可知之仿佛􅀂此大宗伯以祠春享先王以禴夏享先王以甞秋享先王以烝冬享先主論語專爲禘發其􅀃精中庸汎言􅀕祀其􅀃詳恐非記有詳略讀中庸叢􅀃卷上
