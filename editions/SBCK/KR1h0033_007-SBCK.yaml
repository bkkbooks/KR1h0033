front:
  text: 讀孟子叢􅀃卷上東陽許謙
  hash: sha256:efd00ccbb471ee628dd30e7ece4004e8ac2fc2931782a26a5b5a25e774c605dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0033_SBCK_007-1a}
body:
  text: 梁惠王上首章周烈王五年魏武侯卒公子罃立其元年則烈王六年也通鑑周顯王三十五年當罃之三十七年罃與齊威王㑹于俆州以相王考異謂爲後元年大事記顯王十六年當罃之十八年魏拔趙邯鄲服十二諸矦遂稱王後齊敗魏而齊亦稱王於􅂋王三十五年又書曰齊宣王魏惠王與諸矦㑹于俆州以相王今按􅂋王三十三年當魏惠王三十五年孟子至梁􅀂從通鑑則孟子至梁時魏尚爲矦此章稱之爲王乃他日論集著書之時追書尓當從大事記爲正盖始各王於其國至俆州之㑹則王之號通於天下矣俆音舒相思將反仁專言則包四德孟子與義對言則仁体而義用孟子是專主於義而言盖無仁之本則不能行義然仁義又各有体用朱子訓詁皆兼体用􅀃心之德心之制是体愛之理事之宜是用然仁有專言偏言心之德是專言之仁固全􅀃体愛之理是偏言之仁其中又含体用愛爲用其理則体也或問又推以隂陽言則義体而仁用盖天地間物靜体而動用隂静陽動而仁陽也義隂也故其体用如此王曰何以利吾國至不奪不饜固是發明王何必曰利一語而語意自分兩節王曰何以利吾國至其國危矣言王好利於上則大夫士庶效之而好利於下凡言好利者皆是欲得其分外􅀂唯取什一之賦則非好利矣故君欲分外取於下下亦欲分外取於上如此不已必至攘奪壞乱而國隨以亡則是君始好利終於自亡其國此理􅀔所必至然亦告君之語也萬乗之國至不饜又言好利之弊成弒奪之禍皆下取乎上文侯斯與韓趙分晉即惠王之祖也此其明驗爲君而好利禍害之烈可畏如此一言君好利必亡其國二言好利必下􅆲其上萬乗之國則千乗之家千乗之國則百乗之家此以君十卿禄大槩言之也王畿方千里固可出車萬乗天子之卿受地視矦則方百里方百里不能出車千乗也千乗之國當方三百十六里有畸百乗之家則當方百里矣諸矦卿之采地未必如是之大也讀者不可以辭害意君子利已之心不可有利物之心不可無孟子不言利是專攻人利巳之心絶利巳之心然後可行利物之事然利物乃所以利已也至於不遺親後君則已亦無不利矣但不可假仁義以求利耳沼上章聖贒告人非法語之言則巽與之言故孟子與時君言皆是這機軸前章法語之言此章巽與之言也後多放此此章関鍵全在偕樂獨樂上文王與民同樂夏桀結怨奉巳興亡乃其效也靈䑓之作文王所以候日景占星象望雲物也其下有囿囿中有沼併以遊􅀚爾盖非所謂七十里之囿也七十里之囿所以供四時之田講武事於其中且與民之芻蕘雉兎者共之不容不廣此在郊之外者也靈䑓之囿必近城郭地不可容且無所用其大也文王􅁇体即位本都於岐在位四十六年而遷都於程又三年而遷都於豐於是作靈䑓其時年九十有六明年即薨矣田獵之囿非作靈䑓之意也七十里之囿在岐山之舊都歟故有與民同芻蕘雉兎之常制也麀鹿魚鳥各得其所咸遂其性可見文王之德􅀍萬物都在春風和氣中􅀚兩在字而下文魚鹿云云尤見文王仁及物而物感動處物且如是於人可知鶴與鶴鳴之鶴不同音音涸者禽名在鐸韻音學者㓗白貌在覺韻此章字音學移民章加少加多金先生曰不見其愈少不見其愈多棄甲曵兵戰而􅀒者魚鼈之􅀋天地自生之物長㓜皆得食之雞豚狗􅇾人力畜之故以養老則七十者始食五畒之宅百畒之田周礼地官遂人掌􅀖之野辨其野之土上地中地下地以頒田里上地夫一廛田百畮萊五十畮餘夫亦如之中地夫一廛田百畮萊百畮餘夫亦如之下地大一廛田百畮萊二百畮餘夫亦如之注謂户計一夫一婦而賦之田其一户有数口者餘夫亦受此田也廛城邑之居孟子所云五畮之宅樹之以桑者也萊謂休不耕者也䟽謂餘夫皆有田廛是備後離居之法王制云五十始衰六十非肉不飽七十非帛不煖與此不同或殷周之制異或孟子一時之言偶異大抵年高者衣帛食肉也庠序之教教以人倫也於其常教之中又於孝弟二者重明之而篤之􅀹力也後罪歳應前兩凶字塗有餓莩不知發應前移粟由此而知所移乃民間之粟未足以濟河内之民而先巳病河東之民矣况有餓莩不發猶是吝己之財狗􅇾食人食則必征歛無義而傷民之財矣中兩節敎之以王政則民自足食樂義古者九年耕必有三年之食雖有凶荒不待移粟移民而民自無飢寒近者恱而逺者來矣何患不加多哉下章率獸食人亦此意而極言之也集注兵以鼓進以金退亦大約言之如左傳陳書曰吾聞鼓而已不聞金矣是鼓進金退也按周礼大司馬辨鼓鐸鐲鐃之用中冬教大閱帥其民而致乃陳車徒如戰之陳皆坐鼓人三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行三鼓摝鐸羣吏弊旗車徒皆坐又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨坐作如􅀄鼓戒三闋車三發徒三刺乃鼓退鳴鐃且卻夫鐸大鈴也振鐸者摇鐸也摝鐸者以手掩其上而執以振之其聲鹿鹿然也是鐸兼主進退但其聲有不同爾鐲鉦也形如小鐘以爲鼓節鳴之而車徒行則鐲亦主進也鐃如鈴無舌有秉執而鳴之以止擊鼓故鳴鐃而軍卻退也大抵鐲則進也鐃則退也鐸兼進退也後丗戰陳盖專以金聲退鐲直角反鐃女交反畜訓養當作許六切今敕六反誤安承敎章孔子惡作俑者無後亦因見後丗殺人從葬故爲此言史記秦武公卒􅀄以人從死死者六十六人盖其弟德公立而用以殉之當周􅁵王四年魯莊公之十六年也其後穆公卒遂用殉者百七十七人三良與焉孔子據已見之禍而深惡其始謂爲不仁者事始雖小末流必大不可不謹孟子因取以戒恵王不可輕視其民􅀳國天下莫彊章地方百里而可以王答晋國天下莫彊一語王如施仁政一節是方百里可王之實功彼奪民時正指齊秦楚往而征之一節是洒死之事易猶淺也此金先生􅀃盖耕深門土䟽通而苗易發逹耘淺則但去草而不傷榖根以暇日修其孝弟忠信此與行有餘力則以斈文語意正同不是等待大叚間暇了然後去修梁襄王章一之謂統天下爲一家正如秦漢之制非謂如三代之王天下而封建也此孟子見天下之􅀔而知其必至於此非以術數䜟緯而知之也盖自太古立爲君長則封建之法行黄帝置大監􅁥于萬國夏㑹諸矦于塗山執玉帛者亦萬國逮湯受命其能存者三千餘國時云千八百國至孟子時相雄長者止七國尓餘小國盖不足道也自萬國以至于七國吞併之積豈一朝一夕之故今􅀔旣合不可復分終必又併而爲一㪯天下而郡縣之而後已至于秦漢孟子之言即驗但秦猶嗜殺人故雖一而不能定至漢然後定也襄王才質下不足以語王政故孟子不告之而但曰不嗜殺人而已齊桓晋文章文武之道幽厲傷之東遷之後下陵上替五霸迭興不惟王道之不行學士大夫亦且不講自是惟知霸業可尚而桓文又霸之盛者宣王心􅀃其事而誠服之以孟子當時賢者深知其􅀃故舉以爲問其曰可得聞乎見其不易得聞惟孟子知之而又恐不易以告也仲尼之徒則見孔子不言霸事可知至其門人以及後之徒黨不曽有言桓文爲霸之謀畫經營者此與孔子言管仲器小之意同且先截断宣王功利之心下乃開其王者之道桓文之事金先生曰謂其所以爲霸之謀畫經營也􅀂紏合一匡之事孔門固甞言之矣德何如則可王宣王知有德則王可謂天資優而知所本矣及問寡人可以保民及何由知吾可皆能自反而善問者與梁惠王逈別王天下事至大易牛事至小孟子却道只此心便可王故雖指出不忍二字而王猶不知所以上言臣固知王之不忍下言彼惡知之盖宣王見牛不忍之心雖發而不自知其爲仁之端故以知與惡知相對􅀃以爲常人雖爲利欲所昏而本然之善終未甞泯但時或發毎不自覺而不能充之爾故孟子以爲惟君子爲能知之衆人不能知也是啓王之心使凡遇善心發時便須識得即就此推充自小以及大自近以及逺即其一端推之至其極又推其􅀋而充之至於大則仁不可勝用矣孟子與王問荅三反欲王自知不忍見牛即是惻隱而終不悟前德何如以下雖有三善言至此竟昬罔推拓不去但重疊解􅀃不是愛財孟子不得已自與言這正是行仁巧處主意在見牛未見羊一句此非獨王良心之發處之又得其當矣但自不識爲善端而又不推於他事爾及王聞孟子之言而􅀃旣巳得前日之心然又不知處此小事如何便合於王道只是平日無君子啓迪其斈故也術字要看旣見牛而不忍此心欲行則便不可殺此牛而釁鐘之礼又不可廢或殺牛或廢礼皆是仁心行不徹故用未見其形未聞其声之羊以代之此正用術之圎機也此即是􅁠行仁者當放此意而行故謂之術此章見齊王之良心凡兩發孟子教之推而不能推是以終於􅀾國之君而已見牛時一發孟子言之而心戚戚時又一發也此章之要全在推字始使因愛牛之善端而推之充擴其良心以知仁民之爲大於其良心旣啓則當先親親而推及於仁民而又及於愛物謂仁之施愛物難而仁民易今旣能其難而又得行之之術何於其易者而不能也仁民之所以易於愛物者人旣與我同􅀋其好惡不殊所施者不過以巳之所好惡者及之而已况我親其親人感之亦各親其親其應之速又不盡待我之推也其終告以王道之大亦不過盡不忍之心而已權度度物而心爲甚不是言此心以權度去度物正是欲以義理來度此心使於發處審其輕重也抑王興甲兵至快於心與􅀂與􅁠度之言不相接此盖從齊王夲意問霸處􅀃來而使齊王度民心之所不願而推愛心以及之也地方百里而可以王行仁政也齊欲服天下如鄒敵楚不行仁政也以齊一分而敵天下之八者􅀔也發政施仁者徳也以德則湯以七十里文王以百里不論􅀔矣集注名辟彊古人名辟彊者非一作開闢封疆􅀃則上音闢下音疆作辟除彊􅁀􅀃則上必益反下巨良切推廣仁術則仁民易而愛物難老吾老㓜吾㓜以及人之老㓜老㓜彼此皆同以我及於親親者措之於彼固不異是易也上老老恤􅀌而民即興孝不倍則民視上之老㓜與已之老㓜皆同故即效之是又易也至於物則無知識不能逹人之意故仁及於此物則此物得所不能自充廣也本然􅁠度即是人心本有之天理梁惠王下莊暴章王語􅁀以好樂盖論及所好之俗樂􅁀未有以對盖莊暴亦知俗樂之不足好欲諌而未得其辭故以告孟子孟子之荅只是巽與之言王変色是愧前與暴論者不可聞於孟子故其下直言之此章只是欲與民同樂不必專於作樂也交隣國章此章前言交隣在能仁智朱子以懲忿緫之後言好勇在行仁義朱子以養大勇言之王問交隣孟子所荅樂天畏天是交之之正王後再言好勇孟子荅之以好勇須有文武之德乃可集注謂所引與今書文小異今書泰誓上曰天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予􅂚敢有越厥志謂天助佑下民爲之君以長之爲之師以教之君師者惟其能左右上帝以寵安天下則夫有罪之當討無罪之當赦我何敢有過用其心乎寵愛也志已之志也朱子隨孟子文解故其義亦小異盖古者以簡編寫書簡冊煩重非如今以紙模印易辦古人多是以口相傳故古書所引多有不同者雪宮章師行而糧食謂師衆從君行皆裏乾糧而往故有􅏇而弗得食者又勞苦而不得休息於是相與造爲䜛謗而民因而作爲姦慝矣此上言軍民之怨也方命虐民以下是言君也集注廢時失事廢時解荒字失事解亡字明堂章人皆謂我毀明堂舉衆人之言也毀諸自問果當毀之乎巳乎又以巳意問止而勿毀乎見得宣王之意正是欲不毁爾盖巳稱王即欲行天子之制也孟子則不禁他不毀只是教之行王政盖行王政則足副王之名雖行天子之制可也文王未甞稱王而所行却是王政周礼考工記夏后氏丗室堂脩二七廣四脩一丗室者宗廟也脩南北之深脩二七者深十四歩八丈四尺也廣益以四分脩之一則堂廣十七歩半十丈五尺也五室三四歩四三尺堂上爲五室象五行三四歩室方四三尺以益廣木室於東北火室於東南金室於西南水室於西北其方皆三歩其廣益之以三尺謂深丈八尺廣二丈一尺也土室於中央方四步其廣益之以四尺謂深二丈四尺廣二丈八尺也大室居中四角之室皆於大室外接四角爲之大室四歩四角室各三歩則南北三室十歩爲六丈東西三室六丈外加四三尺又一丈則廣七丈九階南面三三面各二四㫄兩夾䆫毎室四户旁皆有兩夾䆫爲八䆫五室二十户四十䆫白盛蜃灰也盛成也以蜃灰堊墻所以飾成宫室盛音成門堂三之二門堂取正堂三分之二南北五丈六尺東西七丈室三之一兩室與門各居一分殷人重屋堂脩七尋堂崇三尺四阿重屋重屋者王宫正堂􅀂大寢脩七尋五丈六尺放夏周則其廣九尋七丈二尺五室各二尋四阿􅀂今四注屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵明堂者明政教之堂也此三者或㪯宗廟或㪯王寢或㪯明堂亙言之以明其同制謂當代三者其制同非謂三代制同也廟門容大扄七箇大扃牛鼎之扄長三尺七箇二丈一尺闈門容小扄三箇廟中之門曰闈小扄膷鼎之扄長二尺三箇六尺通典東西長八十一尺南北六十三尺其堂髙九尺於一堂之上爲五室毎一室廣一丈八尺毎室開四門門旁各有䆫九階外有四門門之廣二丈一尺門兩旁各築土爲堂南北四十二尺東西五十四尺其堂上各爲一室南北丈四尺東西丈八尺其宫室墻壁以蜃蛤灰飾之此釋周礼明堂制又引大戴礼盛德篇云明堂九室室有四户八䆫三十六户七十二牗盖以茅上圎下方其外水名辟雍堂髙三丈東西九仞南北七筵九室十二堂室四户八牖宫三百步今按此文在明堂篇朱子明堂􅀃云論明堂之制者非一熹切意當有九室如井田之制東之中爲青陽太廟東之南爲青陽右个東之北爲青陽左个南之中爲明堂太廟南之東即東之南爲明堂左个南之西即西之南爲明堂右个西之中爲緫章大廟西之南即南之西爲緫章左个西之北即北之西爲緫章右个北之中爲玄放桀章上兼問桀紂下再問弑君是專問紂盖舉重者言之也故孟子亦止舉紂對集注王勉之言謂上下二者兼有則可爲放伐之事􅀂上雖極暴而下非仁不可下雖至仁而上不暴亦不可爲巨室章兩姑舎汝所斈而從我上屈人之大才以從已之小見下不貴國家而徇一已之私欲萬鎰謂璞玉之價直萬鎰之金也齊人勝燕章書仲虺之誥曰􅀄征自􅁑東征西夷怨南征北秋怨曰奚獨後予又曰徯予后后來其􅂫孟子所引多天下信之一句其餘文中多者六字異者四字民望之至民大恱七句孟子自言故集注云兩引書鄒與魯閧章此告君之言不得不切民今而後得反之之言似失大過民固不可求反其暴於上然至於君行仁政則親上死長之心亦民所本有也竭力章大王自邠遷岐行二百五十餘里民從之如歸市史所謂居三月成城郭一年成邑二年成都而民五倍其􅀄盖非獨邠民近於岐周之民皆歸之也當時西方地近戎狄皆間隙之地非封國之疆界故太王得優游迁徙􅀂􅅬在中國又分大國之間無可迁之地民雖或從之亦無所往孟子特舉太王之得民以警文公爾故下文言效死乃其正也平公章前以士後以大夫盖言䘮禮也儀禮有士丧禮篇大夫䘮禮亡不可考三鼎五鼎言􅀕禮也儀礼特牲饋食礼士之􅀕礼也牲用豕陳鼎三豕右肩臂臑肫骼正脊橫脊長脅短脅九體膚三離肺一刌肺三爲一鼎魚十者五爲一鼎腊有獸之乾者也用兔爲一鼎少牢饋食礼大夫之􅀕礼也牲用少牢陳鼎五羊右肩臂臑膊骼正脊脡脊横脊短脅正脅代脅十一體腸三胃三㪯肺一􅀕肺三實于一鼎豕十一體如羊㪯肺一􅀕肺三實于一鼎膚九實于一鼎魚用鮒十有五而鼎腊用麋一純而鼎肩臂臑者肱骨也􅈩骼股骨也正脊脊之前也脡脊次正脊横脊在後者膚脅革肉也離肺者㨒離之不絶中央少許刌肺者切肺也㪯肺者尸食所先舉也􅀕肺者尸主人主婦用以􅀕也㪯肺即離肺􅀕肺即刌肺也凡牲用右胖腊則合升左右胖故曰腊一純純猶全也然此則諸侯之大夫士􅀂天子之大夫用索牛士用少牢臑奴到反肫􅈩皆音純骼音格刌七本反脡音挺鮒音附㨒苦圭反胖音判公孫丑上公孫丑章公孫丑問管晏而孟子獨鄙管仲不言晏子盖晏子之事任才能功烈皆非管仲比而管仲輔桓爲五霸首尤天下之所共宗仰故孟子唯斥管仲曽西敬畏子路排斥管仲而言管仲功烈之卑是謂子路儻得行其志則功烈之大可知矣非獨言心術之邪正而已楊氏乃謂子路之才不及管仲恐未全得孟子之意攷證言之甚詳管仲曽西之所不爲也而子爲我願之乎孟子此語猶有未推重曽西意謂曽西尚且不足於管仲乃爲我願斈之乎武王周公継之然後大行此言周公制礼作樂之後雖殷之頑民莫不率化趨善之時也湯之孫太甲継湯立太甲五丗至中宗大戊大戊三丗至河亶甲河亶甲子祖乙祖乙六丗至盤庚盤庚三丗至高宗武丁武丁二丗至祖甲皆賢君也祖甲殁後六丗七十餘年至紂雞鳴狗吠相聞言民居之稠逹乎四境則舉國皆稠也地不改辟矣民不改聚矣有兩意一􅀃言齊地廣民衆地不必更改巳自辟矣民不必更改巳自聚矣讀就改字略歇一􅀃地不必再加廣辟民不必再加集聚五字一串讀下又連下文上􅀃意詳下􅀃意直上􅀃得矣字岀在人看置郵字書馬逓曰置歩逓曰郵漢西域傳因􅀐置以聞師古曰即今驛馬也黄霸傳郵亭師古曰書舎謂傳送文書所止處如今驛館倒懸謂如人遭顚倒懸挂困苦急迫也揚氏言子路範我馳驅而不􅀗非謂範馳驅真不可􅀗禽也如是則王道真爲無用矣盖範馳驅者王良御車之正也不􅀗禽者嬖奚不能射也欲使射者􅀗禽而行詭遇御者之詐也故王良範驅子路也嬖奚不􅀗時君也倘子路遇明君而信任之則雖小國攝大國而瀕於危亡亦必三年而有足民知方之效子路之不􅀗者不遇可與有爲之君尓管仲則惟欲成目前之功故雖詭遇而不較也但揚氏此叚未爲知子路者不得曽西之意也不動心章孟子平日所言皆王道公孫丑習聞當時霸功之􅀃前章雖聞孟子不許管仲猶未深解於此僅添一王字與霸兼言之耳因上章以齊王猶反手之言固知孟子能用齊矣然猶未深信能王天下故用一霸字在上然丑亦未能分别霸功王道之所以異言動心否乎亦是未深信孟子我四十不動心是孟子素有爲之之具而後有用丗之言也一毫挫於人謂所辱者至小也不受者必報之也不惟必報於賤者雖貴者亦必報之惡声至必反之謂不惟辱來必報雖言小不善亦必報也量敵而進謂量度敵人之堅瑕然後進兵慮勝而㑹謂謀慮巳必有可勝之理然後會戰􅉳舎不動心本又在告子之下公孫丑又以孟賁比孟子故孟子亦以勇士之􅀋言之北宫孟舎之勇皆是養而成至於必勝不懼乃其效而謂君子之道可以不養乎曾子亦是論已與人相敵縮不縮指理之直不直不惴吾往指氣之勇不勇謂理者氣之主理直則氣壯理曲則氣餒所與較之事吾理旣不直雖賤夫亦不求勝之吾理旣直雖千萬人我亦必往盖理曲必屈理直必伸也以舎􅉳比子夏曽子是一意再以孟舎比曽子又是一意上以兩人比兩人之氣象此是虚比下却把二人較其短長此是實比明理上句是事做不去心不必明理下句是心雖有不明不肎去明理如此硬􅎄住心以至不動孟子言内是本外是末末之蔽因本之蔽也言不通逹是夫心不明􅀂不去明其心則言終不逹矣故曰不可􅀂心不明乎理則惟持守其心且不務其末猶得輕重之倫故曰可但孟子且就他􅀃心與氣上分輕重而謂不求諸末則以爲可其實工夫内外皆不可偏廢故又謂􅀂遺其外亦終不能進德所以發明志氣將卒之意然孟子破上句是順他文破只一意下句是外他文破有兩意上句告子謂窒於外不必求於内孟子謂必當求其内然後外可逹告子本意只指内孟子亦專教明於内下句告子謂不明於内不必求外助孟子謂當用功於内兼用力於外告子本意專指内孟子則使内外兩致也告子亦未甞不知爲斈之道曰不得於言勿求於心則固知言之不逹當用心明理曰不得於心勿求於氣則固知心於理有不通當用力問斈討論及臨事度義以明其心爲他急欲不動其心故兩頭截㫁他養心正似禪學孟子言志至氣次持志無暴氣止因告子言不得於心勿求於氣故言氣雖次於心亦當用功是隨其言捄其失至孟子自言但曰我善養吾浩然之氣是專言養氣而不言志所以養之之方與養之之節度一一詳備專是氣上工夫孟子之自得至於大而將進於化正在此與前辨告子之非者意不盡同然養氣在集義所以養之集之是心也但與前持志無暴氣相對􅀃者自不同氣次焉次字不可緩㸔謂即亞於志也知言即是知道孟子自言故如此知道理明故能知天下言之邪正得失孟子之斈是知言養氣知言即知道知道属心爲内養氣属事爲外格物致知以明心遇事行義以養氣然所以知其義而集之者心也即志帥之􅀃至於集義是要心無愧怍心旣無愧怍則氣自生雖有内外之殊及其至也只是養此心耳知言則盡心知性萬理洞然何所疑惑養氣則動皆合義遇事即行何有畏怯二者旣全何能動心此章两言字兩氣字所指不同告子不得於言巳之言也孟子之知言知人之言也告子之勿求於氣氣血之氣也孟子之浩氣仁義之氣也上其爲氣也言氣之體下其爲氣也言氣之用配義與道是氣之能事上句言氣本剛大失養則小以直養之則復剛大而能合助義道而行之沛然但氣即是義以養成旣成則配義愈盛此氣本得於天故至大至剛剛大天之體叚也聖人生知安行無非直道不假乎養衆人知不明自害其剛大故須直以養之直即義也塞天地言其效也塞天地只是應物皆合道義而物莫不從至於郊則格廟則享鳥獸魚鼈咸􅀂而人倫日用不言可知直養無害是養之之道集義所生是養之之功上言氣配義與道下言養氣只􅀃集義盖道是緫言萬事之体義就每事各裁制其宜言義則道即在此如父必慈子必孝義也道在父子者也君必仁臣必忠義也道在君臣者也及事之微細處莫不皆然集義之集字不是應事時工夫應事只是義字應事件件行義積集得多方得此心全無愧怍而氣自生集注乃由事皆合義自反常直是以無所愧怍而此氣自然發生於中事皆兩字􅀃集字自反直無愧是慊也慊則氣盛不慊則餒必有事是專以集義爲事勿正謂不可因集義便期必氣之浩然勿忘謂未能充大則惟不􅈈於有事勿􅂇長謂不可以私意作爲欲充此氣用私意便失義而愈䘮其所集者矣故曰集義養氣之節度有事勿忘是直養勿正勿助是無害養氣專就行事上􅀃於應事地頭做工夫直養無害一語是養之之方直字則其得於曽子之本原下文有事勿忘即養字正及助長則害之矣惟私意妄作害義爲甚故發揠苗一叚八十五字專言私意害氣之失揠苗一節只􅀃不可􅂇長後言不耘苗却言不有事非徒無益而又害之言助長之害孟子先言知言而丑先問養氣文公謂承上文方論志氣而言金先生謂當先問知言此亦是丑之斈未能知所先後竊謂孟子亦自有此文法滕文公下篇孟子先言出疆必載質後言三月無君則弔周霄乃先問三月無君後及載質正與此同知言之􅀃攷證言之甚詳孟子之斈盡格物致知之功故能明夫道義而於天下之言皆能知其是非邪正而無所疑然所以致其知者亦自夫前聖賢之言而得之故知言雖是致知之效而致知未始不因言也所以朱子以盡心知性爲知言之本至於養浩然之氣雖專在於集義而欲集夫義必先知義所在然後可是知言又集義之夲也知言以開其先養氣以培其後此所以不動心也然孟子之自言知言却只􅀃知詖淫邪遁是全􅀃今人之言盖此章夲意是􅀃應事不動心故也詖淫邪遁言之病也旣謂知言而專㪯不善者言之者盖明理然後於天下之言了然知其邪正言無四者之病則爲善言矣曰非礼勿視聽言動則其視聽言動者皆礼矣如曰思無邪曰母不敬曰母自欺聖賢教人其立言大抵如此善爲􅀃辭與知言應善言德行與養氣應善爲􅀃辭此却又就已言上􅀃與告子之言同孟子之知言異􅀚丑㪯孔子之言可見二子善爲􅀃辭三子善言德行善言德行爲自有其德行也孔子旣兼之而但謂不能辭命是㪯其輕者而重者從可知此是古人省文處下文言孟子旣聖可見上句兼包饒􅀟峰曰人之有四端猶其有四體君子所性不過仁義禮智四者而已惟聖人全體備具而各極其至其餘則或得其一或具而微如子夏篤實近仁子游精宻近禮子張高明近智皆是於四體中各得其一冄閔顔淵是四體都全但未曽充得廣大如聖人之溥􅀶淵泉爾姑舎是猶有不足意而不敢言下文曰所願則斈孔子可見丑以孔子比孟子孟子不敢當又以門人比孟子孟子不欲荅於是以古之聖人爲問丑同㪯夷尹是問孟子才徳所至比聖人爲何如盖二子雖皆聖然猶各守一徳非如孔子之時中故孟子先分别夷尹不同道下乃自㪯孔子而曰願學之吾未能有行焉應上何如二字言巳未及夷尹也雖兼三聖言其實荅丑之問至言所願則斈孔子謂雖未及夷尹然亦不願斈之願斈孔子是荅知言以後之主意孟子言所願則斈孔子又賛曰自生民以来未有盛於孔子盖孟子知言養氣才德巳度越諸子惟未至聖人之化尓此是孟子自知之明故亦善言德行者及其積乆惡知不化孟子明言乃所願則斈孔子而丑猶問三聖人班乎未爲知言也後面問同問異却問得明盖孟子上言皆古聖人下却言二子不如孔子然則同謂之聖人却於何處見得旣同者如此異處却如何聖人之道大固不可以名言然亦非丑能盡識故孟子亦不就孔子德行上言而推㪯三子形容聖人處言之尓􅀋指衆人而言萃指聖人而言出􅀋衆聖人也拔萃孔子也集註言任大責重亦有恐懼疑惑而動其心乎見得公孫丑之意非謂孟子加齊之卿相因爵位冨貴有以淫其心也恐懼是氣不盛疑惑是知不明以行道言則知當在前以動心言則恐懼爲重故先恐懼疑懼即是動心處集註却言有所恐懼疑惑而動其心似疑懼又在動心之外者盖心本虚靈静一能明天下之理者此也足以應天下之事亦此也今理有所不能明而疑事有所不能應而懼然則疑懼乃動心之目心因疑懼而動而疑懼非心之所動也旣􅀂是必將窮探力索求明其理之未能明者以釋其疑􅀾兢勉強推行其事之未能行者以免其懼皆足以亂吾虚靈静一之体而非自然應物之道是則所謂動其心也盖公孫丑本問爲齊卿相􅀂居卿相之位而有事之疑懼者寜遂巳乎由是􅀚之則不動心須着如此􅀃疑懼二字貫一章意盖知不能明故有疑勇不能行故有懼乃動其心告子不得於言未嘗無疑不得於心未甞無懼彊制其心所以不動孟子知言故不疑養氣故無懼自然無所動其心也知者不惑仁者不憂勇者不懼孟子之言亦不出此三逹德養氣則不恐懼知言則不疑惑道因知言而明徳因養氣而立道明雖因知然旣謂道則行固在其中謂之德立則行道有得於心而徳巳成立此是行道積累而至者此第一節注皆貫穿一章意程子曰心有主則能不動此句緫言下五人北宫黝必勝孟舎無懼曽子自反孟子知言養氣告子㝠悍強制子夏篤信聖人曾子反求諸已盖􅉳專要勝人其事猶在人故與信聖人者同意舎只是無懼其事專在我故與求諸已者同意所以􅉳不如舎等是等級以高下言倫是倫􅀋以勇士與君子言恐懼之是我去驚嚇他人言有所不逹謂不能通暢條逹所言之事急於本是順告子􅀃但只持其心不動􅀂論君子致力於内專在明理固是急於本然非如告子之急於本也顚躓即跌仆趨走是疾奔盡心知性性即天地萬物之理具於心者知性則窮究物理無不知也無不知則心之全體尽明矣朱子謂尽心知至之謂知性物格之謂也故尽心知性則於天下之言㪯無所疑然所以尽心知性者皆因明聖賢之言而得然後以是而䆒天下之言則是非得失皆洞然矣此聖賢問斈之成法孟子之知言正如此上云凡天下之言下云識其是非得失之所以然此緫古今之言也曰是非謂所言之事曰得失則當理與不當也所以然言其本也如下文詖淫邪遁乃非而失理者所以然則蔽䧟離窮是也自反而縮􅀜上文無作爲害之􅀜下文縮即直無作爲是無害直養是一意無害是一意上是工夫下是防弊天人一也更不分别只是公字此氣得於天故能浩然而道義乃天地間至理皆是公爲有私己便不合公道便卑小然孟子所言浩然之氣乃是言一身之氣爾故曰浩然之氣乃吾氣也吾身本小養而無害則塞天地私則小公故大謝氏敎人須先體認得吾身浩然體叚然後隨事致力以養之庶不是只把做話􅀃又見得心得正無􅃜欠浩然便在此則人無有不可養者而養之亦不難也一事偶合於義是學者固欲行義或理未明而處義未精或無力量而行之不至皆未合義有一事行得恰好適合於義非是􅀃尋常人漫然應事無心偶然相合也這偶合正對不集􅀃心通乎道是孟子物格知至知言乃其效也學不厭者智之所以自明言學而後智則斈是智之功􅀂曰夫子唯見聖道之無窮而學不厭非智者不能言智而又學則學是智之用恐亦可通舉夷尹事實皆是體貼經文􅀃非言二聖人之凡也兄弟遜國言非民不使避紂􅀮居言非君不事歸文王言治則進去武王言亂則退湯聘用之言治亦進使之就桀是去治而進於亂桀不能用復歸湯是去亂而進於治何事非君不間湯桀何使非民不擇夏商本根指德之盛節目指心之正此章當作五節看章首至曽子之守約也爲第一節敢問夫子之不動心至反動其心爲二節敢問夫子惡乎長至必從吾言矣爲三節宰我子貢至所願則斈孔子爲四節伯夷伊尹於孔子至章終爲第五節尊賢使能章市􅒡而不征之􅒡市宅也謂市物邸舎天子諸矦之國都皆畫如井而以後一區爲市聽民交易市􅒡而不征謂但取其邸舎之稅而不取其貨物之稅也􅒡無夫里之布之􅒡民居也周礼所謂上地夫一􅒡田百畒注五畒之宅是也載師宅不毛者有里布宅即五畒之宅布泉也泉即錢也宅而不樹桑麻罰以一里二十五家之泉䟽云二十五家之稅布也謂口率岀泉漢法口百二十此盖以漢法比擬古制未必周果以口計泉數如此又曰民無職事者出夫家之征注云夫稅家稅也夫稅者百畒之稅家稅者出士徒車輦給繇役按載師之法是宅不毛無職事兩事之罰今孟子乃曰􅒡無夫里之布則是居􅒡者使出二十五家之泉而又出百畒之稅也集注言一家力役之征是因所引夫家之文而併釋之恐於夫里之布無所當愚詳孟子謂天下之民願爲之氓是境内田間之民皆使之出是兩等之賦只是於一家田稅之外多岀里布耳與上文市􅒡之􅒡不相関盖上旣曰市􅒡而不征是居市者巳征之孟子固以爲過矣而又出此两等不太繁重乎集注上􅒡字旣釋爲市宅於下􅒡字乃曰市宅之民巳賦其􅒡又令岀此夫里之布二􅒡字合而爲一愚不敢必知其果如此也不忍人章惻隱之心即不忍人之心所發不忍以全言惻􅀮與三者對舉是偏言然只就惻􅀮上看則惻自有專言意擴而充之是日用之間隨四端之發者推廣而充滿之積之乆則如火然泉逹其􅀔自有不能巳者旣能如此而又大充廣之方能盡四海之大兩充字是兩意上充字毎端發處充下充字就應天下事上充四行非土無以生四德非信無以成土即大地也無地則金木水火何所􅀝信即實理也非實理則仁義礼智爲虚言矣集註所謂定位以方言成名以時言專氣以温凉寒暑之氣言無定位即下文之於四行無不在無成名無專氣即下文於四時則􅀉王也此章七節第一節言人本皆有仁二節言先王全此仁以實人之皆有是心猶道性善而称尭舜以實之也三節就人易曉處指出使人体認此仁四節併言義礼智各有所發五節言所發皆是本然之性六節言四者人所共得不可自棄七節言因發處察識而推充之不可放過工夫全在此後一節保四海與上治天下運掌上相應矢人章集註本心全体之德以仁之体言人當常在其中而不可須􅁷離兼其用言也子路人告以過章舜固未甞有不善之可舎亦不待取人之善爲己善也但無一毫私意而徇天下之公則舎已從人之謂也事之善者人爲之巳亦爲之即取人爲善之謂也如耕稼陶漁是也舜之聖天下固皆知之人見已之所爲􅀂是而舜亦􅀂是是我爲者善矣安得不􅂆爲善乎故曰與人爲善也公孫丑下孟子將朝王章彼冨吾仁彼爵吾義仁者循理樂天安貧守分故不知彼之富義者審度事宜進退有制故不羡彼之爵富只在彼爵可加我故用仁義字不同齊王餽金章礼注及趙岐皆曰鎰二十兩國語二十四兩爲鎰字書曰鎰益同數登於十則滿又益倍之爲鎰則二十两者爲有義按儀礼䘮服萹朝一溢米鄭氏注二十两曰溢䟽依筭法言之甚明趙氏注爲巨室章及此章皆云二十两䟽於前章引鄭注却云二十四两而謂趙注爲誤失之矣之平陸章語録都恐是周礼所謂都鄙之都是大邑也此􅀃爲是致爲臣章私龍断謂用私意而暗爲龍断之所爲龍断是商人就市中地髙處立而左右顧望衆人所聚多處而以物趍彼欲售之而罔羅其利孟子以魏惠王之三十五年至魏三十七年改爲後元年十六年卒而子㐮王立孟子有見㐮王語盖當年即去魏適齊當宣王之二十四年也在魏前後計十八年至宣王二十九年伐齊孟子即去齊是年宣王亦卒在齊首尾六年充虞路問章孟子曰待文王而後興者凡民也􅀂夫豪傑之士雖無文王猶興孟子則不待文王而興者也王者興而有名丗者是猶有待於文王者也孟子之時雖無王者興苟有尊德樂道者則孟子能興之讀孟子叢􅀃卷上
