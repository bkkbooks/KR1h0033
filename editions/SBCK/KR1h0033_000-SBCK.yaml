front:
  text: 吳師道讀四書叢説序讀四書叢説者金華白雲先生許君益之為其徒講説而其徒記之之編也君師仁山金先生履祥仁山師魯亝王先生柏從登北山何先生基之門北山則學於勉亝黄公而得朱子之傳者也四書自二程子表章肇明其㫖至朱子章句集注之出折衷羣言集厥大成説者固􅌸以加矣門人髙弟不為不多然一􅂯傳之後不泯滅而􅈬微則泮渙而離真其能的然乆而不失傳授之正則未有如吾郷諸先生也盖自北山取語録精義以為發揮與章句集注相發魯亝為標注點抹提挈開示仁山扵大學有疏義指義論孟有考證中庸有標抺又推所得扵何王者者與其已意併載之君上承淵源之懿雖見仁山甚晚而契誼最􅅧天資純明而又加以堅苦篤實之功妙理融扵言表成説具扵胸中問難開陳陳無少疑滯抑揚反覆使人竦聼深思隨其淺深而有得焉故自逺方来従學者至数百人遂為一時之盛今􅀚叢説之編其于章句集註也奥者白之約者暢之要者提之異者通之画圖以形其妙析段以顕其義至于訓詁名物之缺考證􅀘而未備者又詳著焉其或異義微牾則曰自我言之則為忠臣自他人言之則為讒賊金先生有是言也此可以見其志之所存矣嗚呼􅁒通四書之旨者必讀朱子之書􅁒讀朱子之書者必由許君之説兹非適道之津梁示學者之標的歟先是君未沒時州人有得其書而刋之者君聞亟使人止之且恐記錄之差也則自取以視因得遂為善本諸生謂予甞辱君之知俾序其所以然􅀼獨惟念昔聞北山首見勉齋臨川将别授以但熟讀四書之訓晚年悉屏諸家所錄直以本書深玩盖不忘付嘱之意自是以来諸先生守為家法其推明演繹者􅀅以反朱子之約而已故能傳緒不差閎大光明式克至於今日也又念某識君之􅀄甞以持敬致知之説質扵君君是之復舉朱子見延平時其言好惡同異喜大耻小延平語以吾儒之學理不患其不一所難分不殊耳朱子感其言精察妙契著書數十萬言莫不由此學者扵朱子之書當句讀字求必若朱子之用功而後足以得其心此君之拳拳為人言者也然則得君之叢説而讀之者其扵君敎人讀書之法尤不可以不知也故因併著之君名謙其世系履行與凡他􅀴論著詳具友人張樞子長所為行述茲不復贅云黄溍作墓志曰先生叢説敷繹義理惟務平實甞曰聖賢之心盡在四書四書之義備扵朱子顧其立言辤約義廣讀者或不能悉究其義以一偏之致自異􅀄不知未離其範圍其可以易心求之㢤
