front:
  text: 讀中庸叢􅀃卷下東陽許謙二十章金先生謂此章當作六節看章首至不可以不知天爲一節逹道
  hash: sha256:cc25c518937172c5a00a4e9755e0c9fe8f499a230675bd165bee6def8895f2aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0033_SBCK_003-1a}
body:
  text: 逹德至天下國家矣爲二節九經爲三節凡事豫至不誠乎身爲四節言誠爲五節博斈以下爲六節此章朱子以爲皆孔子之言金先生謂聖人之言簡自仁者人也皆子思之言雜引夫子之言反覆推明之第一節文武之政全体大用雖無不㪯而其要在乎得人擇人之道則在脩身脩身須是以仁仁道雖大只是親親爲要敏樹是樹藝之樹是活字脩道以仁之仁是仁之全包四德者仁者人也此是自古來第一箇訓字言混成而意深宻深体味之則具人之形必須盡乎仁其所以盡仁則不過盡人道而已朱子所謂天地生物之心人得以生者元者善之長人具此生理自然有惻怛慈愛之意皆是就源頭指出示人與他處解仁字不同宜子細看有仁便有義如隂陽對待親親自父母至于宗族其厚薄自有人情不能已者賢之高下其尊之之心有不容不重輕者則所謂殺等皆是自然而然此見聖人制礼只是因人情而節文之而已君子以下四不可以不意頗不同君子不可以不脩身君子通上下言之君子須用脩身此不可以不字乃平正說脩身不可以不事親言事親是脩身大節人而不盡孝何脩身之有於衆目舉其要也此不可以不字專指一事而言事親不可以不知人言事親又當知人此不可以不字是兼言之知人不可以不知天言欲知人須當知天此不可以不字亦正說第二節天下之人生與我同􅀋皆在五倫之中惟朋友一倫所包最廣除却君臣父子夫婦長幼外皆入朋友之倫故大斈言與國人交止於信此朋友之交是提起道合之人􅀃盖中庸是脩德之事教君子之書也交字不可輕讀過子曰二字非􅄛文上知仁勇兩節子思之自言此引孔子之言以足其意與孟子其事則齊桓晋文其文則史孔子曰其義則丘竊取之矣文法同知斯三者章句以爲三近此處似指三逹德不必獨指三近第三節來百工是招徠諸工人在國夫一人之身而百工之所爲備况朝廷乎語録謂百工聚則事事皆有豈不足以足財用乎如織紝可以足布帛工匠可以足噐皿之􅀋則財字不獨如材字意亦兼貨財而言之章句所謂通功易事農末相資却是言舉天下之財用足也盖下民皆視上之所爲而化舜命垂共工列在九官周工人皆属冬官漢以來將作大匠亞於九卿則古人未甞以工事爲輕凡此藝之工巧者旣表而用之又有餼稟以養之則天下之習此藝者莫不勉爲工巧而天下器用无不足齊明所以齊其心盛服所以齊其身非礼不動揔一身而言視聽言之􅀋皆在其中聽讒言則知人之道不明而賢者不安好色貨則必不能尚德而與賢者自相背馳故去此三者而後能貴有德者尊其位爵位也此未言任以事盖宗族且主於養若有才德則自隨所宜用之却在上下文賢與大臣士條内語録􅂆親親也似多一親字􅂆者所以致吾親愛之心而慰恱其意前言敬大臣則不眩是專任意後言官盛任使是優崇意其義不可一塗取任使謂足以任其使令時使則得以乗天時盡地利而所收者廣歛之又薄則民皆殷富而愈力矣第四節逹道逹德九經行之皆在乎誠故此節專提撕不可不誠之意誠則出言制行應事行道無所不可下文惟至於誠身而止然誠身又在免明善明善即格物致知誠身即意誠心正身脩也言素有誠則臨時句句著實無虚妄不誠則說不去如顚躓然事素有誠則臨事平行將去雖事變之來亦無所礙不誠便有困屈行素有誠則所行皆無疚病雖處夷狄患難莫不從容不誠則將枉道矣道則通包上三者有誠則應物必當出之無窮語録道前定不窮一句連上三句都包在裏是有箇妙用千変萬化而不窮之謂事到面前都理㑹得都處置得自章首皆言上之率下至此言在下位却主下事上􅀃盖脩道之教無所不該不可執一論經四道字謂有其法也第五節上二節皆言所以行之者一然未分曉􅀃出誠字至此方明言之誠者天之道言天自然眞實而無妄誠之者人之道言又當体天道以至於誠聖人與天同誠故不思不勉而中道斈者未能故必擇善固執以至乎誠誠者天道誠之者人道二者字􅀂問辭與二也字相應誠者不勉而中誠之者擇善固執二者字指人而言是說盡誠之人與未至乎誠之人誠固是眞實無妄然有指理而言者有指心而言者誠者天之道此指理而言誠之者此指心而言下誠者字雖以聖人之心而言然聖人之心即天也誠者先仁後知以成德言誠之者先知後仁以進德之序言第六節言誠之之目至於変化氣質方是能誠者愽斈五句須作十字㸔先㸔下字後㸔上字不知者當斈斈須當􅀶斈而有疑當問問須是審雖問而知之是自外人又須心思以得之思則必慎思旣得則辨柝剖判使之明而無纎毫滯礙處然後行之行須是篤斈問是資之於人思辨是求之於己盖學須要自得故雖有斈問兩節工夫又恐入耳不能注心未爲自得也子思示人誠之之方至矣愽斈五事言人爲斈工夫條目節次可謂詳矣然當細㸔􅀶斈是緫􅀃一句在上面聖賢每教人􅀶斈夫子謂􅀶斈於文顔子謂􅀶我以文孟子謂􅀶斈而詳􅀃之盖爲斈規模不廣淺見謏聞安能知道此是緫言爲斈之意至以一事一物言之則亦須廣求逺取以反覆其理如是然後有可問者問思以下却是逐一事一節理㑹問須是詳審使答者辭盡意暢如樊遟問仁知旣聞於師又質諸友必逹其意而後止况斈者未必有樊遟之資而答者亦非孔卜之徒歟旣間而得之矣又思之使自得於心可也思則必慎思之不及非慎也思之過非慎也思之泛非慎也思之鑿非慎也思旣得之又加辨柝使明徹無纎毫疑滯然後措之行事而篤焉是皆積累工夫自常人而誠之欲至於至誠非文理宻察工夫積習安能攀縁而上不勉而中安行仁也不思而得生知知也從容中道所謂不頼勇而􅁉如者此知之知仁勇也誠者也斈問思辨擇善也斈而知者也行固執也利而行者也􅀶審慎明篤勇也此仁之知仁勇也斈問思辨之未至而弗措困而知者亦擇善之事也行之弗篤而弗措勉強而行者亦固執之事也弗措而必致百倍之功者勇也此勇之知仁勇也二者皆誠之者也中庸之書廣大髙深到此章方􅀃出下手處大要三逹德乃入道之門而誠爲之本斈問五者乃誠之之目其所以誠之惟欲盡五逹道春秋傳序大事書之於䇿小事簡牘而已正義云簡容一行字数行者書於方方所不容書於䇿儀礼記百名以上書於䇿不及百名書於方名即字也盖古者削竹爲簡長二尺短者半之故字少者書於簡稍多則書於木板又多則以韋連諸簡謂之䇿而書之今章句但訓䇿爲簡者從古注也章句有是君有是臣合今古􅀃君是文武則臣是太公周召之倫方䇿所載之政乃其所行者若後丗有能如是之君臣則文武之遺政固可舉有君有臣而政無不㪯脩身至於仁則有君矣君旣仁則下興起爲仁一也仁則心無私察人之明二也上旣有道賢者樂從三也以是三者故有臣章句爲政在人是在下者當脩身取人以身是在上者當脩身故君子是兼上下言之脩身以道而脩道以仁仁以親親爲大故必先於事親欲盡親親必由尊賢謂非敬賢必不能盡知事親之道故當知人親親之殺尊賢之等皆天理故又當知天此􅀃著礼上又兼親親尊賢二者通繳上兩句􅀃章句欲盡親親之仁必由尊賢之義故又當知人此意是尊賢則能知親親之道是知人在先語録不是思欲事親先要知人只是思欲事親更要知人􅀂不好底人與他處豈不爲親之累此意是不知人則不能盡親親之道是知人在後當圎活㸔親義別序信是五倫之則即仁義智礼信言有便是本原自有這道理下三此字正指此則而言勉行安得㑹至於道又不肯去行緫而言之却只是知行二者皆不勇正與自彊至一者相反非知非仁非勇不曰不是知仁勇盖知仁勇是德巳至之定名若好斈力行知耻亦知仁勇之事但未全爾此体貼三近字說柔逺人謂無忘賔旅孟子注賔賔客也旅行旅也皆當有以待之不可忽忘賔盖朝聘諸侯及大夫旅盖四方遊士及商旅之徒吕氏解体字子字與朱子不同又是一意當以朱子之􅀃爲正文義相恊吕氏作實字􅀃不疑於理不迷於事皆就君身言尊賢則疑事皆資於先知先斍而無可疑者專任大臣無小臣之言間之則臨事即隨大臣所建明而行無所迷眩通功易事孟子注謂通人之功而交易其事功如功勞使人之功勞相通不專爲己作也易事謂彼之功通於此此之功又通於彼是農通於末末通於農則財用彼此皆足通功易事只是一串意經言懷諸侯天下畏之注德之所施者􅀶貼懷諸侯意威之所制者廣貼天下畏之天下斈四海内外緫言盖懷諸侯以德則諸侯誠服中國爲一家中國臣民無有不愛仰則四隅海表夷狄異􅀋莫不畏服矣語録餼牲餼也禀即廪給周礼稍食注禄廪也䟽謂稍稍給之稍食之去聲稍稍上聲夏官槀人乗其事試其弓弩以下上其食而誅賞槀古老反註箭幹謂之槀此官主弓弩箭矢故曰槀人乗計也計其事之成功考之而善則上其食􅀹善又賞之否者反此試本作考上時掌反秋官環人掌送逆􅀖國之通賔客以路節逹諸四方送􅊇及疆註䟽通賔客以常事往來謂朝覲合同者也路節道路之節旌節也夏官懷方氏掌來逺方之民致方貢致逺物而送􅊇之逹之以節此􅀋皆授節送往之事地官遺人掌􅀖之委積郊里之委積以待賔客野鄙之委積以待羈旅十里有庐庐有飲食三十里有􅀫􅀫有委五十里有市市有積註䟽計九榖之數足國用以其餘共之少曰委多曰積里居也六郷之民所居郊者其委積留之以待賔客其賔客主郊與主國使者交接即與之廪餼野鄙在遂中謂客有羇縶在此未得去者則惠之又委人掌歛野之賦歛薪芻凡䟽材木材凡畜聚之物以稍聚待賔客以甸聚待羇旅註䟽野謂六遂之外至王畿二百里爲甸三百里爲稍䟽材草之實木材木之實畜聚之物􅀲瓠葵芋禦冬之具聚之以待羇旅過客之等又懷方氏治委積舘舎飲食此􅀋皆委積迎來之事也甸即乗字燕謂燕享賜謂頒賜九經之實謂是九經之骨子跲訓躓躓陟利反行有􅇢戾失足也左傳杜回躓而顚是也上言逹道五所以行之者三逹德三所以行之者一又九經所以行之者一一皆指誠此凡事指逹道逹德九經則豫與前定皆謂先立乎誠也反諸身不誠章句謂所存所發未能真實而無妄此緫存心應事凡百而言也􅀂只就事親一節言之其行孝之心有一毫不著實雖有事親之文却只勉強假爲也盡得此兩意方是誠身方能恱乎親誠只是實恐實字意未備故曰眞實無妄眞則無僞實則不虚是正􅀃誠字又反言曰無妄妄只是不眞實其訓詁語意與主一無適意一般天理本然人事當然本然當然字有力當看擇善明善章句謂擇善然後可以明善擇者謂致察事物之理明者謂洞明吾心之理合外内而言之擇善是格物明善是知至程子言五者廢其一非斈謂五者都不可抹掠過有質高恃才而不屑於循序者有質下而不能精詳者程子此語提得極有功大學章句以氣禀物欲對言此却止言變化氣質盖氣質禀於有生之􅀄物欲染於有知之後氣質美者染欲輕質不美者染欲重二者亦非判然二物氣質能變則物欲亦消此只就重處論莊子則陽篇注鹵莾滅裂輕脫末畧不盡其分十六章下曰兼費􅀮包大小此章下曰包費􅀮兼小大兼者並㪯之辭包者涵容之謂盖十二章之後至十九章各㪯費之小大而􅀮在其中十六章獨言􅀑神直以􅀮者言之然所謂弗見弗聞是其􅀮者体物不遺則亦費矣故曰兼費􅀮体物不可遺是􅀑神之大者下獨指祭祀而言是􅀑神之小者故曰包大小是於費􅀮之中包大小也二十章逹道逹德九經凡事前皆一一言之是其小者後專言誠是其大者故曰兼小大前所指羣目亦費矣而􅀮固在其中至於誠一節全以理言豈非􅀮者然所謂聖人之天道斈者之人道又豈駕虚言理而遺事邪故曰包費􅀮是於小大之中包費􅀮也諸章皆費􅀮中有小大故兩章費􅀮字皆在上十六章􅀑神先言其大後言其小故曰大小二十章先言衆目後言誠故曰小大誠者此篇樞紐今以此言觀一篇皆言誠也言天之實理固誠也言聖人之實德亦誠也言人之欲實之者亦誠也故天命者以實理賦於人物也性者人物得天之實理也道者循此實理也教者品節此實理也戒懼存此實理也慎獨行此實理也未發之中實理之體也中節之和實理之行也中和實理之感而位育實理之應也中庸誠之至也大舜誠者也顔子誠之者也強矯誠之者當如是也孔子依乎中庸亦誠者也道之費而􅀮誠之盈乎天地者也費之小大皆誠之所生也言􅀑神見幽顯之皆誠也仁者天地生物之誠而人得以生之誠也脩道以之者體此誠也親親尊賢誠之施也殺等之禮誠自然之節也逹道逹德九經皆以誠行之也豫與前定先立乎誠也自治民推至乎明善皆在誠乎身也自誠者以下明言誠又以實夫逹德也二十一章至二十六章皆明言誠二十七章洋洋優優皆誠之著也尊德性以下五事又言誠之之方也二十八章爲下不倍二十九章爲上不驕亦誠之之事三十章至三十二章皆誠者也末章歴序誠之以至於至誠復言天道之誠終焉又細而推之何一語非誠也二十一章四誠字一三四皆同唯第二字似有異章句曰德無不實而明無不照者聖人之德先明乎善而後能實其善者賢人之學誠明是所性而有下句却言賢人之學則是實其善乃誠之之事故第二誠字帶用功意言之尚淺下言明則誠矣此誠則與誠明之誠同入聖而非賢矣意又於可以至於字上見四明字不同自誠明言聖人有眞實無妄之德而照燭萬理自然而明者自明誠言斈者由明理而至於誠用力而後明也第三箇明字與第一箇明字同第四箇明字與第二箇同二則字亦不同誠則明矣猶言誠便明矣此則字意緊明則誠矣言能明理亦可至於誠此則字意慢此章以後誠字皆是指心而言惟二十五章首两誠者字以理言章句德無不實之德􅀃誠字聖人之德兼誠明二十二章此章重明自誠而明之意聖人能參天地賛化育只是能盡其性所以能盡人物之性者亦是元具在己性内了至誠者自然明無不照旣盡己之性即能盡人物之性矣然三盡性字疊言之又似有次第或問所謂親踈近逺淺深先後不容無別但聖人與斈者工夫不同爾兩章性字不同前如孟子性之之性是帶用􅀃此乃指性之體而言德無不實正言誠之至無人欲之私又覆􅀃一語如言眞實無妄也􅀂微有人欲之私以間之則不實矣天命是􅀃性字在我者是􅀃其字孟子曰舜明於庶物察於人倫由仁義行用此察由字察謂盡其理之詳由只是自然出之之意精以理言粗以事言巨細精粗猶言大小事理無毫髪不盡知行皆極也二十三章此章重明自明而誠之意誠以下皆言效驗形著明就已上􅀃動変化就物上􅀃三誠字不同曲能有誠一曲之誠也誠則形積衆曲之誠也至誠則與聖人之誠同曲能有誠一語承上接下致曲是推至於極知行兼㪯此句承上則致曲而造其極一曲之中能有其誠接下則毎曲􅀂能有誠則有下文之驗章句善端發見之偏不論事大小但是心之自動或因事之來善意萌時便從此推之至乎其極善端發見非獨謂必如見孺子入井而惻􅀮發然後就此致之如欲行此事便當就此事上致事親必欲孝事長必欲弟足容必欲重手容必欲恭皆是盖此致曲兼知行言之也二十四章二十二章言至誠可以參賛天地極言聖人之功用二十四章又舉與􅀑神合德者言之前章止就應事處言此章又於事未形之先知之盖天地間唯一理爾明乎理則前無古後無今亘宇宙固可一以貫之此是提出聖人用處一端以明至誠之道無不至此言聖人盡已人物之性不惟臨事動合於天其於事未形亦如􅀑神之豫知以明至誠者之一端然其所以知之却又只就禎祥妖孽或於卜筮四體上見此亦是中庸也非有神怪至誠前知亦必於動處見所謂幾者動之微吉之先見者也聖人知來者如此非有靈異也故爲中庸禎祥􅀃文徐鍇曰禎者貞也貞正也人有善天以符瑞正告之祥之爲言詳也天欲降以禍福先以吉凶之兆詳審告悟之則祥字兼禍福言之經中禎祥與妖孽對祥專指善者妖孽字當作祅􅖈古字借用􅀃文衣服歌謡之怪謂之祅禽獸蟲蝗之怪謂之􅖈又草木謂之妖善必先知之不善必先知之竊恐不是直􅀃上旣言禍福將至下又言此意似重疊盖災祥明著卜筮繇兆明白者人亦能知之但迹雖如此幾乃如彼祥或作凶妖或吉兆者其理非至誠莫能知也盖善中亦有禍福之應不善中亦有禍福之應如此看則與上句不相礙而􅀹足見至誠之如神也定公十五年春邾􅀮公來朝子貢􅀚焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以礼􅀚之二君者皆有死亡焉夫礼死生存亡之体也今正月相朝而皆不度心已亡矣嘉事不體何以能乆髙仰驕也卑俯替也驕近亂替近疾君爲主其先亡乎夏公薨後八年當哀公七年魯代邾以邾子歸子貢未爲至誠然能以礼􅀚之猶見其如此但借此事以證前知尓則至誠之前知可見矣心私則目僞二十五章此章第一誠字兼理與心言第二誠字專言理三四五誠字皆言心誠者自成也章句誠者物之所以自成又曰誠以心言盖經此句兼人物而言實理者物之所以自成人亦物也下誠者物之終始正應此句然人欲成已必其心眞實無妄乃能尓故曰誠以心言本也有是本則可以行道故曰道者人之所當自行又曰道以理言用也誠者物之終始物字兼事而言故人應物才不誠便如無此物不字則就人言之誠者物之終始不誠無物覆言誠者自成也是故君子誠之爲貴覆言道者自道也然不誠無物一句又是承上句接下句意誠者所以成物又言誠之用其廣如此語録克己復礼爲仁成己也智周乎萬物而道済天下成物也前自成謂自然而成後自成謂己自成就也兩自字不同成物知也對成己仁也􅀃二者是合外内之道外指成物内指成己旣合外内如此所以應事以時措之無不得其宜時措亦成己成物之事也上兩句是平􅀃成德德旣成則時措得宜所以下箇故字此言成德故仁在上孟子說入德故知在上性之德合外内之道此緫仁智而言時措之宜謂旣得於己則施之於事無不當也須㸔故字時措之宜卽時中時措隨時而措之宜乃中也二十六章二十一章言誠明明誠􅁇二十章天道人道而言二十二章以後相間言天道人道前言至誠與天地參次言至誠如神此又言不息配天地所以起頭著箇故字是􅁇二十二二十四兩章言至誠也此下二十七章連三章言人道三十章下連三章言天道次第極明整至誠無息惟至誠所以無息有虚假則間㫁矣惟無息乃見誠之至有息則非至誠矣此章言聖人乆於其道昭著於外而人可見者如此至誠積於中者乆則徴驗於外者自然悠逺而無窮悠逺則自博厚博厚則自髙明盖所積者廣博則其􅀔自然髙大所積者深厚則其精自然光明此两句是吕氏之意朱子以爲甚善聖人之道􅀶厚高明而已金聲玉振所過者化宫牆数仞􅀶厚之􅀋也精義入神所存者神天不可階高明之􅀋也字養其民聖人載物之􅀋也教化其下聖人覆物之􅀋也垂範作則利及萬丗皆悠乆成物之事也不見不動只是言聖人無爲下句又揔上二句地未甞有意於生物而百榖草木禽獸昆蟲皆粲然可􅀚是不見而章也天未甞有意変化萬物而有生之􅀋皆禀命於天是不動而変也自無爲而成以上是形容聖人之德天地之道以下至貨財殖焉是形容天地之大􅀚天地山海皆積而後大足以見聖人之德亦積而後盛引詩則以天比聖人之德天與聖人只是箇不已應前至誠無息天地山川非積累而大聖人生知安行其德亦非積累而盛故章句謂讀者不以辭害意是謂聖人之德悠乆而自昭著非謂始微而後著也是專就聖德功效處言之是固然矣然帝堯自明俊德以至于民変時雍豈無次第之序孔子自謂志于斈至於從欲不踰矩豈無造詣之漸由是􅀚之則子思四及其之言亦甚精密豈無意也章句悠乆兼内外而言盖乆即不息則乆之乆悠即悠逺之悠乆是内悠是外故曰兼内外朱子謂悠是據始以要終乆是隨處而常在又曰悠是自今􅀚後見其無終窮之意乆是就他骨子裏􅀃鎮常如此之意二十七章君子之道費􅀮言天地之道道之體也聖人之道洋洋優優言聖人之功業道之用也發育萬物非是比喻正言聖人裁成輔相神聖功化無大不㪯礼儀威儀是品節裁制文理宻察無細不周皆是聖人之至德而行至道處必如此然後盡聖人之用斈者知此標的自不容不斈而斈之方則在下五者此章當作兩節分聖人斈者㸔自首章至至道不凝焉言聖人之道大無不周細無不入必有聖人之至德然後道成自尊德性以下言君子斈以至聖人之道五句工夫極細宻二十章内博斈審問五句只􅀃得此道問斈三字尊德性道問斈緫下四句而言五句文􅀔皆相􅀋非尊德性則不能道問斈旣尊德性又不可不道問斈旣尊德性之後有所不知不能則問而知之斈而能之旣知旣能即須行之所謂道那問斈也心極廣大而裏面析理又須精微心極髙明而所行者不以一毫私意自蔽不以一毫私欲自累人意才有一毫之私則心量便窄狭而不廣大才有一毫爲物欲所累則心便卑汙而不髙明此兩句字面改換不得大小相資首尾相應大言上五節小言下五節首言尊德性道問學一句尾言下四句二十八章有位無德而作礼樂是愚而自用有德無位而作礼樂是賤而自專居周丗欲用夏殷之礼是今丗反古之道生乎今之丗以下是通􅀃上二句盖愚賤者不可作礼樂則居今之丗當遵守當代之法􅀂欲反用古之道即是改作矣必􅀗罪於上故曰烖及其身車同軌應制度書同文應考文行同倫應議礼車同軌是就制度中舉一事言之車輪行於地有迹謂之轍兩轍中間相去闊狹之度謂之軌古者車軌皆闊六尺六寸或不依此制則車亦杌􅥳不可行有司得以討其罪夏礼曰􅀃殷礼曰學盖孔子殷人也祀不足徴是􅂎全微文献皆不足以徴所言曰有宋存焉則宋猶能用殷礼未盡壞但非當時所用耳中庸所記聖言過於論語之精章句書名者書即字也名則其字之聲也如天字之形是書讀之曰天是名考者欲正其字形及讀之音聲語録倫是次序之体次序如等威節文之􅀋体如辨上下定民志君臣父子貴賤尊卑相接之体皆是二十九章本諸身以下六節只是本諸身一句是致力處下五節皆以爲徴驗尓君子之道即上三重謂有位之君子行此三重之道必本於此身之有德則自有下五者之應􅀂下五者不應是身無其德也則用其力以脩德上文四句下面兩句却只􅀃􅀑神聖人二者盖􅀑神乃天地氣之靈者􅀑神即該天地一句而以知天結之先聖後聖皆一揆聖人即該三王一句而以知人結之行已見於事有成法而可效故曰法言未見於事而其言可爲凖則而行之故曰則逺之不得見聖人者也近之親炙聖人者也皆指上文君子而言髙山仰止景行行止逺之則有望也無以我公歸􅀆無使我心悲􅀆近之則不厭也振鷺二王之後來助􅀕之詩也彼其國也謂二國之君在彼國無惡之者在此王國無厭之者故庶幾夙夜以長永終竟其声譽也中庸引之則所謂在彼無惡即逺之有望之意在此無斁即近之不厭之意言君子德盛道行民之敬慕愛戴如此故下文如此之此指本諸身以下六事也三十章二十六章言聖人至誠與天地同道自天地之道可一言而盡以下但言天地之盛大則聖人之盛大自見此章先言聖人與天地同道自萬物並育以下亦但言天地之大則聖人之大自見前章則引文王之詩以結之此章則以孔子之所行起之二章相表裏無非形容聖人之德也祖述憲章同於聖人即所謂考諸三王而不謬上律下襲同於天地即所謂建諸天地而不悖文武制作與堯舜固有不同夫子逺宗近守則中間自有合符節處所謂先聖後聖其揆一也或法天時或因水土無非中庸皆時措之宜也此章三節語録第一節言聖人工夫第二節言聖人之德如天地第三節言天地之大第二節兩辟如只是重疊比旣以天地比其經又以四時日月比其緯上􅀃平鋪處是横􅀃下􅀃接續處是竪􅀃天地覆載之間萬物竝育且如水與火金與木是相制者而各自有成萬􅀋推之自可見四氣流行生長成收各有其序而當生長之時物有死者當成􅀵之時物有生者日月代明東􅂛西没各有序而不亂第三節並行不相悖緫言四時日月並育並行兩句應上兩辟如字此言孔子德之全体不必就孔子已行之迹傳於今日者一一要相合但以此推古之得位聖人行事可見小德大德固言天地用以言聖人則敦化指心川流指事中庸分爲四大章前三章皆以孔子結之第一章自性命之原言之次以三逹德爲入道之門而以大舜爲首顔路則皆孔子之門人其後則曰吾弗爲之吾弗能已是以孔子折􅂨之也第二章言費􅀮之大其下歴叙大舜文武周公而次以孔子論政是又以孔子継羣聖之後也第三章言誠反覆於天道人道前旣言文王而又以孔子継王天下三重之後則是損益百王之道得時措之宜垂萬丗之法非孔子不可也後兩章至聖至誠分言小德川流大德敦化亦就此章而言其極耳孟子毎叙古之聖人必以孔子終之與子思之意一也子貢有􅀂皆曰自生民以來未有夫子豈一人之私言哉三十一章聦者無所不聞明者無所不見睿者無所不通智者無所不知此生知之聖緫下四者而言言其資質也寛廣大􅁉優厚温温和柔順從此仁也仁者度量寛廣足以容物故曰有容發奮起強有力剛不屈毅堅忍此義也義則操守堅固故曰有執齊心之齊莊貌之嚴中無過不及正不偏不􅀝中正以臨事言此礼也文礼密察知也四者言其成德也聦明雖義在耳目其實則主於心凡書之言聦明皆如此臨者自上臨下之義此謂聖人之德首出庶物然後足以臨下五也字上一也緫下四也聦明睿知生知之資而德之備就其中分而枚舉之則仁義礼知四者各有條理故章句於下言五者之德語録溥周徧􅀶宏大淵深沈泉便有箇發逹不已底意時出當用仁則仁出當用義則義出三十二章饒􅀟峰曰大經是道大本是性性乃大經之本也天地化育是命又大經大本之所自來也下文肫肫其仁是􅀃道淵淵其淵是說性浩浩其天是􅀃命性是成之者性指已定之理而言命謂􅁇之者善指理之流行而賦於物者言二者有動静之分故一屬地一屬天自聖人言之則静定而存主處即是性應用而流行處即是命其與天地之理一也故曰其淵其天惟知化育所以能立大本大本旣立故能經綸大經也前言聖之至極此言誠之至極盖聖者誠之用誠者聖之本前言如天如渊是衆人見聖人之溥博渊泉以爲如天如渊也此言其天其渊是聖人見得一般聖人溥博渊泉眞是天眞是渊非但如之而已經是分其條理綸是牽聮相合先經之然後可以綸之分而言之父當慈子當孝君當仁臣當敬各盡其道此經之􅀋也合而言之父子相處必盡親親之仁君臣相接必盡絜矩之義共成其善此綸之􅀋也其於五品之人倫事之大小莫不皆然此固至誠者之能事而脩道之敎即在其中無所􅀝只是至誠自然流出不須着力去做底意思上章至聖是發見於外者故衆人見其如天如淵而凡有血氣者皆尊親之此章至誠是言其在中者故曰其淵其天而唯聖人能知此聖人也前章言表此章言裏章句則曰前章言至聖之德德主積於内者言之也此章言至誠之道道主行於外者言之也盖聦明睿知之資仁義礼智之德雖見於外實溥博渊泉積於中者之所發也知化育立大本雖主於中而經綸大經其仁其天其渊者亦自外而見之也前言德推其本而言之後言道致其用而言之盖互相發也三十三章前言聖人至上章極矣此章又緫一篇之要自下斈立心之始推至於德化之極與首章相表裏首章是自内􅀃向外至於極此章是自外􅀃向内至於極衣錦尚絅一節絅褧同字書檾也三字音同檾枲属績以爲布盖用此布爲禪衣禪从衣从單音丹錦有文之衣也古者内服袍然後服裘又加衣謂之裼襌者即裼衣也爲錦衣有文太著故用䟽布以裼之不欲揚其文也今詩衣錦褧衣凡兩見而此言衣錦尚絅或是逸詩或是子思櫽栝緊要在尚字所以下卽自解曰惡其文之著也闇然即尚絅意闇然言君子脩德只是鞭辟近裏做工夫略無淺露表襮之意雖然却要日章日章是日日漸漸章著􅀂以爲不􅂋露不求人知只是向内却無積累之實終只昏暗安能有成闇􅀮晦皃的明也光的然小明昭灼之皃淡只是人倫日用之常無可喜可愕之事不厭者爲道不可離也簡是簡略非繁碎然秩然有序節奏詳宻故有文温是温厚温厚似混侖不分曉而條理斬然語録此工夫似淡而無味然做時却自可樂故不厭似乎簡略然大小精粗秩然有序温厚似不分暁而條目不可亂如此入細做工夫故能有下文三知之效知逺之近是以己對物言之知在彼之是非由在我之得失如行有不得反求諸己知風之自知其身之得失由乎心之邪正知微之􅂋又專指心􅀃就裏來可與入德如可與共學之可與章句絅之襲於外凡加於衣裘之上者謂之裼加裼上者謂之襲襲則礼服也絅則當爲裼此言襲只是謂重襲在衣裘之上者非裼襲之襲有爲己之心指兩君子之道知此三者指近自顯潜雖伏矣一節詩本言魚之潜於渊可謂伏藏之深然亦甚炤然而易見言禍亂之不可逃也此借之以言幾之存於心者雖深而莫見􅂋乎􅀮微言獨之不可不愼也潜伏皆藏義孔甚也昭明也人之所不見謂君子能致謹於人所不見而已獨知之之地相在爾室一節人居屋漏之中自視其身尚不分明以譬君子不但於人所不知己所獨知之地而愼之於己所不知之地亦所當愼也此即首章戒懼之事首章自内􅀃至外故先言戒懼而後言慎獨末章自外􅀃至内故先言慎獨而後言戒懼獨􅀄發之際不睹不聞未發之先也斈者慎獨乆而熟方能戒懼於不睹不聞内外工夫固當卒修並㪯然難易淺深亦不得不有先後之序也尚庻幾也戒辭也屋漏室西北隅上爲圎竅以通明則其下反暗人處其地則非獨人不見已分曉已亦自見不分曉視在尓室中屋漏之下庶幾能自謹而無愧于心以明不睹聞致戒慎之意不動敬不言信是信敬在言動之前奏假無言一節君子誠心進於神明而其感格不待言􅀃誠之至也則下民亦不待言􅀃而自化矣然􅀑神幽也人道明也本爲兩途今我之誠旣能感幽而况與我同明者乎不􅂋惟德一節不􅂋有二義一謂無迹可㝷而不􅂋著一謂不發揚二􅀃俱存其義始備篤恭而天下平即垂拱而天下治之意其功效至此已盡下叚只是形容不􅂋之妙章句篤恭言不􅂋其敬也謂自厚於恭敬未甞見於言動之間予懷明德一節以無聲無臭形容不􅂋之妙則聖人之道幾於虚無矣而曰上天之事此所以爲聖人之道也君子惟能慎獨又於不睹不聞而戒懼不使心之所存所發有一毫不誠乆而此心渾然天理人莫之知但見其應事接物從容中道與天爲一尓則不􅂋之妙也此所謂聖而不可知之謂神也章末三引詩皆是言聖人德之不􅂋最後所引只是無声無臭一句形容不􅂋之極上天之載一句是帶來􅀃詩中言天之道無聲􅆨中庸則言德之無声􅆨也德夲不可以声臭言此但言無之極耳然上天之事無声臭聖人之德亦如之聖人即天也則此一句亦不是虚引此章雖自下斈立心入德􅀃來以至於極分作六節然第一節只是􅀃用心向内第二節乃言慎獨第三節言戒懼惟此兩項工夫而已下三節五引詩皆是言效中庸始終合一之圗讀中庸叢􅀃卷下
